ě takhle nedoporučí, která vlastně zkušeností je skvělá, tak prostě, jak to má udělat? '", "summary": "Problém s portfoliem - Bariéra kvůli NDA: protože designéři často nesmí ukazovat svou reálnou práci, pokud projekt není veřejný", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hmEdihMetjtG0Z0WrC8Ou", "video_clip": "[video highlight_clip_pElXwR.mp4 00:00.4-00:28.7]", "tags": {}}, {"id": "o8PjL9i6ieEf7mCuuq52", "text": "[Speaker 2] 'Jako může to anonymizovat samozřejmě, ale otázka je, jestli pak něco řekne. Nedokážu posoudit. Ale jako za mě byl fakt problém s tím portfoliem, že vlastně všude vždycky chtějí to portfolio. A jakože, a hlavně třeba já mám další věc, já jsem byla na rodičáku jako 5 let a říkám, pracovala jsem u něj, ale hypoteticky jsem nemusela. A co já jim budu ukazovat věci, co jsem dělala před 6 lety? Jako fakt? Jako něco, kdy AI vůbec nebylo v té době, vůbec. Ta Figma se jenom za tu dobu, než začal Covid a než jsem šla na rodičák, tak změnila, že prostě to je úplně jiný nástroj. A jakože na těch obrázcích nikdo nikdo nepochopí, jak přemýšlím.'", "summary": "Problém s portfoliem - Zastaralost práce po pauze: po rodičovské je staré portfolio nepoužitelné; obrovský posun v nástrojích (Figma) i technologiích (AI).", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h6sq2gCwohdnIgXvvPuYS", "video_clip": "[video highlight_clip_o8PjL9.mp4 00:01.5-00:44.3]", "tags": {}}, {"id": "XiwVrRsROl64AFXtOxdx", "text": "[Speaker 2] 'Já jsem Marek, designu dělám už asi druhou dekádu bych řekl, začal jsem u printu a přetiskové přípravy a dostal jsem se přes internetový marketing k webům, které jsem dělal před asi 15 lety, tak nějak. A postupně jsem začal pracovat pro větší organizace, kde jsem začal zjišťovat, že kromě toho designu mě baví i zlepšovat procesy. A tak jsme třeba s kamarádem dělali plugin do InDesignu, který zlepšoval nějaký guide prostě pro jak používat materiály v InDesignu. A toho si všiml jiný kolega, který potom, když přestoupil do firmy, tak mě přitáhl do technologické firmy americké, kde jsem začal dělat user experience designera. Netušil jsem, co to obnáší, takže první dva roky byly kruté pro mě, ale nějak jsem zjistil, co je očekávání a ten obor byl novej tady u nás v Česku. A zjistil jsem, že mě to hrozně baví pomáhat, přicházet na to, co je vlastně ten správný způsob, jak komunikovat informaci.'", "summary": "Print → weby → UX (americká tech firma). 20+ let. Baví ho dopad — “fungovalo to.”", "session": "P1", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hQguM5JIjq9dMvx5Ayd04", "video_clip": "[video highlight_clip_XiwVrR.mp4 00:00.3-01:18.1]", "tags": {"Default group": ["Background", "Workflow / Chování"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"]}}, {"id": "9PYjOBDVoIa31JZ1f3aJ", "text": "[Speaker 2] 'No tak samozřejmě, když člověk musí dělat věci do šuplíku. Takový, že je na projektu a je do toho zažranej a za pár měsíců se dozvíš, že to nedostalo priority. Nebo že na to není budget. Nebo že ten týden bude dělat rok něco jiného a tak dále. Takže tyhle věci, člověk do toho investuje nějakou energii a zjistí, že potom, že vlastně musí to zahodit nebo odložit a vlastně v téhle oblasti user experience je to něco, co vlastně nechceš, protože víš, že to budeš muset dělat skoro od nuly.'", "summary": "Frustrace z práce do šuplíku — investovaná energie, zrušená priorita, restart od nuly.", "session": "P1", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hlx4mBlVvYp0E7xkmzHWe", "video_clip": "[video highlight_clip_9PYjOB.mp4 00:01.3-00:36.8]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Kandidát"], "Default group": ["Motivátory & Bariéry"], "Intenzita": ["Neutrálně"]}}, {"id": "6KX3jnLMqD4Vi1dax06N", "text": "[Speaker 2] 'No já jsem, já mám pocit, že jsem na rozhraní nyní. Že je to rozhraní, že bych možná raději jako se bavil s lidma o tom, jak pracujou, než přímo pracovat v tom designu. Takže o tom trochu přemýšlím, jako taky vzadu v hlavě, jakože co by nemohl vést lidi, nebo jim pomáhat v tom designu. A souvisí to i s tím, jak se ten design teď jako drasticky mění. A možná, že ta potřeba těch hands on designerů bude menší, ale bude větší potřeba zamýšlet se nad tou strukturou a nad tou vlastně prací samotnou, jako nad tím dopadem, nad tím co je cílem té práce. Takže tak lehce přemýšlím teď jako nad tím, jakože co by to znamenalo, kdybych dělal méně design, ale víc bych se věnoval lidem, kteří dělají design.' [Speaker 1] 'A co tě k tomu vlastně přivedla? Tady k tomu přemýšlení, jako jsou. To jsou ty okolnosti, které zmiňuješ, to znamená, design se mění, nebo to byla?' [Speaker 2] 'Design se mění, přesně tak. A já vidím, jakože ti lidi mají touhu třeba dělat ty věci, ale prostě neví jak, nebo netuší, jakože že jsou jako různé cesty. Takže jo, takže nějaké předávání zkušenosti a zároveň jako já se hrozně učím teď. Strašně moc si učím ty věci a není to jako jednosměrka, jako možná to zase spadne zpátky, že budu třeba dělat víc ten design, ale jiným způsobem.'", "summary": "Na rozhraní IC → leadership. AI mění design → méně hands-on, více strategic + vedení lidí.", "session": "P1", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hcEIik1VIKpQ5n8Az5Zwy", "video_clip": "[video highlight_clip_6KX3jn.mp4 00:01.6-01:43.4]", "tags": {"Hypotézy": ["Emergent", "H3"], "Default group": ["Industry insights", "Motivátory & Bariéry"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "UUBUlorthojdhwPYKWFE", "text": "[Speaker 2] 'Dobře, takže přeskočím o rok dozadu, já jsem mezi tím měl půlroční takové, jakože, já tomu teď říkám epizoda pracovní, protože v podstatě to byla epizoda, vlastně to skončilo kontraktorským jako jobem. A vlastně já jsem pracoval ve firmě, technologické firmě, pět let jsem tam pracoval a už během té práce v té firmě jsem čas od času se koukal na job offers. Čistě z toho důvodu, že i když jsem tu práci jako měl fajn a ten tým byl skvělej, tak mě zajímalo, jak se ten trh jako vyvíjí. Obecně, že jsem koukal na LinkedIn, třeba na nabídky firem, koukal jsem se na to jako, co se očekává a tak dále. A vlastně moje bývalá šéfka mi vlastně tehdy hodně doporučovala, hele, i když pracuješ na věcech, tak si dělej to portfolio průběžně, protože já jsem obvykle kvartálně tak nějak jako si dělal jako nějaký náhled té své práce. A to potom hodně pomohlo, protože firma udělala drastické škrty, zrušili z týdnu na týdne tam zrušili tři týmy prostě a já jsem byl součástí jednoho tohoto týmu UXovýho, takže tam z UX týmu zůstali dva lidi prostě z osmi nebo ze sedmi, prostě oni udělali prostě radikální řez. Takže to bylo první jako impuls byl vyloženě takový jako šokový náraz, že jsem říkal, aha, tak teď to přišlo a já potřebuji vyhledat práci. Bylo to v prosinci, což jsem zjistil, že prosinec a leden jsou nejhorší měsíce na hledání práce, protože ty budgety jsou už vyčerpaný a nikdo ještě nemá nový budgety na další rok. Souvisí to s účetními uzávěrkami, takže nabídky, které byly, byly jako zbytky z toho roku, co zbyly a potom nebyly žádný'", "summary": "Layoff šokový náraz — z 8členného UX týmu zůstali 2. “Prosinec/leden = nejhorší měsíce na job search — budgety vyčerpány.”", "session": "P1", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hrXENWsRWF4QdSIftW7qQ", "video_clip": "[video highlight_clip_UUBUlo.mp4 00:01.3-02:10.7]", "tags": {"Hypotézy": ["Emergent"], "Default group": ["Industry insights", "Workflow / Chování"], "Perspektiva": ["Kandidát"], "Emoce": ["Překvapení"], "Intenzita": ["Silně"]}}, {"id": "n5oaiP945gaHK5yfsUe1", "text": "[Speaker 2] 'Jo, takže já jsem šel na to přes jako přátelé a síť jako známých, kteří neví o něčem třeba, takhle se poptal, ale asi nejvíc mi pomohl vlastně LinkedIn bych řekl. Pak jsem se díval na jobový portály, jako vyloženě jako search a tam jsem skončil jako, že myslím na rakouských nebo prostě německých portálech. Prostě mě zajímala oblast jako střední Evropy, nechtěl jsem to úplně loknout přímo na Česko a některé ty inzeráty byly vypsaný třeba někde na jakém rakouským portále pro Prahu. No takže jako moje cesta byla vlastně, že jsem já mám systematicky udělaný Trello board prostě na job search. Prostě kanban typický, do jednoho sloupce jsem si házel jako nabídky, které mě nějakým způsobem zaujaly, nebo firmy, které mě zaujaly. A pak jsem prostě poslal odpověď na to a čekal jsem, co bude dál. Mezitím taky jako vyladil portfolio, ale to byl tak jako proces, že jsem si k tomu vlastně přizval jako bývalou kolegyni, seniornější, které mi dělaly prostě nějaké overview nad tím a zjistil jsem, že vlastně potřebuji jako si zlepšit třeba i v téhle prezentaci a tak dále. No a občas se někdo ozval. Já jsem vlastně oslovil v období prosinec březen čtrnáct firem a mám statistiky vlastně. Já jsem se koukal, udělal jsem si Sankey graf prostě a z toho čtyři byly bez odpovědi v podstatě. Nebo jedna odpověděla ne rovnou a tři vůbec a do deseti firem jsem se dostal do prvního kola pohovoru nějakého prostě.'", "summary": "Trello kanban + Sankey graf na 14 firem (XII–III). Rozšířil na střední Evropu. Funnel: 14 → 4 bez odpovědi → 10 screening.", "session": "P1", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hXsrmkI26mlG7yPNg40h5", "video_clip": "[video highlight_clip_n5oaiP.mp4 00:00.7-02:10.7]", "tags": {"Hypotézy": ["H2"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"], "Default group": ["Workarounds", "Workflow / Chování"]}}, {"id": "KFqGNFeHb1WBYgSFdn0U", "text": "[Speaker 2] 'No já mám nějakou menší znalost němčiny. A já už neznám ty názvy, já bych se přiznal. Byly dva. Glassdoor. Počkej, Glassdoor je americký. A ještě něco. A já si teď nespomenu jako z hlav  "[video highlight_clip_wfPv8u.mp4 00:01.6-01:21.7]", "tags": {"Emoce": ["Důvěra"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady", "Trust signals"], "Intenzita": ["Velmi silně"]}}, {"id": "pAUHCC7LmN85jtWzJz8C", "text": "[Speaker 2] 'Tři, čtyři bych řekl, tři, čtyři z těch deseti případech užitečné zpětné vazby. A užitečnost to pro mě znamená, teda to, že to je konkrétní, že to reaguje na tu vaši společnou zkušenost, že to není jako abstraktní nějaké hodnocení. Přesně tak.'", "summary": "3-4/10 firem dalo užitečný feedback. Užitečnost = konkrétní, reaguje na společnou zkušenost. 60-70 % neužitečné/žádné.", "session": "P1", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hfVb0pCXhKl885F5YSgI9", "video_clip": "[video highlight_clip_pAUHCC.mp4 00:01.4-00:02.3]", "tags": {"Hypotézy": ["H2"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Pain points"]}}, {"id": "O8CjSY7oI06PnNimych8", "text": "[Speaker 2] 'Je to věc, kterou řeším asi tři roky bych tak řekl trochu intenzivněji, protože ve firmě, kde jsem pracoval předtím, jsme řešili tu tranzici, kdo bude lídovat ten tým. Já jsem byl jako jeden z těch kandidátů. Já jsem vlastně v podstatě pořád řešil vlastně, co to znamená a jaké budou ty dopady a tak dále. A ono to bylo ve firmě, kdy prostě ta struktura byla hodně rigidní a lídovat tým znamenalo prostě být dvě třetiny na mítinzích, které prostě nevedou k nějakému prostě — takže jako to byl asi hlavní důvod, proč jsem jako nechtěl.'", "summary": "3 roky aktivně řeší profesní rozvoj. Silné stránky: prezentace (festival 5000 lidí), facilitace konfliktů. Odmítl leadership kvůli rigiditě.", "session": "P1", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hcteZ3lLpijeuEwaVXCy1", "video_clip": "[video highlight_clip_O8CjSY.mp4 00:00.7-00:45.0]", "tags": {"Default group": ["Existing solutions", "Workflow / , jestli na to upozorní, jestli si to všimne'", "summary": "Hiring process jako lead: tři části — (1) skill check, (2) konverzační interview, (3) team fit", "session": "P1", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hkLGWBkqW7E5Ghz2uDmdJ", "video_clip": "[video highlight_clip_fYD9Ha.mp4 00:01.8-02:20.5]", "tags": {"Default group": ["Existing solutions", "Workflow / Chování"], "Hypotézy": ["H1"], "Perspektiva": ["Lead"], "Intenzita": ["Silně"]}}, {"id": "6TX3ys4x3F0sRjSrWDpM", "text": "[Speaker 2] 'Nás zajímalo, jak ten člověk bude jako se chovat v nějakém přirozenějším prostředí, ne ať to není jakože test, ale ať je prostě nějaký rozhovor nad ničím. Tak jsme mu ukázali třeba kus nějakého designu a řekli jsme, hele, teď jsme tady tohle řešili, a máme tyhle nápady, co si o tom myslíš, jo, třeba tímhle způsobem'", "summary": "Hiring process jako lead: “Nás zajímalo, jak se chová v přirozenějším prostředí” Konverzační formát > testový formát.", "session": "P1", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hUgwsGSdaFcRjvHXWswir", "video_clip": "[video highlight_clip_6TX3ys.mp4 00:01.3-00:19.0]", "tags": {"Default group": ["Existing solutions", "Workflow / Chování"], "Hypotézy": ["H1"], "Perspektiva": ["Hiring manager"]}}, {"id": "AM8d1DfyOUJbXfTsSG6P", "text": "[Speaker 2] 'No, jako já nemyslím, že je dobře, že na pohovoru jako jeden na jednoho. Já mám radši, když tam jsou třeba ti dva lidé, prostě nějaký jako člověk, který třeba je ten decision maker a nějaký prostě k tomu, že je to více taková konverzace i mezi těmi lidmi. My jsme zjistili třeba, když jsme nabírali, že my se třeba mezi sebou pobavíme krátce, že ten člověk potom má pocit, že je součástí spíš rozhovoru, ne výslechu. Pro nás to bylo jako klíčové, že jsme si třeba navzájem řekli něco před ním. Taková jako věc, která mi přišla užitečná i třeba pro nás, že on neměl pocit, že musí pořád mít na všec y, dovolený a tak. To jsou tyhle věci.'", "summary": "Pulsní hiring: focus 3 týdny, pak nic, pak vlna. Celý proces až 6 měsíců. Sezónnost. GTM insight: timing musí reflektovat vlny.", "session": "P1", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hlnjQKcKpdw5Es4gKsBHD", "video_clip": "[video highlight_clip_HqXR8h.mp4 00:00.1-01:06.8]", "tags": {"Hypotézy": ["Emergent"], "Default group": ["Industry insights"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}];
const HYPOTHESES = {"H5": {"label": "Designéři jsou ochotní projít assessmentem, pokud z toho mají hodnotu (self-insight, viditelnost)", "category": "kill-or-go"}, "H6": {"label": "Zaměstnavatelé jsou ochotní platit za pre-vetted designéry s validovaným profilem — místo stávajících kanálů", "category": "kill-or-go"}, "H11": {"label": "Existují seniorní designéři ochotní provádět placené assessment sessions pro jiné designéry — a platforma dokáže tuto práci zefektivnit natolik, aby ekonomika fungovala", "category": "kill-or-go"}, "H1": {"label": "Zaměstnavatelé nemají spolehlivý způsob, jak hodnotit designéry — a vnímají to jako problém", "category": "důležité"}, "H2": {"label": "Zaměstnavatelé jsou přetíženi objemem nekvalitních uchazečů a nemají efektivní způsob filtrace", "category": "důležité"}, "H4": {"label": "Strukturovaný assessment dokáže lépe predikovat úspěch designéra než portfolio review", "category": "důležité"}, "H7": {"label": "2FRESH competency framework je přenositelný mimo interní použití", "category": "důležité"}, "H12": {"label": "AI-asistovaný assessment proces dokáže zkrátit assessor time z 4–5h na ~1.5h bez ztráty kvality hodnocení", "category": "důležité"}, "H3": {"label": "Junioři nemají cestu do profese a senioři nemají způsob, jak prokázat svou hodnotu", "category": "strategické"}, "H8": {"label": "Český/CEE trh je dostatečný beachhead pro launch", "category": "strategické"}, "H9": {"label": "\"Building in public\" + komunita vytvoří organickou trakci bez velkého marketingového budgetu", "category": "strategické"}, "H10": {"label": "Existuje revenue model, který funguje pro všechny tři strany marketplace (designéři + zaměstnavatelé + assessoři)", "category": "strategické"}};
const FILTERS = {
  "Hypotézy": new Set(),
  "Verdict": new Set(),
  "Default group": new Set(),
  "session": new Set(),
  "cohort": new Set(),
  "Intenzita": new Set(),
  "Perspektiva": new Set(),
  "Emoce": new Set(),
};
const SORT = {
  "Hypotézy": "abc",
  "Verdict": "abc",
  "Default group": "count",
  "session": "abc",
  "cohort": "abc",
  "Intenzita": "abc",
  "Perspektiva": "abc",
  "Emoce": "count",
};
const FILTER_LABELS = {
  "Hypotézy": "Hypotéza",
  "Verdict": "Verdict",
  "Default group": "Kategorie",
  "session": "Respondent",
  "cohort": "Cohort",
  "Intenzita": "Intenzita",
  "Perspektiva": "Perspektiva",
  "Emoce": "Emoce",
};
const VERDICT_ORDER = ["Go", "Unknown", "Kill"];
const VERDICT_EMOJI = { "Go": "🟢", "Kill": "🔴", "Unknown": "🟡" };
const INTENSITY_ORDER = ["Velmi silně", "Silně", "Neutrálně"];

function natCmp(a, b) {
  // Natural sort: H1, H2, ..., H10, H11 (not H1, H10, H11, H2)
  return a.localeCompare(b, "cs", { numeric: true, sensitivity: "base" });
}

function valuesFor(h, group) {
  if (group === "session") return [h.session];
  if (group === "cohort") return h.cohort ? [h.cohort] : [];
  return h.tags[group] || [];
}

function getFacetValues(group) {
  const counts = new Map();
  for (const h of DATA) {
    for (const v of valuesFor(h, group)) counts.set(v, (counts.get(v) || 0) + 1);
  }
  let entries = [...counts.entries()];
  if (group === "Intenzita") {
    entries.sort((a,b) => INTENSITY_ORDER.indexOf(a[0]) - INTENSITY_ORDER.indexOf(b[0]));
  } else if (group === "Verdict") {
    entries.sort((a,b) => VERDICT_ORDER.indexOf(a[0]) - VERDICT_ORDER.indexOf(b[0]));
  } else if (SORT[group] === "abc") {
    entries.sort((a,b) => natCmp(a[0], b[0]));
  } else {
    entries.sort((a,b) => b[1]-a[1] || natCmp(a[0], b[0]));
  }
  return entries;
}

function applyFilters() {
  return DATA.filter(h => {
    for (const [group, selected] of Object.entries(FILTERS)) {
      if (selected.size === 0) continue;
      const vals = valuesFor(h, group);
      if (!vals.some(v => selected.has(v))) return false;
    }
    return true;
  });
}

function renderSidebar() {
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";
  for (const group of Object.keys(FILTERS)) {
    const heading = document.createElement("h3");
    const label = document.createElement("span");
    label.textContent = FILTER_LABELS[group];
    heading.appendChild(label);
    if (group !== "Intenzita" && group !== "Verdict") {
      const toggle = document.createElement("span");
      toggle.className = "sort-toggle";
      toggle.innerHTML = `
        <button data-sort="abc" class="${SORT[group]==='abc'?'on':''}">A→Z</button>
        <button data-sort="count" class="${SORT[group]==='count'?'on':''}">#</button>
      `;
      toggle.querySelectorAll("button").forEach(btn => {
        btn.onclick = () => { SORT[group] = btn.dataset.sort; render(); };
      });
      heading.appendChild(toggle);
    }
    sidebar.appendChild(heading);
    const chips = document.createElement("div");
    chips.className = "filter-group";
    for (const [val, count] of getFacetValues(group)) {
      const chip = document.createElement("span");
      let extraClass = "";
      let prefix = "";
      if (group === "Verdict") {
        extraClass = " verdict-" + val.toLowerCase();
        prefix = (VERDICT_EMOJI[val] || "") + " ";
      }
      chip.className = "chip" + extraClass + (FILTERS[group].has(val) ? " active" : "");
      chip.innerHTML = `${prefix}${val}<span class="count">${count}</span>`;
      // Tooltip pro hypotézy
      if (group === "Hypotézy" && HYPOTHESES[val]) {
        chip.title = HYPOTHESES[val].label;
      }
      chip.onclick = () => {
        if (FILTERS[group].has(val)) FILTERS[group].delete(val);
        else FILTERS[group].add(val);
        render();
      };
      chips.appendChild(chip);
    }
    sidebar.appendChild(chips);
  }
  const reset = document.createElement("button");
  reset.className = "reset";
  reset.textContent = "Reset filtrů";
  reset.onclick = () => {
    for (const k of Object.keys(FILTERS)) FILTERS[k].clear();
    render();
  };
  sidebar.appendChild(reset);
}

function renderAggregation(filtered) {
  const respondents = new Set(filtered.map(h => h.session));
  const tally = (group) => {
    const m = new Map();
    for (const h of filtered) for (const t of h.tags[group] || []) m.set(t, (m.get(t)||0)+1);
    return [...m.entries()];
  };
  const hypCounts = tally("Hypotézy").sort((a,b) => natCmp(a[0],b[0]));
  const catCounts = tally("Default group").sort((a,b) => b[1]-a[1]);
  const intCounts = tally("Intenzita").sort((a,b) => INTENSITY_ORDER.indexOf(a[0]) - INTENSITY_ORDER.indexOf(b[0]));
  const emCounts = tally("Emoce").sort((a,b) => b[1]-a[1]);
  const verdCounts = tally("Verdict").sort((a,b) => VERDICT_ORDER.indexOf(a[0]) - VERDICT_ORDER.indexOf(b[0]));
  const sessCounts = [...new Set(filtered.map(h=>h.session))].sort(natCmp).map(s => [s, filtered.filter(h=>h.session===s).length]);
  const cohCounts = (() => {
    const m = new Map();
    for (const h of filtered) if (h.cohort) m.set(h.cohort, (m.get(h.cohort)||0)+1);
    return [...m.entries()].sort((a,b) => b[1]-a[1]);
  })();

  const maxOf = (arr) => Math.max(1, ...arr.map(([_,n])=>n));

  const block = (title, entries, opts = {}) => {
    if (entries.length === 0) return "";
    const max = maxOf(entries);
    const rows = entries.map(([k,v]) => {
      const prefix = opts.verdict ? (VERDICT_EMOJI[k] || "") + " " : "";
      const barClass = opts.verdict ? "agg-bar verdict-" + k.toLowerCase() : "agg-bar";
      return `
        <div class="agg-row"><span>${prefix}${escapeHtml(k)}</span><span class="v">${v}</span></div>
        <div class="${barClass}" style="width:${(v/max*100).toFixed(0)}%"></div>
      `;
    }).join("");
    return `<div class="agg-block"><h4>${title}</h4>${rows}</div>`;
  };

  // Hypothesis context — pro každou zapnutou hypotézu zobraz její plný text
  let hypContextHtml = "";
  const selH = [...FILTERS["Hypotézy"]].filter(h => HYPOTHESES[h]).sort(natCmp);
  if (selH.length > 0) {
    const rows = selH.map(h => {
      const meta = HYPOTHESES[h];
      const catColor = meta.category === "kill-or-go" ? "#C62828" : meta.category === "důležité" ? "#E68900" : "#2E7D32";
      return `
        <div class="hyp-context-row">
          <div class="hyp-context-tag" style="background:${catColor}">${h} · ${meta.category}</div>
          <div class="hyp-context-text">${escapeHtml(meta.label)}</div>
        </div>
      `;
    }).join("");
    hypContextHtml = `<div class="hyp-context">${rows}</div>`;
  }

  // Verdict-per-hypothesis breakdown when single hypothesis is selected (H5/H6/H11 special)
  let verdictBreakdownHtml = "";
  if (selH.length === 1 && ["H5","H6","H11"].includes(selH[0])) {
    const h = selH[0];
    const breakdown = { Go: 0, Kill: 0, Unknown: 0, "(bez verdictu)": 0 };
    for (const item of filtered) {
      const verdicts = item.tags["Verdict"] || [];
      if (verdicts.length === 0) breakdown["(bez verdictu)"]++;
      for (const v of verdicts) breakdown[v] = (breakdown[v]||0)+1;
    }
    const total = filtered.length;
    const pct = (n) => total ? ((n/total)*100).toFixed(0) : 0;
    verdictBreakdownHtml = `
      <div class="hyp-verdict-banner">
        <div class="hvb-title">Verdict breakdown — ${h}</div>
        <div class="hvb-row">
          <div class="hvb-cell verdict-go"><span class="hvb-num">🟢 ${breakdown.Go}</span><span class="hvb-lbl">Go (${pct(breakdown.Go)}%)</span></div>
          <div class="hvb-cell verdict-unknown"><span class="hvb-num">🟡 ${breakdown.Unknown}</span><span class="hvb-lbl">Unknown (${pct(breakdown.Unknown)}%)</span></div>
          <div class="hvb-cell verdict-kill"><span class="hvb-num">🔴 ${breakdown.Kill}</span><span class="hvb-lbl">Kill (${pct(breakdown.Kill)}%)</span></div>
          <div class="hvb-cell verdict-none"><span class="hvb-num">⚪ ${breakdown["(bez verdictu)"]}</span><span class="hvb-lbl">Bez verdictu</span></div>
        </div>
      </div>
    `;
  }

  document.getElementById("agg").innerHTML = `
    <h2>Agregace ${filtered.length === DATA.length ? "(všechna data)" : "(filtrovaná data)"}</h2>
    <div class="agg-headline">
      <div class="item"><div class="num">${filtered.length}</div><div class="label">Highlights</div></div>
      <div class="item"><div class="num">${respondents.size}</div><div class="label">Respondentů</div></div>
      <div class="item"><div class="num">${hypCounts.length}</div><div class="label">Hypotéz</div></div>
      <div class="item"><div class="num">${verdCounts.reduce((a,[,n])=>a+n,0)}</div><div class="label">Verdict tagů</div></div>
    </div>
    ${hypContextHtml}
    ${verdictBreakdownHtml}
    <div class="agg-grid">
      ${block("Hypotézy", hypCounts)}
      ${block("Verdict", verdCounts, {verdict: true})}
      ${block("Cohort", cohCounts)}
      ${block("Kategorie", catCounts)}
      ${block("Intenzita", intCounts)}
      ${block("Respondenti", sessCounts)}
      ${block("Emoce", emCounts)}
    </div>
  `;
}

function renderCards(filtered) {
  const container = document.getElementById("cards");
  document.getElementById("count").textContent = `${filtered.length} z ${DATA.length}`;
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty">Žádné highlighty neodpovídají filtrům.</div>`;
    return;
  }
  filtered.sort((a,b) => {
    const ord = {"Velmi silně": 0, "Silně": 1, "Neutrálně": 2};
    const ia = Math.min(...((a.tags["Intenzita"]||["Neutrálně"]).map(t=>ord[t] ?? 99)));
    const ib = Math.min(...((b.tags["Intenzita"]||["Neutrálně"]).map(t=>ord[t] ?? 99)));
    return ia - ib;
  });
  container.innerHTML = filtered.map(h => {
    const hyps = (h.tags["Hypotézy"]||[]).map(t=>`<span class="tag hypothesis">${t}</span>`).join("");
    const cats = (h.tags["Default group"]||[]).map(t=>`<span class="tag">${t}</span>`).join("");
    const ints = (h.tags["Intenzita"]||[]).map(t=>{
      const cls = t==="Velmi silně" ? "intensity-velmi" : t==="Silně" ? "intensity-silne" : "";
      return `<span class="tag ${cls}">${t}</span>`;
    }).join("");
    const ems = (h.tags["Emoce"]||[]).map(t=>`<span class="tag emotion">${t}</span>`).join("");
    const persp = (h.tags["Perspektiva"]||[]).map(t=>`<span class="tag">${t}</span>`).join("");
    const verds = (h.tags["Verdict"]||[]).map(t=>{
      const cls = "verdict-" + t.toLowerCase();
      return `<span class="tag ${cls}">${VERDICT_EMOJI[t] || ""} ${t}</span>`;
    }).join("");
    const coh = h.cohort ? `<span class="tag cohort">${escapeHtml(h.cohort)}</span>` : "";
    return `<div class="card">
      <div class="summary">${escapeHtml(h.summary)}</div>
      <div class="quote">${escapeHtml(h.text)}</div>
      <button class="quote-toggle" onclick="this.previousElementSibling.classList.toggle('expanded'); this.textContent = this.previousElementSibling.classList.contains('expanded') ? '— sbalit' : '+ rozbalit'">+ rozbalit</button>
      <div class="meta">
        <span class="session">${escapeHtml(h.session)}</span>
        ${coh}${hyps}${verds}${cats}${ints}${persp}${ems}
        ${h.link ? `<a class="link" href="${h.link}" target="_blank">▶ Condens</a>` : ""}
      </div>
    </div>`;
  }).join("");
}

function escapeHtml(s) {
  return (s||"").replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

function render() {
  const filtered = applyFilters();
  renderSidebar();
  renderAggregation(filtered);
  renderCards(filtered);
}

render();
</script>
