ou cestou to udělají (…) Tady k tomuhle jsem taky měla přirovnaní (…). je to jako s vařením. Každý si dokáže uvařet ty méchané vajíčka. Ale je dost velký rozdíl mezi tím, jestli si dáte vajíčka v michellinu, anebo prostě někde tady v pátý cenový. '", "summary": "Buyer mapping: ideal = TA manager (strategický), korporát = HM ad hoc. “Vajíčka v Maršelinu vs. ve večerce.”", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hrWgo5d9hmmuxpITPGg0q", "video_clip": "[video highlight_clip_8DIGQ2.mp4 00:00.2-01:26.9]", "tags": {"Verdict": ["Go"], "Hypotézy": ["H10", "H12", "H6"], "Default group": ["Industry insights"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "COoXlxIDKGKwG5aQhFTB", "text": "[Speaker 1] 'Jo tady je to spíš asi o těch feedbackích, o tom, aby se dávaly jasný a technický feedbacky těm lidem. Protože v mou případech prostě v tom objemu a další aspekty do toho jako vstupují, tak vám přijde ta generická odpověď. A to je ještě dobrý. Prostě nikdy nedostanete po třech týdnech vůbec nic, i když jste už zbyl na dvou kolech. Takže za mě jako co by měly jako všechny firmy napříč jako zlepšit, tak je právě ta jako postkomunikace s těma lidma a práce s těma datama a lidma, který už viděli a s kterýma prošli. Takže to si myslím, že se moc neděje, že vlastně jako se to pořád valíte před sebou jako to nový.'", "summary": "Universal pain confirmed: post-process komunikace s kandidáty. “Nikdy nedostanete vůbec nic po dvou kolech.” Latent talent pool zapomenutý.", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hVSq8HmYRn5DUUiv3wqjR", "video_clip": "[video highlight_clip_COoXlx.mp4 00:00.7-00:43.7]", "tags": {"Hypotézy": ["Emergent", "H1", "H3"], "Default group": ["Existing solutions", "Pain points"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "T2cNBeR3NU2hoYfvo1Y6", "text": "[Speaker 2] 'No ono vlastně PeopleGuru vzniklo před těma deseti rokama plus minus jako agentura pro vyhledávání IT specialistů vlastně v Česku. My jsme se utrhli tenkrát jako dva sales manažeři, kteří dělali hlavně obchod, ale taky vyhledávání IT specialistů vlastně v Cool People. Tam jsme skončili asi po roce a půl, po dvou letech. Naučili jsme se ten biznis a jakož s Vojtou jsme se znali, z výšky od roku 2008, kdy jsme spolu byli na ekonomce, tak jsme si věřili a šli jsme spolu do biznisu a jsme tam v tom doteď. A vlastně ten biznis funguje na vyhledávání IT specialistů, to je people guru, do různých bank, pojišťoven, software houseů, jak v Česku. (…) No a vlastně part time vznikl z toho důvodu, on teda už teďka nefunguje. My jsme ho měli 6-7 let, teďka jsem ho tam ještě nezavřel na linkáči. (…) Mysleli jsme si, teze byla taková, že firmy by chtěly lidi i na part-time třeba. (…) Ale ono to prostě nefungovalo, firmy to úplně nechtěly, my jsme to jako šilovali všude možný, kde jsme mohli, ale prostě se to nesetkalo s úspěchem, tak jsme v tom vzpálili pár stovek tisíc.'", "summary": "PeopleGuru = IT recruitment agency 10 let. PART-TIME.cz = matchmaking projekt — firmy nechtěly, projekt v útlumu.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hAtIqWEnS69bBhKQKEGhV", "video_clip": "[video highlight_clip_T2cNBe.mp4 00:00.0-01:44.2]", "tags": {"Default group": ["Industry insights", "Workflow / Chování"], "Intenzita": ["Neutrálně"], "Perspektiva": ["Recruiter"]}}, {"id": "9qOAGmzLNv4zjQh1KCCc", "text": "[Speaker 2] 'Oni holky jsou teďka na mateřský, všechny, co tam jsou, a máme dva externisty, které nám pomáhají v tom vyhledávání díky těch specialistů, ale zaměstnance nebo zaměstnaneckou bázi už nerozšiřujeme, protože opravdu ten trh se teďka snížuje a snížuje se počet poptávek, řekl bych dost markantně a těžko říct, kam se to dál pohne. Já jsem střízlivej, takže hledáme teď o 50 % méně než třeba před třema rokama.'", "summary": "Trh poptávky −50 % vs. 2023 (covid pík). Tým redukovaný na owners + 2 externisty.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/h17cnIu5gM6F44DxFitFC", "video_clip": "[video highlight_clip_9qOAGm.mp4 00:01.0-00:33.9]", "tags": {"Hypotézy": ["H10"], "Default group": ["Industry insights"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "hoXkEeqi8uuFi9Qa5S8P", "text": "[Speaker 2] ' My hledáme pořád podobné počty lidí, jenom na extrémně specializovaný pozice. To znamená, vůbec nehledáme mediory, juniory, fucking super seniory. A nebo fakt jako lídy, anebo teďka hodně AI specialisty, DevOpsáky, security a podobně. Takže hodně se to specializovalo a tam, kde ty firmy nemají tu chuť to hledat, anebo to je jako fakt náročnější na čas, tak tam si nás až najímají, nebo dlouhodobě si jim to nedaří prostě obsadit.'", "summary": "Posun na ultra-specialisty (super-senior, AI, DevOps, security). Agentura = last-resort pro pozice, které firma sama nezvládne.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hjHN7ubR1v50ceTuTcQtC", "video_clip": "[video highlight_clip_hoXkEe.mp4 00:00.2-00:28.9]", "tags": {"Hypotézy": ["H10"], "Default group": ["Industry insights"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "eKmQcWAJctrg1LGOGFCe", "text": "[Speaker 1] 'Jako minorita. Ono vlastně pro, když to řeknu tak, ty designéry si dost často firmy hledají sami, anebo tolik neodcházejí. Myslím si, že jako ty designéři jsou taková v fůzovkách sort a toho IT trhu, kdy mně přijde, že jakoukoliv pozici my vyhodíme, tak jich posíláme prostě 20, 30. Že oni mají opravdu zájem měnit pozice (…). Ale je to fakt, řekl bych, z těch početů lidí, kterými dodáme, což je třeba mezi třiceti, čtyřiceti za rok lidí, na koho nahajdujeme, tak je to třeba jeden až dva lidi. Jsou to UX nebo design nebo něco podobného nebo frontend. Frontend se do toho neřadí, protože to je vývojář.Tak no i když kdo ví, jak to bude do budoucna, ale to je každopádně, pojďme se podívat na ty 2 pozice, které jste obsazoval v tom posledním roce klidně vezměte 1 z nich, která vám přijde. Já nevím zajímavější tím, jaká byla, jestli si na to vzpomenete, mě by zajímalo, jak to vlastně u vás vypadá od toho momentu, kdy se klient ozval, že potřebuje designéra až do momentu, kdy se vám podařilo toho designera teda umístit.'", "summary": "Designeři = 1–2 z 30–40 placementů ročně (~3–6 % byznysu). Firmy si je hledají samy. Zájem kandidátů ale vysoký.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hc0gExWZbgnz5llcstJFI", "video_clip": "[video highlight_clip_eKmQcW.mp4 00:01.9-00:24.2]", "tags": {"Hypotézy": ["H10"], "Default group": ["Industry insights"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "kIFRcalY1oNNCAkAn7Pw", "text": "[Speaker 2] 'U nás je to jednoduché. My vlastně, když se s firmou spojíme a dáme s nima pozici, tak se snažíme od ní namnímat, koho hledá, to znamená, jakou má představu, jestli je junior až senior. (…) do jakého odvětví by měl být napasovaný skrz profil, to znamená, jestli ten člověk má být z fintechu, nebo má být prostě z nějaký health insurance, nebo odkud prostě má být. (…) Myslím si, že samozřejmě dokáže člověk, který nedělal fintech, se do toho vcítit. Ale podle mě je lepší to párovat jedna ku jedný. A i ty firmy vlastně to chtějí, takže toho, koho jsme tam dodali, tak vím, že právě dělal fintech. '", "summary": "Recruiter vědomě páruje 1:1 odvětví, ne přenositelné dovednosti. Domain bias jako default modus operandi.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hgx5ZIldmAod0DBD1zhZF", "video_clip": "[video highlight_clip_kIFRca.mp4 00:00.3-00:56.1]", "tags": {"Hypotézy": ["H6"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "KM65ftl2d2NMQNdF8dBd", "text": "[Speaker 2] 'To je i míň, ono de facto, tohleto, jak říkám, standardně oslovujeme třeba na roli třeba až 500 lidí. V rámci toho záleží, jaká je ta pozice, jak dlouho se hledá. (…) U té role, tak tam nám jsme těch 20 lidí poslali z toho důvodu, že je to všechno zaujalo. My jsme potom jako jsme měli nějaký soupis otázek, který jsme na ně používali, v čem pracovali, jak pracovali, jak dlouho na ty roli dělali a plus portfolio. (…) Nejvíc asi portfolio, plus to, v čem ten člověk dělal, a pak samozřejmě jsou tam ještě aspekty toho, kolik chce peněz, kdy může naskočit, a třeba jestli umí anglicky. To znamená portfolio, skills, jestli to je v tom daném oboru, plus kolik chce peněz, kdy může naskočit. To jsou věci, které my tam se snažíme screenovat.'", "summary": "Filtrace 500→20 = odvětví + portfolio + peníze + timing. Vrstva, kterou by mohl rozšířit pre-vetting profil.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hQj6YyKso7GRB6kEjGa8s", "video_clip": "[video highlight_clip_KM65ft.mp4 00:00.8-01:32.5]", "tags": {"Hypotézy": ["H2", "H6"], "Default group": ["Industry insights", "Workflow / Chování"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "HKWdsRvY9X8xJMJL5FTp", "text": "[Speaker 2] 'Medior je těžký poznat, protože medior je něco mezi juniorem a seniorem a je těžký říct, že ten člověk je dobrý. Ono, jak říkám, to portfolio zhodnotí nejlíp ten designer, který sedí na druhé straně. Tím, že já nejsem designer a jsem slupnej pochopit jenom to, že ten člověk dělá na několika velkých projektech nebo zajímavých projektech, tak třeba když dělal pro firmy, já nevím, typu Product Board a podobně, nebo STRVčku a tak dál, tak si myslím, že ty projekty tam jsou, už tam je ta kvalita toho, že ty projekty jsou zajímavý. (…) Pokud dělá svoje freelancovské projekty, typu dělá se na vlastních webových stránkách, anebo dělám tady pro lidi e-shopy, tam si myslím, že nikdy to nedopadá moc. Protože i když bude dobrej, tak si myslím, že mu chybí takovej ten vhled do toho sezona ta firma potřebuje.'", "summary": "Recruiter explicitně přiznává limit screeningu designerů (“nejsem designer”). Soudí podle prestiže klientů, ne podle work itself.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/h1VwkfcElpfhDCDihtHhb", "video_clip": "[video highlight_clip_HKWdsR.mp4 00:00.3-00:59.5]", "tags": {"Default group": ["Existing solutions", "Pain points"], "Hypotézy": ["H2"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "McbuvXXpaS5Tf2lfmRwu", "text": "[Speaker 2] 'Někdy děláme cally, někdy děláme videokóly. Ale na druhou stranu, pokud to hoří, spěchá to a ten člověk má dalších deset pozicí, tak nás to zbytečně brzdí. (…) Já jako 13 let a píšu si s těma lidma vlastně denu denně od rána do večera a mně přijde, že i jako ve společnosti ta psaná forma a celkově to, jak ty lidi vlastně reagují, jak jsou souplně reagovat a jak chtějí reagovat, tak kdo vám zvedne telefon v práci, pokud někde pracuje, no skoro nikdo. (…) Já se snažím ty zprávy strukturovat tak, aby byly co nejvystížnější a pokud ten člověk už mě neodpoví na zprávu nebo respektive nechce to řešit po psaný formě, tak je šance na to, že si se mnou vůbec zavolá ještě nižší. (…) A to jsme těch lidí dodávali dohromady jako přes 600.'", "summary": "Async-first style (text-only). 600+ placementů evidence-based. Soft skills explicitně odsouvá na firmu.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hIs0VdhxmSztHqJhAFsgi", "video_clip": "[video highlight_clip_McbuvX.mp4 00:00.2-01:01.7]", "tags": {"Perspektiva": ["Recruiter"], "Intenzita": ["Silně"], "Default group": ["Workflow / Chování"]}}, {"id": "vEKK7Ia7W7SyggtfjLhs", "text": "[Speaker 2] 'Aby jsme toho člověka našli, tak jsou to hodiny, to určitě. (…) Já dávám můj risk, můj čas na to, že bych mohl hledat pro někoho jiného, ale dávám ho vám. To znamená, že vy neplatíte nic na začátku, platíte až na konci success fee. (…) Nějaká ta average, bych řekl, že třeba je do deseti až dvaceti hodin hledání, intenzivního hledání, jako v rámci sítě, databázy a podobně. (…) Strčit ruku tomu člověku do rukávu a zaujmout ho, to je to, za co platí ta firma a je to to, co se nedá úplně ocenit, ale to je ta databáza, kterou my jsme sbírali roky. To znamená, když já mám teďka třeba na LinkedIn 26 tisíc spojení, tak to je to, co já teď dělám 14 let.'", "summary": "Cenotvorba = success fee + no risk. Reálná hodnota = LinkedIn base 26k, budovaná 14 let. Nejde i hodiny, ale o kontakty a umění člověka zaujmout.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hmahUT3xdyOlunRkhYvpZ", "video_clip": "[video highlight_clip_vEKK7I.mp4 00:01.2-02:38.0]", "tags": {"Default group": ["Industry insights", "Workflow / Chování"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "xxPC2ll5pn5eKAphzdKd", "text": "[Speaker 2] 'Většinou já potřebuji popis toho, co ta firma dělá, to jsem svobodně navnímal manažera, když si voláme nebo píšeme. (…) Pak ideálně potřebuji vědět, jak ten tým je velký, co se o toho člověka očekává v tom týmu, jestli to má být lídr, nebo to má být prostě člověk do týmu. (…) JDčko, nějaký job description asi strukturovaný, který tam bude přesně vypsaný ty požadavky, potom samozřejmě to, za kolik bude, jak bude pracovat, kde bude pracovat. (…) Když ta firma má nějakou videoprezentaci nebo minimálně třeba je super přidávat LinkedIn profily těch lidí, kterýma budou pracovat, tak on se vlastně může na ně podívat. (…) To je i to PR pro vás, protože tak jste schopni získávat zajímavé lidi, jenom na to, že tam máte zajímavé lidi.'", "summary": "Info pro kandidáta (firma + tým + JD + salary + LinkedIn profily kolegů) = recruiter-side standard. Firmy to out-of-the-box nedělají.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/haim9gftLzKva8xU50Z2E", "video_clip": "[video highlight_clip_xxPC2l.mp4 00:00.6-01:49.7]", "tags": {"Default group": ["Existing solutions"], "Hypotézy": ["H4"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "WMlfSts5asErGzZMtrZo", "text": "[Speaker 2] 'Pro tu finanční firmu, která dělá vlastně to zobrazení těch marketingových dat v rámci Wall Street a podobně, jako to obrovská firma slovenská, řekl bych teďka hodně rostou, tak tam jsme hledali pro ně produkt designery, produkt manažery, potom jsme hledali pro ně AI specialisty a teďka jsme tam dodávali ještě front end developer. I to se nám tady nepovedlo. Je to jediná pozice z těch čtyř, která se nám nepovedla z toho důvodu, že oni pro ně neměli práci pro toho člověka, protože už tolik vyrostli, že vlastně by mu teďka neměli co dát. (…) Já myslím, že těch třeba frontendiáků tam bylo poslaných 15, těch specialistů na ten UX tam bylo poslaných 20. (…) Já vždycky říkám, hele, když ten zájem je, tak já vám ten zorek pošlu (…). Ano, jsou tam potom pohovory, jsou tam potom třeba mysnutý pohovory, že to třeba si nesedlo, ale já jako já říkám, já nedodávám krabici, já dodávám člověka.'", "summary": "100 % placement rate jen pro design (2/2). Statisticky neprůkazné — N=2 + BD bias. “Nedodávám krabici, dodávám člověka.”", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hlJvm1QXe8OhIMC9k3ZZZ", "video_clip": "[video highlight_clip_WMlfSt.mp4 00:01.3-02:27.2]", "tags": {"Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "otZCsdmZB7HyUOCoVumG", "text": "[Speaker 2] 'Jo, přesně tak. Fungovalo to vlastně něco jako startup jobsy. Měli jste tam prostě půl, to znamená, jak se ta firma tam přihlásila, tak jste tam mohla listovat v tom v tom seznamu, v tom filtru. Byl tam filtr podle toho, jestli je part-time, jestli je remote, v jakém městě je. A mohl si, když si zaplatil nějaký feature, což tam byla si tisíc korun za úplně směšný za rok, tak si vlastně mohl odkryt celý jeho profil, což byl vlastně odkaz na LinkedIn, CV. (…) Já jsem tomu projektu fakt strašně věřil. (…) Ale přijde mi, že potom, jak fakt přišlo AI, jak přišlo propouštění, jak vlastně začalo se fungovat víc on-site a podobně, tak tam ten zájem potom hrozně upadal.'", "summary": "PART-TIME.cz = listing + filter + paywall (1000 Kč/rok firma za odkrytí profilu). AI + propouštění + on-site návrat = killed model.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hmRBvZzkw3hlovCvOVzCk", "video_clip": "[video highlight_clip_otZCsd.mp4 00:01.9-00:55.3]", "tags": {"Default group": ["Existing solutions", "Industry insights"], "Hypotézy": ["H8"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "yAejkfaY6yU4ELTDjMk7", "text": "[Speaker 2] 'Nevím, asi tady v tom projektu, co bych udělal nějak, možná bych si najel nějaký obchodňáka, který by víc jako fungoval, typu jako jezdil by. (…) My jsme se možná trošku míjeli s kolegou o tom, co kdo chceme a co v tom vidíme. (…) My jsme na to fakt neměli tolik toho prostoru, jako, když to řeknu, ne marketňáci, ale jako obchodňáci, protože já, když jsem dodal jednoho člověka nebo s naším týmem jsme dodali jednoho člověka, tak ten take profit byl mnohem větší, než co bysme dostali potenciálně z toho, kdyby jsme jako jezdili. (…) Co bych udělal asi jinak, tak bych musel zrušit PeopleGuru a jít jenom do part-time, to znamená dělat jenom to, protože ten projekt si jinak jakož nedá škálovat. a když bych najal, kdybych najal obchoďáka, kterej by mě stál 70 80000 v tý době měsíčně, navíc ještě. '", "summary": "Agency cashflow > platform growth tension. “Musel bych zrušit PeopleGuru a jít jen do part-time.” Lekce pro 2FRESH product split.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hCKdma7aXx0Va3uq9SRcm", "video_clip": "[video highlight_clip_yAejkf.mp4 00:00.8-02:07.4]", "tags": {"Default group": ["Existing solutions", "Industry insights"], "Hypotézy": ["H8"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "oAzacGH6FbxjxirjJMx4", "text": "[Speaker 2] 'A ono, a i agentury se mnou poutávají, jo, protože vlastně ty firmy dost často si, ty lidi hledají sami, protože jim prostě přijde poutat, jako nabídky. (…) Když vám přijde na zakázku, já nevím, ze startup jobsů, z jobsů a ještě z normální nabídky, nevím, 10, 15 profilů a vy z nich vyberete, tak nepotřebujete agenturu, že jo. Dřív to tak nebylo. Dřív vám přišly CVčka, ale byly katastrofální z jobsů. (…) Pokud na to má finance a nemá svoje HR oddělení aktivní nebo takový, který funguje na denní bázi, tak asi si ji vyplatí zaplatit si agenturu.'", "summary": "Reverse market 2024+: málo poptávek, hodně kandidátů. Firmy si vystačí s organic flow z job boards. Threat pro pre-vetting B2B.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hvc3wLJf7xTacYFVZfObp", "video_clip": "[video highlight_clip_oAzacG.mp4 00:00.7-00:52.4]", "tags": {"Hypotézy": ["H10", "H6"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Recruiter"], "Verdict": ["Unknown"], "Intenzita": ["Velmi silně"]}}, {"id": "aPmXx9z2pZ2nxb5e89E6", "text": "[Speaker 2] 'Tak to jde většinou z headcountu celé firmy, to znamená, když to jsou velké firmy, jako banky, ty dany společnosti, to a nevím, jak oni to mají, kam oni si to učtují, jestli si to učtují do ostatních nákladů nebo do nákladů většinou služby. (…) Podle mě to jde z nějakého hlavního headcountu, který mají prostě uvolněný na ten hiring. (…) Když to je nějakej startup, tak tam jsou to asi možná nějaký venture fondy, který do toho dávají.'", "summary": "B2B revenue source = HR/headcount budget (centralizovaný), ne produktové týmy. Sales target = HR director / head of talent.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hYF1R0VWmdqPEsf7NTP4A", "video_clip": "[video highlight_clip_aPmXx9.mp4 00:01.0-00:45.9]", "tags": {"Verdict": ["Go"], "Hypotézy": ["H12", "H6"], "Default group": ["Industry insights"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "SRc2vHFCYsfLZ8KriMqQ", "text": "[Speaker 2] 'Jako rozdíl je určitě ochota jednat, jakože produktáci jsou super příjemní na jednání, tam jako můžete s každým úplně v pohodě mluvit, jsou příjemnější, mně přijde, než developeři, ty jsou takový víc odměřený, možná protože jim chodí víc nabídek. (…) U těch designérů tam je to stoprocentní, to oni prostě chtějí dělat na hezkých věcech a na věcech, které dávají dost smysl. (…) Mně přijde, že designéři dost často nechtějí dělat na věci, které jsou třeba na sezónu, že si chtějí v tom vidět nějaký impact. Ideálně nejlépe se prodává firma s produktem'", "summary": "Designeři = impact-driven, anti-seasonal. Cross-role rozdíl: PMs komunikativní, devs odměření, designeři selektivní podle smyslu.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/htwBKIIdyXu7tezCKTLQa", "video_clip": "[video highlight_clip_SRc2vH.mp4 00:01.7-02:05.3]", "tags": {"Hypotézy": ["H5"], "Default group": ["Industry insights"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "lghm0sZMgfd3FNeCdlPA", "text": "[Speaker 2] 'Tak u těch developerů se řeší zase kód, to znamená místo pro portfolia se prostě řeší kód, to znamená tam se snažíme dostat do člověka ideálně GitHub nebo případně nějaký projekt, který se může prezentovat. Ale hlavně tam je dobré vidět, že přijde mi, že u těch designérov je to víc takový, jak to říct, podle mě hůř uchopitelný z toho pohledu, protože design každý vidí trošku jinak. Ten kód je dost jako striktní (…). U těch developerů se mi dost často třeba stává, že když je to tech lead, tak to tam jako padá na tom, jak ten člověk dokáže pracovat s lidma. Ale to zase je vždycky hodně, hodně individuální pohled toho třeba CPO nebo jednatele ty dané firmy'", "summary": "Asymetrie hodnocení: kód = striktní, GitHub portable signal. Design = subjektivní. Designerské pre-vetting fills this gap.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hE5ZU2EXh77xjNs4xLw9o", "video_clip": "[video highlight_clip_lghm0s.mp4 00:01.4-01:25.8]", "tags": {"Hypotézy": ["H2", "H7"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "Qya9DuzaCHQAdAnRmtCI", "text": "[Speaker 2] 'Jo, dlouhý pohovory, jako dlouhý prolongace toho, kdy dávají feedbacky. A dost často třeba jsem tam nějaká určitá, to se nám tady vůbec nestávalo, ale u těch developerů se nám dostávala miskomunikace, to znamená, že to fakt dlouho trvalo a ty lidi potom odchází pryč. (…) Samozřejmě nám ty lidi respondují skvěle na to, když my jim posíláme celý ten soupej z té pozice. O firmě. Co ta firma dělá? Kde sídlí, jak dlouho bude ten člověk působit onside, remote co za to dostane, jaká je forma spolupráce, jaký jsou kanceláře, s kým bude spolupracovat? JD, to je vlastně takovej soupis tý pozice. On je dlouhej, ale on to fakt funguje. '", "summary": "Dva systémové defekty firem: dlouhé multi-kolové pohovory + pomalé/chybějící feedbacky. Workaround Pohanky: full info paket dopředu.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hbCv5MkUjt9QJGVQaMkRd", "video_clip": "[video highlight_clip_Qya9Du.mp4 00:01.2-01:27.1]", "tags": {"Default group": ["Existing solutions", "Pain points"], "Hypotézy": ["H3"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "mEvDCkXCQ4z0dWPVm92W", "text": "[Speaker 2] 'Jo, jo, to píšou oni, to necháváme my, protože to je jako originál ze jejich strany. Když bychom to zase mi přepsali, tak by tam mohl potom vzniknout nějakej nesoulad, nechci. To si myslím, že je ideální, pokud ta firma si tohleto sepíše sama, my k tomu získáme takový ty dostupné informace. (…) Když dostanete vlastně full informaci, tak máte mnohem lepší rozhodovací tu šanci, že vám ten člověk řekne ano. (…) Ten konverzní poměr je pro nás hrozně důležitý.'", "summary": "Pohanka NEoupravuje JD klienta. Přidává jen ambient kontext. Optimalizuje konverzní poměr přes info paket, ne přes JD rewrite.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hZWZO30ziqynuHcxFhXvk", "video_clip": "[video highlight_clip_mEvDCk.mp4 00:01.9-01:05.9]", "tags": {"Hypotézy": ["H4"], "Default group": ["Pain points", "Workflow / Chování"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "cqFcyOczOlUSoM3Ieno6", "text": "[Speaker 2] 'To je asi ohledně toho hiring manažera. Ten hiring manažer vlastně hýruje jiným způsobem. Ale když třeba jsme hledali do toho fintechu, tak tam konkrétně ty lidi odmítali. Pokud ten člověk neměl fintechovou znalost nebo neměl znalost ze zpracování data nebo něčeho podobného, tak vlastně byl zamítnutý. (…) I když byl dobrý designer, právě proto jsem ho tam posílal ten grad, říkám, i když je dobrý designer, já vás tam pošlu, protože si myslím, že ty zkušenosti tam jako jsou, protože dělá na zajímavých projektech, ale nebyly to právě ty projekty toho fintechu, takže tam se to potom, pak jsme změnili to hledání a pak jsme šli přísně po tom (…). Když mi řekl, hele, nedělal, tak já se omlouvám, ale prostě tady to nepůjde, protože oni nám fakt zamítají 90% lidí, kteří nemají fintech.'", "summary": "Hard kvantifikace domain biasu — 90 % rejection rate u fintechu bez doménové zkušenosti. Recruiter to po 1–2 iteracích přivlastní.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hPXndBnyWkwO6Fqdw6Uk2", "video_clip": "[video highlight_clip_cqFcyO.mp4 00:01.8-00:59.0]", "tags": {"Hypotézy": ["H6"], "Perspektiva": ["Hiring manager", "Recruiter"], "Default group": ["Industry insights", "Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "bLnZo9VtBrMfdZg7J3lx", "text": "[Speaker 2] 'Ale třeba když to bylo do toho Clover DX, což byl vlastně BI, oni dělají svůj produkt v rámci BI a zpracování data engineeringu. Tak tam, myslím si, že ta holčina, co tam nastupovala, to byla taková mladší holka, asi 25 let, tak vím, že tam, myslím, tam jako nebyl potřeba ten zrovna ta znalost tady toho od větví a byla dobrá jako designerka, byla jako, řekl bych, to byla taková mediorka. (…) Takže tam ani jsme ten požadavák z jejich strany neměli.'", "summary": "Counter-příklad: B2B BI/data tooling firma nepožadovala doménovou zkušenost. Domain bias není univerzální — silně závisí na sektoru.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hc3A1KwzheFzjKlC26zyu", "video_clip": "[video highlight_clip_bLnZo9.mp4 00:01.0-00:38.0]", "tags": {"Hypotézy": ["H6"], "Default group": ["Industry insights"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "z7BndksQNC7k0mzVmGmX", "text": "[Speaker 2] 'Já si myslím, že to je fakt o tom, co tomu klientovi poskytnete. (…) Pokud ten člověk chce trošku víc peněz, než je rozpočet, a je to troška, je to třeba 50%, takže toho člověka zamítají. A on je fakt dobrý. Takže když rozpočet do 140 tisíc třeba na nějakým DevOps inženýrovi, on chce 150 nebo 155, tak ho zamítnou, protože prostě není headcount a nejsou schopni si to vyjednat'", "summary": "Korporátní rigidita = headcount tabulky, on-site policy. Pohanka SMB-bias (“v korporátu jsem nikdy nedělal”).", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hvfEVLTKlJLPoCi3TuHPb", "video_clip": "[video highlight_clip_z7Bndk.mp4 00:00.8-01:03.5]", "tags": {"Hypotézy": ["H10", "H3"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "qCdvoNDDVsuF3WGfpQ1r", "text": "[Speaker 2] 'Pokud ten člověk může fungovat tři dny on-site a oni mají jako nutnost pět dnů nebo čtyři dny, tak i když ten člověk je dobrý a je to člověk jen třeba na třeba GO vývoj nebo Erlang vývoj nebo Scala vývoj, těch lidí je fakt úplný minimum, tak že mu nedají tu možnost. '", "summary": "Korporátní rigidita = headcount tabulky, on-site policy. Pohanka: “já jsem nikdy v korporátu nedělal, já jsem dělal v organizaci do 40 lidí maximálně” → SMB-bias v jeho judgmentu. Pro produkt: korporát = největší trh, ale nejhorší product-market fit.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hczeaYMqRxtRhlhud9mQc", "video_clip": "[video highlight_clip_qCdvoN.mp4 00:01.6-00:32.1]", "tags": {"Hypotézy": ["H10", "H3"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "nKB2vV3wXZnm2rk0mqZt", "text": "[Speaker 2] 'Tam jsem to plánoval tak, že kdyby to fungovalo, tak by mohly fungovat, kdyby byly dobří a firmy si je často najímaly, nebo byly, jak řeknu, bestselleri, tak by se potom dalo monetizovat tak, že by ten člověk platil nějakou částku třeba, nevím, než to řeknu, dvouma pětistovkama za rok jenom za to, že z té databázy je a může získávat zakázky. (…) Já jako střílim, tohle to je fakt, to je AB, jako to byste musel zkusit. (…) Já myslím, že jsme trošku přecenili to, jak velký by to mělo být. (…) '", "summary": "Two-sided monetizace zvažovaná (firma 1k/rok + bestseller kandidát 1k/rok). Nedostalo se k testu. Přecenili part-time market.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hPqk9BB0Z9bnIrwusGng1", "video_clip": "[video highlight_clip_nKB2vV.mp4 00:01.3-00:32.8]", "tags": {"Default group": ["Existing solutions", "Industry insights"], "Hypotézy": ["H12", "H8"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "ICfaLCajIamaxVj9fr7E", "text": "[Speaker 2] 'Tak určitě jako takhle, tak mohli bychom tady mít agenta, co by se naučil to jako dopovídán kandidátům, ale já mu nevěřím, jako on tam začne psát nějaké blbiny a jako já se pod to nepodepíšu, já když se pod to podepíšu a on bude psát za mě jako za Michala Pohanky, bude tam psát nesmysle nebo začne halucinovat, tak jako já přijdu volit nějaký účet, že jo. (…) Když mě LinkedIn banne účet, na kterým pracuji 14 let a já o něj půjdu a už ho nedostanu, tak jsem jako mínus miliony. (…) LinkedIn extrémně poroste. Nikdo se ten dokáže uvědomit, ale LinkedIn je síť, která je neuběvená za mě.'", "summary": "Trust gap pro AI v outreach — odmítá automatizaci kvůli LinkedIn ban risk. “LinkedIn = neuhnatelná infrastruktura.”", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hZnuDmxigb8MJcnsqQYOp", "video_clip": "[video highlight_clip_ICfaLC.mp4 00:00.4-02:07.8]", "tags": {"Default group": ["Existing solutions", "Pain points"], "Hypotézy": ["H9"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "igy8HjlX2uyefYOarqnm", "text": "[Speaker 2] 'Jo, rozbitý asi podle mě není vůbec nic. Rozbitá je teďka ekonomika v rámci EIA, co bude sedít a lidi s tom mají strach. To si myslím, že je rozbitý. Nikdo neví, co bude do další dva, tři roky. Ta nejistota na trhu IT, nebo respektive tak, jak ji vnímám já, je vysoká. (…) U UX, u UI, jako ve vývoji, říkám, tím, že tolik těch pozicí nehledáme, tak asi nedokážu říct, že bylo rozbitýho. Za mě se to hledá nejlíp. Za mě jako dostat UX zakázku znamená jistý biznis. (…) My ty lidi najdeme, máme je, máme je v seznamu, máme je poptaný. (…) Ale jako rozbitýho podle mě není nic.'", "summary": "“Není rozbité nic, jen ekonomika.” Counter-evidence k P1–P8. BD bias: recruiter má incentivu trh prezentovat jako fungující.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/h7LVVhSgPG3lNIcz54Ymz", "video_clip": "[video highlight_clip_igy8Hj.mp4 00:00.5-01:21.5]", "tags": {"Hypotézy": ["H1", "H2", "H3"], "Default group": ["Industry insights"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "yfKYM8VWf75JInSuSnxx", "text": "[Speaker 2] 'Co můžu doporučit, tak je rozhodně to, aby ve výborovém procesu byly co nejkračší kola, aby tam bylo co nejmíň úkolů, abyste dokázali toho člověka odahnout co nejrychleji a aby ti lidi, kteří k vám budou nastupovat, tak zkrátka věděli, kdy, jak, zakolik a co budou tvořit. To je nejdůležitější.'", "summary": "Doporučení = redukce friction (méně kol, méně úkolů, plná transparency informací pro kandidáta).", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/hkfdHVn1bhiarmHN3v6jL", "video_clip": "[video highlight_clip_yfKYM8.mp4 00:01.3-00:22.0]", "tags": {"Default group": ["Existing solutions"], "Hypotézy": ["H3"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "uiuXX421asO3vzxv5cHY", "text": "[Speaker 2] 'Ni přínosem rozhodně, já si myslím, že je super člověk, kterej s kterejma se dokonce budu i teďka vidět. Tak je Frederik Bolf z Uniters univers ty jsou v pohodě kluci.' [Speaker 1] 'Frederik pardon a příjmení.' [Speaker 2] 'Federik bolf jako jako ne ne jako golf ale bolf jako béčko.' [Speaker 1] 'Dobře.' [Speaker 2] 'Tak to je člověk, to je člověk s katarinou kojitalovou. Oni asi mají spolu uniters tak tak ty mají spolu vlastně firmu tak to jsou. To jsou lidi, s kterejma jsem spolupracoval na floru každej den vlastně v půl píplu. Ty si založil agenturu asi 4 roky po nás možná 5 a fungujou dobře a ty vám asi poskytnou taky další informace a. Celkem v pohodě se mi vždycky spolupracoval s kubou konečným z titánů. Ty jste jsou v pohodě. Kuba konečnej ten je dobrej tam myslím že jsou super AI já nemyslím, mají agenturu teďka tak ty brďo. Aikid a tam myslím, že ani jako iket, ale ty dělají já nevím kdo to teďka, kdo to tam vede a když se podíváte i kit, tak tam tak to tam vede jenom to řeknu, já se tam podívám. Že já si myslím na to jméno, protože tím, jak na ně spolupracujeme a děláme prostě jo Matěj kult, tak ten je suprovej. No tak s tím s tím jsem vždycky rád spolupracoval. Ten taky s cool peoplu, vlastně všeci, všichni, co jsou o něco tak se založil vlastně agenturu. To je divné, ale. Jako, ale asi asi tam bude nějakej trigger, že jsme, že jsme třeba, že jsme třeba chtěli fungovat sami. No.'", "summary": "Reference network: Frederik Bolf + Kateřina Kojitálová (Uniters), Kuba Konečný (Titan), Matěj Kult — celé ex-CoolPeople.", "session": "P9", "cohort": "recruiter-agency", "date": "30/04/2026", "setting": "", "link": "https://share.condens.io/h6gNaSYWL8S4EwP8jPy4x", "video_clip": "[video highlight_clip_uiuXX4.mp4 00:01.4-01:31.8]", "tags": {"Default group": ["Industry insights"], "Intenzita": ["Neutrálně"], "Perspektiva": ["Recruiter"]}}, {"id": "Ie9ED45FKEZKth9iCTFY", "text": "[Speaker 2] 'Jo, můžu určitě. Já jsem teď na pracovním úřadě, takže si hledám práci. Respektive už ji mám, ale byla jsem teďka v procesu hledání práce. A pohybuji se v designu odhadem 11 let s tím, že 5 let jsem byla na rodičovské, ale na té rodičovské jsem taky pracovala. Na nižší úvazek, ale je to znát, že tam prostě nebylo plné zaměření. Každopádně předtím jsem byla v korporátu, konkrétně v Honeywellu, jako UXák. Takže se tomu vlastně říká asi product designer, to znamená od všeho něco. A na rodičovské potom od, no taky vlastně pořád to byl nějaký product designer, až přes startupovou specialistku v agentuře, kdy agentura měla nápady. Já jsem prostě, protože jsem měla hodně malý ten úvazek a chtěla jsem být v oboru pořád, to je designová agentura, a chtěla, tak jsem tam rozjížděla jejich nápady a starala se vlastně o všechno kolem toho startupového projektu. A teď se vlastně, teď jsem si hledala tu práci, protože tam už jsem nechtěla pokračovat.'", "summary": "11 let v designu, 5 na rodičovské (0.2–0.7 úvazek). Honeywell (korporát) → Stride XL → teď hledá.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hqqXMD5KoxGj8uYLM1O9K", "video_clip": "[video highlight_clip_Ie9ED4.mp4 00:00.8-01:05.8]", "tags": {"Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "9d82YznLvaHc8Vb0Yt7P", "text": "[Speaker 2] 'Dlouhodobě se mi nedařilo sehnat projekt, který by byl prostě pro mě na takhle nízký úvazek a takže já jsem se ke klientským projektům třeba nedostala.'", "summary": "Problém s kapacitou - rozpor mezi nízkým úvazkem a vhodným projektem", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hEMokw8h07AxESVZFhRHF", "video_clip": "[video highlight_clip_9d82Yz.mp4 00:00.5-00:10.1]", "tags": {"Default group": ["Pain points"]}}, {"id": "Jhld7dK2dC7caAMPJ2yg", "text": "[Speaker 2] 'Já jsem ráda kreativní a řeším ráda cizí problémy. I svoje. Takže mě tam baví hodně ta kreativita. A já mám vystudovanou fakultu informatiky. Je to strašně dávno, programovat neumím. Ale vždycky mě bavila spolupráce s vývojáři. Takže to je něco, co mi k tomu pořád drží, táhne. A hrozně mi baví zajímat se o uživatele a snažit se jim nějak pomoct. Řešit ty potíže, o kterých třeba ani neví.'", "summary": "“AI mi do toho hodně hodilo vidle.” Strach z technologické disrupce po pauze — velké mezery v prototypování.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h8KVx9PVdoeoGchAFdLKD", "video_clip": "[video highlight_clip_Jhld7d.mp4 00:00.9-00:24.4]", "tags": {"Hypotézy": ["Emergent", "H3"], "Default group": ["Industry insights", "Pain points"], "Intenzita": ["Silně"]}}, {"id": "4chE2JjbovBh8j09iaj5", "text": "[Speaker 2] '.'", "summary": "", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hleI4ZoiA9X60g0qKyXMp", "video_clip": "[video highlight_clip_4chE2J.mp4 00:00.2-00:00.4]", "tags": {}}, {"id": "b7AAbuF1ffbqdruog0UU", "text": "[Speaker 2] 'Aktuálně mi na tom trochu štve, že jsem doufala, že přes ten rodičák si trošku víc udržím fresh. Ale AI mi do toho hodně hodilo vidle. Ne, že bych se nesnažila, ale sama od sebe se v tom dovzdělávat je teď hodně těžké'", "summary": "“AI mi do toho hodně hodilo vidle.” Strach z technologické disrupce po pauze na mateřské", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h7MBhUsu8OFPiYWSmJLBA", "video_clip": "[video highlight_clip_b7AAbu.mp4 00:01.3-00:18.7]", "tags": {"Hypotézy": ["Emergent", "H3"], "Emoce": ["Frustrace/zklamání"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"], "Intenzita": ["Velmi silně"]}}, {"id": "t671LyRc1SDoXpRYnitS", "text": "[Speaker 2] 'Je to fáze, kde vím, jak to použít. Ale třeba zrovna v prototypování konkrétně, k tomu jsem se dlouho teďka nedostala a strašně se to změnilo. Takže tam mám teďka velké mezery a doufám, že si to brzy doplním.'", "summary": "Uvědomění si svých limitů (AI)", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h82XvkNmuYqrydGOhSWSo", "video_clip": "[video highlight_clip_t671Ly.mp4 00:00.7-00:14.5]", "tags": {"Default group": ["Industry insights", "Motivátory & Bariéry", "Pain points"], "Perspektiva": ["Kandidát"]}}, {"id": "coDISDiJeQqSnzIiKRpD", "text": "[Speaker 2] 'Ne, já na to moc nejsem. Nikdy jsem na tady té komunity nebyla. Já jsem Czechitas učila, učila jsem tam grafiku a UX a potom na mateřské jsem jim tam pomáhala zlepšovat jejich systémy. Ale já jsem na to nikdy neměla právě kvůli Czechitas čas, protože mě to zabíralo hodně času, bavilo mě to. Takže jsem se rozvíjela jako jiným způsobem, prostě jiné priority, když už mám volno. Tak vlastně, když jsem si hledala tu práci, tak pro mě jedna ze dvou podmínek byla, že tam musí být designový tým, abych se měla od koho učit a dostávat zpětnou vazbu.' [Speaker 1] 'To je ten způsob, jak se držíš nějakého kontaktu. Jo než než jako aktivně sledovat vše, kde se co šustne, hmm rozumím.' [Speaker 2] 'Pak nějaký newsletter, je takové jakože lehce, ale jako takhle, že bych se vyloženě vydala na nějakou frontendovou akci, a to spíš, když tam přednáší někdo známý.'", "summary": "Není v UX komunitě. Klíčová podmínka: “musí tam být designový tým, abych se měla od koho učit.” Tým = nutnost po rodičáku.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hzLkIZcmZVwSGXqqxKKls", "video_clip": "[video highlight_clip_coDISD.mp4 00:01.9-00:58.0]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Kandidát"], "Default group": ["Motivátory & Bariéry", "Trust signals"], "Intenzita": ["Silně"]}}, {"id": "MbedQdr9hrhae79BYdWr", "text": "[Speaker 2] 'Já jsem si tu práci hledala aktivně v tom, že jsem — já budu asi tak, jak mě to napadá — takže nebyla jsem ještě tak zoufalá, abych si psala inzerát na LinkedIn, jak jsem to třeba dělala před těma dvěma lety. Tam jsem si vlastně vytvořila prostě post na linkáči, který se pak jako šířil. A na základě toho se mi jako ozývali různí lidé s nápady, tak tohle jsem teďka ještě dělat nechtěla, protože mi to není příjemné takhle hledat práci. Bylo to hodně vystoupení z komfortní zóny. Takže teďka jsem se dívala hlavně na nabídky, které jsou na různých portálech. Indeed, Jobs, LinkedIn. A pak ještě jedno, kde ale se nic moc neobjevovalo, takže se přiznám, že si to nepamatuji, jak se jmenovalo. A když se tam objevila pozice, já jsem si vlastně tu práci začala hledat zhruba před měsícem. Když se něco objevilo a aspoň trochu mě to zaujalo, tak jsem tam napsala. S tím, že já mám trochu problém s angličtinou, nejsem úplně dobrý English speaker a hlavně jsem 6 let skoro nemluvila. Takže takové ty rady kamarádů, přihlas se na seniorní pozici, i když se jako senior necítíš, jsem v této chvíli nemohla, nechtěla prostě dělat, protože pokud tam byla angličtina jako primární jazyk, tak jsem se prostě netroufla. Na jednu firmu, tam jsem se potom troufla, ale tam jsem se troufla hlavně z toho důvodu, že jsem věděla, že se tam nehlásím na toho seniora, že prostě chci, aby mě věděli. Takže vlastně nakonec se mi takhle přes ty inzeráty povedly 4 firmy, a pak mě jedna napadla sama od sebe, že vím, že tam pracuje kamarádka, tak jsem se dívala na jejich stránky a oslovila jsem je přes tu kamarádku. Takže nakonec jsem posílala 5 životopisů, když to takhle zkrátím, během měsíce.'", "summary": "5 CV/měsíc. Bariéra: angličtina po 6 letech. Odmítá self-promotion na LinkedIn. Selektivní z nejistoty, ne ze sebevědomí.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hTvCeoRm2wfdAOFo7w5lK", "video_clip": "[video highlight_clip_MbedQd.mp4 00:01.5-01:54.0]", "tags": {"Hypotézy": ["Emergent", "H2"], "Perspektiva": ["Kandidát"], "Default group": ["Motivátory & Bariéry", "Workflow / Chování"], "Emoce": ["Nejistota"], "Intenzita": ["Silně"]}}, {"id": "bRxYh2pu9COjhG7Od97r", "text": "[Speaker 2] 'Kromě 2FRESH, kde se mi teda ozvala vaše náborářka, tam jsem to měla pouze otevřené a nechtěla jsem se ozývat, ale ozvala se sama, tak jsem to zkusila. Tak ostatní — jinak moje podmínka byla Brno a ten tým, aby tam byl.' [Speaker 2] 'Takže tam jsem psala a pak, aby tam ta angličtina byla taková, jako — že to není prostě ten primární jazyk na tu komunikaci. Ne až tak s tím vývojovým týmem, to asi by se dalo nějak, ale že třeba v kanceláři fakt celé jako české, nebo nic takového. A pak jako lokace, protože vlastně jeden z důvodů, proč já jsem se nevrátila do Honeywellu, je že je to prostě hodina cesty a to já si teď dovolit nemůžu. A hodina cesty, protože dobrá doprava, nechci jezdit autem, takže takhle. A ten tým, jakože prostě tam, aby tam nebyl jediný designér.'", "summary": "Filtry: Brno, designový tým, čeština primární, MHD lokace. Praktické životní podmínky zužují pool firem.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hwE9TTIAr61xPU6LTCinT", "video_clip": "[video highlight_clip_bRxYh2.mp4 00:00.9-00:52.3]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Kandidát"], "Default group": ["Motivátory & Bariéry"], "Intenzita": ["Neutrálně"]}}, {"id": "VmNjmqVLLBLtkOXLUrSr", "text": "[Speaker 2] 'To CVčko bylo velice často stejné, s tím, že se vyvíjelo, jak jsem si povzpomínala, že se vlastně ještě dává smysl tam něco připsat. Protože jsem jako trochu zapomněla, co všechno mám za sebou. Takže spíš nějak jako školení nebo tak jsem si tam dopisovala postupně. A k těm CVčkům jsem vždycky posílala takový průvodní dopis, proč nemám portfolio. Protože já nemám portfolio. A to nemám z toho důvodu, že v Honeywellu byly NDA, v Czechitas jasný, všechno tam malovali na papír, anebo jsme se to ústně domlouvali. A ve Stridu mám taky NDA, nebyl tam design hlavní, takže tam nebylo co ukazovat.'", "summary": "Portfolio neexistuje — NDA z 3 firem + Czechitas papírové prototypy. Průvodní dopis vysvětluje proč. Portfolio = systematická diskriminace NDA designerů.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hDt8HBMW8xZ3FsNXAIql1", "video_clip": "[video highlight_clip_VmNjmq.mp4 00:00.5-00:41.1]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H4"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "moGgnaDEN5iZUrCc1LFl", "text": "[Speaker 2] 'Já myslím, že to stihneme, protože to bylo rychle. v 2FRESHI to bylo rychle, protože nejsem dostatečně seniorní na tu pozici, která byla vyžadovaná. A tam bylo strašně super to, že tam byla vlastně Sandra, jestli se nepletu, se mi ozvala, velice rychle jsme se domluvili na termínu. Já jsem, tím, že jsem poslouchala ty podcasty, tak jsem tušila, že to nebude úplně něco pro mě teďka, což jsme odhalili během prvních deseti minut rozhovoru. A bylo to fajn, že jsme se tím pádem jakoby nezdržovaly, ale ona mi pak dala prostor, jakoby si aspoň popovídat o mně, takže jsem si něco nacvičila, i když bych nějaké pohovory měla, ale bylo to hrozně příjemné i tak, i když mi to v tomhle směru nic nepřineslo, bylo to hrozně fajn, že to bylo takové příjemné. Potom jsem posílala do Notina, protože to je tady v Brně, tam mají designérský tým, mám to tady po šalině, takže to je super, a tam už se tři týdny neozvali, ani na reminder emailový nedošla žádná zpráva, na jejich stránkách je ten inzerát stažený a na LinkedIn jsem si myslím ho ještě viděla. Tam jsem se hlásila přes kamarádku, která tam pracuje. To je vůbec nic, naprosto bez reakce.'", "summary": "Kontrast: 2FRESH (rychlý, lidský prescreening, prostor “nacvičit”). Notino — 3 týdny ghosting, ani na reminder, ani přes referral.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hPiHQlFEjI1WjAAPXi76c", "video_clip": "[video highlight_clip_moGgna.mp4 00:00.1-01:10.4]", "tags": {"Emoce": ["Důvěra", "Frustrace/zklamání"], "Hypotézy": ["H2"], "Default group": ["Pain points", "Pozitivní příklady"], "Intenzita": ["Velmi silně"]}}, {"id": "85ZMeurbvbiagZ8Oguxg", "text": "[Speaker 2] 'Pak jsem se hlásila do firmy Tricentis, co tady má také nový tým. To je jedna z těch anglicky mluvících firem, kde hledali seniora. Tam to taky mezitím, než jsme se dohodli, stáhli, ale s tím, že oni seniora našli a hledali mediora, což bylo super. A tam jsme narazili po úvodním rozhovoru s rekrutérkou na jeden velký problém, a to ten, že já chci 0.8 a to oni nemůžou nabídnout. Taky rychlé. A pak mi zbývají vlastně jenom dva, a to je YSoft a Masarykova univerzita. S tím, že Masarykova univerzita hledá něco na grantový projekt pro vědce, a to se mi moc líbilo, protože to mám zase hrozně blízko, a jsem z Masárny, takže to je taková jako čest pro tu školu pracovat. A je to jako hrozně fajn, mi to přišlo, a fakt jsem se na to docela těšila. Ale zase trvalo více než dva týdny, než se ozvali, téměř tři, takže oni prostě čekají, až se jim ozve víc kandidátů, a potom je prostě pohovorují. Bohužel pak onemocněla potenciální vedoucí, takže se to posunulo ještě o týden. Takže tam mám za sebou vlastně první kolo, které bylo teďka v úterý. A mezitím ale se ozval WhiteSoft, kde to bylo naopak strašně rychlé. Takže jak jsem poslala v nějaký pátek životopis, hned v úterý, nebo v pondělí, když jsem měla rekrutérku, hned za pár dnů už s týmem, a hned za pár dnů už jsem měla testovací kolo přímo zase s tím týmem. A vlastně včera jsem se dozvěděla, že mě teda vzali.'", "summary": "5 firem: 2FRESH (nefit), Notino (ghosting 3w), Tricentis (úvazek 0.8 nefit), Masaryčka (3w+nemoc), WhiteSoft (rychle, přijata). Rychlost = rozhodující.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h9p5OiSeoxpltHRCcTuye", "video_clip": "[video highlight_clip_85ZMeu.mp4 00:01.7-01:25.1]", "tags": {"Emoce": ["Důvěra", "Nejistota"], "Hypotézy": ["H2"], "Default group": ["Industry insights", "Workflow / Chování"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "p9lnfL4olcqKMhTlNSmb", "text": "[Speaker 2] 'Tak v tom WhiteSoftu, to je takový malý korporát tady v Brně, který se zabývá tiskem, pomáhá spravovat tisk malým i velkým firmám, aby to bylo bezpečnější, když to tak jako jenom shrnu. A posílala jsem tam ten životopis přes kamarádku, s tím, že jsem viděla vypsanou pozici už nějakou delší dobu teda, nebo minimálně po druhé, na to se ještě pak musím zeptat, až tam opravdu budu, že buď někdo odešel, anebo nevím. Každopádně posílala to tam kamarádka, já jsem si zase říkala, že když už se někam hlásím, tak ať z toho má někdo referral bonus. Takže jsme to udělali takto. A tam vlastně velice rychle, fakt třeba následující pracovní den, nebo tak nějak, mi psala e-mail rekrutérka, když se domluvíme, abychom se popovídali, že takový základ. Prescreening vlastně, to byl půlhodinový hovor, kdy ona asi až tak nevěděla, o čem se bavíme, ale takový ten základ tam byl. Na základě toho jsme se pak domluvili pohovor jenom já a dvě potenciální kolegyně, s kterými bych byla v týmu. To byl hodinu a čtvrt rozhovor, tam jsme se bavili konkrétně o mých zkušenostech, o tom, co dělají oni, popisovali mi to vlastně produkt, jak pracují, protože to je taková specifická forma práce, oni nemají manažery a UX asi tam fungují jako konzultanti převážně. Takže to mi popisovali vlastně a bavili jsme se o nějakých dalších takových věcech. A potom jsme měli další, na který jsem se měla připravit pět až deset minut povídání na jedno ze čtyř nebo z pěti témat, které mi nabídly. To jsem si dělala jako prezentaci, snažila jsem se shánět screenshoty a tak. A pak se mě zkoušely, jak přemýšlím, dávaly mi prostě konkrétní věci, co se jim jako dějou v práci a já jsem měla nějakým způsobem zareagovat, mluvit nahlas, co mi v hlavě běží. Pak jsme chvilku přešli do angličtiny, pak se mě ještě na nějaké takové věci ptaly, prostě týmové, byla tam coachka součástí toho pohovoru, nějaká jejich, asi ne scrum masterka, ale prostě něco v tom smyslu. Byl tam product owner, s kterým spolupracují a zase ty dvě designérky.'", "summary": "WhiteSoft 3 kola: prescreening rekrutérky → 1h15m s 2 designérkami → prezentace + live úkoly + AJ + coachka + PO. Tým-orientovaný proces.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hVBhtrFyNDrGsgDw34Zhd", "video_clip": "[video highlight_clip_p9lnfL.mp4 00:00.2-02:00.7]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "aT74C0vcUfVcROx1LceJ", "text": "[Speaker 2] 'Já myslím, že největší vliv na to mělo to, že jsme se jakoby sedly nějakým způsobem, jsme si byly příjemné, jakože určitě během těch rozhovorů. Ale moje příprava na to druhé kolo, i vlastně na to první, už bylo jakoby zjistit něco o té firmě, prostě podívat se na nějaký Atmoskopu, tady tyhle věci, jak to tam funguje, podívat se, kde to je, a jak se tam dostanu. A pak vlastně během toho rozhovoru, tak jak jsem říkala, první mi vykládali o tom jejich produktu, jestli mě to vůbec jako zaujme, protože, co si budem — ono když jsou to nějaké tiskárny, tak já jsem se na to dívala, tak jsem si říkala, proč tam potřebují designéry, to je přeci takový pytlák jenom, že jo, pak maximálně nějaké administrátorské nastavení, a pak se můžou tak moc designovat, aby tam měli tři designéry, tak mi to pak dovysvětlili trochu víc, že tam toho je samozřejmě víc, a probíhá tam nějaký redesign, takže proto. A vlastně bavili jsme se o tady tomto, pak říkám o těch mých zkušenostech, já jsem jim vykládala, co jsem kdy jakoby dělala, na čem, a co mě jako bavilo, nebavilo, a o sobě, jakože oni mi říkali něco o sobě. No a pak mě vlastně pozvali na to další kolo, jakože jim se mnou dobře mluvilo a tak, ale jakoby to první kolo s těma designérkama nebylo zkoušení, nebylo o mých znalostech.'", "summary": "2. kolo = kulturní fit, ne skill check. Designérky vysvětlovaly produkt, zjišťovaly zájem. “Nebylo to zkoušení, nebylo o mých znalostech.”", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hJr2QCFYJoH0nEXlYfpdj", "video_clip": "[video highlight_clip_aT74C0.mp4 00:00.6-01:27.1]", "tags": {"Emoce": ["Důvěra"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady"], "Intenzita": ["Silně"]}}, {"id": "wdPMSioJqamO20xnTkDo", "text": "[Speaker 2] 'Vlastně říkám, byly tam ještě další dva lidi navíc. Ta coachka, ta se připojila později trošku, a ten product owner, ten zase se dřív odpojil, takže já jsem vlastně začínala to třetí kolo vlastně tou svou prezentací, kdy jak říkám, oni mi předem poslali seznam, ze kterého si mám vybrat.' [Speaker 1] 'Můžu se zeptat, jaký témata byly v nabídce, pokud to není nějaký tajný?' [Speaker 2] 'Jedno z nich bylo třeba fuck up, jedno z nich, které jsem si nakonec vybrala, tak bylo před a po. ' [Speaker 2] 'Pak tam bylo nějaké — nějaký zlepšovák, který bych já sama třeba vymyslela, nebo výzkum, který jsem iniciovala, a jestli byly tyhle ty čtyři, nebo ještě nějaký pátý, tak to se teďka nejsem jistá, ale minimálně tyhle čtyři. To asi vymýšleli, ale předpokládám jako že ty holky, protože vy s tím se jakoby každý den potkávají a dávalo to jakoby smysl k tomu, co mi říkali, že dělají za práci tady tyhle ty.' [Speaker 1] 'Sis vybrala.' [Speaker 2] 'Vybrala jsem si tady to před a po, protože to byla vlastně poslední pořádná UXácká práce v Czechitas, a my jsme tam dělali úpravu portálu pro lektory a účastnice, a věděla jsem, že minimálně seženu od vývojáře, protože to je kamarád, tak od něho seženu nějaké podklady, nebo to dokážu tak popsat, a hlavně jsem získala přístupy do aktuálního portálu, takže jsem si mohla udělat ty screenshoty, abych aspoň nemluvila jenom tak jako naslepo prostě o něčem. A přišlo mi to taková fajn.' [Speaker 1] 'A ta struktura toho, jak se to prezentovala, byla na tobě to bylo to bylo takhle jako řekněme velmi volně zadaný úkol, prostě mluv 10 minut na téma před a po jo.' [Speaker 2] '5 až 10 minut, jak to pojmu, tak myslím si, že teda pocitově — já osobně bych to tak udělala, že i vlastně to, jak jsem to pojala, tak to je taky nějakým způsobem to hodnocení. Ale to mi nikdo neříkal.'", "summary": "3. kolo: volba 1/4–5 témat (fuck up, před/po, zlepšovák, výzkum). 5–10 min, struktura na ní. Implicitní test designérského myšlení.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hn11vksXfOqBQeI0nTrHQ", "video_clip": "[video highlight_clip_wdPMSi.mp4 00:00.3-02:00.0]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Pozitivní příklady", "Workflow / Chování"]}}, {"id": "C45UshjKIuq4zoxJyzsZ", "text": "[Speaker 2] 'Potom byl prostor na jejich otázky a na moje otázky, protože já jsem mezitím měla nějakou otázku k té firmě, takže to mi pak odpovídal ten product owner, který vlastně věděl na to líp odpověď, než ty designérky. A potom mi dávali nějaké ty úkoly, jakože konkrétní úkoly z praxe, které se jim prostě dějí, s tím, že byly teda trošičku do extrému a měla jsem odpovídat hned. Takže když řeknu jeden konkrétní třeba, tak navrhla jsem nějakou hlášku do toho systému a pořád mi ji někdo vrací. Zase to bylo hodně konkrétní, to nevím, jestli můžu a chci říkat, ale prostě pořád mi to někdo vrací a jak se v různých těch fázích toho vracení budu — jak se zachovám, co jim na to řeknu těm lidem. Protože tam se to často děje, že vývojář přijde sám s nápadem, který na jednu stranu smysl dává, na druhou ne, tak jak se zachovám. Takže vlastně zase čekali nějakou moji odpověď a pak byl třetí úkol, ten už se nepamatuji. A potom jsme zkoušeli teda přepnout bez upozornění do té angličtiny, protože oni věděli, že bude trochu pro mě problém, ale tím jsem prošla teda úplně v pohodě. Ale zase je rozdíl bavit se o něčem, o čem člověk ví, což je o mně, nebo bavit se úplně o něčem jiném, ale to jako se doučím v pohodě. A pak nějaká taková otázka, co si myslím, že bych přinesla do týmu, když už vím, jak ten tým funguje. Co mě na tom láká, vlastně na té práci u nich.'", "summary": "Live úkoly z praxe: design opakovaně vrácen, vývojář s vlastním nápadem. Test komunikace + reakce. Žádný pixel-perfect. AJ neohlášené přepnutí.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hpbIbCoXYtPiUgJWvS47O", "video_clip": "[video highlight_clip_C45Ush.mp4 00:01.8-01:33.3]", "tags": {"Hypotézy": ["H1", "H4"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady"], "Intenzita": ["Silně"]}}, {"id": "rlqsMee4M4MqE3tpx2mI", "text": "[Speaker 2] 'No a pak teda ještě ta coachka tam nějakým způsobem mluvila, ptala se na něco, co se teda nepamatuju moc na co, na to, co bych teda přinesla do toho týmu a ještě možná něco, ale to už nevím co. A po tomhle pohovoru jsem měla hrozně dobrý pocit z toho. Celkově jakoby z toho, jakým přístupem se mnou mluvili, jak komunikovali, že byli rychlí, chtěla jsem to napsat, ale říkala jsem si, že to je takové jako lezení do zadku, takže jsem si to zatím nechala pro sebe. A byly Velikonoce, takže jsem jakoby nevěděla co a jak, a to bylo ve čtvrtek před Velikonocema a v úterý mi vlastně volala ta rekrutérka zase, že jako, že všechno je pozitivní, že se jim to líbilo, jak se teda jako já cítím a tak. Mezitím jsem teda měla ten pohovor na Masaryčce, k tomu se kdyžtak dostaneme potom, ale že se mi to teda jako líbilo a že mi posílá teda ten prescreeningový dotazník z takových těch korporátních klasických věcí, jestli nespolupracuju se zakázanými zeměmi a tady těmahle podobnými věcmi. A to se mi vlastně vyplnilo a včera mě volala, že mě teda vzali.'", "summary": "WhiteSoft od CV po přijetí ~14 dnů (přes Velikonoce). Hrozně dobrý pocit z procesu. Rychlá zpětná vazba = trust signal.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hZT2OFXUvA6BHoQ77cAGd", "video_clip": "[video highlight_clip_rlqsMe.mp4 00:01.9-01:17.1]", "tags": {"Emoce": ["Důvěra"], "Hypotézy": ["H2"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady"], "Intenzita": ["Silně"]}}, {"id": "duwA6PjHBO3S3LTfVun6", "text": "[Speaker 2] 'Vlastně v tu chvíli, kdy já jsem odpovídala, tak jedna z těch designérek vždycky řekla, že třeba, když už jsem se trápila, nevěděla, co dál říkat, když se to taky řekne, tak její ta odpověď stačí a popsala vlastně, co slyšela z těch mých odpovědí. Můj myšlenkový pochod, jak se jí líbil, jestli se jí líbil a ta zpětná vazba tam na tahle úrovni byla. Že jsem úplně mimo, to tam asi nepadlo, to jsem doufám nebyla, ale to by mě asi nevzali. Ale ta zpětná vazba byla okamžitá, z hlediska toho vyjádření.'", "summary": "Zpětná vazba v reálném čase během pohovoru. “Stačí” + shrnutí myšlenkového pochodu. Okamžitý feedback ≠ čekání týdny.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hZJIkyFjuqwUmvQuWAc9X", "video_clip": "[video highlight_clip_duwA6P.mp4 00:01.9-00:35.7]", "tags": {"Hypotézy": ["H1", "H2"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady", "Trust signals"], "Intenzita": ["Silně"]}}, {"id": "EQ1bpztc5Suv1ajV2o2v", "text": "[Speaker 2] 'Ten WhiteSoft byl boží, bylo to fakt skvělé a já jsem jim to potom psala, jakoby i říkala jsem to té rekrutérce, že to bylo hrozně příjemné, mě nikdo něčím mega netrápil a přitom všechno jakoby prošlo, vyšlo a tak. Každý ten meeting byl hodinu a čtvrt, třeba, nebo něco takového a ta moje příprava té prezentace, nedokážu říct, já jsem na ně měla hodně času, nebo respektive jeden den, ale tím, že jsem neměla žádný vedlejší projekt, tak jsem si ji prostě věnovala nějakým způsobem, takže to byla vlastně jediná má velká příprava, když nepočítám zjistit něco o té firmě a tady tyhle ty věci.' [Speaker 1] 'Co tě z toho procesu vlastně celého nejvíc bavilo. Co tam byl takovej ten jako high, řekl, že tohle bylo boží. Tohleto je ten nejpříjemnější.' [Speaker 2] 'Pro mě byl fakt velký highlight to, že po mě nechtěli to portfolio, protože to je všude a všude a já prostě ho nemám. A přijde mi to i zbytečné, podle obrázku stejně nikdo nepozná, popsat to slovy prostě, stejně kdo to čte. Takže jakoby to, že mě zkoušeli na místě, nebo jsem počítala s tím, že budu vytvářet nějaký prostě prototyp, cokoliv, nevím, jestli tady prostě — s tím jsem počítala a jsem ráda, že to takhle bylo.'", "summary": "“Pro mě byl fakt velký highlight to, že po mě nechtěli portfolio.” Live zkoušení > statické portfolio. “Podle obrázku stejně nikdo nepozná.”", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hqloZOpmKLFmhyrZk1Zhq", "video_clip": "[video highlight_clip_EQ1bpz.mp4 00:01.7-01:18.7]", "tags": {"Emoce": ["Důvěra"], "Hypotézy": ["H4"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points", "Pozitivní příklady"], "Intenzita": ["Velmi silně"]}}, {"id": "O8sGoR6PquOLOFgMHE3W", "text": "[Speaker 2] 'Já myslím zrovna u toho WhiteSoftu tam mi asi nevadilo nic. Respektive mě jakoby na všech tady těch pohovorech, kam jsem se cokoliv hlásila, tak nejvíc vadilo to, že se neozývají dlouho. Což tady zrovna nebylo. Ale že prostě posadit někam životopis, došla automatická odpověď a pak se prostě 14 dnů nikdo ani trošku neozve, nebo tři týdny teďka u toho Notina, tak to je jako nepříjemné. Já jsem jakoby ještě nebyla v nějaké nouzi toho, že bych hledala práci, nebo tak něco, že hrozně moc, já jsem teďka na tom pracáku, takže to je tak nějak v pohodě. Ale kdybych byla v téhle situaci, tak si myslím, že mi to vůbec nepřidá.'", "summary": "Universal pain: 14 dnů ticho po automatické odpovědi. Notino 3 týdny. “Pro lidi v tísni by to bylo devastující.”", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hLjZQ5TnFGwgBOFGnt9i3", "video_clip": "[video highlight_clip_O8sGoR.mp4 00:01.0-00:43.4]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H2"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "o0Ebo05bzM1p9oa6Tb9f", "text": "[Speaker 2] 'Jako teď to tak nějak pocitově vím, co mi nejde, co mi dlouho trvá a kdyby to chtělo zlepšit, je otázka, jestli je to nutné nebo ne. Ale když neberu angličtinu, tak jako v tom designovém procesu. A na to asi teďka nedokážu odpovědět. Tím, jak jsem teďka nedělala UXáka jako UXáka dva roky, víc než dva roky, tak nebo když už tak něco jenom tak jako lehce, tak nedokážu asi říct, jak bych to teďka zjišťovala.'", "summary": "Self-awareness gap: “Pocitově vím, co mi nejde.” Žádný strukturovaný systém self-assessmentu. 2+ let mimo full-time UX = neví ani jak by to zjistila.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h9VxHp9qfY8Kq1fnWGKWL", "video_clip": "[video highlight_clip_o0Ebo0.mp4 00:01.0-00:29.3]", "tags": {"Hypotézy": ["H5"], "Perspektiva": ["Kandidát"], "Emoce": ["Nejistota"], "Default group": ["Pain points", "Workarounds"], "Intenzita": ["Silně"], "Verdict": ["Unknown"]}}, {"id": "hfw3VOtuiPg4SwoDtwfh", "text": "[Speaker 2] 'Lišilo se to, no v tom, že se teda taky dlouho neozývali, jak jsem říkala. To byl jako velký rozdíl. Už hned jako by na to první kolo s tím týmem si mě pozvali k nim. Takže jsem tam byla fyzicky. A to je taková asi jako specifikum, strašně špatně se hledalo něco o tom projektu, na kterém bych pracovala. To je grantový projekt a vlastně kdybych asi neměla takový vstup do ISU, jako bývalý student, nebo bývalý student vlastně, tak mám přístup pořád, tak bych to ani nedohledala a vlastně nevěděla, na co se hlásím, protože ten projekt je obrovský, čítá milion grantů a oni jsou jenom jedna malinkatá součást. A to tam nebylo až tak dobře specifikované v tom inzerátu. Ale to se mi pak povedlo dohledat, takže jsem na to se dala připravit. Inzerát teda během toho, když jsem se chtěla připravovat den předtím, tak zmizel, protože už byl měsíc nahraný a jim to tam zmizelo, takže se na to připravovala trochu hůř. Já jsem to neměla stažené. '", "summary": "Masaryčka — špatný inzerát, nespecifikovaný grant, mizel den před pohovorem. Bez ISU přístupu by se nemohla připravit. Upstream JD problém.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hCVfB3W5KdDKB3au9FEdB", "video_clip": "[video highlight_clip_hfw3VO.mp4 00:00.6-01:01.8]", "tags": {"Hypotézy": ["Emergent", "H1"], "Emoce": ["Frustrace/zklamání"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "4fBDYIgobop9Sm9NLGA7", "text": "[Speaker 2] 'Přemýšlela jsem nad tím, protože já jsem zpětně zjistila, že byly tam dva lidi, co tam pracují. Ale vlastně ona je designérka, takže mi pocitově, i když my jsme spolu nikdy nepracovaly, jenom všechny jsme se potkaly jako lektorky, ale pocitově si myslím, že doporučení od ní má nějakou větší váhu, než kdyby to bylo jenom tak náhodně se jako přihlásit. Jakože oni by na to asi časem došli, protože ona dělá v Czechitas a já jsem tam měla Czechitas, ale z tohohle pohledu si myslím, že to má nějaký smysl. A když jsme jenom u toho — tak u Notina mě doporučovala jiná kamarádka, ta teda účetní, a ta psala průvodní dopis, proč mě doporučuje.'", "summary": "Trust signal: “Doporučení od designérky má větší váhu.” Expertíza > blízkost vztahu. Notino referral od účetní = ghosting.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hDk6Do5v7a3UM9V1O4Kmg", "video_clip": "[video highlight_clip_4fBDYI.mp4 00:01.5-00:43.0]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Kandidát"], "Default group": ["Trust signals"], "Intenzita": ["Velmi silně"]}}, {"id": "cvhMs96IHlqkGDeWQQ0i", "text": "[Speaker 2] 'Oni mi dali skvělou příležitost pro ně pracovat na 0.2. Protože to jenom tak jako nikde nebylo. Když už, tak to byly jenom právě nějaké konzultace pro jiné nějaké IT firmy, kde prostě bych si nic nenaučila. Tady jsem se dokázala něco naučit. Mám různé zkušenosti, ne úplně ty, co jsem chtěla, ale získala jsem tam hodně zkušeností. Poslední dobou, když už byly projekty, tak byly výzkumnické. A já se jako výzkumník — chtěla jsem být výzkumník, nepodařilo se mi ve Stridu stát se výzkumnicí. A když už bych výzkumnicí byla, tak byla juniorní. A to tam teďka není žádné. A jsou potřeba výzkumníci seniorní.' [Speaker 1] 'Dobře a ještě přemýšlím, jako dali ti příležitost pracovat na 0. Dvojku? Chápu super v rámci mateřské, že jo, tak to je jako příjemný. A když bysme se bavili o tom procesu náboru, tak jaký byly ty jejich kritéria, jejich způsob hodnocení tebe vlastně aby, aby si jako ověřili, že?' [Speaker 2] 'Jo, o tom jsme vůbec neřešili tehdy. Já jsem se prostě jim ozvala na doporučení někoho, že by mi možná mohli dát práci. A oni řekli, jo zrovna někoho potřebujeme, kdo má nějaké zkušenosti alespoň s čímkoliv. A nevadí nám vlastně, že máš tu 0.2, a že budeš doma týden, protože jsou děcka nemocné. Tohle jsme vůbec neřešili. Ale myslím si zpětně, že to je chyba, že vlastně jsem zjistila za ty dva roky, že o mě vůbec nic neví.'", "summary": "Stride nábor = nulové hodnocení (přijali na doporučení). Po 2 letech: “Zjistila jsem, že o mě vůbec nic neví.” Žádný assessment = no growth path.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hwhGb0cUysTrqm64BxJzy", "video_clip": "[video highlight_clip_cvhMs9.mp4 00:01.3-01:33.9]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "z3I3Ia8WYnfy1IxlHok6", "text": "[Speaker 2] 'Tady u toho Stridu, to spíš mi někdo doporučil, ať se ozvu Stridu. Jo, takhle to bylo. To bylo takhle, že měl tady v Brně nějakou pověst a že by to tam šlo.' [Speaker 2] 'A tady u těch ostatních, tak ty doporučení — já jsem přes ně šla spíš fakt kvůli tomu, že když už se hlásím na nějaké firmě, kde někoho znám, tak on za to může mít ten referral bonus. Když já se tam udržím. Takže mi to jako dávalo smysl z tohoto pohledu, než že bych doufala, že když mě někdo zná, tak že to bude lepší, nebo tak.'", "summary": "Referral motivace: pragmatická (referral bonus pro kamarádku), ne strategická. Síť funguje i nevědomě.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hCfifDmsMslcUL8C41EuU", "video_clip": "[video highlight_clip_z3I3Ia.mp4 00:01.6-00:32.3]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Trust signals", "Workflow / Chování"]}}, {"id": "bTubcSo5JtYScCzt4D4X", "text": "[Speaker 2] 'V konkrétně v Honeywellu byl problém s malým počtem designérů. Tady v Brně potom ke konci, než jsem odešla na rodičák, což je 2020, tak dokonce v letectví žádný UXák oficiálně nebyl, ani já. Já jsem byla jako system engineer vedená, protože všichni museli být v Americe. Takže tam, jakoby co se týče toho, jak jsem dobrá skillově jako UX designer, mi asi někdo právě zpětnou vazbu pořádně nedal, protože neměl kdo. Ale co se týče potom nějaké lidské stránky a toho, jak se se mnou spolupracuje, jaké jsou výsledky těch mých nápadů, tak to dokázali vlastně i vývojáři. A já jsem vlastně tam vystřídala hodně projektů za těch kolik, 6–7 aktivních let, kdy ty projekty třeba jako skončily, nebo mi tam třeba nevyhovoval ten projekt nebo něco takový. Takže já jsem nebyla čistě na jedné pozici na jednom projektu, ale měla jsem toho docela dost. I v rámci pozic, že mám Scrum Master kurz, tak jsem jednou dělala i částečně Scrum Lady na projektu a tak. Takže tam se to střídalo a měnili si mě, půjčovali si mě na základě asi jako zase doporučení, tentokrát to bylo asi lidské doporučení, že prostě jim pomůžu.'", "summary": "Honeywell — vedená jako system engineer (US org struktura). 6–7 let bez designérského feedbacku. Osamělý UXák v korporátu nemá jak růst.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hbTCFLAQKb4s0in0rX2N8", "video_clip": "[video highlight_clip_bTubcS.mp4 00:00.4-01:25.5]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H7"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "vCMW8jSj40MdYTX3CNaa", "text": "[Speaker 2] 'On tam byl, ale pro vývojáře. A tím, že jakoby já jsem byla designér, tak se tam prostě doplnily nějaké moje políčka, ale pak to bylo jenom o tom, jak se ohodnotím já.' [Speaker 1] 'Tedy ty sama ses zhodnotila a neměla jsi nějakého oponenta, který přicházel, challengoval tě? A bylo to vůbec… Teď jsi říkala, že je pro tebe důležitý ten tým v tom honeyvalu byl nějaký tým vlastně lidí, který.' [Speaker 2] 'My jsme tam, nás tam bylo víc designérů, pak se to trochu rozpadlo, a ani jsme se jako lidsky moc nesedli, takže tam se potom to hrozně měnilo. Pak to byl Human Factors, ale oni jsou přece jenom trošičku jinak zaměření. Ale byl tam jeden právě kolega, který dokázal dávat dobrou zpětnou vazbu a jakoby byl takovým mentorem, než odešel. A já jsem měla, co se týče třeba zpětné vazby na ty designy, tak já jsem měla skvělý vývojový tým, kde byli frontendisti s velkým přesahem, anebo systém inženýr s velkým přesahem. Ne, že by tomu nějak víc rozuměli, ale ten druhý pohled na věc prostě z jiného úhlu byl v té době dostačující.'", "summary": "Honeywell kompetenční model jen pro vývojáře. Designerům “doplnily políčka” — self-assessment bez oponenta. “Je to jeden z důvodů, proč se nechci vracet.”", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hyCopW05GbNdI7VMSX7ma", "video_clip": "[video highlight_clip_vCMW8j.mp4 00:01.2-01:03.9]", "tags": {"Default group": ["Existing solutions", "Pain points"], "Emoce": ["Frustrace/zklamání"], "Verdict": ["Go"], "Hypotézy": ["H1", "H11", "H5", "H7"], "Perspektiva": ["Kandidát"], "Intenzita": ["Velmi silně"]}}, {"id": "uJhYgWfqSmfHtHRvlz6P", "text": "[Speaker 2] 'Záleží. Jakože já jsem třeba teďka řešila, že mi ten WhiteSoft jako vzal, ale když jsem porovnávala na vahách Masárnu a WhiteSoft, tak mi to přišlo podobné. Oba mají nějaké své plusy, nějaké své mínusy, ale já jsem se prostě rozhodla pro ten WhiteSoft, protože u té Masárny bych další tři týdny třeba nevěděla, jestli si mě vzali nebo ne. A ten WhiteSoft jsem nemohla a nechtěla nechat tak dlouho čekat. Takže jakoby, jenom to, že já to jako chápu, že nebudou mít ty pohovory prostě v jeden den, ale už jenom to, že vlastně se mi ozvali oni sami po těch více než 14 dnech, a ještě se pak teda bohužel onemocněla ta vedoucí, tak se zase protáhlo o dalších 14 dnů, takže už to bylo prostě jako strašně dlouhé. A potom jako samotné to ozvání u toho Notina, teďka jsou to ty 3 týdny, včera to byly 3 týdny. Ale u toho WhiteSoftu to vlastně bylo všechno během 14 dnů. Tam se na tom dali fakt záležet.'", "summary": "Rychlost = rozhodující. Masaryčka a WhiteSoft podobné, ale vybrala WhiteSoft. “U Masárny bych další 3 týdny nevěděla.” Pomalý proces ztrácí kandidáty.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hUFpoVrWiYOKiHS08eETR", "video_clip": "[video highlight_clip_uJhYgW.mp4 00:01.5-00:51.3]", "tags": {"Hypotézy": ["H2"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"], "Intenzita": ["Velmi silně"]}}, {"id": "hSOWPwUdgxv5wwtrhbys", "text": "[Speaker 2] 'Portfolio. Pro mě je to portfolio. I jako to, že zabere hromadu času a nic neřekne. Pokud to člověk, pokud dělá člověk celou dobu sám na sebe a ty jeho designy se někam implementovaly a je to veřejné, tak jako v pohodě. To mi přijde super. Ale pokud dělám v korporátu nebo prostě nějakou specifickou práci, jako třeba právě pro Czechitas, nebylo Figma, zdrojáky prostě, nebo něco takového, tak jakože já bych si s tím portfoliem fakt trcala strašně dlouho a asi by nemělo podle mě vůbec ani takový efekt a nikdo by z něho nepoznal, jak přemýšlím, jaká jsem.'", "summary": "Co nefunguje - Portfolio neukazuje myšlení: Tvorba portfolia zabírá spoustu času, ale statické obrázky nedokážou vůbec předat to podstatné – jak designér nad problémem reálně přemýšlí.", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hVVvN2tl6HFNAOQaNSHpd", "video_clip": "[video highlight_clip_hSOWPw.mp4 00:01.7-00:47.4]", "tags": {}}, {"id": "2BV8zSzSaQfbzPd0Yhjz", "text": "[Speaker 2] 'Portfolio. Pro mě je to portfolio. I jako to, že zabere hromadu času a nic neřekne. Pokud to člověk, pokud dělá člověk celou dobu sám na sebe a ty jeho designy se někam implementovaly a je to veřejné, tak jako v pohodě. To mi přijde super. Ale pokud dělám v korporátu nebo prostě nějakou specifickou práci, jako třeba právě pro Czechitas, nebylo Figma, zdrojáky prostě, nebo něco takového, tak jakože já bych si s tím portfoliem fakt trcala strašně dlouho a asi by nemělo podle mě vůbec ani takový efekt a nikdo by z něho nepoznal, jak přemýšlím, jaká jsem.' [Speaker 1] 'Takže myslíš jako, že by vůbec to portfolio jako artefakt vyřadila jako z celého procesu, protože v něm nevidíš přidanou hodnotu. V podstatě se dá říct. A nebo to znamená něco jinýho?' [Speaker 2] 'Jako strašně záleží, ale jako vidím to i ve Stridu, jako my tam prostě máme ty NDA, i kolegy, kteří prostě pracovali normálně, nejenom na těch projektech, co já, tak prostě — jako pokud case tady nevyšla na webu, tak ji prostě nemůžou použít, nemůžou říct, že s tímhle zákazníkem pracovali, protože to taky není ofiko. A jako když se pak chtějí někam hlásit, tak pokud je někdo vyloženě takhle nedoporučí, která vlastně zkušeností je skvělá, tak prostě, jak to má udělat? ' [Speaker 1] 'Rozumím.' [Speaker 2] 'Jako může to anonymizovat samozřejmě, ale otázka je, jestli pak něco řekne. Nedokážu posoudit. Ale jako za mě byl fakt problém s tím portfoliem, že vlastně všude vždycky chtějí to portfolio. A jakože, a hlavně třeba já mám další věc, já jsem byla na rodičáku jako 5 let a říkám, pracovala jsem u něj, ale hypoteticky jsem nemusela. A co já jim budu ukazovat věci, co jsem dělala před 6 lety? Jako fakt? Jako něco, kdy AI vůbec nebylo v té době, vůbec. Ta Figma se jenom za tu dobu, než začal Covid a než jsem šla na rodičák, tak změnila, že prostě to je úplně jiný nástroj. A jakože na těch obrázcích nikdo nikdo nepochopí, jak přemýšlím.' [Speaker 1] 'Je něco, co bys ty vzkázala firmám, který najímají designéry? A není to, aby vynechali portfolio ještě něco dalšího?' [Speaker 2] 'Přemýšlím. Já jsem se jakoby nesetkala s tím, že bych měla špatný pohovor. Já jsem jich teda neměla tak moc. Ale nebylo to nikdy a nikdy mě neshazoval během toho pohovoru. Nebo prostě neshazoval moji práci nebo něco takového. Vím, že se to ale děje, protože nejsem jediná na světě, kdo dělal pohovor. Bavíme se o tom. Takže nedokážu se ve své vlastní pozici takhle posoudit. Ale nevím, nevím. Asi mě nejvíc trápí to portfolio.'", "summary": "Co je nejvíc rozbité: portfolio. 3 vrstvy: time/value mismatch + NDA + zastaralé po rodičáku. “Na obrázcích nikdo nepochopí, jak přemýšlím.”", "session": "P4", "cohort": "designer-mid", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hF5Xt9NhfM48WZYbhT777", "video_clip": "[video highlight_clip_2BV8zS.mp4 00:01.7-03:07.5]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H4"], "Default group": ["Industry insights", "Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "pElXwRvf0KhTiuaOPfrD", "text": "[Speaker 2] 'Jako strašně záleží, ale jako vidím to i ve Stridu, jako my tam prostě máme ty NDA, i kolegy, kteří prostě pracovali normálně, nejenom na těch projektech, co já, tak prostě — jako pokud case tady nevyšla na webu, tak ji prostě nemůžou použít, nemůžou říct, že s tímhle zákazníkem pracovali, protože to taky není ofiko. A jako když se pak chtějí někam hlásit, tak pokud je někdo vyložen
