Takže je to taková trojice. Ten člověk, ten jeho rozvojový člověk a ten jeho nadřízený.'", "summary": "Existující framework: 20 kompetencí × 5 úrovní (Dreyfus) + roční self-assessment + trojice (designer / chapter lead / nadřízený).", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hN1LfApD4gnrNT3fPHzoa", "video_clip": "[video highlight_clip_CiJMbn.mp4 00:01.1-01:52.0]", "tags": {"Default group": ["Existing solutions"], "Hypotézy": ["H11", "H7"], "Perspektiva": ["Lead"], "Intenzita": ["Velmi silně"]}}, {"id": "dWfHTBOWCaCwjhafPtHR", "text": "[Speaker 2] 'No je to založený opravdu čistě na poptávce z těch jednotlivých týmů. to se bavíme dva a víc let jako dozadu, že já jsem pomáhal s identifikací těch gapů, těch chybějících kapacit designérů v celé té bance. Takže to souviselo ještě od doby, kdy jste tam nám pomáhali vy s nějakou tou evangelizací celkovou toho designu, která nebyla, takže ty lidi si neuvědomovali, že ty designéry potřebují. To se zlepšovalo postupně, ale stejně jsem jakoby pomáhal s tou identifikací a hodně jsem přemlouval ty lidi, aby si vytvořili to místo pro designera, protože tady by ho uživili. Protože do té doby to znamenalo, že jsme všechno museli vykryvat z toho mýho týmu a to bylo kapacitně docela náročné. A hlavně ten člověk byl odtrženej dost od toho vývojového týmu samotného, protože většinou musel switchovat mezi spousty projekta. Takže, takže jsme vlastně postupně to po té bance jako pokryli a teď mi vypadla myšlenka, kam jsem se chtěl dostat. Odpoledne, trošku unavenej.' [Speaker 1] 'Nejsi byla důležitej, tak se tak se určitě vrátí.' [Speaker 2] 'řešili, jestli to je ve vlnách nebo tak. Záleží to na obtávkách těch jednotlivých týmů. To znamená, že dnes je to hodně o tom, jestli ty týmy se ozvolují, hledáme designera a my jim s tím náborem pomůžeme. My si pak vezmeme na starost i onboarding, dáme tomu člověku nějakýho buddyho a tak. To chceme mít na svý straně, protože rovnou chceme toho člověka zapojit do té komunity. A nebo se stále občas děje to, že se snažíme je přesvědčit, aby si to místo, aby si to FTE, tu pozici vytvořili pro toho danýho designéra tam, kde si myslíme, že by to potřebovali a kde právě dlouhodobě využívají ty naše kapacity. A to je čím dál tím těžší, protože jsou katy, prostě snižují se stavy a tak, takže ty lidi jako skoro nikdy neřeknou, máme volnou kapacitu, vypíšeme novou pozici a tak. Takže se většinou snaží nějakým způsobem převrtět nějakou pozici, kterou tam mají, nebo člověka, který k tomu má nejdlíž, a my ho nějakým způsobem upskillujeme a dostaneme ho do toho řemesla. A pokud byste učítal i tyhle věci, které nejsou ryzý nábor, ale nějaká transformace člověka a jeho záměru, tak bych tam připočet dalších pět lidí za rok.'", "summary": "3–5 hires ročně, čistě podle poptávky týmů. Stagnuje kvůli úsporám.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hDXCF0MJ6ZGAXOxYrspmH", "video_clip": "[video highlight_clip_dWfHTB.mp4 00:01.0-02:45.8]", "tags": {"Hypotézy": ["H10"], "Default group": ["Industry insights", "Workflow / Chování"], "Perspektiva": ["Lead"], "Intenzita": ["Silně"]}}, {"id": "lQBzFUi8bdONQnBhDxA8", "text": "[Speaker 2] 'Jasně. Za ten hiring je z pohledu, vždycky to má na starosti někdo z HR nebo z této části banky, ale zároveň se toho účastní a u nás u designerů je za to zodpovědný ten chapter lead. My vancem kolem interakčního designu a UX, tak máme v tuhle chvíli šest vance těchto lidí, tak vždycky záleží, v které části banky to je, že ten chapter lead je za to zodpovědný a ten se toho hiringu účastní. Donedávna to bylo tak, že jsem se toho skoro vždycky účastnil já. Teď už je to hodně tak, že se toho účastní primárně ty chat lidi, a když chtěj nebo nemůžou, tak já je vlastně nahrazuju. A já se pak účastním hiringu, jenom kdyby to bylo do mýho týmu, nebo třeba když nabírají seniorní lidi, tak týmu využívají i mě, aby měli vlastně dvojí pohled.' [Speaker 1] 'A jenom předtím, jak se říká, že se tam býval u těch hiringů ty tak býval se tam ty i oni, to znamená, byli jste tam společně, nebo se tam dávali jenom ty?' [Speaker 2] 'Oni ty čeptr leadi neexistovaly. Byl jsem tam jenom já a občas jsem si bral sebou někoho jako druhýho, aby tam byl jako druhej designer, ale ta zodpovědnost ležela na mně. Když to teď leží ta zodpovědnost na nich.' [Speaker 1] 'Rozumím a dobře, tak jo, takže jsou tam czechter, lidi AHR jsi říkal a teď mě ještě zajímá tak dobře. Takže protože ta poptávka ta poptávka jde na tebe. Ty to deleguješ na toho czechterlida řekneš ty pepíku, prostě to vezmi jo a teďka ještě spolupráce HR versus czepter lee nezajímá trošku.' [Speaker 2] 'Jo, ona jde rovnou na toho chapter leada, protože ono se to orchestruje z té jejich části, kde se pohybujou domény nebo nějakého velkého týmu a tam vzniká ta poptávka, protože od nich se ten člověk platí. A ty mají nějakého předěleného HR-istu z té banky, tradičně, takže ten se o to stará a ten si k tomu rovnou přibere tohoto chapter leada, protože on automaticky ví, kdo to je. A tím, že já mám jakoby synchro pravidelný s těma chapter leadama, tak řešíme každý ten nábor prostě společně a domluváme se, kdo se do toho bude účastnit, jestli u toho chci být, nebo jestli si to pojedou sami, protože oni jsou zvyklí, že jsem dřív u toho vždycky byl.' [Speaker 2] 'A teď jsme domluvení tak, že já se účastním jako první okola, s nima a když mi to přijde jako OK, tak už to druhé kolo nechám na nich, já jim třeba pomůžu s tím, že se podívám na případovku nebo něco podobného, tu si pošlám ještě do celé komunity a sbíráme si feedback z celé komunity a kdo chce se účastnit a kdo chce dát feedback, tak ho dá a pak mají vlastně už ty další kola, už chci nechat, aby byly jenom v tom týmu, protože si myslím, že ten můj, je ta moje účast, je taková matoucí už pro ty lidi, protože oni primárně pak budou v nějakém jako týmu, A proč by měli mluvit s nějakým jako Kubou, který ho jako uviděj jednou za týden nebo něco podobného, když to není ten jejich primární kontakt. Takže já spíš jako pomůžu na začátku a řeknu, hele, ten člověk je jako v pohodě, tak teď už si to jako dojďte sami a pak mi jen řekněte. Takže se snažím to postupně předávat jako na ně a myslím si, že to je správně, protože čím víc těch designerů je, tím méně se setkávají se mnou.'", "summary": "Hiring vede chapter lead + HR-ista. Kemr se účastní jen prvních kol nebo seniorů.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hgZluZCznGb3dX3micjh9", "video_clip": "[video highlight_clip_lQBzFU.mp4 00:00.7-03:12.2]", "tags": {"Perspektiva": ["Lead"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "AEbxpvAJqmd3NGPgWBHv", "text": "[Speaker 2] 'Dřív to byl trochu punk, že respektive punk jakoby cross ty designerský pozice, ale my jsme svoje JDčko vždycky měli v rámci UX, dřív v rámci jako toho interakčního designu. Ale měnili jsme ho vždycky na míru té dané pozici, celkem jako dost. A měnil se to já s tím chapter leadem.' [Speaker 1] 'Nějakej základ, abyste ho jakoby si trošku přímo i podle toho, co bylo potřeba.' [Speaker 2] 'Přesně tak. A HR si tam doplnili takovou jako bankovní sekci, která je jako všude stejná, benefity a takovýhle věci. A dneska už to je jinak. My jsme si tohleto vzali všechno pod tu naší střechu toho centra expertízy. Máme tam vlastně hlavní copywriterku a máme job descriptiony vlastně pro všechny ty role, interaction designer, servisní designer. copy researcher a máme definovaný typový inzeráty, který, když vznikne ta poptávka, tak my je dáme těm chapter leadům a oni si tam případně, mají tam jako nějaké místo, kde si doplňují tu, ten kontext toho daného týmu. Ale jinak ten job description zůstane jako víceméně stejný. Aby měl stejný ještě tone of voice, vlastně cross všechny ty role, aby to fot vystupovalo víceméně jako stejně.'", "summary": "D standardizované v centru expertízy. Vlastní copywriterka, typové inzeráty per role. Kontrast vs. Šrogoň generika.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hEJaY5WI96UjgQNeDfuuf", "video_clip": "[video highlight_clip_AEbxpv.mp4 00:01.5-01:21.4]", "tags": {"Default group": ["Existing solutions", "Pozitivní příklady"], "Hypotézy": ["H1"], "Perspektiva": ["Lead"], "Intenzita": ["Silně"]}}, {"id": "DjamYwNin1wtduUT6bIb", "text": "[Speaker 2] 'My používáme takovejto Teamio, takže oni to vypublikujou tam a tam to i spravujeme. Většinou si to nazdílíme právě tak jako, já do toho mám vždycky přístup, dáváme si tam palce nahoru, palce dolů na nějaký běžný filtr. Předtím ještě to prochází HRista, protože ten člověk v rámci toho daného enzerátu vyplňuje nějaké jednoduché dotazníky, tak oni to už filtrují na základě toho, jestli se ten člověk vůbec třeba rozsahem požadovaných financí vejde do toho, jaké jsou možnosti, a pokud ne, tak to rovnou hážou pryč, aby to odfiltrovali. A my pak tam s těm pracujeme. Komentujeme si to tam, dáváme si tam lajky a podobně a domluváme se vlastně v rámci toho týmia a přidruženého chatu, který vždycky k tomu vznikne, který ty lidi na ten pohovor pozveme nebo nepozveme. A vždycky si to hlavně orchestruje teda ten chapter lead, ten HRista je spíše k dispozici, udělá ten pre-filtr a já jsem třeba druhý oko, nebo jinej designer.'", "summary": "Teamio + palce nahoru/dolů + HR prefilter na finanční rozsah. Stejný pattern jako Lucie.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hSqQpOZmVHE45aIdLjBds", "video_clip": "[video highlight_clip_DjamYw.mp4 00:01.7-01:06.2]", "tags": {"Hypotézy": ["H2"], "Perspektiva": ["Lead"], "Intenzita": ["Neutrálně"], "Default group": ["Workarounds", "Workflow / Chování"]}}, {"id": "XdfobeW4wWazt3XFb9Vp", "text": "[Speaker 2] 'My vypisujeme ročně 10 trainee pozic. Většinou jsme jednu měli my za UX za interaction design a pak tam byli různí analytici a architekti, a bohužel všechno možné. A na ty ostatní role se hlásilo do 20 lidí během toho, co se ten inzerát spustil. Na tu naši desetkrát víc než na ty ostatní.'", "summary": "Trainee pozice: 10× víc zájemců o design než ostatní role. Medior ~50 CV/nábor.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hmze0pJ6dDP5A4fiTuBuq", "video_clip": "[video highlight_clip_Xdfobe.mp4 00:00.3-00:23.9]", "tags": {"Hypotézy": ["H2", "H3"], "Default group": ["Industry insights"], "Perspektiva": ["Lead"], "Intenzita": ["Silně"]}}, {"id": "i3xtrOjlDgJIhfm6ziJ6", "text": "[Speaker 2] 'Takže my většinou vypisujeme mediory, což je takový typický profil, který my do banky hýrujem. My vlastně nehyrujem moc nic jinýho, nechcem úplný juniory. třeba jo, teď ta doba tomu tolik nenahrává, a úplný seniory taky ne, protože ty nemáme zase jak moc, tam je to těžší s motivací u nás, takže my si je spíš jakoby najmeme jako mediory a vypistujeme si z nich seniory inhouse. A těch mediurů se přihlásí většinou, řekněme třeba 50 během toho, co ten nábor jako běží. A z těch 50 třeba filtrujeme a vyfiltrujeme si, řekněme, Nejdřív jedeme palec nahoru, palec dolů, takže to skončí třeba na polovině, na třetině. Z nich se snažíme vybrat třeba ty čtyři kandidáty, který poznáme do prvního kola.'", "summary": "Strategie: vypisujeme medior → seniora vyrábíme inhouse. Senior se zvenku nehiruje.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/h3AqJWR27ltT4AxZdxSRU", "video_clip": "[video highlight_clip_i3xtrO.mp4 00:00.7-00:35.9]", "tags": {"Hypotézy": ["H1", "H7"], "Default group": ["Industry insights", "Workarounds", "Workflow / Chování"], "Perspektiva": ["Lead"], "Intenzita": ["Silně"]}}, {"id": "i7Xrz7eGTEcPL33gK1TA", "text": "[Speaker 2] 'Řekl bych druhá možnost, je to víc strukturu bych v tom, nehledal, není tam. Je to hodně pocitový. Ale ještě tam je s tím spojený hovor, který ten HRista pak s těma kandidátama, který si předfiltrujeme, dělá. Protože často to jsou cizojazyční lidi a tak, takže on to spláhne dohromady s tím, že zjišťuje, jestli ty lidi umí česky. Nebo nějakým sobem jsou schopný komunikovat. Stejně taky s angličtinou. Si to jako ověřuje, protože potřebuje mi tu angličtinu. Takže tam probíhá nějaký jako pryček toho, jestli jako ten člověk, jestli to má smysl. Takže z těch třeba pěti předvybraných skončí třeba, nebo, já jsem říkal víc, padesát, dvacet pět, ale vybereme třeba těch deset nejlepších, on těch deset jako obvolá a řekne, s těma dle těma pěti to dává největší smysl a my si z nich vybereme tři.'", "summary": "Výběr do 1. kola = pocit, ne struktura. HR telefonát ověřuje jazyk.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hmtso3K8s8PdrIF8V9sux", "video_clip": "[video highlight_clip_i7Xrz7.mp4 00:01.1-00:53.2]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Lead"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "j7gd8ixfciF4pYBBY4TR", "text": "[Speaker 2] 'To je perfektní otázka a úplně transparentně skenuju to i tak rychle, jak to jen jde. Snažím se skenovat a hledat věci, co mě zaujmou. Já ty CVčka nečtu. Dneska, teďka jsem dlouho žádný návody neměl ve velkým, už bych to prostě prohnal nějakým AIčkem nebo něčím jako podobným a nechal bych si od tohohle pomoct, ale když jsme to dělali jako ručně, jako do teď, jinou zkušenost vlastně nemám, tak já jsem to nečetl. To nebylo možné, na to jsem prostě čas jako neměl. Takže jsem skanoval, koukal jsem, koukal jsem do kolonky jazyky, hledal jsem vlastně národnost toho daného člověka, koukal jsem do kolonky školy a četl jsem si motiváky vždycky, byť samozřejmě taky můžou být jako generovaný, ale hledal jsem to něco navíc a ty lidi vždycky měli možnost tam přiložit nějaký soubor další a tak, protože tam byly motiváky, nějaký svodky osobní a tak. Takže já jsem tomu určitě nevěnoval, protože každý den tam naskočily ty lidi, a my jsme museli reagovat relativně rychle, byť ta naše doba na reakci je extrémně žalostná, tak nevěnoval jsem tomu víc než dohromady 30 minut denně, víc ne. 15 minut za den, když tam naskočilo prostě pět, deset nových zájemců.' [Speaker 1] 'A tenhle ten proces trvá třeba. Týden 2 3 nebo jak dlouho tak?' [Speaker 2] 'Ten první boom je takovej jako hodně silnej, protože když se objeví ten novej inzera, tak ti lidi to tam sypou jako hrozně, hrozně moc, takže a pak to začne jako plesat. A my se snažíme vlastně během toho prvního týdne, co to tam nasype, udělat tu první selekci na to první kolo. Takže to trvá třeba týden. A pak už to hrozně závisí na tom, jestli se nám někdo chytne z toho prvního kola, jestli vůbec vkládáme energii do těch dalších. Takže těm dalším, co se tam vlázejí, my na to koukáme, ale koukáme na to už zase trochu míň, protože už se primárně směřujeme na ty lidi, který jsme si předvybrali, A ty, co se tam přihlásí další, tak spíš koukáme, jestli se tam objeví nějaká paráda. Něco, čím si rozbijeme ještě znova to první kolo a ještě si ho třeba natáhneme.' [Speaker 1] 'Nebo něco si kladu otázku tady v tom úvodním, že jo, než toho člověka dostanete na ten 1. Pohovor vlastně tak co tam je ta? Jak to říct a jako nejvíc náročná aktivita, co tě jako nejvíc zatěžuje, jestli ty říkáš jako čas, že ho jmenuješ vlastně to, že to jako bereš trošku hopem?' [Speaker 2] 'Já jsem teď to tam na vteřinku vyskočilo, jenom tam nejím, nevím, co jsi řekl za slovo.' [Speaker 1] 'Nějakou nejvíc zatěžující aktivitu, a to znamená něco, co tě jako. Nebaví zatěžuje, překáží. Co tam je ta největší?' [Speaker 2] 'Že jsou ty CVčka všechny stejný. A čím juniorní jsou, tím víc jsou stejný. Každý tam má, že absolvoval Google UX certifikát, anebo úslečen, že prošli Čechý task kurzem na UX. a pak tam je nějaký odkaz na portfolio, to vidíš, to jsem nezmínil, to je hodně důležitý v tomto pohledu'", "summary": "“Já CVčka nečtu — skenuju.” Max 30 min/den. Chce AI summary.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hz8GuyVWoq9yK1DJuWGG9", "video_clip": "[video highlight_clip_j7gd8i.mp4 00:00.0-03:25.8]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H12", "H2"], "Perspektiva": ["Hiring manager", "Lead"], "Default group": ["Pain points", "Workarounds"], "Intenzita": ["Velmi silně"]}}, {"id": "vMHuA5vY8SLRHa6VnZuy", "text": "[Speaker 2] 'y odkazy na portfolio jsou fajn, ale klikám na ně. Je to jedna z těch věcí, co jako skenuju, ale já osobně tomu čím dál tím méně dávám váhu. Ty věci, které tvoří, jsou podobné. Já nevím, co si z toho mám vytáhnout. Já na to kliknu, teď to nemá popisky, na mě prostě křičí spousta obrázků, grafik, 3Dček. Já nevím, co tvořil ten člověk, co dělal s někým. Já potřebuji si s ním popovídat, abych pochopil, proč to celé vzniká. Ty vizuály a portfolia sama o sobě bez kontextu jsou pro mě osobně úplně nulový.'", "summary": "Portfolio bez kontextu = nula. Vizuály bez popisků nic neřeknou o designerovi.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hESSecXsqEtKPklR3wpr7", "video_clip": "[video highlight_clip_vMHuA5.mp4 00:00.6-00:40.7]", "tags": {"Hypotézy": ["H4"], "Perspektiva": ["Hiring manager", "Lead"], "Default group": ["Industry insights", "Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "tfcPbAfYThkKsINcXAYF", "text": "[Speaker 2] 'Si myslím, že tohle máme hrozně dobrý. My máme extrémně nízkou fluktuaci, dlouhodobně. A když už si někoho vybereme, tak ten na 95% zůstane. Že bychom se ve zkuševce s někým rozvoučili, jsem zažil dvakrát, co to dělám, a dělám to vlastně sedm let z té líderské pozice. A když už si je vybereme, tak tam zůstanou.'", "summary": "95 % nově přijatých zůstává. 2× rozloučení ve zkušebce za 7 let.", "s zice té svý dané role. A je to velmi relevantní v tom, že pak na tom druhém kole my máme vlastně odpovědi i technický, i produktový, který třeba ten designer jako všechny není.'", "summary": "2. kolo = panel s vývojářem a PM. “Koukají, jak ten člověk přemýšlí.”", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hQlcAVOKXMIdQf28aemNX", "video_clip": "[video highlight_clip_CVeM7Q.mp4 00:01.5-01:53.6]", "tags": {"Default group": ["Existing solutions", "Pozitivní příklady"], "Hypotézy": ["H1"], "Perspektiva": ["Lead"], "Intenzita": ["Silně"]}}, {"id": "mPYavZKUeYMLke8ZjS2B", "text": "[Speaker 2] 'Většinou je to na základě porovnání těch lidí, co absolvovali to druhé kolo. Podle mě to hodnocení toho konkrétního výkonu je jako jedna věc, ale většinou se tam hrozně sčítá takový to porovnávání těch lidí. Takže pak vybíráš z toho, jaký jsou tvý možnosti, a ne z toho, jestli se reálně potkaly tvý požadavky na toho člověka. Víc se vybírá na základě toho, co je zrovna v meníčku. Teďka prostě přišly tyhle ty tři chody a my si řekneme, tenhle chod je lepší než nemít asi nic, tenhle asi vezmu.'", "summary": "“Vybíráš z toho, co je v meníčku, ne proti požadavkům.” Relativní porovnání > absolutní kritéria.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/h32f6Qua3m3a73shvCMO2", "video_clip": "[video highlight_clip_mPYavZ.mp4 00:01.3-00:52.2]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Perspektiva": ["Hiring manager", "Lead"], "Default group": ["Industry insights", "Pain points"]}}, {"id": "yKQaBGoF13XLyXOim0WR", "text": "[Speaker 2] 'Tak tomu dáme nabídku prvnímu, pak jí dáme tomuhle, a teda počkáme, jak zareaguje, a když zareaguje negativně, tak jí dáme tomuhle, a když ten… To tímhletím způsobem, jo, a hrozně do toho vstupujou nejenom faktory z tý daný kejsky a z toho, jak se ty lidi předvedly, ale i okolnosti typu jestli jsou součástí jiných výběrek, jak cítíš tu chuť u nás jako pracovat, protože i ten úkol, který dopadl jako hůř, ale cítíš třeba nějakou jako velkou chuť toho daného člověka jít zrovna k nám. v té týdně nějakou lojalitu, já nevím co všechno, tak to může taky přidat, že vlastně podle toho určíme, tam probíhá normální prioritizace, prostě komu dřív pošleme nabídku. A my bohužel musíme z nějakých jako legal požadavků vždycky počkat na to, jak ten člověk na tu nabídku zareaguje, protože my v momentě, kdy nabídku posíláme, tak jsme teďka pokud se nepletuji, ale myslím, že mi to tak na HR vždycky říkali, tak jsme povinni ji tomu člověku potom reálně dát, když ji přijme. Takže ji nemůžeme poslat dvou lidem naraz. To je trochu tricky, protože jim nechceme říct, rozhodněte se do pěti minut, ale říkáš jim, jak se rozhodněte ta jídla přes víkend, teď to třeba nepřijme, nebo řekne, já potřebuji ještě chvíli, a ty si říkáš, a ten kamidát je ale fakt dobrý, a ty si to celý protahuje. A teďka to… ten ti pak odpoví, hm, tej den jste se nemoc bali. A to je prostě, v tomhletom to jako hrozně, hrozně drhne a ta naše reakční doba je fakt zoufalá.'", "summary": "“Naše reakční doba je zoufalá.” Legal blokuje paralelní nabídky → dobří kandidáti mezitím berou jinde.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/h4nQJiQ7v1hziaNY14ARO", "video_clip": "[video highlight_clip_yKQaBG.mp4 00:00.7-01:41.0]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H2"], "Perspektiva": ["Hiring manager", "Lead"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "aWHdh9Ge9TgrK7gRFnNV", "text": "[Speaker 2] 'Protože je tam sto nabídek a máš tam prostě lidi, kteří jsou skvělí, tak automaticky dáváš přednosti jim. Takže ty trény jsou úplně odepsané. Ale to jenom jako dodatek. A s těma mediorama to skončí u seniorů. Často. A teď jsme teda měli tento případ, nabrali jsme toho kluka na Mediora, mně přijde seniorní. Já jsem říkal, jak to vlastně máme s těma kompetencama, že jsem vůbec nevěděl, jak to funguje. A odpověď byla za mě fair, protože my jsme se rozhodli, že je nastavíme po zkuševce, že prostě až projde zkuševkou, tak on si projde tím self-assessmentem sám a na základě toho my to hodnotíme a uvidíme, co vyjde. A pokud zjistíme, že prostě je na jiný úrovni, než jakou jsme si jako mysleli, tak na základě toho upravíme ten rozvoj a vstoupí to v platnost prostě v dalším období tý evaluace. Jo, kdy vlastně vždycky jednou za rok minimálně jako ty lidi budeme hodnotit a budeme vlastně ověřovat tu úroveň, na který jsou. A do toho by pak měl vstupovat i to, že se jim může změnit jako plat, že se jim můžou změnit nějaký povinnosti a další věci. Takže to určitě uděláme, ale necháme to po zkuševce. A je to zatím první případ, který mám a přijde mi to vlastně jako docela fér nápad, protože v tuhle chvíli ani toho člověka nechci zahlcovat nějakou byrokracii, self-assessmentu, nějakých kompetenciích a podobných věcí, když má spoustu jiných starostí, jak se adaptovat do týma.'", "summary": "Kompetenční matice 20×5 v hiringu NEPOUŽÍVÁ — až po zkušební době. Side effect: vypsaný medior končí jako senior.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hYVmkODLN9S4994jxPhCI", "video_clip": "[video highlight_clip_aWHdh9.mp4 00:01.5-00:51.7]", "tags": {"Hypotézy": ["H1", "H7"], "Perspektiva": ["Lead"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Velmi silně"]}}, {"id": "0rybNKkZUEPcdXFkk0dd", "text": "[Speaker 2] 'ten si vybavím, který vlastně dneska vede asociaci UX a já když jsem vlastně najímal Michala, tak on k nám prošel tak trochu se štěstím, protože já jsem hodně chtěl jeho a ten tým chtěl jiný dva kandidáty. A vlastně já jsem měl jako velmi slabou argumentaci na to, proč ho chci, protože on byl přesně ten případ, který tu case tady jako nedopracoval, nebo on jako rozděl spoustu výzkumů a tak, ale měl tak skvělej design proces zatím, přemejšel nad tím skvěle. Já říkám, já tohle člověka prostě chci, tohle to je za mě UX designer. To, že tady ta holka vám nakreslila jako krásné ikonky, proti tomu se velmi špatně jako celkově argumentu, ty vizuálně orientovaný lidi prostě na tyhle ty lidi jako jdou a oni nebyli špatný ani v té UX oblasti. Ale já jsem si hodně jako přisadil, že mi ten Michal přijde prostě zajímavý vystupováním, pokorou obrovskou a takovou jako vrozenou diplomací, tak jsme se nakonec rozhodli pro něj a to byl jako velmi, velmi dobrý krok, no, teď u nás teda nevydrží nějak jako extra dlouho, taky dva, půl roku, pokud nebo tři možná, ale to, to byl super, super nábor, kterej, kterej byl jako parádní. '", "summary": "Strnadel: prosadil proti týmu na základě “pokory a diplomacie” — intuice vs. vizuální portfolio kolegů.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hZPnKu36UgZtEOCGpYANh", "video_clip": "[video highlight_clip_0rybNK.mp4 00:00.3-01:25.2]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Hiring manager", "Lead"], "Default group": ["Pain points", "Pozitivní příklady"], "Intenzita": ["Silně"]}}, {"id": "ZL53Bo8f3fFH685viNkd", "text": "[Speaker 2] 'Zpětně vidím, že ten člověk byl nesrovnatelně, opravdu nesrovnatelně jinde, než ten, kterého jsme chtěli vzít, a ještě byl levnější. Takže já do dneška ho tam mám, je to moje absolutně jako pravá ruka, naprosto boží člověk na design systémy. Neprodal se na tom pohovoru zdaleka tolik jako ten druhý, ale ve výsledku byl prostě mnohem lepší. A já si říkám, to bylo víc štěstí, než nějaká naše observace nebo analýza kolem toho.'", "summary": "“Bylo to víc štěstí než naše observace.” Lepší kandidát se neprodal — systém neumí rozpoznat kvalitu.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hhO4iALwTfJ9vnsp2h9U6", "video_clip": "[video highlight_clip_ZL53Bo.mp4 00:00.5-00:46.0]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H4"], "Perspektiva": ["Hiring manager", "Lead"], "Default group": ["Pain points"]}}, {"id": "cJQKy62LJzRdJphLhePG", "text": "[Speaker 2] 'Ano, ano, ano. Tohle jsou HR budgety, ale tam tomu do detailů jako vůbec do toho nevidím.'", "summary": "Plat z týmu, nábor z HR budgetu. Hiring manager do nákladů náboru nevidí.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hiJreaMVBUzWQis8XIHIA", "video_clip": "[video highlight_clip_cJQKy6.mp4 00:00.3-00:06.8]", "tags": {"Hypotézy": ["H10", "H6"], "Perspektiva": ["Hiring manager", "Lead"], "Default group": ["Industry insights", "Pain points"], "Intenzita": ["Silně"]}}, {"id": "YBfWtew4Vlrcs6vMRZZi", "text": "[Speaker 2] 'Určitě používají, nevím, jestli to ještě funguje, používali dark posty na Linkedinu, používali hodně právě Linkedin sdílení. Já když jsem zjistil, že daleko, nebo ne daleko líp, ale že jako další kanál, velmi dobrý kanál funguje, Slack, že jo, českej, UXácký, tak to sypeme tam, odtamtud se nám ozývají lidi a tím, že ta komunita je tímto relativně malá, tak se často ty lidi znají, takže tohle, takže mi Na jednu stranu dělá to HR, stará se o tu promo na Jobsy a na spoustu těch dalších s tím jako zpřízněných stránek. My máme i vlastní kariérní stránky, CSAS, který si myslím, že už nefungují. ale donedávna určitě fungovaly, pár měsíců zpátky. Takže tam byly jenom pozice vyloženě jako spořitelní, tam byl odkaz hlavního vému spořitelný. Takže těch kanálů bylo spousta, ale já jsem zjistil, že pro ten designerský svět je relevantní ta komunita. Takže když jsme to posílávali do Slacku, tak se nám ty potávky jakoby násobně zvyšovaly.'", "summary": "Český UX Slack = násobně lepší kanál pro recruitment než Jobs.cz / LinkedIn dark posts.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hdVBF1WFZI26596cJd2kk", "video_clip": "[video highlight_clip_YBfWte.mp4 00:01.5-01:07.2]", "tags": {"Perspektiva": ["Hiring manager", "Lead"], "Default group": ["Industry insights", "Pozitivní příklady"], "Intenzita": ["Silně"]}}, {"id": "FW3vENirJvDVZzrAiP1s", "text": "[Speaker 2] 'Jo, určitě hlavně teda s tím daným HR-istou, který nám je přidělaný, protože třeba já jsem ti hiringu dělal jako za tu dobu, co to dělám, relativně dost, a ty HR-isty jsem měl jako, jsem jich měl za tu dobu prostě 10 nejméně. A každý je úplně jinej. A u některých jsem třeba sklouzl k tomu, že jsem se s nima domluvil, že je tam nepotřebuju ani na první úkole. To jsem jim řekl, že to je ta jednodušší varianta. Ta pravda byla, že oni mi jako neprospívali k tomu, abych to od člověka říkal. Oni říkali věci tak obecného charakteru, jednoduchého, že když už jsem to dělal to několikátý, tak jsem to byl schopný odjet místo nich. A vůbec to nebylo potřeba. Udělali ten screening telefonní a tak a já jsem se o to staral. A prodával jsem jim to tak, že vy ušetříte čas, my ušetříme čas. Není to potřebný. Takže pak jsme dosáhli nějaký efektivity a víc jsem tohle preferoval, ale pak se zase změnil HRista, tak vždycky jsme si tím museli znova projít. A já toho vlastně vůbec nejsem fanda. Podle mě tam vůbec tyhle lidi potřeba nejsou. Dřív jsem si myslel, že ano, protože jsem to vnímal tak, že jsou prostě to lidi, kteří jsou lepší v mnoha jiných oblastech, dokážou toho člověka dobře prozkoumat, ale to se může dít jako bokem, po telefonu nebo v nějakých jako jiných kanálech, ale když jsem měl už pak nějakou zkušenost s nějakým počtem těch lidí, tak jsem zjistil, že tohle nepotřebuji, že si to můžeme odjet jako úplně krásně sami.'", "summary": "0+ HR-istů za 7 let, každý jinak — nemožnost vybudovat trvalý proces.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/ho403m80vStugcquvZTbI", "video_clip": "[video highlight_clip_FW3vEN.mp4 00:00.1-01:27.9]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H2"], "Perspektiva": ["Hiring manager", "Lead"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "a0wrO4Kcxj0DABdHE9hc", "text": "[Speaker 2] ' První kolo dáme průměru se osmi kandidátama, řekněme. Já teď beru jenom ten čas, který to, který zabere vyloženě ten, ten daný pohovor a tak, a pak k tomu připočtuji nějakou režii kolem. Na půl hodiny, to máme 4 hodiny za první kolo. Druhý kolo, nějaký skenování případovek, řekněme třeba další 2 hodiny. čtyři plus dvě, šest. Druhé kolo je většinou na hodinu a půl až dvě s tím daným místem a toho se účastní většinou tak jako tři kandidáti plus mínus, někdy víc, když se to nedaří vybrat. Tak řekněme, tři, vemu to po dvou hodinách, to je šest plus šest, dvanáct. Takže dvanáct hodin vyloženě strávený na těch mítinzích toho výběrka a plus ta režie kolem. Takže nějakej ten den je prostě řekněme ta půl hodinka v Teamsech, beru to na jednoho člověka, takže jsou jako dva, co se v tom hodně šťouraj, tak jsme třeba na hodině a běží to ten první týden, je to nejintenzivnější, tak to máme 5 hodin za týden, takže plus 5, 12 plus 5 je 17 a nějaká režie kolem, tak třeba řekněme 20 hodin. Ale je to tak jako hrubé počty. Ale může to být tak jako těch 2,5 Mendeje.'", "summary": "~20 h (2,5 MD) za hire. Skenování CV/case ¼ času, zbytek mítinky + režie.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hGD49e0tdqPvvZmtw21BQ", "video_clip": "[video highlight_clip_a0wrO4.mp4 00:00.5-01:36.7]", "tags": {"Hypotézy": ["H2", "H6"], "Perspektiva": ["Hiring manager", "Lead"], "Default group": ["Industry insights", "Workflow / Chování"], "Intenzita": ["Velmi silně"]}}, {"id": "kmZjURkiPC0kWZM2zU8n", "text": "[Speaker 2] 'Něco na zjednodušení hiringu. První myšlenka. Hned jsem viděl to proklepávat, což teda za mě těžké slovo napřečte. Je dlouhý. A tři kruky odpovdávky. Pak skáču dolů na ty tři kostičky. Popíšete koho hledáte, dostanete tři profily, je na relevantní kandidáti. Třetímu nerozumím, tak to třetí jediný si čtu. Žádných 120 CVček, tři lidé, kteří splňují váš brief. Když se netrefím, připravím další zdarma. Jo, tak budu to jako nějak… Chápu, nebo cítím, že by to mohl být nějaký automatizovaný systém, který mi s tím pomůže a budeme prostě na základě, já udělám jenom brief a na základě toho mi prostě vyfiltruje tři nějaký relevantní profil. Pokud se netrefí, tak mi dogeneruje další.'", "summary": "První dojem z mockupu: “automatizovaný systém, který mi dá 3 relevantní profily místo 120 CV.”", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hvhZtCSpu32YZ4qMIcW87", "video_clip": "[video highlight_clip_kmZjUR.mp4 00:00.0-00:56.1]", "tags": {"Verdict": ["Go"], "Hypotézy": ["H12", "H6"], "Perspektiva": ["Hiring manager"], "Default group": ["Nápady respondenta", "Trust signals"], "Intenzita": ["Silně"]}}, {"id": "IAoUxJXKL5NAUAj5UVmh", "text": "[Speaker 2] 'Velmi relevantní. Když jsem o tom mluvil, že je hrozně moc těch CVček a já nemám čas je číst, tak je stejně nečtu. Ale pokud existuje nějaká automatizace, která je za mě přečte a předchroustá mi nějaký summary, jakýkoliv druh summary, tak je to velmi vítané z mého pohledu. I v té nedokonalé variantě, nad čím by to fungovalo, by to bylo dokonalejší než ten můj rychlosken.'", "summary": "I nedokonalá varianta by byla dokonalejší než můj rychloscan.” Velmi silný WTP signál pro AI pre-vetting.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hBkODqlwZ3WkxMU0ZkYA3", "video_clip": "[video highlight_clip_IAoUxJ.mp4 00:00.4-00:52.3]", "tags": {"Emoce": ["Důvěra"], "Verdict": ["Go"], "Hypotézy": ["H12", "H6"], "Perspektiva": ["Hiring manager"], "Default group": ["Nápady respondenta", "Trust signals"], "Intenzita": ["Velmi silně"]}}, {"id": "sn7nHcDJbfL8a4vCOkh8", "text": "[Speaker 2] 'Přemýšlím, někde napomezí ty dané domény, která toho člověka nabírá, tak drží ty budžety, a nebo toho HRu, nebo ten HR plošně.'", "summary": "Budget pro pre-vetting: doména (kdo nabírá pozici) nebo HR plošně.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hZaMCygcm5ncgUU4esrax", "video_clip": "[video highlight_clip_sn7nHc.mp4 00:00.9-00:16.7]", "tags": {"Verdict": ["Go"], "Hypotézy": ["H10", "H6"], "Perspektiva": ["Hiring manager", "Lead"], "Default group": ["Industry insights", "Nápady respondenta"], "Intenzita": ["Silně"]}}, {"id": "B7xOZCDAWQMl4l6MxXix", "text": "[Speaker 2] 'HR. Absolutně jakákoliv příprava. Ale nemám zkušenosti cross firmy a tak, takže z mého pohledu ten koncept, jak je to postavený v té korporaci, je absolutně nefunkční. Řekni mi o tom nic. Žádný nic navíc. Já je nepotřebuju.' [Speaker 1] 'Takže. Jako ta jejich pomoc, kterou ti poskytujou tak. Vlastně říkáš, že by bylo ideální, kdyby vůbec neexistovala, že by jako líp pracovalo, kdyby tam nebyla, že to je jako nutnost nějaká, kterou ty musíš jako.' [Speaker 2] 'To, co jsi mi ukázal, kdyby to existovalo, takový prototyp, to je za mě HR. Ten filtr, nějaká pomoc prochroustat se množstvím věcí, pomoct mi komunikovat s těma lidma, pomoct tomu dát dobrou flow, abych mohl reagovat rychle, abych ty lidi neztratil, aby se měli dobře, když je nevyberem. Todle všechno, a to všechno se neděje.'", "summary": "“Nejvíc rozbité je HR. Já je nepotřebuju.” Produkt by měl nahradit HR funkci (filtr, komunikace, flow).", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hehJsh5FicBH3kObQe8m3", "video_clip": "[video highlight_clip_B7xOZC.mp4 00:00.1-00:41.1]", "tags": {"Verdict": ["Go"], "Hypotézy": ["H1", "H2", "H6"], "Perspektiva": ["Hiring manager", "Lead"], "Default group": ["Nápady respondenta", "Pain points"], "Intenzita": ["Velmi silně"], "Emoce": ["Vztek/rozčílení"]}}, {"id": "MPl1LDUSmOrHZ7o0g2dZ", "text": "[Speaker 2] 'Ty lidi neodpadají, ty lidi fakt v 90 plus procentech zpracujou. Ale čím to je, tak já si myslím, že to je, že oni jsou v pozici, že chtějí žádat o práci, chtějí získat. Nejsou to ty seniorní designéři, kteří si tohle víc můžou dovolit. A oni nechtějí přiznat, že něco nepochopili. Vždycky hledají chybu v sobě. To je moje hypotéza'", "summary": "Kandidáti se nedoptávají — bojí se přiznat, že nerozumí. Mocenský gap blokuje oboustrannou komunikaci.", "session": "P8", "cohort": "hiring-manager", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hvBh7tNcYptxTn8V2piSc", "video_clip": "[video highlight_clip_MPl1LD.mp4 00:00.3-00:25.6]", "tags": {"Hypotézy": ["Emergent", "H1"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát", "Lead"], "Intenzita": ["Velmi silně"]}}, {"id": "JJyqg2x3tGJQsbTCrJh6", "text": "[Speaker 2] 'To je vlastně jako dobrá otázka, protože vlastně, keď jsem dala výpověď v tom Microsoftě, tak to bylo takové jako, že, kde vlastně jako teď jsem, potom po těch jako zkusenostech, alebo i co se týká jako roků, protože už jsem byla na seniorní pozici už nějakou dobu a teď je to vlastně jako ten, to rozcestí, kam se vydat jako dělej, či pokračovat vlastně v tom individual contributory, jak to v těch firmách je jmenované, nebo jít do toho managementu, že to bylo takové jako rozcestí. Aktuálně jsem to tak vnímala.' [Speaker 1] 'Tak se tak to vypadá teďka, teda už se rozhodla, nebo zatím seš v procesu rozhodování nebo.' [Speaker 2] 'Zkoušíš? Já jsem vlastně jako chtěla zkusit, to bylo vlastně před tím, než jsem začala pracovat pro VML, tam jsem měla takové období dvou, třech měsíců, když jsem se uchádzala o ty pracovné místa, a vlastně jsem si to jako rozdělila s tím, že na pár inzerátů, nebo ty pozice, které byly otvorené na seniornější pozici, kde jsem zkoušela, aby jsem si nějak zmapovala ten trh, a potom vlastně byly otvorené nějaké pozicie na veduce, na manažerskou pozici, takže jsem si to skoro jako tak nějak jako osahávala, co by to znamenalo, v jakém prostředí bych pracovala. A pro mě asi důležitější je v tom, kde bych pokračovala, je nějaká možnost toho dlouhodobějšího rastu, ten tým, s kterým bych pracovala, a nějaké finančné ohodnotení, protože jsem úplně nechcela klasnout uprímně, co se týká nějakého příjmu pod standard, který jsem si dlouhodobo budovala, takže to byly takové kritérie při tom hledaní.'", "summary": "Rozcestí IC vs. management po Microsoftu. Mapuje trh paralelně. Tvrdé kritérium: neklesnout finančně. Faktory: růst, tým, peníze.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hK7T8NgXQoxuKTzlehNFd", "video_clip": "[video highlight_clip_JJyqg2.mp4 00:01.8-01:59.2]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Kandidát"], "Default group": ["Motivátory & Bariéry"], "Intenzita": ["Neutrálně"]}}, {"id": "5CntLFzG5cGPxuFUcMCg", "text": "[Speaker 2] 'Pro mě je to největší vzrušo ten moment, kdy z toho chaosu začne už vznikat něco konkrétné, kdy už to dostává jako zmysel, to mám moc ráda. A potom vlastně, když to prvníkrát používají ty uživateli, nebo když máme ty prvé testování s reálními uživatelmi, to mám moc ráda, takové aha momenty. A potom ty oblasti, a může to být napříč celým design procesem, když je nějaký problém a buď vizibilita, nebo třeba bys má nějaký problém, nebo je tam problém s časem, tak pro mě je to takový zaujímavý orišok, který třeba prousknout, takže to mám ráda. To má na tom baví.'", "summary": "Motivuje ji process a problem-solving (chaos → smysl, aha momenty s uživateli), ne vizuální výstup.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/h7d6807AM13b1s95eDQMW", "video_clip": "[video highlight_clip_5CntLF.mp4 00:00.0-00:42.5]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Kandidát"], "Default group": ["Motivátory & Bariéry"], "Intenzita": ["Silně"]}}, {"id": "hqesSRYos4nd30nyt2Ua", "text": "[Speaker 2] 'Tak mě osobně jako designera, já úplně nemám ráda ten pixel perfect design, na tom moc nesu, jako zvládněm to, ale že bych se v tom jako vyžívala, nebo ztracela, nebo išla do toho flow, to úplně ne. A co mě na tom nebaví je občas ten čas, který strávíš na něčem, čemu jako nedává smysl, nebo když to někdo jako rozhodně nějak jako v biznise, co nedává úplně jako reální smysl, ale vlastně urobíš to nejlepší, co víš a co jsi schopný v tom čase. S tím jsem ok, ale občas to jako zamrzí. A po tom, co mám fakt jako, skvěle to jsem zjistila vlastně v té poslední práci, že ty ostatní designery, s kterými spolupracujeme, tak pokud jsou tak nastaveny, že přijmají ty věci, jak jsou, a nepozerají se na to s tím kritickým myslením, nebo vůbec jako se nepýtají, proč robíme ty věci, které robíme, a nechcou nějakým způsobem vrást, už oni mají nějaký jako plán toho rozvoja, buď osobného, alebo odborného, tak jsem zjistila, že mi to jako, je to jich věc, samozřejmě to respektujeme, ale není to úplně prostředě, v kterom bych chcela zůstat, že to mi jako jako.'", "summary": "Dvě vrstvy frustrace: (1) pixel perfect a práce bez byznys smyslu, (2) silnější — kolegové bez kritického myšlení. Trigger k odchodu.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hmBBpQw2mdowwTFaSghS3", "video_clip": "[video highlight_clip_hqesSR.mp4 00:01.6-01:22.9]", "tags": {"Hypotézy": ["Emergent"], "Emoce": ["Frustrace/zklamání"], "Perspektiva": ["Kandidát"], "Default group": ["Motivátory & Bariéry", "Pain points"]}}, {"id": "kv7rfsSNCfNmZ7665te7", "text": "[Speaker 2] 'Vlastně jsem členkou asociace, tam jsem byla od začátku, která je dost aktivná, když je čas, tak se to zúčastním, a potom se snažím raz ročně jít na nějakou konferenciu, tu v Praze, alebo online, kde se tak nějak jako zase jdem z té bubliny pryč, trošku se na to pozrím, co se děje jindě, a člověka to aj motivuje, že jako to dává zmysel, to dává tu energiu, a potom se zase vrátím do té svoje bubliny. Takže asi takto v zkratké. Na LinkedInie vlastně jako ty posty, alebo takto. Skoro jako poslední dobu mě skoro zajímaly ty tendenci, které jako v designě jako vznikají kvůli AI, takže skoro jsem se pozřela i na čas toho jako byznysu, alebo co se jako děje v tom codingu, a kde tě presahy vlastně jako jsou, a co to znamená jako pro ten design, a kde bychom se mohla orientovat, aby jsem byla relevantná pro ten trh. trh?'", "summary": "UX asociace + 1 konference ročně + LinkedIn (AI/coding/byznys). Strategicky přemýšlí o vlastní AI relevanci.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hRJyONPOy1mIlNXbEgqTM", "video_clip": "[video highlight_clip_kv7rfs.mp4 00:00.9-01:06.3]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "YE5WBvPkf0QvHlTc3m3a", "text": "[Speaker 2] 'Já jsem měla poslední rok také jako dvě obdobě, co jsem hledala prácu. Ta prvá byla na podzim, a ta posledná byla vlastně jako teraz, od toho februára, mařece, april. Potom jsem měla obdobě, keď jsem já aktivně hledala vlastně jako lidi do týmu vlastně v té agenturě. Takže v tom, v té prvé části jako na ten podzim, co to vlastně odštartovalo, bylo to, že jsem se rozhodla odjít z Microsoftu, a chtěla jsem si udělat i mezi tím karieru pauzu, takže jsem si dala nejprve jako pauzu měsíc, dva, a potom jsem začala hledat prácu, hlavně cest LinkedIn, pozerala jsem se vlastně jako na posty od jiných designerů, a nějakým způsobem se začala posílat životopisy.'", "summary": "Dvě období job search (podzim + jaro). Po Microsoftu kariérní pauza 1-2 měs, pak LinkedIn. Paralelně sama najímala v agentuře.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hVHus64yku6tU6W9AJjkE", "video_clip": "[video highlight_clip_YE5WBv.mp4 00:00.1-00:53.1]", "tags": {"Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "Oph7HWbAlkZx6dycmWiP", "text": "[Speaker 2] 'Je to skvěle nějaké jako moje osobní nastavení, že na to úplně jako nesu, jak to jako předávat. Z těch jako známých sice jsem v minulosti jako spolupracovala i s agentůrami, alebo poznám těch lidí i z té komunity, ale nešla jsem tím štýlem, že by jsem jako někoho obslovovala, či mají nějaké jako pozici, či někoho hledají, alebo na nějaké jako kafe, aby jsem zjistila, co se děje, nebo to nějak jako sdělat na LinkedIne. Vlastně jsem využila to nastavení LinkedInu, že hledám prácu, co je vlastně více viditelné pro ty nábory náborárov.'", "summary": "Seniorní designérka s bohatou sítí ji vědomě nepoužívá. Self-promotion bariéra. Pasivně “open to work” na LinkedIn — nevyužitý sociální kapitál.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hYbVDsbwsSGpT23qMcki6", "video_clip": "[video highlight_clip_Oph7HW.mp4 00:01.3-00:44.4]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"], "Default group": ["Workflow / Chování"]}}, {"id": "LccenwDOuH5AlEg1K7eu", "text": "[Speaker 2] 'A Párkrát jsem se pozřela na Jobs, ale z toho důvodu, že už jsem hledala nějakou seniorovnější pozici, tak jsem hledala skoro firmy, které jsou více jako mezinárodné. Není to úplně firmy, na které jsem cílila, které by měly inzerady třeba na Jobs.cz. Pozřela jsem si vlastně i Slack, co máme v rámci asociace, ale tam jsem nějak jako nenašla něco, co by nějak jako rezonovalo. A na tom LinkedIn je vlastně jako všetko, takže....'", "summary": "LinkedIn = monopol na senior design. Jobs.cz a UX Slack nerelevantní pro mezinárodní seniorní role.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hlvUMLh2nRlgcGeGAxXCE", "video_clip": "[video highlight_clip_Lccenw.mp4 00:00.9-00:37.0]", "tags": {"Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "LGz7B9uA0kNoMBygZduk", "text": "[Speaker 2] 'Nebylo jich velká, jako když to porovnám, když jsem začínala jako s UX, nebo když jsem si hledala ty práce, když jsem byla medior, toto bylo skôr jako v rámci deset, desetok těch životopisů. Nebylo to nějaké jako velké číslo, fakt jsem si jako vyběrala pozici, o které jsem stála, nějakým způsobem.'", "summary": "Senior posílá řádově desítky CV (ne stovky). Selektivní. Méně CV = méně dat pro obě strany.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hb9fELjo4xKbGghdRDQyc", "video_clip": "[video highlight_clip_LGz7B9.mp4 00:00.3-00:27.9]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "c7bf2LI9GaT7R9nz3nVl", "text": "[Speaker 2] 'To založilo vlastně jako od firmy. Většinou, co se týká nějaké jako firmy typu startupů, nebo nějakých stabilnějších startupů, to bylo hněď ten den, což jsem měla vlastně jako nějaký kontakt s HR, kde jsme si to hovarali, tu prvé část, to bylo prvé kolo interviu. Co se týká větších firm, tam to trvalo dlouhě, tam to mohlo být pár dní, než se mi ozvali. V některých případoch, v těch naozaj velkých firmách, '", "summary": "Rychlost odpovědi: startupy = ten den, velké firmy = dny až týdny. Korporátní screening = black box.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hb53ljeqN0LJHgChFXqx4", "video_clip": "[video highlight_clip_c7bf2L.mp4 00:00.7-00:28.2]", "tags": {"Hypotézy": ["H2"], "Default group": ["Industry insights", "Workflow / Chování"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"]}}, {"id": "Cw9GSaHTGEtkLusHxTY6", "text": "[Speaker 2] 'Jako byly tam moje, ale to byl pár, kteří se na mě vykašlali. V podstatě byly to dvě skupiny — od jednej jsem vlastně nedostala žádný feedback, jenže přijali automaticky e-mail, že byla přijatelná ta kandidatura, alebo ta poptávka. A ten druhý, když už to přišlo nějakou automatickou kontrolou a přišel mi rovnou feedback v průběhu dne nebo dalšího dne, že nemají zájem, že jim vlastně jako nefituje. Většinou to byly ty inzeráty, kde chtěli už mít nějaké rozmezy třeba co se týká nějaké jako rozmezy toho platu. A kde čekovali nějaké konkrétné zkusenosti. Takže byly některé inzeráty, které vlastně jako hledaly někoho s specifickými zkusenostemi s pracou na specifických produktoch nebo v oblasti. A tam, i když část té moje zkusenosti jako tam fitovala, tak nebyla dostačujícá, nebo nějakým tím skéninkům prostě nepřišla, tak vlastně byla automaticky zamietnutá.'", "summary": "Ghosting + automatická zamítnutí kvůli chybějící domain-specifické zkušenosti. Designerské kompetence neprorazí keyword filtr.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/h765NgM7rFp5UVPloV8OE", "video_clip": "[video highlight_clip_Cw9GSa.mp4 00:01.4-01:18.7]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "qOM1Ho9kRdUb3rWIaG4i", "text": "[Speaker 2] 'to je dobrá otázka, protože ono je to velmi jako subjektivní, ne zvaž jako pro mě jako pre kandidáta a jednak jsem očekávala nějaké jako nějaké jako standardy celkovou, ktorésu nějakým způsobem podobné, ale v podstatě každá firma k tomu přistupovala trošku jako jinak, takže jsem se tam vlastně musela i přizpůsobila tomu tomu výběru a potom tomu procesu. A tak jde. Možná jako nejideálnější je ti ty pohovory bolí policie.'", "summary": "Nejlepší pohovory = autenticita, lidský kontakt, specifické otázky. “Pocit, že se hledá ten fit, ne že mě někdo hodnotí a známkuje.”", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hz2Trpn5hV2LOP9pMuo27", "video_clip": "[video highlight_clip_qOM1Ho.mp4 00:00.9-00:35.0]", "tags": {"Emoce": ["Důvěra"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady", "Trust signals"], "Intenzita": ["Velmi silně"]}}, {"id": "Y9Gzp3Jzbb6c8LHjwYs0", "text": "[Speaker 2] 'Například, keď se vlastně interpretoval záujem o tu pozici, tím jako působím a jaká jsem osobnostně. A to byl jeden konkrétní pohovor na manažerskou pozici, kde jsem vlastně byla v klidě na tom osobném pohovore a bylo mi vytknuté, že nedávám do toho tolko energie, či to vlastně chcem, či jsem dravá, či mám na to tu správnou energii a ten drive. Tak to mě trochu zarazilo, že je tato pozice potřebné pro lidi, kteří vědí udržovat klid i v náročných situacích. Tak to bylo trochu jako matuce.'", "summary": "Manažerská pozice: vytkli “málo energie a drive” — přitom byla klidná záměrně. Subjektivní interpretace osobnosti místo kompetencí.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hDfb4pwIiwbaEuhG01iAc", "video_clip": "[video highlight_clip_Y9Gzp3.mp4 00:01.4-00:44.4]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"], "Emoce": ["Vztek/rozčílení"]}}, {"id": "5SiwTpTIZ0PyoOtsRrVn", "text": "[Speaker 2] 'A potom nějaké jako nepříjemné, kde jsem vnímala, že to je fakt jako to hodnotení jako v škole. Ale skôr se to týkalo jako nějakých hard skillů nebo té historii těch hard skillů. A je to skôr jako moje osobní problém, protože já vnímám jako seniorní pozici jako důležitou hlavně, co se týká soft skillů a nějaké komunikace. Protože čím důležitější je ten projekt, tím je důležitější ta komunikace a ta spolupráca. A ty hard skilly se dají naučit jako vždy, lehčí za pár týždňů nebo za měsíc. Alebo to, že máš za sebou nějaký větší projekt a víš ho jako dodat v určité kvalitě. Takže se mi to asi nějak tak jako osobně dotklo, že ta moja seniorita je dotazovaná.'", "summary": "“Hodnocení jako ve škole.” U seniora jsou soft skills + komunikace důležitější než hard skills. Seniorita zpochybněna kvůli specific hard skills.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hmCkIWSFwbPbKrB8J40e1", "video_clip": "[video highlight_clip_5SiwTp.mp4 00:00.4-01:21.6]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H4"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"], "Intenzita": ["Velmi silně"]}}, {"id": "FF8U5aH8gT3lUARmRpYG", "text": "[Speaker 2] 'Co je jako také specifické oproti tomu, když jsem hledala kdysi tu prácu a když jsem hledala teď, že vlastně se hledali, ve většině případů hledali jako zkusenost s konkrétními oblastmi a s konkrétními produktami. A to vlastně evoluovalo jako senioritu v jejich oblasti.'", "summary": "Domain specificity bias — firmy ztotožňují senioritu se zkušeností v konkrétní oblasti. Přenositelné kompetence nestačí.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hn5irWIDqVvfvxNN12SrF", "video_clip": "[video highlight_clip_FF8U5a.mp4 00:01.5-00:14.4]", "tags": {"Hypotézy": ["Emergent", "H1", "H3"], "Emoce": ["Frustrace/zklamání"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "zH1x991t2pWpKVIpOnb5", "text": "[Speaker 2] 'Tak to ty jako kandidát nevíš, jako to hodnotí, a to jsou skôr jako interní procesy. A ti, které poznám, jsou skôr jako kvůli tomu, že poznám, protože jsem byla z druhé strany. Tak například jako v tom Microsoftě, lebo těž jsem se jako hlasila znova jako do Microsoftu, tam je vždycky ten feedback, tam je například portfolio review, kde vlastně prezentuješ tu case tady před celým publikou. Tam může být 5 designérov, k tomu ještě další inžinieri, alebo produktoví manažéry. A mám možnost se pýtat. A oni potom vyplňují takový jako feedback form, v rámci té firmy, kde mají špecifické oblasti. A ti jsou na základě toho, těch hodnot, které má firma interně. Čiže, keďže se jede growth mindset, tak se tam čekuje, jak je jako mindset na ten rast osobnostný a profesný. Jak je to tam vlastně na určité škále. A potom je tam vlastně jako zkusenost s tou úrovňou toho designu jako takého, z tvojho pohledu jako designera. Potom je tam spolupráce a myslím si, že je tam ještě empowerment. Že vlastně jako pomáháš třeba jiným, čiže oni tam hodnotí, či sdíláš to svojí know-how, či robíš mentora, alebo či píšeš třeba články. Tak třeba jako vím, že oni mají takovou tu šablónu, kterou jako vyplňují. A na základě toho to zazbírají vlastně z celé skupiny, která tam je. A potom si z toho urobí jako ten feedback, že tam se fakt urobí ten average. A porovnávají se tam ty kandidáti. '", "summary": "Microsoft best practice: strukturovaný portfolio review před panelem (designeři + inženýři + PM). Feedback formulář s growth mindset, design level, spolupráce, empowerment. Škála + průměr.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hYoxYMgu4XO7BpIXrY5Xt", "video_clip": "[video highlight_clip_zH1x99.mp4 00:00.7-01:49.1]", "tags": {"Default group": ["Existing solutions", "Pozitivní příklady"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "KqXjVsaPQYwnM0dNr2kQ", "text": "[Speaker 2] 'To už bylo další kolo, kde jsem išla osobně do té kancelárie. A tam měli připravenou nějakou case, byli tam zastupci za produktový management a za užívatele, který to používá, business architekta. A měl jsem vlastně pomoct najít nějaké rěšení, které jsem měla odprezentovat byznysovému vlastníkovi, který tam přišel ku konci. A měla jsem na to 35 minut, aby jsem vyspovědala vlastně jako to užívatele, aby jsem zjistila, jaké jsou, co vlastně jako chceme prezentovat a co chceme jako za byznys vlastně jako dosáhnout. A vlastně nebylo ani jako dané, či to mám urobit wireframe, či mám urobit prezentaci, co s tím mám urobit, takže to jsem si těž musela nějakým způsobem zjistit v rámci toho času.'", "summary": "Whiteboard challenge: reálný problém, mix rolí, 35 minut, otevřený formát. Kandidát musí sám zjistit kontext + formát výstupu.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hehgrWTf62sKck0XoKi36", "video_clip": "[video highlight_clip_KqXjVs.mp4 00:01.5-00:43.5]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady"], "Intenzita": ["Silně"]}}, {"id": "K4jRy41m6FN69i44yOpG", "text": "[Speaker 2] 'Jo, ale i tak to bylo vlastně jako zvláštně, protože jinak ta forma tej prezentácie tej case tedy byla bolná a ten feedback byl vlastně na tu štrukturu tej prezentácie v podstatě. Takže jako z druhé strany pro mě OK, jako prezentací někam jinam jako dělej na podobné pozici je dobrý a chápem to, ale jako zadání nebylo úplně tak to konkrétné, že by to bylo jako must have. Takže jako nedá se úplně hodnotit něčeho, keď nejsou tak nejjasné požadavky'", "summary": "Microsoft feedback paradox: formát byl “volný”, feedback hodnotil strukturu prezentace. Disconnect — nemůžeš hodnotit, co jsi nespecifikoval.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hLqtjMv6IEM5TBSvNahIv", "video_clip": "[video highlight_clip_K4jRy4.mp4 00:00.1-00:37.8]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Pain points"]}}, {"id": "0aRKfGji6Pyx7TtEd94s", "text": "[Speaker 2] ' Já bych to možná rozdělila na dvě části. Ta jedna, kterou má bavila skôr jako osobně, tak byla ta, že vlastně jako designujem něco jiné, že mám nějakou case study, kterou můžu si nějakým způsobem ochutnat, jaký typ práce tam vlastně jako bude. A pro mě to je vždycky takový jako refresh toho můjho vzťahu k práci, takže pro mě osobně je to vždycky takový, že mě to baví, že zase jako vidím tu svoji radost z té práce, že jsem designer a že mám tu flow. Tak má vlastně jako hodně bavila, i když to bylo stresující, ta case study. To je jako poprvé, co to bylo takto koncipované, že tam fakt byl jako mix těch rolí a byl tam jako reální problém, který říjí v té firmě, takže to bylo jako zajímavé si osahat to, jak se komunikuje jako s těmi ostatními rolami, jak moc jsou otvorení tomu designu, jak moc jako chápou ten design. Pro mě to bylo fajn jako zjistit si a osahat si, jako by to reálně v té firmě vyzeralo. Zároveň to ode mě vyžadovalo nějaký jako čas. Některé firmy mají takový jako ten jeden děň v té firmě, takže mi to přišlo takové, že to má jako stejný efekt, ale zároveň tam je ten respekt vůči tomu času a té energie, kterou ten kandidát do toho dá. '", "summary": "Case study = refresh vztahu k práci. “Vidím tu radost z práce.” Oceňuje formát, který respektuje čas kandidáta.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hXSQ2uqF8mOTzmLmpRaWN", "video_clip": "[video highlight_clip_0aRKfG.mp4 00:00.1-01:46.2]", "tags": {"Emoce": ["Důvěra"], "Verdict": ["Go"], "Hypotézy": ["H1", "H5"], "Perspektiva": ["Kandidát"], "Default group": ["Motivátory & Bariéry", "Pozitivní příklady"], "Intenzita": ["Silně"]}}, {"id": "FfMqlcTsTmbgM03kfWDj", "text": "[Speaker 2] 'Já bych se možná ještě vzpomenula jednu věc, možná je to, není něco, čemu bych se chtěla vyhnout, ale co je jako extrémně náročné, je vlastně jako mít v tom portfolii úplně všechno, protože jako designer máš zmluvy s těmi firmami, že ty designy nemůžeš jako někam dáleji dát, alebo prezentovat. A vlastně já si neuschovávám úplně všechny designy, které jsem v životě jako vyrobila, nebo měla, nebo všechny flow, jako nemám všechny figmy. A mně přijde, že vlastně jako v určitých momentech jako ode mě očekávali takovýto level toho portfolia, nebo ukážky práce, ale přitom to nedávalo jako zmysel, ani to není jako reálně možné. To je asi takový jako hodně velký challenge.'", "summary": "Portfolio paradox: NDA blokuje sdílení, nemá uschované všechny screeny — ale firmy očekávají kompletní portfolio. “Není to reálně možné.”", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hirFhrCO1clSQTsaSPIuk", "video_clip": "[video highlight_clip_FfMqlc.mp4 00:00.4-00:50.7]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H4"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "Xsu7qPt636YzAAjhnWjK", "text": "[Speaker 2] 'S profesním rozvojem, já ho mám velmi jako spojený s tím, aj co robím, protože já jsem trošku jako praktickejší člověk. Záleží od té cesty, kterou si vyberiem, ale skôr když to vezmu jako všeobecně, když vůbec jako hledám, kterou tu oblast si vybrat, tak skôr pozerám nějaké jako ty tendenci, co nejvíc jako rezonuje, ale zároveň to ještě kombinuji s tím, co mě baví a s tím, co vím, že je tam větší pravděpodobnost, že zůstane. Takže například, teď aktuálně co si myslím, že je oblast, která má velký potenciál a která teda zjistně není přeskumaná, každý hovorí o kodingu, vibingu a veci podobného, ale myslím si, že ta UX architektura — mať nad tím nějakou jako kompletnou představu, jak čo funguje a nastavovat to a mapovat a veci podobné — je vlastně oblast designu, která bude potřebná a bude tu nějakou dobu. Čo se týká toho blueprint mapping, výzkumy, naučit se trochu biznisu, jak vzniká MVP. A jednak je to spojené s tím, že chci zůstat individual contributor, takže je to taková mojí cesta.'", "summary": "AI resilience strategie: UX architektura + blueprint mapping + service design = oblast, kde AI nenahradí. Chce zůstat IC.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hEoCR0UKx3CjznOrEJD2O", "video_clip": "[video highlight_clip_Xsu7qP.mp4 00:00.8-01:44.8]", "tags": {"Hypotézy": ["Emergent", "H3"], "Default group": ["Industry insights", "Motivátory & Bariéry"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "VgCbHFY888jSO8RedamN", "text": "[Speaker 2] ' Vždy jsem chtěla být nějakým rovnocenným partnerem v tom týmu, na tom projekti. A vlastně cokoliv z tohoto mi dává možnost být tím rovnocenným partnerem, nebo být viděná jako ten rovnocenný partner. Čili, že když zabavíme třeba o té hodnotě designu — byla jsem v situaci, kdy jsem byla jediný UXák jako v firmě a potřebovala jsem více UXáků, albo jsem měla konečně na starosti nějaký lepší projekt, tak ukázat, že ten design má nějakou hodnotu a cenu, tak mě to zaujalo. Potom — teraz zase design už každý si bude wireframing sám, protože použije AI, tak jako už nebudou chodit k nám s papírekmi, jak to mají nakreslené, ale už rovno s prototypmi. Tak co můžeme udělat, aby jsme byly relevantní? Tak zase architektura a nějakým způsobem mapování a procesní design mi do toho jako dává smysel, že mám zase jako proč se bavit s těmi vlastníky, že neobcházejí, jsem rovnocenným partnerem a jsem stále relevantní pro tu diskusi'", "summary": "“Každý si bude wireframing sám přes AI, už nebudou chodit s papírekmi ale s prototypmi.” UX architektura = rovnocenný partner v post-AI éře.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hJhkJLn98m1CZnSTcbcgs", "video_clip": "[video highlight_clip_VgCbHF.mp4 00:01.0-01:23.0]", "tags": {"Hypotézy": ["Emergent", "H3"], "Default group": ["Industry insights", "Motivátory & Bariéry"], "Perspektiva": ["Kandidát"], "Intenzita": ["Velmi silně"]}}, {"id": "fNkO29VGhToGMk47pAzT", "text": "[Speaker 2] 'Keď popíšu na tu konkrétnu situaci, tak jsem byla na starosti menší tým, který se rozšiřoval a v tu dobu už vyslal i inzerát na mediorného designera, ale zároveň v průběhu času, co byla ta poptávka otvorená,tak přišla další poptávka pro dalšího designera, takže na jeden inzerát jsme vlastně jako nabírali více lidí. To prvé, co se jako děje, je nějaká komunikace jako s HR, tak nějakou definovat vlastně, koho hledáme a jaký level má. Takže bylo jako těžké nějakým způsobem definovat, koho vlastně hledáme, protože mám zkusenost, že prostě jako lidé, kteří nemají úplně dlouhodobou zkusenost, tak se aj tak hlásí na seniornější pozici. Potom, co se dohodovalo s HR je vlastně jako nějaký proces — screening, potom interview so mnou a potom case study alebo review. A jsem vybrala to portfolio review, protože pro mě bylo důležité hlavně jako, aby ten člověk věděl odprezentovat tu prácu před klientem, protože to byla agentura, takže prezentačné dovednosti byly důležité. A bylo pro mě jako důležitější vidět ty mekké dovednosti, a nějakým způsobem typ projektu, který mají ze sebou, než nějaký jako hard skill, že vědí nadizajnovat prostě landing page pro nějakou kampání, protože to je něco za mě, co se člověk jako naučí rychle'", "summary": "Hiring jako lead: definice s HR těžká. Proces: screening → interview → portfolio review (inspirován Microsoftem). Soft skills + šíře > hard skills.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hcvq1yAI7wt3S0yUd352f", "video_clip": "[video highlight_clip_fNkO29.mp4 00:00.3-02:31.1]", "tags": {"Verdict": ["Go"], "Hypotézy": ["H1", "H11", "H4"], "Perspektiva": ["Hiring manager"], "Intenzita": ["Silně"], "Default group": ["Trust signals", "Workflow / Chování"]}}, {"id": "IojakcjxV0DgxmFE2uJS", "text": "[Speaker 2] 'Nejprve jsme selektovali s HR životopisy, takže jsem si vždycky sedla s tím HR-istem a přecházeli jsme životopisy. On nějakým způsobem občas filtroval, občas nefiltroval, takže jsme to většinou robili pospolu, kterých si budeme pozývat na to další kolo. Jedním z těch kritérií bylo, aby hovořili nejen anglicky, ale i česky. Mnoho těch kandidátů hovořilo jen anglicky, nebo byli cizí. Potom někteří ještě stále študovali. A dalším kritériem bylo, bohužel, byl nějaký budžet, takže jsme se dívali i na to rozmezit, jestli má vůbec zmysel si těch lidí zavolat. Občas jsem si zavolala i někoho, kdo chtěl vyšší úsazbu, když se mi ten životopis fakt páčil. Takže jsem si screenovala ty životopisy a skoro hodnotila a hledala nějaké red flagy a nějaké good points. Na tom prvém kole, když měli to povídání se mnou, tak to bylo o tom, co mají za sebou. Pro mě bylo důležité i vědět, proč chci jít do agentury a jaké mají očekávání a co jich na tom designu baví, aby si byli vědomí, že pracují v agentuře.'", "summary": "CV screening společně s HR. Kritéria: jazyk (CZ+EN), kapacita, budget. Občas ignoruje budget pokud CV zaujme.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hbXxB4UIM5X2NGMRJTuqY", "video_clip": "[video highlight_clip_Iojakc.mp4 00:00.0-01:32.6]", "tags": {"Perspektiva": ["Hiring manager"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "clDod0hMOkfmGMykVfVo", "text": "[Speaker 2] 'Tam bylo ještě jako Vianoce, ještě pomazitým tam byla taková jako stopka, že jsem to pozastavila, protože jeden kolega z týmu odcházel, protože dostal někde nabídku, takže já jsem se snažila mu dať tu otvorenou pozici, aby zostal, ale nakonec se rozhodl, že odjde. Tých bylo možno aj, já nevím, kolem osmdesát plus, co jsme prechádzali. A z toho selectu nějakých třicet, a potom vo finále jsme si pozvali na ty osobné, okolo desítky, a potom na to portfolio review pětich. No takže jo no. Jako mně znamená to čistého času, ale od doby, co dosáhl, jsou inzerát po po vlastně jako nástup. Tak tak to boli 4 mesiace. '", "summary": "4 měsíce inzerát → nástup. Funnel: 80+ CV → 30 short list → 10 interview → 5 portfolio review.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hwRKJMKhRDV6msescsE0d", "video_clip": "[video highlight_clip_clDod0.mp4 00:00.9-00:34.2]", "tags": {"Hypotézy": ["H2"], "Perspektiva": ["Hiring manager"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "3tZn4Kl7A613AOxv1vgj", "text": "[Speaker 2] 'Tam byl hlavně jako důležitý za toho produkťáka soft skills, aby věděl komunikovat, aby měl nějakou zkusenost s tím, být proaktivní a fungovat v chaose, nebo když něco nefunguje. Protože to byl klient, který měnil zadání prostě jako každý týždeň. A potom, co hládali jako s tým, je ta zkusenost jako s tím designem, jak moc seniorný je, jak je na tom jako s tím interaction designem, či robil nějaký výzkum, nerobil výzkum. A bohužel někdo, lidé v tým jako hodnotili i to, či měl zkusenost s nějakým jako marketingem, nebo ne. Tam jsme se jako interně nezhodovali, co je jako důležité pro seniorného designera.'", "summary": "Hodnotící kritéria se lišily podle role: produkťák chtěl soft skills, design tým hard skills. Chybí společný framework.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/h1Hmf8roA9FlTMH0dOUUm", "video_clip": "[video highlight_clip_3tZn4K.mp4 00:00.5-00:46.6]", "tags": {"Hypotézy": ["H1", "H7"], "Perspektiva": ["Hiring manager"], "Default group": ["Pain points", "Trust signals"], "Intenzita": ["Silně"]}}, {"id": "MQ7qvNBMbTexxuWqubcj", "text": "[Speaker 2] 'Bylo to vlastně jako cez HR, co se jako komunikovalo. Nešlo to jako nějak jako od nás, ale skoro jako HR mál na starosti tu komunikaciu.' [Speaker 1] 'Snažím se představit, do jaké míry ta zpětná vazba byla detailní viz, tak když jsme se bavili o té tvé, že jo, že ta zpětná. Vazba k tobě. Dostávala byla na úrovni, děkujeme mockrát, ale používal jsme si vybrali jiného kandidáta. Tak jestli ta komunikace od vás šla podobným podobný úrovni detailů a nebo tam třeba bylo víc informací o tom, proč třeba se toho kandidáta odmítli, nebo.' [Speaker 2] 'Jo, bylo to podobné úrovni detailů.'", "summary": "Feedback kandidátům šel přes HR, na minimální úrovni detailu — stejný pattern, jaký sama zažila jako kandidát. Strukturální problém.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hRf62puG7prYyAHI6RVUU", "video_clip": "[video highlight_clip_MQ7qvN.mp4 00:01.2-00:39.3]", "tags": {"Hypotézy": ["H2"], "Perspektiva": ["Hiring manager"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "57mQx1fecjIE7DicLnbO", "text": "[Speaker 2] 'Spíš ta komunikace interně s tím týmem. Co to znamená? Co je jako důležité pro každého? Toto konkrétně byla firma, kde vlastně nebyly dané standardy, co znamená vlastně být seniorním člověkem. Co znamená být seniorní designer. Interně v týme to bylo chápané tak, že ten jediný člověk, který byl na seniorní pozici, tak se každý s ním srovnával. Že vlastně i ty jeho názory, či ano, či ne, ten seniorní člověk byl brán za prostě sad intestum. A s čím jsem ani nebyla OK.Takže to bylo skoro na úrovni jako toho interného nějakého dohadování, co mě fakt nebavilo, že abychom měli nějaký common, jako společné chápání, koho konkrétně hledáme a které skilly jsou nejdůležitější. Že to není o tom, či ví někdo jako nakreslit prostě jako landing page, ale je to o něčem jako trošku víc. Jako ten zvyšek, buď jako lída, alebo jako designera, je to vždycky jako radost, když se nabere, protože v tom vidím, že ta firma dává důvěru tomu designu a je to skoro takové jako Vánoce'", "summary": "Největší pain jako lead: chybějící standardy seniority. “Jediný senior se stal benchmarkem — s čím jsem nebyla OK.” Ale zbytek hiringu = radost (“Vánoce”).", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hT1urpNg6aUW8dFcLJnUv", "video_clip": "[video highlight_clip_57mQx1.mp4 00:01.0-01:23.9]", "tags": {"Verdict": ["Go"], "Hypotézy": ["H1", "H11", "H7"], "Perspektiva": ["Lead"], "Default group": ["Motivátory & Bariéry", "Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "32USunbW8yujx0KQKLVl", "text": "[Speaker 2] 'Je to skoro. Já si myslím, že ty standardy jsou asi na také úrovni, ne úplně konkrétné, ale aspoň nějakým způsobem rámcové dané by měly být. Samozřejmě každý tým, i když máš obrovskou firmu a jsou tam nějaké standardy, které mají nějaké jako tabulky, nějaké levelů, tak každý tým má vlastně jako jiné chápaní toho, co to jako znamená v té praxi. Něco na té úrovni, aby jako nějaký checklist byl jako daný, protože každý má v hlavě něco jiného, každý se prostě jako porovnává s někým jiným. A je pro mě jako strašně nešťastné, jako pro lídra, nebo pro toho hirujícího, kdy vlastně se něco hodnotí na velmi subjektivném, jak to jako zmeráš.' [Speaker 1] 'Není to jasný. Co to znamená teda bejt ten senior, že jo, jako každej se to může představit nějak jinak.' [Speaker 2] 'Přesně tak jako Někdo to má podle rokov, někdo to má podle objemov tých jako projektov. Je něčo jiné, keď jako ten UXák robí 10 rokov na jednom flow v jednej firmě a je něčo jiné, keď má v starosti kompletný redesign nějakého portálu. Takže jako každý to chápe jinak a možno mít tak jako spoločné chápaní toho, co to znamená, je důležité.'", "summary": "Potřeba alespoň rámcového checklistu seniority. “Strašně nešťastné pro lídra hodnotit subjektivně.” Příklad: 10 let na 1 flow ≠ kompletní redesign portálu.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hglj1C4H4Xf0mbUnJr3cC", "video_clip": "[video highlight_clip_32USun.mp4 00:01.2-01:54.9]", "tags": {"Emoce": ["Frustrace/zklamání"], "Verdict": ["Go"], "Hypotézy": ["H1", "H11", "H7"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Lead"], "Intenzita": ["Velmi silně"]}}, {"id": "JkzDNl9bWergFiuZ545S", "text": "[Speaker 2] 'Figmu, lebo to potřebuji mít vizuálně a mít tam ty lepíky. A to je asi tak všechno. Snažila jsem se v tým mít ještě nějakou škálu, ale tohle nepřešlo. Nic takového toho.'", "summary": "Nástroje pro hodnocení: Figma s lepíky — primitivní workaround. Pokusila se zavést škálu, neprosadila v týmu.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/h43tqAsGxntaNTKkVzsjh", "video_clip": "[video highlight_clip_JkzDNl.mp4 00:01.2-00:18.7]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Hiring manager"], "Intenzita": ["Neutrálně"], "Default group": ["Workarounds"]}}, {"id": "VfenVpKqb7bwAPofclc2", "text": "[Speaker 2] 'Je to ten čas, a pokud to byla agentura, kterou jsem měla odzkoušen, na kterou důverujem, tak to bylo ideálnější. Že ten onboarding nebyl úplně na mě, že už ten člověk přišel onboardovaný na ten projekt, na nás jako na klienta, že už věděl začít dodávat a vytvářet něco, už ty prvé dva týdny. Zároveň, že za tu kvalitu někdo jako odpovědal, že si interně třeba aspoň nějaké kolečko iteračné dali před tím, než jsme ti designy konzultovali spoločně. Skoro jako výhoda toho byla, že rychlý onboarding, ta úroveň těch lidí, ale to záleželo od agentury. Byly agentury, které tam dotlačily lidí, kteří nevěděli nebo se učili dělat o Figma, co mě překvapilo.'", "summary": "Vendor agentura jako alternativa k hiringu: rychlý onboarding, kvalita zaručená — pokud důvěryhodná. Některé poslaly lidi, co se učili Figmu.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hU0cUbLZ2cKnIfyKwIaOF", "video_clip": "[video highlight_clip_VfenVp.mp4 00:01.0-01:23.0]", "tags": {"Hypotézy": ["H6"], "Perspektiva": ["Hiring manager"], "Default group": ["Pain points", "Pozitivní příklady"], "Intenzita": ["Silně"], "Verdict": ["Unknown"]}}, {"id": "KqhLOKI46v7T7ZyY0wLu", "text": "[Speaker 2] 'Já si myslím, jako v rámci designu, keďže je tak jako širokospektrálný, a jinak každá firma chápe UX úplně jinak, a očakává jiné delivery, tak je to skvůr o tom, co jako potřebuješ vlastně jako vykrytí, a i v tom týmě, a i v té poptávce. Já strašně ráda používám to koliesko tých skillsetů, nevím, či tě ho poznáš vlastně od Normana, tak vlastně jako je normálně jako ta pavučina těch skillsetů. ' [Speaker 1] 'Kdy?' [Speaker 2] 'Ten graf, a ty si to vlastně můžeš urobit pro celý tým, a vyjde tam překvíl, a potom víš vlastně jako koho potřebuješ doplnit do toho týmu. Zvlášť kdy je to jako agentura, že potřebuješ nějaký skill, který jako chybá v tom týme, tak to tam víš jako vykrytí. Že pokud si ti lidé urobí ten graf, a i s výhledem kam se chcou posouvat, tak úplně ideálně.'", "summary": "Spider chart skill radar (od Normana) jako existing solution — pavučina pro celý tým. Vizualizuje gaps + development plán. Framework musí být flexibilní.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hxHB9xbm8faJalQncGnfM", "video_clip": "[video highlight_clip_KqhLOK.mp4 00:01.4-01:13.3]", "tags": {"Default group": ["Existing solutions"], "Verdict": ["Go"], "Hypotézy": ["H11", "H5", "H7"], "Perspektiva": ["Lead"], "Intenzita": ["Silně"]}}, {"id": "Wf0qG5o1pEyYyKPjdOVw", "text": "[Speaker 2] 'Asi jasnější požídavky než jako všeobecně generované inzeráty. To vlastně odfiltruje hned na začátku. A nějak to očekávání nad těmi dalšími kolemi, že co konkrétně se očekává. A když se neočekává nic, že vlastně jako to mají očekávat třeba tu tvou reakci, jakým způsobem reaguješ na neznámé prostředí. OK, já jsem s tím OK, ale tak jako tak by bylo fajn to vědět. '", "summary": "Nejvíc rozbité: generické inzeráty + nejasná očekávání procesu. Upstream problém — špatný input = špatný output.", "session": "P6", "cohort": "designer-senior", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/h3gL2VdNm7XwFKjMZn4jd", "video_clip": "[video highlight_clip_Wf0qG5.mp4 00:01.5-00:39.0]", "tags": {"Hypotézy": ["Emergent", "H1"], "Emoce": ["Frustrace/zklamání"], "Perspektiva": ["Hiring manager", "Kandidát"], "Default group": ["Nápady respondenta", "Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "jgWsdVmIpT1YyHKJSoyM", "text": "[Speaker 2] ' já jsem studovala právě grafický design na střední, takže původně jsem myslela, že půjdu práci s touto designu, ale nakonec jsem zjistila, že na to mám dostatečný talent (…) jsem se náhodně dostala do cool people (…). napsali na linkáči a já jsem potřebovala práci a vlastně jsem si říkala, jo, proč na to zkusím, toho rekrujtera. (…) po nějakých čtyřech, pěti měsících v tom flow people už jsem nezvládala asi tu neetyčnost toho chování (…) uplifting právě zrovna firma, která hodně řeší různé etické kodexy (…) jsem se tam dostala na juniorní pozici před těmi lety. A za tu dobu, co tady jsem, tak jsem vlastně už teď pokročilý medior.'", "summary": "Career switcher z grafického designu, 4-5 měs CoolPeople (eticky neuspokojivé) → Applifting junior → “pokročilý medior” za ~1,5 roku.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/h87XvcicUYg8lY3b0upo9", "video_clip": "[video highlight_clip_jgWsdV.mp4 00:00.3-01:07.3]", "tags": {"Perspektiva": ["In-house TA"], "Default group": ["Industry insights", "Workflow / Chování"], "Intenzita": ["Neutrálně"]}}, {"id": "GefK1TUX1PKqEteAc3in", "text": "[Speaker 2] 'Určitě My jako děláme digitální produkty (…) máme tam designovej tým, máme UXáky a tam je zhruba podle mě 8 lidí teď. Dohromady v liftingu je nás kolem 180. ten design si myslím, že je docela velkou roli. Máme ty produkty asi jako podle mě to je hezký a myslím si, že ty designéři jsou jako hodně hodně seniorní. To co tam?' [Speaker 1] 'Máme no a. V tom vašem h rvym týmu tak tam to vypadá jak kolik vás tam je na takhle velkej takhle velkou firmu už tak určitě neděláte sama. Předpokládám, že tam určitě bude víc lidí.' [Speaker 2] 'Ne, ne, ne no co se týče počtu rekruterů, tak teď jsme tři, byli jsme donadávno jenom dva, což byl
