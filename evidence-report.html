, ale dáš mi prostě na výběr dva, tři lidi, jo. A snažíte se nám sehnat někoho, kdo k nám mečuje a současně koho i jako by to zajímalo. Takže vlastně je to pro mě takový, že i ti víc věřím, jo. Kdežto u těch lidí jako z ulice, tak tam si řekneš, že já vlastně vůbec nevím, kdo ty seš a musím si tě mnohem víc jako proklapnout.'", "summary": "Pre-vetting přes agenturu = důvěra. “I ti víc věřím.”", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hi101SP2KCzgzLc9BlQRS", "video_clip": "[video highlight_clip_nG6nNj.mp4 00:01.2-00:46.2]", "tags": {"Verdict": ["Go"], "Hypotézy": ["H6"], "Perspektiva": ["Hiring manager"], "Default group": ["Pozitivní příklady", "Trust signals"], "Intenzita": ["Velmi silně"]}}, {"id": "QxMcmNifSeuw0rXhE7X5", "text": "[Speaker 2] 'Hele, tak já si myslím, že ono se to ani až tak jako nelišilo. Ale dobře, pojďme od začátku. Takže hele, já jsem prostě semka nastoupila a mou úlohou bylo přesně i jakoby nabrat ten tým lidí. Takže se začaly dělat jako nějaký nábory. A ty nábory se moc neliší od toho, když jsem teďka nabírala vlastně toho posledního trejního. Ten nábor vypadá pořád dost podobně. A to je přesně to, že ty teda vypíšeš jako popis té pozice, co chceš nebo co nechceš. Což dneska já můžu dělat s tím týmem. Tehdy jsem to musela tak nějak jakoby sama dát jakoby dokupy, případně s Mírou Štechrem, s mým šéfem. A vlastně je to teda o tom, že ty kontaktuješ HR. A musíš prvně mít schválený to místečko. Je budget a je prostě místo tady jakoby je. Ale jakoby i od ředitelů. Proto teďka, když to řeším s Mírou, že bychom chtěli jako další lidi, tak je to takový jako — já to řeším s ním i s HR, tam by se to ještě jako potkalo. Ale pak Míra musí jít a obhájit to jako u ředitelů. A to mi přijde, že už jako úplně nechce tuhle tu křížovou cestu jako podnikat.'", "summary": "Schválení budgetu od ředitelů = “křížová cesta”, šéf nechce opakovat → bariéra rozšiřování týmu.", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h8dBsVCq7vS2VQgwQLAtd", "video_clip": "[video highlight_clip_QxMcmN.mp4 00:01.1-01:07.3]", "tags": {"Hypotézy": ["H2"], "Perspektiva": ["Hiring manager"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "jm9aObgbuUUkt60swjtK", "text": "[Speaker 2] 'Hele, já to vlastně vykopnu. Vždycky se dívám na to, co jsme měli v minulosti. Dneska se prostě zeptám i AI, co by mi ještě třeba poradilo na takovouhle pozici. Případně se kouknu, jak to máme popsaný, nějaký jiný inzeráty, co tam jsou jako takový to jen práce. Prostě ČEZ má taky nějaký takový ty stránky. A takže tam se inspiruju. A pak poprosím většinou, třeba neprosím celý tým, ale prosím seniory, což je David s Filipem, aby se na to mrknuli. A prostě takhle to posílám na HR. Co bych ale jako bych nečekala, je to, že by mi HR trošku ještě jako pomohlo s některýma věcma. Ale většinou to tak není. Většinou to tak je, že já něco pošlu a oni to jenom takhle jakoby hodějí dál. Ze začátku, když se tohle dělo, tak jsem si myslela, že já to posílám na HR a že oni mi dají nějakou zpětnou vazbu, nebo že to ještě společně trošku dočíšem. Tak to se podle mě nestalo.' [Speaker 2] 'Prostě jsem to jenom takhle jako — a já, ú, opravdu, už to je venku.'", "summary": "JD: minulé inzeráty + AI + review seniorů. “Myslela jsem, že mi HR dá feedback. Nestalo se.”", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/haZCMtksdvRaNxyWpBvJT", "video_clip": "[video highlight_clip_jm9aOb.mp4 00:00.3-01:08.1]", "tags": {"Hypotézy": ["Emergent", "H2"], "Emoce": ["Frustrace/zklamání"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Velmi silně"]}}, {"id": "X1rWUY3wM3JYrFRgLAeb", "text": "[Speaker 1] 'Ocenila bys vlastně nějakou expertní radu, někoho jako říct, Lucko, hele dobrý, tady možná bychom mohli něco drobně poladit, nebo... ' [Speaker 2] 'Jo, nebo třeba ten tone of voice, nebo něco prostě říct. Že já jsem to sepsala jakoby z toho pohledu, co my potřebujeme, ale má to být víc vtipný, má to být méně vtipný, nebo každý tým si to dělá vtipný podle sebe. Jakože vlastně nevíš, že jsem to brala jako, když my děláme tu apku, tak prostě někdo hlídá takový to, aby to bylo furt jako podobný. Ale asi si to dělá každý tým prostě podle sebe. Moje moc vtipný nebylo.'", "summary": "Chybí design review na JD — tone of voice, konzistence.", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hgSyRlq191KLpHGdg22HV", "video_clip": "[video highlight_clip_X1rWUY.mp4 00:01.8-00:39.9]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Hiring manager"], "Default group": ["Nápady respondenta"], "Intenzita": ["Silně"]}}, {"id": "htVD8m9Xl3uWlB5XW6ZI", "text": "[Speaker 2] 'Milane, já si myslím, že jde.' [Speaker 1] 'Jo, že to prostě jako průtokáč pouští na tebe jo.' [Speaker 2] 'Protože ono to z těch jobsů, já nevím, jestli vy to máte nebo ne, tak je ještě nějaký Teamio, jo. A u nás,' [Speaker 1] 'Používám tohle znám to.' [Speaker 2] 'já když takhle vykopnu pozici, tak mi ten inzerát se jakoby propojí s tím profilem v tom Teamiu, tam se mi ukáže, že já mám otevřenou nějakou pozici, já dostanu jako možnost, jakože se tam přihlásit. Pak, až toho člověka naberu, tak mi zase zrušejí ten přístup. Ale jakmile mám otevřenou pozici, tak se mi to prostě propojí s tím inzerátem na těch jobsech. A kdokoliv, kdo odpoví, tak takhle prostě to tam všechno padá.'", "summary": "Teamio + Jobs.cz, žádný HR pre-filtr — vše padá přímo na ni.", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hXeSiIse8HTEbOutL7gsz", "video_clip": "[video highlight_clip_htVD8m.mp4 00:01.5-00:46.8]", "tags": {"Default group": ["Existing solutions", "Workflow / Chování"], "Perspektiva": ["Hiring manager"], "Intenzita": ["Neutrálně"]}}, {"id": "3P6zP6zepPrHHbdbYp5t", "text": "[Speaker 2] 'No, a potom ta administrativa, že jako když já tam vyklikám ty lidi, které chci pozvat, tak jim dám vědět, že hele, na kdy bysme to zhruba mohli pozvat, nebo kdy já mám čas, a ať oni jim zavolaj a pozvou. Takže oni jim zavolaj, udělaj schůzku v kalendáři, potvrdějí místnost. A případně, když to pak řešíme, tak to HR tam je s náma na každém tom pohovoru, to jakoby tam s náma je, takže se ptá na takový ty HR prostě věci. Necháme si samozřejmě i poradit — jedna věc je, že já řeším lidskou stránku a řemeslnou, ale i některý věci, to zase už pak HR pozná takový ty red flagy, nebo když se někdo taky jako cuká, nebo je zvláštní. No a pak nám HR pomáhá s tím, že jako řešíme ty smlouvy a to. Ale jinak já to řeším všechno, Milane, já vidím každý ten inzerát, proto opravdu i tu baristku.'", "summary": "HR = kalendář, smlouvy, red flagy na pohovoru. Žádný pre-screening CV", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hmxfPHnQKWk6PRwEPnd5V", "video_clip": "[video highlight_clip_3P6zP6.mp4 00:00.1-01:01.0]", "tags": {"Hypotézy": ["H2"], "Perspektiva": ["Hiring manager"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "UR0BWxOzTjcHviAe5dGj", "text": "[Speaker 2] 'Na tu brigádní roli, což byl jenom Brigoš, tak to bylo asi 120–130 inzerátů za dva týdny.' [Speaker 1] 'A to je standard jakoby na na jakoukoliv pozici, nebo to bylo jako víc než obvykle.' [Speaker 2] 'To bylo víc než obvykle, ale současně, jako na ty minulý se nám nehlásilo tolik, protože já jsem chtěla i seniornější lidi. Ale jako stejně to není, že tam máš pět těch inzerátů, jsou to prostě desítky, nejsou to jako stovky, nebylo to 120, ale je to prostě projdejšich třeba 50. A vlastně, jak ti říkám, ne všechno je relevantní a současně taky mi někdo řekl, že dneska, že už i na toho Brigoše, že jsem si teda měla udělat nějaký AI nebo něco. Já říkám, no ale zrovna i u toho Brigoše, víš, Milane,' [Speaker 2] ' mě to přijde takový, jak ti říkám, že já si na tom dávám záležet, když to je interní člověk.'", "summary": "120–130 CV/2 týdny (brigoš), ~50 na seniorní. AI filtr odmítá: \"dávám si na tom záležet.\"", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h97n3jwWX75Vi4hybUN54", "video_clip": "[video highlight_clip_UR0BWx.mp4 00:00.4-00:54.1]", "tags": {"Hypotézy": ["H2"], "Perspektiva": ["Hiring manager"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "tHRl6gGT52KMlE2WIfEY", "text": "[Speaker 2] 'A já zas nechci, aby něco udělalo chybu, že já tam občas čtu i nějaký věci, i ta motivace mě zajímá, jo, u těch lidí, jakože co tam kdo píše. Že pak, když to máš rozlišit, tak prostě jde ti i o nějakou lidskou stránku. Je to takový, že vlastně já to jako ráda čtu, když — jako čtve mě, když to jsou fakt nerelevantní lidi. Že si rovnou říkám, tyjo, tak když tam dávám, že chci, aby ten člověk prostě byl s náma tady v Praze, že sice máme home office, ale že bude muset docházet i do kanceláře, jako v Praze, dvakrát, třikrát týdně, a je to člověk třeba z Ostravy, který tam studuje a nemá s Prahou nic společného, ale ty lidi to zkoušejí. Tak si říkám, tohle už mohlo HR jako vlastně odfiltrovat.'", "summary": "Štve ji nerelevance (Ostrava na Prahu). \"Tohle už mohlo HR odfiltrovat.\"", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hJJByFiZc6IlqOAor2Ig1", "video_clip": "[video highlight_clip_tHRl6g.mp4 00:00.9-00:45.2]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H2"], "Perspektiva": ["Hiring manager"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "FD8eQg8smePy1kd6N2JH", "text": "[Speaker 2] 'Já neodpovídám, Milane, nikomu, tohle doufám, že řeší to HR, protože to ani není jakoby v mojí — já nemám jako jak ty lidi kontaktovat. To bych si musela vykopírovat jejich e-mailovou stránku nebo jako prostě e-mail nebo telefon a nějak se jim ozývat, což bych jako narušovala vlastně ten HR proces. Ale já tam mám jenom, jenom tam mám prostě, víš, daný, že volná pozice jedna, tak já si tu prokliknu a teď tam vidím podle datumu, jakože nový přihlášení, teď tam mám to jméno a jestli už jsem se já vyjádřila, nebo ne, jestli tam mám palec nahoru nebo dolu nebo jako nechat na později. To jsou nějaký tři stavy, případně možnost napsat poznámku. A já většinou dávám jenom ty tři stavy, že dávám ty palečky, abych viděla, jestli už jsem to prošla nebo neprošla. Takže já vlastně tam jenom chodím takhle, že si procházím jako každý den vlastně ráno vstanu, mrknu se, většinou ještě před devátou, než to začne, tak prostě se mrknu, co mi tam přistálo jako za nový životopisy, ty se snažím jako projít, pak třeba odpoledne, když se nudím, nebo takový to po obědě, že máš ten brain fog, tak si řekneš, hele, tak dám tomu deset minut, než se jako rozjedu. Taková ta administrativa, tak prostě znova mrknu, jestli tam je někdo zajímavý. A vlastně já dávám ty palečky a na základě těch palců pak to HR si to jako obvolává, ale to samozřejmě, Milane, já jsem se jich jako ptala, jestli jim, těm lidem, něco chodí, a já se bojím, že jim jako chodí nějaká jenom generická odpověď.'", "summary": "Screening v Teamiu: palec ↑/↓/později, žádný kontakt s kandidáty. Obává se, že zamítnutým chodí jen generická odpověď.", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hdc2GEmO2KDx4nbyETs0g", "video_clip": "[video highlight_clip_FD8eQg.mp4 00:00.3-01:29.7]", "tags": {"Hypotézy": ["H2"], "Perspektiva": ["Hiring manager"], "Default group": ["Pain points", "Workarounds"], "Intenzita": ["Silně"]}}, {"id": "eGZZplX7nFmevchQLYq7", "text": "[Speaker 1] 'Že jako nějaký důvod toho, proč tys to jako rozhodla takhle tak to tam se tam jako to nikam nepíšeš vlastně že jo.' [Speaker 2] 'To nikam nepíšu, no. To bych se totiž mohla upsat — ale jste s Ostravy, pane bože, kancelář je v Praze, kde máte být třikrát týdně, no. A jako prostě se hlásí ten jako nerelevantně. Kde dávám zpětnou vazbu, tak to je to, když ti lidi mi přijdou, jo, tak prostě my děláme vždycky dvě kola těch pohovorů. Což znamená, že na tom prvním kole, já si myslím, že snad i všem dáváme šanci i na to druhý kolo, i když víme, že to není vončo, ale tak si říkáme, hele, tak prostě — protože já tam nezvu kvanta, já zvu třeba fakt jenom tři lidi, prostě takový ten výběr z hroznů.' [Speaker 1] 'Těch 120 přijdou 3 lidi do toho jako 1 druhýho kola. Vybereš si prostě.' [Speaker 2] 'Nějaký, Protože prostě to jakoby vidíš podle toho popisu, nebo co se tam odehrává, proto ti říkám, že by to mohl někdo odfiltrovat. Že třeba z těch 120 by bylo relevantních jako 15. A já z těch 15 si vyberu třeba tři, pět.'", "summary": "Funnel 120 → 15 → 3–5 → 2 kola. Opakuje: \"By to mohl někdo odfiltrovat.\"", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hlixzDB8WyByyYZcYStOy", "video_clip": "[video highlight_clip_eGZZpl.mp4 00:01.8-01:04.6]", "tags": {"Verdict": ["Go"], "Hypotézy": ["H2", "H6"], "Perspektiva": ["Hiring manager"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "4Taw6R5qV9gSuMae3q1J", "text": "[Speaker 2] 'Je to jako hodně času. Je to hodně času, protože, Milane, u nás i ten hiring znamená, že víš co, pro mě to nekončí tím, že máme podepsanou smlouvu. Pro mě to končí tím, že ten člověk tady s náma sedí a má přístupy, má notebook a má všechno. A tím, že já jsem jako team lead, ale já ty lidi nemám pod sebou — to je to, co vlastně tady řeším celou tu dobu, že jsem zakopaná v tý struktuře — tak to znamená, že já dělám věci, který bych ale neměla dělat. Z pohledu mojí role, ale mám je dělat, protože je nikdo jiný neudělá. Což znamená, že mě nikdo neškolil na to, jak mám ty lidi nabírat. Ani mě nikdo neškolil v životě na to, jak mám těm lidem žádat o přístupy. Takže přesně teďka u toho Honzy, vždycky to dělal Míra, teďka už to ani Míra dělat nechtěl, tak mi jenom řekl, tady něco založ. Tak já pak vlastně založím nějaký ticket v servisdesku, který ani nevím, teda jestli je správný, nevím, co tam mám moc jako psát, prostě jenom píšu, přijde mi novej člověk, má tady nějaký číslo, a říkám, potřebuji stejné přístupy jako mají tady — dám nějakýho kolegu — a notebook. No a pak většinou, Milane, to je tak, že já čekám, čekám, nic se neděje, tak já tam volám a to, abys věděl, já tam třeba volám hodinu, já třeba fakt jako čekám 30 minut na lince, pak někam to, '", "summary": "Hiring nekončí smlouvou — řeší přístupy/notebook, čeká 30 min na lince. \"Dělám věci, který bych neměla dělat, ale nikdo jiný je neudělá.\"", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hg73Ka3ghlnRQjUxKjNRd", "video_clip": "[video highlight_clip_4Taw6R.mp4 00:01.2-01:30.7]", "tags": {"Hypotézy": ["Emergent", "H2"], "Emoce": ["Frustrace/zklamání"], "Perspektiva": ["Hiring manager"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "kCdPPRX6XeSC0LNqsT5C", "text": "[Speaker 2] 'ic, volám druhej den. A takhle musím volat třikrát. Prostě takovýhle jako opičárny, když to řeknu, tak to vlastně jakoby žere čas. o dobře, tak já to dám tady kolegovi já říkám mně, ale jako zejtra pozitří mně přijde ten člověk, on tady bude jen tak sedět tím jenom tě chci jako na tom ukázat, že opravdu ten nábor, to je práce jak na kostele. Ale kdyby ses mě zeptal, kolik je tam efektivní práce, tak by se to dalo shrnout na to, že já vidím možná přesně tady těch 10 životopisů, z toho si pár vyberu a pak jdu na ty pohovory. Ale já dělám to všechno kolem, což by měla dělat spíš nějaká asistentka.'", "summary": "Čas: screening 2 týdny × 30 min/den, pohovory 6–10 h, administrativa žere většinu.", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hPAdE8g2YNaM4ObpEjWTM", "video_clip": "[video highlight_clip_kCdPPR.mp4 00:00.3-00:29.3]", "tags": {"Hypotézy": ["H2"], "Perspektiva": ["Hiring manager"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "eC7iSiQh7YoUbSUAE9GT", "text": "[Speaker 2] 'Hele, tak jdu podle úplně jakože primární věci, ale jak jsem ti říkala, třeba místo výkonu práce Praha, tak to jenom, to beru jako objektivní data. Tak prostě dívám se na to, co ten člověk má za sebou nebo nemá, jestli splňuje to řemeslo. Ale potom, když už jde na to lámání chleba, kdy ty lidi si řeknou, ano, tak takhle, prostě všichni mají za sebou nějakou praxi, tak podle čeho to rozhoduju? Tak jedna z těch věcí je, jestli třeba má za sebou nějaký podobný projekty nebo podobnej background, jako to, co my tady máme, aby ten člověk — víš, aby to nebyl někdo ze startupů, kdo si chce jen tak vyzkoušet korporát, ale vlastně z toho bude nešťastnej. Pokud umí to řemeslo, tak se dívám prostě na to, jestli už třeba byl v nějaký takovýhle velký firmě, nebo sice dělal jako pro agenturu, ale vlastně pracoval tři roky pro toho klienta a byl tam u něho. To je pro mě jako důležitý, protože to prostředí, a protože jak jsem ti teď přesně popisovala — ala volám na ten servis desk, čekám na lince — někdo už by se na to vyprdnul. Prostě mi někdo řekl, tohle to nemám za potřebí. Ale to je prostě bohužel jako náš denní chleba. A to je něco, s čím se tady ten člověk bude potkávat, že to není jenom o tom řemesle, ale je to i o tom, jakoby, vydržet, nebo trošku boj s větrnými mlýny. Takže dívám se na to, kde do teď jako dělal a jestli vlastně z toho nebude jako frustrovaný. To je jedna z těch věcí a druhá z těch věcí, jestli pracoval v týmu, protože když ti přijdou samý takový ty ičaři, který dělali tu one man show, ty lidi jsou dobrý, ale prostě oni pak často neumějí být ty týmový hráči. Já tady nemůžu mít jenom ty Ronalda. ' [Speaker 2] 'Já potřebuju mít i obránce, někoho v tý bráně. Prostě každý má tu svou roli. Potřebuju, aby to sedělo jako celek. '", "summary": "Kritéria: lokace, korporátní fit (ne startupáři), týmovost. Hledá odolnost vůči \"boji s větrnými mlýny\".", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h4Qis70Ih0475RrbnDXss", "video_clip": "[video highlight_clip_eC7iSi.mp4 00:00.0-02:10.3]", "tags": {"Hypotézy": ["Emergent", "H1"], "Perspektiva": ["Hiring manager"], "Intenzita": ["Silně"], "Default group": ["Trust signals", "Workflow / Chování"]}}, {"id": "aE7OTC67QtDiNB0vbExG", "text": "[Speaker 2] 'Já nebudu někomu vysvětlovat, že je přece normální říct tady kolegovi, co dělá, protože pak by ses divil, jak ty lidi si to tam šmudlají jako sami a přijdou po měsíci se vší pompou, říkám, no ale to nebude fungovat, prostě jako takhle nejde. No a pak samozřejmě je to nějaká jakoby ta chemie. A proto ty lidi chci vidět. Dívám se samozřejmě na ten motivační dopis, ale to není, že mi tam musí psát jako pohádky, ale spíš takový to — chceš někoho jako dospělýho. Kdo ten život vidí střízlivě, kdo má pořád ještě nějakou motivaci, není jakoby vyhořelej, chce ty věci měnit, ale chce měnit nějak střízlivě. Minimálně v tom našem prostředí — ví, že to nejde všechno hned, ale zase není to tak, že hele, přijdu a udělám si ty svoje tři obrazovky a jdu domů. Takže je to nějaký motivační dopis, jako co toho člověka vede zrovna k nám. Jestli to je třeba někdo — hele, Filip tam tehdy měl, že pracoval v týmech, pracoval pro klienty, ale pracoval třeba právě že jako ičář a říkal mi, hele, že ho už to nebaví shánět zakázky nebo něco, že chce teďka třeba stabilnější prostředí. A říkám, jo, tak jako proč ne — vlastně zná nějaký takovýhle prostředí, jenom nechce být jako na tý druhý straně, ale chce být jako prostě zaměstnanec, protože se chce soustředit na to řemeslo, ale ne třeba na shánění tý práce a řešení jako faktur.'", "summary": "Hledá \"dospělé\" — střízlivý pohled, ne idealisty/vyhořelé. Filip: ičař → zaměstnanec, chce řemeslo bez shánění zakázek.", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hJS5MfWlfZ8OMdciBgRXg", "video_clip": "[video highlight_clip_aE7OTC.mp4 00:00.6-01:24.7]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Hiring manager"], "Default group": ["Pozitivní příklady", "Trust signals"], "Intenzita": ["Silně"]}}, {"id": "CTTF6RrMV1fPN5eZsrxa", "text": "[Speaker 2] 'To se chci vidět fyzicky, a teď se tady směju a ty to nahráváš, ale třeba abys tam neměl nějakýho smraďocha, nebo víš, jak to myslím. Prostě ty lidi tady, tím, že my sedíme fyzicky v tý firmě a já přesně nechci, aby jsme vystupovali jako garážovka. Nemůžeš tady mít někoho, kdo vypadá prostě jak Vagus. A to není, že jsme tady modelové, ale nějak dodržují základní hygienu. Tak na tom pohovoru jedna z těch věcí je i tohle, prostě já si nemůžu dovolit tady mít člověka, u kterýho budu vědět, že nemůže jít sám na schůzku, protože si o něm budou myslet, že to je nějakej blázen. To by vlastně podkopalo to, co se tady celou dobu snažíme, že říkáme, my nejsme jenom dodavatelé obrazovek, ale jsme prostě seriózní strategický partner na těch projektech. Abys byl ten partner, tak ani nemáš být jako overdressed, jo, nemáš prostě zase tady chodit jako v kostýmku jak ředitelové, ne, ale zase tady ani nebudu vypadat jak nějaká studentka v nějaký minisukni. Takže vlastně hledáš něco takovýho, což neznamená, že tady sejmujou ty lidi na základě oblečení, ale prostě nějakej první dojem. Hele, měli jsme tady třeba i holčinu, než vlastně přišla Míša, tak jsme na těch pohovorech měli jako různý lidi. Byla tam jedna holčina, která vlastně vypadala hrozně fajn, i působila fajn, ale ta kultura — a teď se dostanu ne k tomu, jak vypadáš, ale občas je to takový, že oni by tě i sežrali. A třeba u toho pohovoru byl i Míra, a on mi říká, hele, ta holka je strašně fajn, ale tady by jí nebylo dobře, prostě tady ty lidi by ji sežrali, protože byla taková víc jako křehká'", "summary": "Filtr na první dojem: hygiena + kulturní fit. \"Tady by ji sežrali\" — vyřazení křehké kandidátky.", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hiAQPuCKPu6YEUUjloaSx", "video_clip": "[video highlight_clip_CTTF6R.mp4 00:01.9-01:59.6]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Hiring manager"], "Default group": ["Industry insights", "Trust signals"], "Intenzita": ["Silně"]}}, {"id": "zRYhmgUZoXGkYOe7vvAw", "text": "[Speaker 2] 'Míra chodí se mnou, ale často chodí až na druhý kolo. Teďka třeba u toho brigádníka mu to bylo tak trochu jako to šumák, ale na to druhý kolo já jsem mu řekla, hele, já chci, abys tam šel, pak tady ten člověk s náma bude, prostě chci, abys u toho byl, abys to jako věděl. Ale jinak na ty pohovory já vždycky chci, aby se mnou chodil ještě někdo z našeho týmu, což když nabírám spíš UX-áka, tak chodí Filip, když nabírám spíš UI člověka, tak chodí David. Že já říkám takový ty obecné věci o tom týmu a tak dále. Pak třeba už i o tom řemesle říkají jakoby kluci. A bavím se i s nima, já chci, aby to bylo víc objektivní, aby to bylo jako o tom, hele, na mě ten člověk působil takhle, co ty si o tom myslíš? Plus ta HRistka, takže jsme tam jakoby tři. A na to druhý kolo třeba už pak nejde ten Filip, i kdyby tam byl, tak ještě přijde ten Míra, toho tam jako chci.'", "summary": "1. kolo: lead + senior + HRistka. 2. kolo: + Míra. Konsensus, žádný framework.", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hFjeQx9ssjOrPSzeuwIEu", "video_clip": "[video highlight_clip_zRYhmg.mp4 00:00.3-00:56.7]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Hiring manager"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "9ZvCTBIw2ZZ1ZqNuRXhh", "text": "[Speaker 2] 'Hele, to první kolo je fakt taková ta chemie — vůbec jako, aby my jsme se představili, aby oni viděli nás a my je. I oni můžou říct, že to prostě s náma nefílujou a to je jako v pohodě. Proto já tam říkám naplacato, jak my dneska fungujeme. Co máme a co nemáme nastavený, koho hledáme, jak to dneska máme prostě rozdaný ty karty, jak to funguje na těch projektech. A já to říkám tak, jak to je, aby pak někdo nebyl jako frustrovanej. Říkám i ty výhody, i ty nevýhody. Co tam jsou, že ty věci díl trvaj, nebo prostě se to jako — teď, Milane, teď tady mám na tabuli 15 minut, protože to bude trochu jinak po dvou letech, chápeš to? Ještě to není vyvinutý a teď přišla IT analýza ' [Speaker 2] 'že ty data úplně nemůžou být takhle, takže to máme trochu předělat. No dobrý, hele, já už jsem v pohodě, mě to nemůže rozhodit. Já už jsem zen mistr. Takže tohle já těm lidem taky na tom pohovoru říkám, protože to prostě, to se může stát a někdo to musí jakoby ustát ten člověk. Nesmí si z toho tolik brát. Je to takový jako jak když jdeš na to první rande, vůbec jestli se chceš vidět ještě podruhý a něco tam budovat, nebo ne? A když tohle všechno jakoby v pořádku, že se teda znova jako chceme vidět, že chceme pokračovat, tak to druhý kolo už je potom jako praktický. Protože já říkám, víš, tady jsme si ten med kolem tý pusy, tak nám to funguje, jsme zaláskovaný, máme ty růžový brejle, ale já teďka chci vidět trochu i nejenom ty sladký řečičky, ale i ty činy. Takže chci vidět — dáváme nějakej úkol, záleží podle tý pozice, na kterou se hlásej. A zase to není tak, že na to vypracování potřebuješ dva dny. ' [Speaker 2] 'JTo já jim říkám, že se zase vážím jakoby jejich času. Takže tady nedělám žádný assessment centra. Ale já chci něco vidět a chci hlavně vidět, jak ten člověk nad tím přemýšlí.'", "summary": "1. kolo = chemie/první rande, transparentně i nevýhody. 2. kolo = úkol, \"chci vidět, jak nad tím přemýšlí.\"", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hfhXRj8VcULFM8O6wRwvG", "video_clip": "[video highlight_clip_9ZvCTB.mp4 00:00.7-02:42.8]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Hiring manager"], "Default group": ["Pozitivní příklady", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "uuLo5hupujUHXh6PhczN", "text": "[Speaker 1] 'Takže zadáváš to e-mailem, nastavíš očekávání na tom screeningovém kolu ještě, řekneš, bude nějaký úkol, dáš jim čas na to, aby ho vypracovali? předtím 2 setkáním vlastně jo, takže když přichází, připravený na to 2 setkání s tím úkolem.' [Speaker 2] 'Přesně tak.' [Speaker 1] 'Dáváš jim na to nějakej fakt čas? To znamená, že třeba jim to pošleš den předtím. Nebo že je omezuje časově, nebo.' [Speaker 2] 'Většinou to druhý kolo je třeba týden potom a já jim to třeba pošlu, já nevím, pět, čtyři dny před tím. Není to jako, že by to bylo den před tím, to zase taky nevím, víš, jakože jestli ty lidi mají čas přesně ten večer, nebo ne. Ale já jim tam píšu, že si třeba myslím, že by to mělo zabrat, já nevím, dvě, tři hoďky, maximálně čtyři, že tomu zase nemají jakoby věnovat dva dny. A snažím se jim říkat i na tom prvním kole, že prostě s čím přijdou, tím přijdou a že mě zajímá i to, jak nad tím přemýšlej. ' [Speaker 2] 'Ale přesně, Milane, mě totiž často nezajímá jenom jako, že je ten výstup, že by někdo přišel s Figmou pixel perfect jako grafika, ale mě zajímá ten proces zatím. A protože já jim posílám e-mail, ale součástí toho e-mailu jsou i třeba do Figmy nebo do FigJamu, já nahážu screeny z mýho Čezu, protože ty lidi často nemají přístup do mýho Čezu. Tak tam jenom hodím třeba tady dashboard, tady odběrný místo, tady nějaký platby, prostě jenom pět takových jakoby screenů, aby si udělali trošku obrázek, o čem to je a s tím zadáním, že biznis přišel, že nevím, je nějaký problém, klienti si stěžují — co s tím.'", "summary": "Úkol: reálný ČEZ problém + screeny ve FigJamu, 2–4 h. Hodnotí proces, ne pixel perfect.", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hdAbUvh7zo4lsd8Hh0iXd", "video_clip": "[video highlight_clip_uuLo5h.mp4 00:00.1-01:36.3]", "tags": {"Hypotézy": ["H1", "H4"], "Perspektiva": ["Hiring manager"], "Default group": ["Pozitivní příklady", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "GWPlrQhSBSM4BWJQs3k1", "text": "[Speaker 2] 'No a to je právě hezký vidět, kdo se jak připravuje. Třeba z minulosti vím, že přišla jedna holka na juniorku, která třeba chtěla, jakože měla podle mě ten Czechitas test nebo něco takového za sebou, nějakej kurz. Tak já i těmhle těm lidem jsem dávala šanci, jsem si říkala, hele, tak jo, pojďme to vyzkoušet. Motivační dopis měla jakoby hezký. I to tehdy bylo tak, že třeba ta holka, já jsem prosímtě byla na letní škole za Krále Klacká a ona tam byla se mnou. Tak jsem si říkala, pane bože, já ji asi znám, tak jsem podle mě na to první kolo poslala jenom Filipa, abych nebyla jako zaujatá, protože já jsem o ní měla takovou trošku představu, že to není úplně moje krevní skupina. Ale to neznamená, že to musí jenom moje krevní skupina. Tak jsem schválně tehdy vyslala pouze Filipa, abych si říkala, hele, ať já nejsem zaujatá, prosím tě běž tam ty, pobav se s ní, jestli ti to sedí a jestli ji pozveme do druhého kola. Tak Filip mi říkal, hele, vypadalo to dobře — pozvali jsme ji na to druhé kolo, tak jsem tam jako taky přišla. Hele, a ta holka prostě přišla s takovým zmačkaným papírem, kde něco začala vybalovat, a to prostě vidíš, Milane. Já říkám, tak toto tady utrhla papír a dělala to v autobuse po cestě sem. Hele, to si ji takhle rozstříleli, mě ji až bylo líto. Já jsem si pak přišla jak na státnicích, my už pak odpovídáme sami — já třeba říkám, jak byste řešila tohle a co třeba se na to kouknout z tohohle pohledu? Že těm lidem to není, že my je jenom střílíme. Nesnažíme se toho člověka tam dusit ve vlastní šťávě, to prostě už vidíš po nějakých otázkách, jestli se chytá nebo nechytá, co jakoby zhruba my chceme. A on když ví, tak naskočí a řekne, jo, jasně, já jsem jenom nevěděl, tak jsem to rovnou udělal jako takhle, ale třeba normálně bych to řešil. Ale jde mi o to, s čím ty lidi vůbec přijdou — ala zmačkaný papír versus něco tady mám. Že vůbec to má nějakou jako strukturu. A to neznamená, že já chci pixel perfect obrázek ve figmě, to nemusí být, ale prostě třeba, že ti i v tom FigJamu nebo kdekoliv ukáže ten člověk — hele, tak když by přišla taková věc, tak co bych jako dělal. A vlastně, víš, já si vždycky říkám, když máš ten design proces, tak kdyby jel přesně podle něho, tak mi odpovíš na všechny ty otázky.'", "summary": "Zmačkaný papír vs. struktura ve Figmě. Design proces = hodnotící rámec. \"Nestřílíme — pomáháme.\"", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h6DX4MpnFTbyUxx9UdIlA", "video_clip": "[video highlight_clip_GWPlrQ.mp4 00:01.5-02:51.2]", "tags": {"Hypotézy": ["H1", "H4"], "Perspektiva": ["Hiring manager"], "Intenzita": ["Silně"], "Default group": ["Trust signals", "Workflow / Chování"]}}, {"id": "I3iK8NRMLbiwSdoK5dQa", "text": "[Speaker 2] 'Hele, je to tak, že většinou s tím člověkem prostě teda se vidíme tu hodinu a pak třeba ještě zůstaneme v tý zasedačce dalších deset minut, něco takovýho. A i s tou HRistkou společně vlastně si tak jako říkáme, co nám tam sedělo, nesedělo a jestli to vidíme na nějaký jako pokračování nebo ne. A většinou ' [Speaker 2] 'to prostě jako to víš, to prostě to není tak, že bys to nevěděl. A já navíc chci, aby ten člověk jako seděl nám všem, aby to byl jak Filip, tak já, tak Míra, že to — a to stejný ta HRistka řekne, jo, hele, v pohodě, nebo že to jsou jenom drobnosti, kterých si všimneš, ale jakmile tam někdo z nás vidí ten red flag, tak jakoby víš, že to nebude fungovat.'", "summary": "Debrief 10 min, 3 lidi. Jeden red flag od kohokoliv = vyřazení.", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hEvQBxN0bIqJ89eE0rdgJ", "video_clip": "[video highlight_clip_I3iK8N.mp4 00:01.4-00:41.2]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Hiring manager"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "u5hMuNfTPb55v21jomO6", "text": "[Speaker 2] 'Hele, jako my se snažíme dávat zpětnou vazbu na to, co bylo dobrý a co ne, jako na ten úkol.' [Speaker 1] 'Jasně.' [Speaker 2] 'Jo, To je už na místě, prostě, že říkáme tu zpětnou vazbu, prostě třeba, jak bysme si to my víc představovali, nebo jak to u nás funguje. Co třeba čekáme od toho designéra, že to mělo být víc takový a makový, ale není to, jakože by ten člověk odcházel s brekem, ale prostě tak nějak jako. Takže to je jakoby součást toho druhého kola, že to není, že ten člověk nám jenom jako frontálně prostě něco ukazuje, ale je to i taková diskuze, že my se doptáváme. A pak i právě na konci třeba říkáme, jako co by nás teda jako ještě zajímalo, nebo nadhazujem něco, jestli ten člověk se chytne, nebo ne. Někdy se právě že chytne s tím, že jenom to tam nemá, ale jako on to ví, jenom ho nenapadlo to tam dát. A nebo vidíš, že se prostě nechytá. A pak mu dáš nějakou zpětnou vazbu. Ale jak říkám, není to, že by odcházel s brekem, ale je to takový, jako, hele, a přemýšlel jste tady jako ještě nad třeba tímhletím? Protože tohle je to, co nás pálí. A ten člověk třeba často řekne ne, nebo jo, mu řekneš, proč jste odstranil tohle, protože třeba víme, že to je jako vlastně důležitá věc, tak co vás jako u toho napadlo? Zpětnou vazbu na to, co vidíme, dáváme na tom místě, ale potom to prostě dělá ta HRistka tu komunikaci a po mně ani nikdy jako nechce, abych k tomu ještě jako něco dala.'", "summary": "Feedback dvourychlostní: na místě užitečný, po skončení procesu generický (HR se neptá).", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hKjBIehRJY3Fsc4JbyVue", "video_clip": "[video highlight_clip_u5hMuN.mp4 00:01.1-01:58.3]", "tags": {"Hypotézy": ["H2"], "Perspektiva": ["Hiring manager"], "Intenzita": ["Neutrálně"], "Default group": ["Pain points", "Workflow / Chování"]}}, {"id": "Etkqy5skT7Sq3SMm6HBD", "text": "[Speaker 2] 'Hele, to je za mě, jakoby, celý proces, jo, že třeba celkově ten proces, já jsem nevěděla, do čeho jdu. Protože, jak ti říkám, nikdo mě tady na nic nezaškolil. A teď ty přijdeš jako team lead na novou pozici do práce a někdo ti řekne, tak naber člověka. A co to jako znamená v týhletý firmě? Co jako znamená nabrat člověka? A tady na to není nějaká, jako, nějaký PDF, který by ti řeklo krok jedna, krok dva, krok tři. No a jestli je, tak mi ho nikdy nikdo neposlal, já jsem ho nikdy neviděla. Takže možná ty manažeři na to mají nějaké školení, protože tady jsou školení na všechno. Na co já musím dělat a nikdy jsem školení neměla, protože já to jenom dělám, jenom za to nemám ty peníze a tu hodnost vraníka, ale jinak prostě. Takže možná tím chci říct, že já jsem v takové divné situaci, ve které jako zbytek firmy není. Takže nevím, jestli to existuje nebo ne. Tím tady nechci hánit naše HR, ale chci říct, že pro mě to byl docela takový black box. Jako vůbec si říct, aha, a co je proto teda jako vlastně potřeba, co teda mám jako udělat, co je krok jedna, co pak následuje. Bylo to takový jako, že tak teď mi pošli tohle, no tak já jsem to udělala a čekáš. A pak ti přijde nějaký tým, a řekneš aha, tak to asi, jo, tak když tak napíšeš přes chat, a co s tím mám dělat? No tak se koukni prostě a tak mi to tam ohodnoť. Tak jo, tak to děláš, jo, tak pak zase, hele, tak už tam něco mám, co s tím dál? Že vlastně, no musíš se jako aktivně doptávat jo, takže bod číslo 1 je, že já jsem.' [Speaker 2] 'Jo se mi vypad Milán nepromiň já.' [Speaker 1] 'Si teďka tady nějak počkej.' [Speaker 1] 'Haló haló už.' [Speaker 2] 'Bych měl být.' [Speaker 1] 'Lucko.' [Speaker 2] 'Slyšíme se. Já jsem si vypla kameru. Já nevím, jestli je problém u mě nebo ne.' [Speaker 1] 'Nevím, zdá se, že by mohl být u mě, tak já jsem teď já.' [Speaker 2] 'Jsem si pro jistotu vypla kameru jo, kdybys chtěl, tak jí zapnu já jenom abysme to jako to jo dojeli.' [Speaker 1] 'Takže takže jestli to bylo na místě, tak teď to bude. Každopádně by to mělo být stabilnější.' [Speaker 2] 'Jo hele takže Co by se mi hodilo, tak by bylo vůbec jako nějaký how to — jak nabrat člověka, prostě. Tak to tam jako nebylo. A potom další z těch věcí je, že teda děláš nějaký ten popis, tak přesně — a já tak možná jsem se ani nezeptala, jestli mi na to dají zpětnou vazbu, možná jenom to bylo moje takový očekávání, že mi k tomu jakoby někdo něco řekne, tak třeba to bylo tak OK, že to prostě teda rovnou poslali dál, nevím. No a potom, jak říkám, potom na mě propadá všechno, takže taky bys čekal, že to bude nějaký síto. Minimálně — víš, jsou věci, který jsou jako softový, který pak odladuju já, ale takový ty hard skills, nebo ty jako data, který můžeš odladit — ale někdo je v Ostravě a ty chceš prostě Prahu, tak je schopnej dojíždět do kancelu dvakrát, třikrát týdně, ano, ne? A tohle můžeš vyřadit na základě jako toho — nemusíš ani vědět, co znamená UX.'", "summary": "HR = black box, žádné školení, žádné PDF \"krok 1, 2, 3\". \"Někdo ti řekne: tak naber člověka.\" Chybí hard-skill filtr.", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hpM8lwdql7lWKWTHAL8Uo", "video_clip": "[video highlight_clip_Etkqy5.mp4 00:01.5-03:51.8]", "tags": {"Hypotézy": ["Emergent", "H2"], "Emoce": ["Frustrace/zklamání"], "Perspektiva": ["Hiring manager"], "Default group": ["Industry insights", "Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "BT6MTTR9t0DVsJ65WGFq", "text": "[Speaker 2] 'Hele, u nás je to ta transparentnost — jakože ty nevíš, jak to jde přes různý oddělení, tak ty nevíš, co se zrovna děje, nebo co se jako má dít, bude dít, kde to je. No a pak je to opravdu to síto na ty kandidáty. ' [Speaker 1] 'Jasně.' [Speaker 2] 'Jo Že prostě musím pročítat i ty lidi, který jako bych vůbec pročítat neměla.' [Speaker 1] 'Kdyby si měla vybrat jeden největší problém? Úplně nejvíc tě pálí, tak je to tohle, nebo je to něco jinýho?' [Speaker 2] 'To já nevím, Milane, oba dva jsou na tom asi dost podobně. Protože u toho síta to síto mi zabere jakoby velkej čas, ale tam to ovlivním já. Kdežto ty jiný věci třeba nejsou tak časově náročný, ale mě nejvíc štve, že je neovlivním — ala to, že chci pro někoho notebook a já jsem prostě odkázaná na cizí lidi, kteří to mají na salámu. To je prostě skoro na kolenou — víš, jako že tam si sám nepomůžeš.' [Speaker 1] 'Chápu no asi přijde, že ta příležitost, na kterou by ti mohla pomoct, nevím. Firma jako jsme my, tak to je ten výběr kandidátů s tímhle tím tělesem my nepomůžeme, že to jsou interní procesy. Ještě si kladu otázku vlastně na té rolí toho HR. Já jsem si původně myslel, že HRU vás vlastně dělá ten screening. Jo, že to HR vám právě přefiltruje. Jo ty kandidáty jo překvapilo mě dneska asi nejvíc, že to vlastně je práce, která jde za tebou celá.' [Speaker 2] 'Jo jo.' [Speaker 1] 'Hele no dobře, tak pojďme to nějak přehrnout a pomalinku. Tohleto setkání ukončit mě by ještě zajímalo, co by se vzkázala k designérům, který u vás budou v budoucnosti hledat práci nějaká taková takový vzkaz do budoucnosti? Něco, co?' [Speaker 2] 'Pomohlo. Které budou hledat práci, který.' [Speaker 1] 'Prostě by chtěli pracovat tak co, co bys jim řekla takhle dopředu?' [Speaker 2] 'Pane bože, to jsi úplně dostal milane. No jak říkám, hele, pro mě je důležité ten, kdo by chtěl u nás dělat tak, aby to byl jako týmovej hráč, aby to byl jako srdcař, aby to byl člověk, jako kterýmu záleží na tom řemeslu a chce ho dělat dobře. Ale současně, aby se nenechal prostě převálcovat. Tím korporátem.' [Speaker 1] 'Rozumím no. Hele a my jsme se teda o tom už spolu bavili, že jo ty jsi říkala, že možná by to mohla být ta Adéla od vás AHR ale kladu si otázku jestli znáš někoho, s kým bysme se tady o tom o té problematice náboru designerů měli promluvit taky, kdo by tě napadl? Abysme měli podle tebe oslovit. Ať už no ta.' [Speaker 2] 'Ta Adéla mi jako vlastně pomáhala teďka s tím náborem. Což je teda HR. No anebo potom mě napadá ten Kuba Kemmer, kterej vlastně řeší ty designéry ve spořitelně. ' [Speaker 1] 'Kubu jsem si napsal, no toho to to to díky za tenhle ten tip. No já už mám připravenýho, že ho oslovím, protože předpokládám, že má ten tým docela velký. To mi.' [Speaker 2] 'Přišlo dobrý.' [Speaker 1] 'Takže asi má jako relativně. Zkušenosti. S tím, že jo tenhleten tým jako obsazoval.' [Speaker 2] 'A já bych i čekala, že oni to tam budou mít trochu líp podchycený, víš, že tím, jak my jsme malej tým a ten nábor děláme prostě tady jednou za dva roky, tak je to takový jako, že vždycky reinkarnuješ jako něco, ale nemá to moc štábní kulturu, jo, nebo takhle to na mě prostě působí.'", "summary": "Dva pain points: síto (ovlivní sama) + transparentnost (mají to na salámu). 1×/2 roky = \"nemá to štábní kulturu.\"", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hbRGB0oQVPhPncZCFHYwU", "video_clip": "[video highlight_clip_BT6MTT.mp4 00:01.5-03:42.3]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H10", "H2"], "Perspektiva": ["Hiring manager"], "Default group": ["Motivátory & Bariéry", "Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "3eKNcEhhsstxcus55r1U", "text": "[Speaker 2] 'Dobře, co dělám? Teďka jsem vlastně discovery manager na volný noze, protože poslední jako z větší zaměstnání jsem měl v Direktu před asi rokem a čtvrt dejme tomu. A od té doby jsem na volný noze s tím, že prostě loni jsem pracoval třeba na dvou projektech pro ČSOB, na jednom projektu pro Českou spořitelnu, konzultačně pomáhal pro Proof and Reason a pak ještě dělal nějaký školení na Discovery pro Future, další agentura. Takže vlastně to mě bavilo tak poslední rok a kousek. Teďka zrovna žádný velký projekt nemám, takže vlastně jsem v situaci, kdy na jedné straně jako hledám případně projekty anebo možná i založíme firmu s jedním známým jako jeden směr. No, ale jako takový druhej směr, prostě furt hlídám trh, jestli se tam neobjeví pro mě něco jako zajímavýho, relevantního. Já jsem v designu principiálně od roku 2008 plus mínus, takže prostě blíží se to 20 letům. V digitálu jako takovým jsem od 2003, protože jsem prvních zhruba pět let dělal vývojáře v Seznamu. Takže vlastně v digitálu se pohybuju už přes 20 let, v designu se to k 20 letům blíží. A z toho vlastně posledních zhruba devět let se specializuju na tu discovery fázi, což jsou v podstatě strategické výkopy,'", "summary": "20+ let v digitálu, 9 let discovery. Freelancer po Direkt layoff. Dva směry: volná noha NEBO design lead pozice.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hX0pxMNdNitmrVDwOZWVf", "video_clip": "[video highlight_clip_3eKNcE.mp4 00:01.4-01:55.3]", "tags": {"Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "UQKibGADix3xcYViDOkf", "text": "[Speaker 2] 'Asi ve třech a půl firmách jsem vedl nějaký týmy. Vedl jsem designový tým v Seznamu, pak jsem vedl discovery tým v MMSD, pak discovery tým v Avastu, a pak jsem vlastně začal skládat — to je ta půlka — začal jsem skládat vlastně podobný tým v Direktu, ale tam prostě došlo k nějakému strategickému přeuspořádání úplnému. Že se to vlastně ze skupinový úrovně rozpustilo do jednotlivých firem tý skupiny, a tím pádem já jsem jako ztratil pozici. A tam jsem to vlastně jako nestihl dobudovat, akorát když jsem dostal první podřízenou, tak prostě změnili směr a rozpustili nás.'", "summary": "Vedl týmy v Seznamu, MMSD, Avastu (od nuly). Direkt layoff — pozice rozpuštěna. Pattern: firmy ruší design týmy.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hNq4yXdae8If2M4oee9iZ", "video_clip": "[video highlight_clip_UQKibG.mp4 00:00.3-00:38.3]", "tags": {"Hypotézy": ["Emergent"], "Default group": ["Industry insights"], "Perspektiva": ["Lead"], "Intenzita": ["Neutrálně"]}}, {"id": "fgbFIM3lCRiGwVDEhu0c", "text": "[Speaker 2] 'Hele, sleduju to přes automatizace dvojího typu. Jedna je prostě nějaký přednastavené automaty na LinkedInu, co se to, ale jako občas já na to kouknu i manuálně. A druhá, mám nastavených pár jako v uvozovkách agentů, protože už běží automatizace na ChatGPT, kde mám asi dva nebo tři zaměřený na trochu různé profily, různou kadenci a tak, a ty mi v podstatě jako taky hlídají trh a potom mi chodí taky nějaký jako notifikace, na co bych se měl podívat. Takže tyhle jsou ty dva, já napak si pochopitelně povídám s lidma, ale to vlastně není až tak — tam bych mohl asi přitlačit.'", "summary": "Sofistikovaný job search: LinkedIn automaty + ChatGPT agenti (2-3 profily). AI workaround pro monitoring trhu.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hoD97txe7j30qm0JXerli", "video_clip": "[video highlight_clip_fgbFIM.mp4 00:00.2-00:51.9]", "tags": {"Hypotézy": ["H12"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"], "Default group": ["Workarounds", "Workflow / Chování"]}}, {"id": "Yqau7t1QRllxwmilXFl9", "text": "[Speaker 2] 'Přesně, chodím na meetupy nebo případně prezentuju na meetupech, a vlastně sděluji, co dělám na jedné straně a na druhé straně, jaké oni mají příležitosti případně. Takže ale to je jedna věc, ale druhá věc je potom navazuju pochopitelně na předchozí spolupráce. Mám teďka rozjednaného něco dalšího pro Českou spořitelnu, jenom prostě ještě není hotový byznys. A něco podobného máme rozjednané s tím parťákem v ČSOB, taky zase vlastně teď zrovna pro ně nic nedělám, ale děláme na tom, abysme pro ně dělali. Ale to jsou právě ty spíš ty projektový záležitosti, ty zaměstnání je spíš o tom, že rozhazuješ sítě a se prostě náhodou někdo něco nemá.'", "summary": "Dvě strategie: projekty (aktivní přes předchozí spolupráce) vs. zaměstnání (pasivní, oportunistické). Asymetrie v síti.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hRBC9VtiSpyB48byusetH", "video_clip": "[video highlight_clip_Yqau7t.mp4 00:00.5-01:00.7]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "oRNXFToEUxuUIIjxVzqE", "text": "[Speaker 2] 'Tady už se vlastně dostáváme k tomu, jak ten trh podle mě funguje, nebo aspoň z mé perspektivy. Já znám vás různý designéry, dejme tomu českých a gošek, a vy mě vlastně zas tak moc nepotřebujete a já mám vlastně jakoby mezeru k tomu byznysu v těch firmách. Tím, že vlastně já jsem celou tu dobu, co jsem v praxi, tak jsem byl vždycky někde zaměstnanej, takže mám sice vybudovaného nějakého osobního brandu, to jo, ale spíš ten expertní a ne ten byznysový.' [Speaker 2] 'No takže vlastně nevím, když no, ale ale takhle. Ale furt je v tom, že to zase jako zase znova jo, tady prostě jako beru to oporturisticky. ' [Speaker 2] 'Ten brand je vhodný spíš na ty projekty, než na to zaměstnání a vlastně teďka Ta současná situace mi přijde taková, že ty firmy — chudáci headhunteři — oni vlastně mají jenom dvě extrémní polohy, oni nemají skoro žádný střed. Oni prostě se strašně doprošujou, aby tě umluvili, abys s nimi šel na pohovor — to je ve chvíli, kdy ten trh má prostě nedostatek lidí, to byla covidová doba. Anebo mají tu druhou polohu, s prominutím sednem na všechny, když si tady vypíšeme pozici a počkáme, kdo se nám jako sejde. Takže vlastně, že by se mi to, co se mi dělo dřív — dejme tomu ještě před covidem a přes covid, že prostě se otvíraly pozice a aktivně mě někdo sháněl — tak to prostě vlastně docela dost vymizelo. Člověk musí sledovat, jaké pozice si oni pasivně otvírají a čekají, kdo se jim sejde. A to to přijde teďka.'", "summary": "“Firmy mají dvě extrémní polohy — doprošujou se NEBO sednou na všechny a čekají.” Pre-covid aktivní recruiting, teď pasivní vypisování.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/heeDaAeQhCZfnPTmyMC2j", "video_clip": "[video highlight_clip_oRNXFT.mp4 00:01.4-02:17.3]", "tags": {"Hypotézy": ["Emergent", "H2"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"], "Intenzita": ["Velmi silně"]}}, {"id": "EkeVvuddFzJIxKPimlSx", "text": "[Speaker 2] 'Asi docela reprezentativní byl Rohlík. A já pak i teďka telegraficky řeknu nějaký ty další příklady — bavil jsem se s Vodafonem, tam to bylo jakýmsi způsobem zajímavé, sice rychlé, ale zajímavé. Pak jsem se bavil s Heurekou, která byla relativně standardní a proběhlo to podle mě tak, že se nemá cenu o tom bavit, byť to neklaplo, ale vlastně z mého pohledu v pořádku. A teďka poslední, ale krátké, bylo třeba s Outučkem.' [Speaker 2] 'já vysvětlím to to zároveň říkám plus mínus ten profil firem, o který mi jde, že jo, prostě tak nějak. Navazuji na to, co jsem dělal dřív, jakože prostě asi nevlezu do nějakého startupu úplně, ale spíš něco takového většího, složitějšího, co některý lidi nemají rádi, aby to zase vyhovuje. A tTenhle vzorek říkám, protože já vlastně tím, že mířímu na relativně specifickou pozici — ale ne úplně nenormální,' [Speaker 2] ' prostě design lead — tak ono jich není tolik a já tím pádem taky neaplikuju prostě ani třeba na desítky pozic, že bych prostě jenom odškrtával. Já se fakt snažím mít dobrou filtraci, dobrý ten předvýběr a když už se s někým bavím, tak se dostat jako někam přiměřeně daleko.'", "summary": "Design lead pozic málo. Selektivní přístup — kvalitní předvýběr, ne stovky CV. Senior = menší vzorek, větší investice.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hnB7JqzxXSd6ugLiiwORA", "video_clip": "[video highlight_clip_EkeVvu.mp4 00:00.6-01:20.1]", "tags": {"Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "JKFWea6FsYYeVVoHHwoI", "text": "[Speaker 2] 'Teď mám trochu trouble, že si nemůžu vzpomenout, jakým způsobem jsem se k té pozici dostal, jakože kterým z těch kanálů, ale můžem to pak, kdyžtak zkusit dohledat, ale nerad bych se tím teďka brzdil, jo.' [Speaker 1] 'A ozval se s ním sám a nebo oni oslavili tebe. Byl to ten.' [Speaker 2] 'V tomhle případě jsem se, myslím, já ozval jim, protože se to prostě někde mě v tom screeningu objevilo, že Rohlík hledá head of design.' [Speaker 1] 'Vzpomínám si na to, to byl nějakej jako podzim minulej rok, že jo nebo konec léta.' [Speaker 2] 'To byl to byl bych, řekl říjen třeba.' [Speaker 1] 'Jo. Loňskýho roku, jo Michal damburský.' [Speaker 2] 'Odcházel a prostě mi no a myslím, že to bylo no přesně. Michal Damborský odcházel, ten je vlastně nakonec v té Heurece, a já měl teoreticky šanci zaujmout jeho místo s tím, že když to vezmu nejdřív jako rychle a pak to můžem začít trochu pitvat, tak vlastně to, co proběhlo, bylo, že jsem se. ' [Speaker 2] 'Spojil jsem se s HR-istkou, nějaká docela řízná holčina, která už tam teda taky nedělá, ale to pak je součástí story. Ta udělala takový ten klasický screening, že nejsem úplný debil, a poslala mě do nějakých dalších kol. Vcelku mě vysvětlila, že Rohlík se s tím nechtějí moc mazat a tím pádem, že by to mohlo být sice intenzivní, ale relativně rychle za náma. '", "summary": "Začátek Rohlík: sám našel přes screening, sám se ozval. HR-istka nastavila očekávání rychlého procesu.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h0Mn5locEGgIHNZBIPhgW", "video_clip": "[video highlight_clip_JKFWea.mp4 00:01.4-01:34.2]", "tags": {"Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "sDhTH19V0tFACe5Nin18", "text": "[Speaker 2] 'pak jsem měl myslím. Call s luma jak on se to jmenuje budík? Já vám tam počkejte vteřinku, tohle tohle se vyplatí najít, aby. Abych byl přesnej v tý roli, ale to bylo myslím jako telefonickej rozhovor, kterým jsem tak jako prošel v pohodě. A pak myslím, následovalo zadání. Ježíš teďka teďka mi fakt to.' [Speaker 2] 'Tak počkejte, já si ho někdo přestanu, no a pak následovalo zadání. Domácí úlohy si myslím. Na kterou jsem měl asi tejden a myslím, že jsem se docela snažil a principelně si myslím, že jsem s ní jako taky taky prolez.' [Speaker 1] 'Hele a když říkáš tejden jako na vypracování, tak kolik času ti to reálně zabralo? Ta úloha, jako kolik se tomu věnoval?'", "summary": "Hiring manager (Luka Budík) byl nový v roli, plaval. Kandidát si všímá nepřipravenosti — ovlivňuje kvalitu hodnocení.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hQ0507dsDnS01YKBu3vWg", "video_clip": "[video highlight_clip_sDhTH1.mp4 00:00.7-01:09.6]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "GaQEiDezbOhV15cb4Zzr", "text": "[Speaker 2] 'á myslím, že asi 8 hodin nebo 10, jako něco takového. Já jsem se snažil dodržet to, co oni říkali v zadání, že prostě tomu nevěnujte víc než něco, tak jsem to trochu přešvihl, ale jenom jako o trochu. Bylo to řešení problémů s akvizicí v Německu, že mají špatný konverzní poměr — ty lidi se jim přihlašujou, nabírají, přihlašujou se a nenakupují. Z mého pohledu to nebyla nejhorší úloha, co jsem kdy někdy dostal, na jednu stranu, na druhou stranu už to nebylo úplně juniorní a chtělo se to trochu hrabat i v tom německém Rohlíku a podobně'", "summary": "Domácí úkol Rohlík: 8-10h práce, týden. Reálná case study (akvizice v Německu). Kandidát přešvihl doporučený čas.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hGRV16k03TuUM1gqWfoGM", "video_clip": "[video highlight_clip_GaQEiD.mp4 00:01.9-01:13.8]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "hojb0GBWCTVFd1vFUlg4", "text": "[Speaker 2] 'Lidé šli na začátku dva a pak šli po jednom, takže to byly vlastně čtyři lidi ve třech sešnách. A grilovačka slušná, takže to bylo intenzivní — celkem asi skoro tři hodiny. ' [Speaker 1] 'Zeptat jenom jako já bych to zkoušel, nevím, jestli to správně čtu. Takže byl ten screen screenovej call, kterej jsem měl s tím lukou, pak mu.' [Speaker 2] 'Řekli dobrý tady bylaPersonalistka, Luka, domácí úkol, a pak ty tři pohovory se čtyřma lidma — to bylo celkem pět pohovorů.'", "summary": "Rohlík formát: 5 kol — HR + manager + úkol + 3 pohovory se 4 lidmi v jednom odpoledni. “Grilovačka slušná.”", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hDNcvSzkSiC1K1H18jmkY", "video_clip": "[video highlight_clip_hojb0G.mp4 00:00.3-00:38.7]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"], "Default group": ["Workflow / Chování"]}}, {"id": "OhreqSj4HuaCh1sRNQn5", "text": "[Speaker 2] 'kde to právě začalo z mého pohledu trochu skřípat, že oni vlastně nebyli moc připravený na ten pohovor — Luka a Michal na mě. Vlastně jsme si dohromady ani neodřídili, jak rychle to jako probereme, a pak tam nezbyl moc čas na nějaké další povídání o jiných věcech, protože jsme se prostě zasekli na té case tady. Sice zajímavým povídáním, ale vlastně neměli to podle mě úplně jako připravený, no tohle to. A ty si promiň?' [Speaker 1] 'Že tam do toho vstupuju, jenom říkáš, nebyli připravený a tak co to jako znamená? Jo, ty jsi čekal, že to nějak bude, že proberete jako nějaký témata, ale ve skutečnosti jste probrali jenom to domácí cvičení.' [Speaker 2] 'Já jsem čekal, že jim to prostě fakt relativně svižně odprezentuju, oni budou mít připraveny nějaký tři základní otázky, u kterých se půjde třeba trochu do hloubky, a tím to zabalíme a půjdeme se dál bavit o mé historii, mém přístupu k věcem, nebo já že se budu mít šanci doptat jich, co vlastně potřebujou. ' [Speaker 2] 'A vlastně tomuhle vůbec nedošlo. Celý jsme to zabili na tom jejich aktuálním problému, který přiznali, že je reálně pálí. Bylo vidět, že oni se nějak asi úplně nedohodli, jak moc do detailu chtějí na tom jít, a zároveň prostě fakt nedali mě prostor opačně. Furt přece jenom já jsem ten nabíraný, a ne ten, kdo by si měl řídit hiring managera, že jo?'", "summary": "Hiring manageři nepřipraveni — nedohodli strukturu, neměli otázky, zasekli se na case. Kandidát neměl prostor se ptát.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hcbzhrYiTxDPEl6O3JJdp", "video_clip": "[video highlight_clip_OhreqS.mp4 00:00.9-02:03.9]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "pvsrPpqysYh6skFSe4Q3", "text": "[Speaker 2] 'pak jako ty další pohovory — personální ředitelka dělala spíš jako nějaký culture check. Ta to byla jenom naštvaná, že se nám protáhl ten první pohovor, že na mě má míň času, ale nějak to zvládla relativně se ctí. Zároveň té odbornosti jako naší moc nerozumí, takže jako asi mě podle mě taky hodnotila jenom jako lidsky. A zajímavý byl ten člověk z toho, myslím, že vyloženě obchodu, který byl naopak jako perfektně připravený. Věděl v podstatě, co ze mě chce vytáhnout, s cílem taky částečně culture check a částečně, aby viděl, jak o věcech přemýšlím, jestli jsem schopen nějakého třeba expertního odhadu a podobné věci. A ten byl ostrej ale milej. Já jsem třeba kdysi zažil podobný pohovor do Auta a vlastně tenhle člověk ho téměř dokázal vyrovnat. To Auto bylo tenkrát nejlepší pohovor, co jsem ever zažil — bylo to totálně ostrých 50 minut, perfektně strukturovaný, perfektně rozmyšlený, na co se ten člověk a proč ptá. A tenhleten člověk z Rohlíku, typově prostě fakt drsnej obchoďák, tak to měl nachystaný podobně kvalitně. Prostě jsem pak dolezl a jenom jsem si otřel pot a říkal jsem si, tak tohle bylo dobrý. '", "summary": "“Nejlepší pohovor vedl drsnej obchoďák, ne design lead.” Perfektně strukturovaný (~Avto). Obchodníci hiringují líp než design lead.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hGZEQDZQTyRT8TJcuaDMw", "video_clip": "[video highlight_clip_pvsrPp.mp4 00:01.3-01:36.5]", "tags": {"Emoce": ["Důvěra"], "Hypotézy": ["Emergent", "H1"], "Default group": ["Industry insights", "Pozitivní příklady"], "Perspektiva": ["Kandidát"], "Intenzita": ["Velmi silně"]}}, {"id": "SUlxZktrSNeYLWr2pDJx", "text": "[Speaker 2] 'dohromady to nemají podle mě úplně blbě vymyšlený v tom, že tě prostě neotravujou jako postupně, ale že tě tam prostě zatáhnou na to odpoledne, zatíží, prostě pak si udělaj nějaký debrief. To vím, že dělali, že přímo po mně dělali debrief. '", "summary": "Pozitivum Rohlíku: intenzivní formát (vše v jednom odpoledni) + ihned debrief. Respektuje čas kandidáta.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hluawlNP3EjuMzLDZ1dzO", "video_clip": "[video highlight_clip_SUlxZk.mp4 00:00.3-00:12.5]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Pozitivní příklady"]}}, {"id": "vadLcqszcN0LTEu453R0", "text": "[Speaker 2] 'Sranda je, že tohle to jsme zvládli podle mě tak nějak na přelomu listopadu, prosince. Vím, že oni si udělali debrief. A pak se mnou postupně komunikovala ta personalistka, která vlastně říkala, no a ještě si to musíme jako nějak tady rozmyslet. Tak ještě prosím chvilku strpení. A pak už říkala, hele, ještě poprosím, prostě já nevím, přes víkend. A pak, jak to trvalo už dlouho, už to asi bylo trapné, tak z ní začaly lézt i detaily, co se děje. Že prostě — hele, prakticky jseš až jako jedinej kandidát a už jenom schválíme, teda čekáme na to, až tě schválí jako Tom Čupr. A tohle to už bylo vlastně někdy před Vánocema těsně. A pak ona zavolala fakt prostě pátek před tím vánočním týdnem a říká, no, tak se omlouvám, tak jsme to do Vánoc nestihli. Což jako — původně se tvářili, že prostě na přelomu listopadu, prosince bude vybaveno. K tomu já jsem naštěstí už na začátku byl skeptický. To, že to není rozseklý do Vánoc, no, to už mě trochu naštalo, protože prostě chceš vědět, jestli jo nebo ne. Na druhou stranu to z jejich strany vypadalo celkově pozitivně, tím, že ona mi jako asi trochu neplánovaně říkala, že jsem prostě jedinej kandidát a čeká se už jenom na schválení. Pak proběhly 14 dnů Vánoc, nic se nestalo. Pak proběhnul první lednový týden, taky se nic nestalo. Volal jsem zpátky té personalistce někdy druhý týden v lednu a říkám, tak co, už prostě tři démy a ticho popěšně. A ona: no, já už tam nedělám, oni se s tebou nespojili? A já — no, nespojili. Tak já šťouchnu do toho mého nastupujícího kolegy, ať ti teda dá vědět. A kolega se pak ozval v duchu: no, tak tady proběhlo nějaký business review, a vlastně jsme se rozhodli tu pozici neobsadit. Ptám se: hele, tak mi aspoň řekněte, jak jsem dopadl. Z tohohle člověka vypadlo: no, měli jsme tři kandidáty a vybírali jsme si mezi váma. Ale přitom těsně před Vánocema říkala, že jsem jedinej a čeká to na schválení'", "summary": "Rohlík hiring fail: 5 kol, ~3 měsíce, kandidát se dozví náhodou. Slíbili rychlost, řekli “jedinej kandidát” → “měli jsme 3” → pozice zrušena.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hCR8mpu3wkocUU5Xw2qXX", "video_clip": "[video highlight_clip_vadLcq.mp4 00:00.5-03:17.9]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H2"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "R5ecv3ESpTkQH8hS5J8e", "text": "[Speaker 2] ' Že prostě Ta firma měla tu pozici, to byl ten Michal, ten odešel. Oni pak byli ještě ochotní se rozmyslet, že to dají celý tenhle ten ansámbl do pohybu. A pak to vlastně zkratovali a o pár týdnů na to povyhazovali ještě relativně hromadu lidí, pod dojmem AI. To nevím, jestli jste zaznamenali, ale to byla prostě vlna vyhazování. A vlastně ve finále Rohlík — to vím teďka od toho Louky, co jsme si relativně nedávno psali — tak Rohlík má fakticky asi dva designéry. Myslím si, že jako těžce vibe codujou, ono to taky na tom začíná být vidět, že prostě se jim tam objevujou bugy, jako černý text na tmavě šedým pozadí a tak. Prostě už fakt sázejí na tu automatizaci asi hodně. A nejenom že neobsadili tu pozici, ale prostě seškrtali designovej stav z asi deseti lidí na asi dva.'", "summary": "Rohlík po business review: zrušená pozice + masivní layoffy (10→2 designeři). AI techno-optimismus. Buggy UI viditelný.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h0X13Yn7PIxIQqhTGs2Nd", "video_clip": "[video highlight_clip_R5ecv3.mp4 00:00.8-01:30.9]", "tags": {"Hypotézy": ["Emergent"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"], "Intenzita": ["Velmi silně"]}}, {"id": "tKC0gQZMIlbeLghREMs9", "text": "[Speaker 2] 'Mám LinkedIn, mám webovky a mám vlastně nějaký jakoby v uvozovkách OnePager, který má ve skutečnosti asi tři stránky, co je prostě jako PDF-kové CVčko, který je vlastně nejvyladěnější většinou. Teď už ho vlastně u většiny těch pozic, na které jsem se v poslední době hlásil, tak jsem ho upravoval jako na míru. Tím nemyslím, že bych v něm jako kecal, jenom prostě vypíchávám jiný části osobnosti'", "summary": "CV na míru každé pozici — vypíchává relevantní části osobnosti. Senior přístup: customizace = standard.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hXBT0eh8u4PRdC2KPPVsb", "video_clip": "[video highlight_clip_tKC0gQ.mp4 00:00.3-00:28.9]", "tags": {"Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "dyEVgB4d4lXfMNYmD42b", "text": "[Speaker 2] 'principiálně já vám můžu dopopsat trochu víc, jak funguje ten proces z mé strany. Když mi přijde pozice přes nějaký ty automaty, kde je přednastavena nějaká filtrace, tak kromě toho, že si ji snažím pročíst jako já klasicky ručně, tak ještě už mám nastavený napromptované porovnání mého profilu s tou vypisovanou pozicí. Takže mám normálně v podstatě něco podobného jako mají ty headhunteři, že prostě mám jako skill matching — vyjde mi to jako hele, seš osm a půl z deseti, a tohle jsou tvé silné stránky, tohle jsou tvé slabé stránky, na co si dát bacha a tak. Takže tohle je takový, že se utvrzuju v tom, že to má vůbec cenu zkusit, a pak na základě tohohle dodělávám to CVčko tak, aby odpovídalo té pozici. Nemám vlastně přípravu na ten první pohovor, protože vlastně není moc potřeba. Ale pak spíš to úsilí směřuju právě do nějakých těch cvičení, když na ně dojde, nebo přípravy na ty další pohovory — když se dozvím hiring managera, tak si přesně proústřelím na LinkedInu, abych věděl, co mají za sebou, jaký background, typově co jsou to za lidi.'", "summary": "AI skill matching jako workaround: napromptované porovnání profilu (8.5/10), silné/slabé stránky. Sám dělá co by měl headhunter.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hhf3p5uu6E9IvX514Se76", "video_clip": "[video highlight_clip_dyEVgB.mp4 00:01.8-03:09.9]", "tags": {"Hypotézy": ["H12"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"], "Default group": ["Workarounds"]}}, {"id": "Nfr6L5B76qFegZRevNr7", "text": "[Speaker 2] 'No, já si sbírám feedback i teďka na těch projektech a sbíral jsem si ho jako historicky ve firmách. Takže já z tohohle mám nějaký přehled o tom, jako co na mě ty lidi oceňujou a co ne. Když to vezmu z takového toho úplně designérského konce, tak já jsem historicky zjistil, že prostě nejsem visual designer, že vlastně skoro všechny ostatní věci jsem schopný nějak více či méně řešit, ale prostě abych dělal vyloženě ten pixel perfect design, to prostě není, to nemám v pokoji. Zkoušel jsem to, takže tohle o sobě vím. Pak na to navazuje, že vlastně vím, že se nestarám o design systémy, protože prostě na to většinou je v týmu nějakej jinej expert. No a pak to jde dál tím způsobem, že já právě z toho feedbacku, co na mě chodí nebo co mám pozbíraný, tak vím, že lidi, se kterýma spolupracuju, tak většinou oceňují to, že jsem schopnej fakt přijít do neznámé situace relativně rychleji nasát, pochopit, identifikovat, co tam je za problémy a podle toho nalajnovat nějakej plán řešení, který nejenom si nalajnu pro sebe, ale právě jsem schopný tím provést i ty ostatní. Většinou jsem hodnocen jako spíš takovej tvrdší facilitátor, že nejsem takovej ten softovej, ale pro větší skupiny třeba to je potřeba.'", "summary": "Sbírá feedback historicky i teď. Jasná sebeznalost (visual ne, design systémy ne, rychlé nasátí ano). “Sbírám si feedback sám” — workaround pro absenci assessmentu.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hpjA2Y3jEZpgNUToUejUX", "video_clip": "[video highlight_clip_Nfr6L5.mp4 00:01.0-01:56.0]", "tags": {"Default group": ["Existing solutions", "Workarounds"], "Verdict": ["Go"], "Hypotézy": ["H5"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "KCkW9MaNencQzkp4gk38", "text": "[Speaker 2] 'Jedna možnost rozvoje je tenhle směr za podpory AI — pracovně to nazývám AI-powered discovery. Teď nemyslím jenom, že má člověk nějaký dílčí pomocníčky, ale že máš fakt poskládaný ten end-to-end proces podporovaný AI. Vlastně se to snažím už nějakou dobu dělat, jenom ještě nemám v ruce ten case, který by byl opravdu poctivě end-to-end udělaný za pomoci nějaký smečky agentů. To ještě nemám, ale už mám prostě nějaký zkušenosti s tímhle, mám tu smečku agentů ve výstavbě, atd. Ten druhý směr, po kterém se přeci jenom reálně trochu stejská, je ten design manažerský na nějakým produktu, kde na to má člověk vliv end-to-end. Jeden consulting a change management, protože já principiálně říkám, že v téhle fázi svý jsem schopný přinášet tu change, ale ne tolik pak to zavádění, ten management té změny. Jsem schopný pomoct té firmě vymyslet tu změnu, ale nejsem schopný s níma dotáhnout ten impact.'", "summary": "Dva směry: AI-powered discovery consulting (smečka agentů) vs. design management. Sebe-reflexe: umí přinést změnu, ne ji zavést.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hLO7SWYGXEJAGH6qd8DzV", "video_clip": "[video highlight_clip_KCkW9M.mp4 00:01.1-01:37.3]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Kandidát"], "Default group": ["Motivátory & Bariéry", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "z2Xx3rwzJSVObZ35aOXD", "text": "[Speaker 2] 'já jsem teďka v takový trochu debilní situaci. Třeba jsem kvůli spořce dohledával, jak je na tom projekt, který jsme v ještě době, kdy jsem dělal v MMSD — čili pět, šest let zpátky — vykopávali. Byla to digitalizace příbalových letáků, ale už tenkrát jsme věděli, že to má roadmapu asi na deset let. A já jsem si chtěl zjistit, jak jsme na tom — vlastně s tímhle projektem, který jsme pomohli vymyslet, vykopnout. No a teďka má to za sebou pilotní provoz v pěti zemích po celém světě, je to v podstatě v předposlední fázi před masivnějším uvedením na trh. Jenže jak já si tohle kurník mám dát do nějakého portfolia, když to vlastně ještě nežije a dělal jsem to před šesti lety. Podobně teďka loňský rok jsem prostě dělal ČSOB na věcech, které jsou na tři a půl anebo taky deset let dopředu. Direkt, ve kterým nejsem rok a půl, teďka uvádí na trh to, co jsme tam pomáhali vymyslet. Mě se fakt baví ty strategické výkopy, ale na druhou stranu se mi strašně blbě dokazuje ten můj impact.'", "summary": "Portfolio paradox pro stratéga: roadmapa 3-10 let, výsledky až po odchodu. “Jak si tohle dát do portfolia, když to ještě nežije?”", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hWWH4cnXbOASoQcSm3O0Z", "video_clip": "[video highlight_clip_z2Xx3r.mp4 00:00.1-02:12.8]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H4"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "uSdOH0bd6weWiRsKgxw2", "text": "[Speaker 2] 'Jo, hele Já jsem ten tým v Seznamu tenkrát částečně zdědil, ale už i do něj jsem hajroval a ty další dva týmy — MMSD a Avast — jsem vlastně stavil od nuly, protože já jsem byl člen číslo jedna a měl jsem si k sobě nabrat nějaké lidi. Fór je v tom, že ty další dva už nebyly čistě designové týmy, ale byly to ty discovery týmy, do kterých jsme vlastně sháněli jako směsku rolí.'", "summary": "Přechod na druhou perspektivu — hiring lead. Stavba týmů od nuly v MMSD a Avastu. Discovery týmy = směska rolí.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hx3p3q6MzeDhE6iINj3nR", "video_clip": "[video highlight_clip_uSdOH0.mp4 00:00.5-00:28.4]", "tags": {"Perspektiva": ["Lead"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "g684NnYYwwv7bf9vfahu", "text": "[Speaker 2] 'Ono se ten můj postup se zas tak moc nelišil, protože už v tom Seznamu jsme dávali skoro bych řekl větší důraz než na to, jakej prostě má ten člověk vizuální výstup, tak spíš právě na to jednoduše, jak o tom přemýšlí, respektive jak zná nějakej designovej proces z high level a případně praktické metody v detailu. Já často k sobě potřebuju spíš lidi, kteří umějí opravdu nějak přiměřeně metodicky procházet procesem a nekličkujou jak zajíci. A když je potřeba, tak ve finále se někdo na ten hezký design jako najde. A pak jasně, když jsme nabírali specificky jako UI designéry, tak tam už to přesně bylo o portfoliu — předveď, že jseš schopný měnit třeba styl podle potřeby, aby to nebylo všechno na jedno prdo. Ale jinak valná většina těch lidí, které já jsem historicky nabíral, tak byli fakt spíš takový ty design thinkeři a metodičtí lidi, anebo výzkumníci nebo produkťáci '", "summary": "Při hiringu důraz na myšlení a proces, ne vizuál. “Kličkujou jak zajíci” = red flag. UI = portfolio, ostatní role = process.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hrIO3icZVaddfjeic3cYX", "video_clip": "[video highlight_clip_g684Nn.mp4 00:01.0-01:34.7]", "tags": {"Hypotézy": ["H1", "H4"], "Default group": ["Industry insights", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "fB8pcxTYQD3CzL0i0C0g", "text": "[Speaker 2] 'S těma ten základ už jsem v podstatě řekl — jak přemýšlejí o problémech, jak se navigujou. Pak jsme pochopitelně zkoušeli i nějaký domácí úlohy, ale my jsme se lidi většinou snažili neopatrovat až tak naháliko — byly spíš menší, abychom byli o čem se bavit. Ale s čím jsme měli relativně dobré zkušenosti, tak byl nějaký role play. Že jsme si je prostě vzali na pohovor a nebyl to jenom pohovor, ale byla to prostě simulovaná jejich situace s nějakou netriviální pozicí — ale opravdu otravnej stakeholder třeba, nebo prostě protichůdné požadavky a tak. Na to jsme si pak vzali kolegy z týmu, aby to nebylo jeden na jednoho — byli jsme tři, čtyři. Uvedli jsme tu situaci, sehráli jsme ji, trvala třeba tři čtvrtě hodiny. A z toho jsme si pak hodnotili, jak ty lidi fungují.'", "summary": "Hiring metody: domácí úkoly (menší) + role play (45min, 3-4 lidé, simulované situace). Role play = nejlepší — ukazuje reálné fungování.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hIxX8Oj1q7mqrpMhIDndx", "video_clip": "[video highlight_clip_fB8pcx.mp4 00:01.5-01:08.0]", "tags": {"Default group": ["Existing solutions", "Pozitivní příklady"], "Hypotézy": ["H1", "H4"], "Perspektiva": ["Lead"], "Intenzita": ["Silně"]}}, {"id": "CjcqqssKKwO5N31leJQa", "text": "[Speaker 2] 'My jsme měli už relativně dávno vydefinovaný v podstatě v tom MMSDčku, tím jak jsme založili jako discovery tým — Dušan Pavlica tam dříve či později získal pozici jako direktor a my jsme byli pak jeho senior direktoři. A tahle skupinka, ve smyslu nejenom on a já, ale pak prostě šéf vizuálních designů, Šárka research a tak, tak jsme si vydefinovali profily těch rolí. My jsme měli prostě fakt jakoby kariérní matici' [Speaker 2] 'co má umět prostě junior, medior, senior, lead — pro každou tu oblast. A vlastně to bylo takové jakoby to zrcadlo nejenom pro ty kandidáty, ale vlastně i pro nás samotné, že vlastně my jsme si pak dělali i interní assessmenty, jak jsme na tom. A tohle to já si od té doby plus mínus nesu sebou a používám to a vylepšuju. A jako teda ne celou tu matici za celý ten designovej tým, ale tu mojí discovery část. Já mám prostě rozpadlou do asi teďka dvanácti kompetencí, na kterých je popsaný, co v každé té kompetenci vyměl ten člověk plus mínus umět'", "summary": "Vlastní 12-kompetenční model 8+ let, kariérní matice (junior/medior/senior/lead). Vzniklo v MMSD, používá napříč firmami. Zrcadlo i pro sebe.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hTLExckQO27u8FLtTuq3s", "video_clip": "[video highlight_clip_Cjcqqs.mp4 00:01.2-01:40.1]", "tags": {"Default group": ["Existing solutions"], "Verdict": ["Go"], "Hypotézy": ["H11", "H7"], "Perspektiva": ["Lead"], "Intenzita": ["Velmi silně"]}}, {"id": "VBMl4jcsHBV61t7hrTU0", "text": "[Speaker 2] 'těch dvanáct kompetencí je rozdělenejch na nějaký specifické a na nějaký generické. Ty generické jsou takové — nějaké prezentační dovednosti, komunikační dovednosti a tak. A pak ty specifické jsou prostě vedení výzkumných pohovorů, vizualizace, mapování. A v principu, když pomenu leadership, tak k tomu přistupuju tak, že vlastně junioři se to učej, mid level to má dělat, a senioři to mají být schopni učit. Když to hodně zjednoduším — a učit ve smyslu i třeba vysvětlovat právě stakeholderům, že jako musí být schopný si vymyslet metodologii, odprezentovat si, obhájit si třeba a tak. Vlastně tohle je to zrcadlo, proti kterému jsme — neříkám že úplně vždycky, ale většinou — ty kandidáty hodnotili. Minimálně v Avastu a MSD.'", "summary": "Struktura modelu: 12 kompetencí = generické + specifické. Senioritní škála: junior se učí, mid dělá, senior učí. Použito v Avastu a MSD.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hdboS9elTiCnwLklSTtUM", "video_clip": "[video highlight_clip_VBMl4j.mp4 00:00.5-00:16.1]", "tags": {"Default group": ["Existing solutions"], "Hypotézy": ["H7"], "Perspektiva": ["Lead"], "Intenzita": ["Silně"]}}, {"id": "jcpa8cDjbgt2KK8iEF2d", "text": "[Speaker 2] 'A ještě jsme to měli částečně nakalibrované tím, že jsme si udělali assessment sami sebe a navzájem. Nějak se člověk vnímá, nějak se známkuješ a nějak tě ještě zkorigujou ostatní — a z toho máš plus mínus nějakou představu o tom, jak jsi na tom. A tím, že jsme měli tuhle tu jakoby kalibraci, tak jsme pak byli vůči tomu schopni i ohodnotit kandidáty.'", "summary": "Self-assessment + párová kalibrace: hodnotíš se sám + hodnotíš druhé + společně koriguješ. Tým = benchmark pro kandidáty.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hVFJB7xJM3nlRajxsinqL", "video_clip": "[video highlight_clip_jcpa8c.mp4 00:00.5-00:32.4]", "tags": {"Default group": ["Existing solutions"], "Verdict": ["Go"], "Hypotézy": ["H11", "H5"], "Perspektiva": ["Lead"], "Intenzita": ["Velmi silně"]}}, {"id": "Fr7k5sfvhj4xdrnaQ0u1", "text": "[Speaker 2] 'Já mám jako kombinace nějaká, já už si nepamatuju úplně, ono všechno tak jako roky zpátky. Ale já mám pocit, že my jsme vzali inspiraci jakoby na ten framework plus mínus, což není vlastně nic až tak unikátního, ale prostě abychom to nemuseli vymýšlet. Ale čím jsme to plnili, tak byly naše vlastní jako definice jakoby na ty low levely.' [Speaker 2] 'Asi jsme to taky jako někde v uvozovkách nakradli, ale nemyslím si jako že celé. Vlastně to byl takový jako puzzle z nějakých definic zbokova' [Speaker 1] 'Inspirovali jste se, jak se říká?' [Speaker 2] 'A pak jsme to ještě posunuli dál v tom Avastu, už jsme to přivedli do takového toho pavoukového diagramu, kde to vlastně vynášíš ty hodnoty do té kruhové výseče. Pak jsi schopný hezky prezentovat nejenom jednotlivce, ale i tým. Že jsme vlastně takhle asesovali celé týmy. ' [Speaker 1] 'Tam, kde máš gab, tak třeba hledáš kandidáty který.' [Speaker 2] 'A tam, kde máš gap, tak třeba hledáš kandidáty, kteří ti ho mají vyplnit. To už je prostě takovej ten jako talent v managementu.'", "summary": "Framework = puzzle inspirací + vlastní definice. Evoluce: tabulka (MMSD) → spider chart (Avast). Gapy v týmu = cíl hiringu. Konvergence se Srogoň.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hlA6NmCPkZni0xAy2qDoN", "video_clip": "[video highlight_clip_Fr7k5s.mp4 00:01.5-01:32.6]", "tags": {"Default group": ["Existing solutions"], "Verdict": ["Go"], "Hypotézy": ["H11", "H7"], "Perspektiva": ["Lead"], "Intenzita": ["Silně"]}}, {"id": "LddZY3y6NDY1HUysBfjv", "text": "[Speaker 1] 'najmout jednoho nového člověka do týmu — kolik je to práce? Jo, co vlastně to všechno obnášelo? Protože vem si, že na začátku řekneš, chci nového člověka a teďka musíš dát inzerát a teď spousta dalších aktivit a na konci člověk je 1 jen v práci a začíná onboarding, tak jestli dokážeš nějakým způsobem paušalizovat ten čas, kterej ti vlastně takováhle aktivita?' [Speaker 2] 'Já to už
