o trošku náročné období, ale teď jsme teda 3 a jinak ještě holky z interního HR, který řeší vlastně hlavně smlouvy a takové interní věci, různé akademie, tak ty jsou taky tři, takže šestná si teď.'", "summary": "Applifting = 180 lidí, 8 designérů, HR rozdělený 3 recruiteri + 3 internal HR. Mid-size scale, design ~4,5 % týmu.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/h817DRykX9iakCGWtZCwP", "video_clip": "[video highlight_clip_GefK1T.mp4 00:00.9-01:05.0]", "tags": {"Perspektiva": ["In-house TA"], "Default group": ["Industry insights", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "yUa71ONPUIieSmvk3KK2", "text": "[Speaker 2] 'Jo, to se asi nedá úplně zproměrovat, že my moc nejedeme na statistiky a na KPIčka vůbec, takže já to vlastně ani nevím (…). já hajruji právě tady tu jako designovou víc část, takže najdou i produktáky, designéry, marketing, grafický design, zároveň pak i pozice, třeba jsem říkala dotnet, takže více jako IT a technický analytiky (…) ale třeba jenom těch designovejch bych řekla tak kolem 4, 5, 6, 7, něco takový.'", "summary": "5-7 design hires/rok. Žádné KPIs / measurement culture = Applifting differentiator. Aneta hiruje cross-role, design = primary.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hJTBFpprBAY4zeHgW2EBz", "video_clip": "[video highlight_clip_yUa71O.mp4 00:01.7-00:41.9]", "tags": {"Perspektiva": ["In-house TA"], "Default group": ["Industry insights", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "OcjSlzp7gYCiFg9Wjkvh", "text": "[Speaker 2] 'ten specialista, to je člověk, který vlastně řeší hlavně teda ten hiring, takže klasický kolečko, pohovory, prescreeny a tak. A ten partner, tak tam už se to vlastně tak jako rozšiřuje ta agenda toho člověka, že já teda dělám i technický meetupy, organizuju a zároveň se i člověk stává jako víc partnerem těch vlastně v úvozovkách hiring manažerů'", "summary": "TA escalation: Specialist = transactional → Partner = strategic (eventy, employer branding, partnership s leadem). Partner = relevant buyer level.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/h4krdGXA5fT8VfHsQQQz1", "video_clip": "[video highlight_clip_OcjSlz.mp4 00:01.2-00:26.0]", "tags": {"Hypotézy": ["H10", "H12"], "Perspektiva": ["In-house TA"], "Default group": ["Industry insights"], "Intenzita": ["Silně"]}}, {"id": "FRZhPq45YEIDKx6FbT1W", "text": "[Speaker 2] 'Celkově tam je to opravdu hodně o kvantitě a ne o kvalitě. že tam celkově i ta neetičnost počívala v tom, že se běžně dělo, že jsme lidem, jako vývojářům, snažili se tlačit nižší mandate, než mohli dostat, a tvrdit jim, že vlastně víc nedostanou, aby ta firma Bráku People si stáhla co nejvíce z té provize, což prostě mě nebylo příjemné, takže jsem to trošku sabotovala. (…) Hlavně, že bylo navoláno tisíc lidí a posláno mi jen e-mailů. Takže asi to prostě mi nelíbilo.'", "summary": "Insider whistleblow z agenturní strany — CoolPeople taktika tlačit nižší honorář, aby agentura získala větší provizi. Volume nad quality.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hVwMjELnNBJ4fqMcLlndm", "video_clip": "[video highlight_clip_FRZhPq.mp4 00:00.9-00:45.4]", "tags": {"Hypotézy": ["H10", "H8"], "Perspektiva": ["In-house TA"], "Default group": ["Industry insights", "Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "R1TX4uo5FXDFkUrDOErX", "text": "[Speaker 2] 'Celkově ten hiring designéru je u nás většinou na delší časové období. Naše designéři jsou hodně vybíraví a opravdu se prochází portféle po portfoliu. (…) sejdu s těch lidem, se píšeme nějaký požadovky, vystavíme inzerát na startup jobs, pak na našich stránkách (…) my tam i máme jako v pipelinech třeba kandidáty z minulého roku, kteří byly fajn (…). designéře se na to dívají, probírají se těma portfoliama, já taky teda, když tam vidím, že to jsou třeba právě spíš grafici než designéři, tak já už to zamítám tím, že k tomu mám jako větší přesah (…). prescreen call, ten většinou trvá nějakých 45 minut (…) Snažíme se tak zjistit, jestli ten člověk vlastně podobně smýšlí jako my (…). osobní pohovor je zhruba na hodinu a půl. (…)' [Speaker 2] 'Vždycky jsme tady asi ve třech zhruba, takže tam jsou dva právě designéři většinou. jeden člen C-teamu (…). Procházíme nějakou ukázku práce (…) říkám kandidátům, aby si připravili právě nějakou práci z minula, jakoukoliv, a oni pak vlastně ji prezentují. Oni neví, že to budou prezentovat, ví, že o tom nějak bude mluvit, ale nemají být vlastně úplně připraveni na tu prezentaci. Chceme, aby mluvili na nějaký způsob spatra a dokázali si to obhájit.'", "summary": "End-to-end Applifting workflow: kickoff → JD + Startup Jobs → portfolio review → 45min prescreen → debrief → 1,5h pohovor (2 designeri + C-team) → “ukázka spatra”.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hKpRlqB3zXRFhbDVM76D5", "video_clip": "[video highlight_clip_R1TX4u.mp4 00:00.1-02:55.4]", "tags": {"Hypotézy": ["H1", "H7"], "Perspektiva": ["In-house TA"], "Default group": ["Pozitivní příklady", "Workflow / Chování"], "Intenzita": ["Velmi silně"]}}, {"id": "5hU3T6Tx2rTaZn0EofRg", "text": "[Speaker 2] 'On to je jakoby typu designu. Jenom my takhle tomu říkáme Tech Lead, Team Lead, no to je jako podobný, ty Tech Lead jsou víc technický, takže ten design už se brane jako technicky, takže Tech Lead je ten lead toho designovýho, no, té skupiny.'", "summary": "Applifting interní terminologie: Tech Lead = Design Lead. “Design už se brane jako technicky.”", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/h3fJqXCIa9ad8AJgZueQN", "video_clip": "[video highlight_clip_5hU3T6.mp4 00:00.8-00:17.0]", "tags": {"Hypotézy": ["H7"], "Perspektiva": ["In-house TA"], "Default group": ["Industry insights"], "Intenzita": ["Neutrálně"]}}, {"id": "7qLee5M4hyseOpK0ZB6d", "text": "[Speaker 2] 'Na této pozici se hlásí opravdu hrozně moc lidí, takže myslím si, že když to nějak jako opravdu jenom zhruba tak odhadnou, tak třeba dejme tomu z nějakých padesáti, co pošlou CVčko a portfolio, tak třeba přes země a přes ty designéry vlastně jenom v rámci toho portfolia přejde třeba, nevím, deset lidí. Po deseti let má se dál ten call a většinou třeba po tom callu, dejme tomu, pět, který pak jdou vlastně o pohovor, někde i méně'", "summary": "Funnel pro 1 placement: 50 přihlášek → 10 portfolií (4× zúžení) → 5 prescreen (2×) → 5 pohovor. Passive sourcing, žádný outreach.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hIRyiuE7c3BhXCFSXmGWr", "video_clip": "[video highlight_clip_7qLee5.mp4 00:01.9-00:35.2]", "tags": {"Hypotézy": ["H2"], "Perspektiva": ["In-house TA"], "Default group": ["Industry insights", "Workflow / Chování"], "Intenzita": ["Velmi silně"]}}, {"id": "L4ZxSeHL2j1bmChWZtOE", "text": "[Speaker 2] 'u tady té pozice spíš řešíme fakt to portfolio. (…) když se já dívám jenom na to CVčko, tak samozřejmě zjišťuju, jak dlouho ten člověk tady to dělá. Asi mě asi úplně nezajímá, co studoval, to vlastně u nás neřešíme vůbec. Spíš se koukáme na ty firmy, ve kterých pracuje, jak dlouho tam pracoval. A pak samozřejmě na ukázky těch prací..'", "summary": "CV signály: firmy × délka × ukázky. Škola = irrelevant. Cross-validuje Pohanka P9 pasáž 7 (prestiž klientů).", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hLInNsU0WM3eMhLRawpLL", "video_clip": "[video highlight_clip_L4ZxSe.mp4 00:00.6-00:27.5]", "tags": {"Hypotézy": ["H7"], "Perspektiva": ["In-house TA"], "Intenzita": ["Silně"], "Default group": ["Trust signals", "Workflow / Chování"]}}, {"id": "2x4pcVsgy7dheUfrGxQq", "text": "[Speaker 2] 'Jo, to je fakt těžký říct, protože třeba než jsem vlastně highrovala já tu pozici, tak vím, že to trvalo třeba půl roku. Takže to bylo dlouhé, protože designeri byli extrémně právě vybíraví a potřebovali někoho seniorního, takže to bylo prostě náročný proces. Myslím, že když jsme to vystavovali nám na poslední, tak to bylo zhruba dva měsíce asi.' [Speaker 1] 'Celou dobu se bavíme o tom procesu, kdy vlastně že jo, už vám někdo poslal CVA vy vlastně jako procházíte a filtrujete dál ten ten tu pipelinu, kterou vám někdo jako to znamená, že aktivně se vám někdo ozval a. Teď přemejšlím, jestli máte nějaký jiný strategie, jak sehnat ty kandidáty, než jenom, že čekáte, kdo se ozve?' [Speaker 2] 'No vím, že jsme dělali nějaký aktivní sourcing, ale určitě (…) tady tu pozici, protože jako to nejde, teda hodně docela u nás teď funguje ten referál (…) ale já teda vůbec nesourcuju.' [Speaker 1] 'V kolik hodin třeba na tý pozici jste vy osobně strávila jako pro tu představu jenom?' [Speaker 2] 'Jako celý to kolečko, všechno jako než než 1 člověka obsadím tak, jak dlouho to třeba trvá.' [Speaker 1] 'Řádově.' [Speaker 2] 'Kolik hodin? To je fakt těžký, no tak třeba 40, 30, něco takového.'", "summary": "Time-to-hire 2 měs default, 6 měs extreme. 30-40h/placement. Aneta žádný outreach = passive sourcing — strukturální rozdíl in-house vs. agentura.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hU33XsbqWnzsHRz4ciayP", "video_clip": "[video highlight_clip_2x4pcV.mp4 00:01.3-01:37.4]", "tags": {"Perspektiva": ["In-house TA"], "Default group": ["Industry insights", "Workflow / Chování"], "Intenzita": ["Velmi silně"]}}, {"id": "XhUuKahDLsxWvSdVVU9F", "text": "[Speaker 2] 'Máme všichni stejnou váhu toho slova rozhodujícího, takže i já, i teda člentovství týmu. Takže vlastně se musíme my všichni tři shodnout a pak pustíme nabídku.'", "summary": "Konsensuální rozhodování: TA + 2 designeři + C-team = equal weight. Žádný hierarchický gate keeper. Buyer = celý hiring panel.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/h0ho80HlHhJQ6JmeTgtI8", "video_clip": "[video highlight_clip_XhUuKa.mp4 00:00.4-00:18.9]", "tags": {"Hypotézy": ["H10", "H12"], "Perspektiva": ["In-house TA"], "Default group": ["Industry insights", "Workflow / Chování"], "Intenzita": ["Velmi silně"]}}, {"id": "n0Lti3Gv8RzWSdPMFVmC", "text": "[Speaker 2] 'občas třeba nějaká nepřipravenost těch kandidátů, kdy vlastně se pak na tom osobním kole, ale to je i u jiných pozic, prostě zjistí, že ten člověk neumí úplně dobře prezentovat, není tak silnej vlastně v té lidský komunikaci. což se opět občas prostě stane, pracují ty nervy (…) na kólu ten člověk je úplně v pohodě a pak naživo prostě pracuje ten stres a nervy.'", "summary": "Hlavní pain: kandidáti zvládnou prescreen call, padají na osobním pohovoru. Strukturální gap mezi remote a in-person komunikací.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hG3A2rXBD3eGMXf7AkWFl", "video_clip": "[video highlight_clip_n0Lti3.mp4 00:00.7-00:29.5]", "tags": {"Hypotézy": ["Emergent", "H1"], "Perspektiva": ["In-house TA"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "6FDR3HChLYuAq5PNz7qv", "text": "[Speaker 2] 'my máme UX, UI jako společný jeden tým a pak produktový tým je zase zvlášť, tam máme jiného i tech vída a teď já nevím, jestli byla. Pardon, úplně jsem zapomněla na otázku.' [Speaker 1] 'Jak se?' [Speaker 2] 'Liší.' [Speaker 1] 'Jestli je způsob vybírání těch jednotlivejch typů designerů, to znamená UXUI produkt, tak jestli to je stejný, nebo máte nějaký jiný kritéria filtrace?' [Speaker 2] 'Určitám jsou jiná kritéria, ten Ten tým designerů opravdu řeší hlavně nejenom tu vizuální část, ale i teda tu komunikační, což teda se dělá i v tom produktu, ale produktňáci celkově jako moc design sami jako nedělají, takže samozřejmě se musí jako mě zvládat moderovat design sprinty, ale ale jako designy dělají.'", "summary": "Applifting org: UX+UI = jeden tým, Product = oddělený. PMs moderují design sittingy, nedesignují. 2 různé profily, 2 různá kritéria.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hF4U5v05d5or73K6HwZNk", "video_clip": "[video highlight_clip_6FDR3H.mp4 00:01.2-00:57.1]", "tags": {"Hypotézy": ["H7"], "Perspektiva": ["In-house TA"], "Default group": ["Industry insights", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "T8iMQkbPQLWeOSvHTAE1", "text": "[Speaker 2] 'když tam vidím, že ten člověk dělal opravdu 20 let v jedný firmě a je mu třeba kolem už jako 60, tak už prostě si říkám, že to asi nemá smysl, což samozřejmě asi bych neměla dělat, ale tím, že třeba ten tým je jako kolem, lidi kolem 40 je 30, takže mladý, tak vím, že asi by to třeba nebyl úplně fit, ale samozřejmě to jako nemůžu vědět stoprocentně, takže to je možná taková chyba, kterou občas dělám.'", "summary": "Aneta self-acknowledged age bias: 60+ kandidát s 20 lety v 1 firmě → “asi nemá smysl”. Důvod: tým 30-40, kulturní fit. “Asi bych neměla.”", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hHNk23I2SP1JeaIWDXCTY", "video_clip": "[video highlight_clip_T8iMQk.mp4 00:00.3-00:27.5]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["In-house TA"], "Default group": ["Pain points", "Trust signals"], "Intenzita": ["Velmi silně"]}}, {"id": "ZZUZSLmsjz4po2Jab4OU", "text": "[Speaker 2] 'Určitě,když třeba víme konkrétní projekt, na který někoho hledáme, tak když třeba teď řešíme nějaké bankové právě věci, tak určitě dáme přednost někomu, kdo už tě má ty zkušenosti. (…) ono záleží na tom projektu. Nikdy nevíme konkrétní projekt, nikdy nevíme vůbec žádný projekt, protože těch pipeline nemáme několik, ale když opravdu hajrujeme na určitý obor nebo určitý projekt, tak asi je to prostě plus no.'", "summary": "Domain bias condicionální — když Applifting hiruje na konkrétní bankovní projekt, doménová znalost = plus. Default: pipelinová poptávka, doména nerelevantní.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hnlmU0jceeShQw4cv2Ojp", "video_clip": "[video highlight_clip_ZZUZSL.mp4 00:01.6-00:32.1]", "tags": {"Hypotézy": ["H7"], "Perspektiva": ["In-house TA"], "Default group": ["Industry insights"], "Intenzita": ["Silně"]}}, {"id": "8b8ZCCvLdyhXhXdFLbhg", "text": "[Speaker 2] 'amotný jako ten výstup, jak ty portfolio vypadají, jestli to je jenom PDF, nebo jestli to je ve filmě, nebo vlastně jakým způsobem je to zaslaný. Pak asi já prostě koukám hodně na ty fonty a na to, jak to vypadá, jestli to prostrkání je správný (…). když vidím, že to je prostě úplně jako splácaný takový, tak už jako asi vím, že to u nás neprojde. (…) chyby jako textu, hrubky a tak..' [Speaker 1] 'Vždycky, ale já rozumím. Ještě nějakej jinej billbreaker, kterej třeba sleduje něco, co si řeknete na 1. Dobrou a tak to asi ne.' [Speaker 2] 'No. i vlastně ty úpravních prací, čeho se třeba týkají, jestli to vypadá profesionálně, nebo jestli to jsou opravdu jenom takový cvičení, kdy si prostě člověk jako junior prostě zkouší různý sám designy (…) i to, že často to jsou i jako reální designy, který byly použitý, nebo samozřejmě pokud ten člověk pracuje pod nějakým NDAčkem, tak samozřejmě to nemůžou ukazovat.'", "summary": "Aneta díky design backgroundu screenuje portfolia samostatně. Signály: format, typografie, gramatika, reálné práce > studie, NDA acknowledgement.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hMWoTLa4kvEcz7wQNriil", "video_clip": "[video highlight_clip_8b8ZCC.mp4 00:01.5-01:24.1]", "tags": {"Hypotézy": ["H2", "H7"], "Perspektiva": ["In-house TA"], "Default group": ["Trust signals", "Workflow / Chování"], "Intenzita": ["Velmi silně"]}}, {"id": "AjMgWXQLVd1Guq5zpm5L", "text": "[Speaker 2] 'My těch referálů máme tady docela dost právě na ten design, ale jako zrovna na tohle pozici žádný referál opravdu nikde nechvap, protože většinou ty kandidáty jsou moc juniorinní, anebo právě se to pletou i ostatní aplivtery s tím grafickým designem, takže často tam padají prostě grafici.'", "summary": "Referral channel pro design = strukturálně slabý. Kolegové neumí rozlišit grafika od designera. Counter k Krejčí P10 pasáž 2 (firmy si je samy najmou).", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hm5iOENFwjgsbWwyPxy2X", "video_clip": "[video highlight_clip_AjMgWX.mp4 00:00.9-00:22.3]", "tags": {"Default group": ["Existing solutions", "Pain points"], "Hypotézy": ["H2", "H8"], "Perspektiva": ["In-house TA"], "Intenzita": ["Velmi silně"]}}, {"id": "ufIUFmu222z3Ie3MJfOg", "text": "[Speaker 2] 'Vím, že jsme tam měli nějaký jako problém s nepochopením se v rámci nějakých jako nástupů a smluv a tak. Ale to, to jako se úplně týkalo té konkrétní pozice, to spíš to byl jako lidský nějaký problém, že ten kandidát byl úplně jinej vlastně na pohovoru a.' [Speaker 2] 'a vlastně ve chvíli, kdy nastoupil, tak se začal projevovat jako úplně jinej člověk, takže to byl jako lidský spíš problém.'", "summary": "Hire-survivor bias: nepředikovatelnost post-onboarding behavior z pohovoru. Limit any pre-hire assessment. Pre-vetting tool tohle nemůže řešit.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hMI7K20fdwEscCEQXSyAk", "video_clip": "[video highlight_clip_ufIUFm.mp4 00:00.4-00:31.4]", "tags": {"Hypotézy": ["Emergent", "H1"], "Perspektiva": ["In-house TA"], "Default group": ["Industry insights", "Pain points"], "Intenzita": ["Silně"]}}, {"id": "QyjWpyrZeVobyUVh4W4W", "text": "[Speaker 2] 'Ty job descriptions, tak my už máme nějak ten vzor už hotovej o delší dobu. My to vždycky tak nějak upravujeme podle těch požadavků. Každopádně, když se vystavuje novej enzirát, tak vždycky to musí projít naším copywriterem, kterej to zreviduje a vlastně napíše to v tom stylu toho upliftingu, aby to prostě bylo nějakým způsobným lidem víc.'", "summary": "Copywriter v hiring pipeline = unikátní v sample. Applifting JD má dedicated language polish. Investice do employer brandingu.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/h23NXc7P2PgBrf46ZQWMJ", "video_clip": "[video highlight_clip_QyjWpy.mp4 00:01.2-00:22.7]", "tags": {"Default group": ["Existing solutions", "Pozitivní příklady"], "Hypotézy": ["H4"], "Perspektiva": ["In-house TA"], "Intenzita": ["Velmi silně"]}}, {"id": "lz0c2clxgC9IrH7qOygC", "text": "[Speaker 2] ' my vlastně jako HR máme takový systém buddies (…) což znamená, že nějaký kandidát po tom, co nastoupí, tak maximálně badyka, který ho pak jako provází ty první měsíce tou cestou do aplikace. Takže já si většinou beru jako ty badyky právě tady, který jsem nahajrovala, takže potom je to jedna z takových mých otázek po nějakých dvou měsících vlastně, jak se to vlastně lišilo, ta jeho představa o upliftingu, o tom, co nastoupil. (…) zatím mi přijde, že asi ano, jakože nějaký 90 % to tak nějak schází.'", "summary": "Aneta = buddy svých hires = built-in post-hire JD validation loop. 2 měsíce po nástupu zjišťuje match expectation vs. reality (~90 %). Unique data point.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hAlcdiIWZWjji4B9n0YLv", "video_clip": "[video highlight_clip_lz0c2c.mp4 00:00.5-00:43.4]", "tags": {"Hypotézy": ["Emergent", "H4"], "Default group": ["Existing solutions", "Pozitivní příklady"], "Perspektiva": ["In-house TA"], "Intenzita": ["Velmi silně"]}}, {"id": "K0WKF4az1fdB1I69Pfvu", "text": "[Speaker 2] 'no my vlastně ten HR-ovej tým, jak říkáme, to mám rozdíl na rekrutery a HR, takže mi řešil opravdu jenom ten rekrut, my v té smlouvě, a teď se to vůbec přeze mě jako nejde, takže myslím, že i tím mám jako ty ruce docela volnější. Ale myslím si, že u nás ten proces je fakt rychlý kvůli tomu, že my neřešíme nějaké zbytečné papírování asi a nějaké zbytečné požadavky, které musí přes x lidí, než se to schválí. Že vlastně jsme zvyklí ty věci řešit napřímo a nemáme tam nějak hrozně moc lidí, než se ten proces dodělá. '", "summary": "Direct counter k Navrátilová P3 (HR jako brzda). Applifting in-house HR = enabler: 3 lidi, řešit napřímo, žádné multi-stage approvals.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hqmvyEEjbFEzRNXpNQUUu", "video_clip": "[video highlight_clip_K0WKF4.mp4 00:00.4-00:37.7]", "tags": {"Hypotézy": ["H10", "H12", "H2"], "Perspektiva": ["In-house TA"], "Default group": ["Industry insights", "Pozitivní příklady"], "Intenzita": ["Velmi silně"]}}, {"id": "iSQVxTxw3KW5pgQTQCe1", "text": "[Speaker 2] 'Vlastně já si myslím, že fakt hodně dáme na tu sebeprezentaci, protože fakt u nás je to hodně o té komunikaci (…). nemůžeme prostě mít lidi, kteří jsou sice strašně talentované, ale jsou fakt jenom za počítačem a bojí se mluvit, protože my řešíme ty věci s těmi klienty napřímo z jakýchkoliv vlastně pozic, že to zase nejde přes x jiných manažérů, kteří se to jako předávají, ale.' [Speaker 2] 'ten designer prostě běžně sedí s klientem a řeší ty věci s klientem. (…) jak je komunikačně silnej, jak vlastně dokáže opravdu prezentovat tu svoji práci. (…) ty designéři doptávají opravdu na konkrétní věci technický (…) Ptáme se, jak vlastně se jim pracuje v T-Figmě (…) hodně se ptáme na to, jak používají AI, jestli používají třeba Weeble, ty prototypy jak dělaj a tak.'", "summary": "Klíčové kritérium = client-facing communication (designer napřímo s klientem). Hard skills přes tech otázky (Figma, AI, prototypy).", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hUrkMobKFIOtyhNbSfLmg", "video_clip": "[video highlight_clip_iSQVxT.mp4 00:01.4-01:00.0]", "tags": {"Hypotézy": ["H7"], "Perspektiva": ["In-house TA"], "Default group": ["Industry insights", "Workflow / Chování"], "Intenzita": ["Velmi silně"]}}, {"id": "1gGb9d2PDguUeMHHflN5", "text": "[Speaker 2] 'Záleží asi v jaký fázi, jestli to je vlastně potom colu 1 a po tom callu prvním a po tom prescreenu, tak tam to většinou je rychlý. Celkem myslím, že třeba do nějakých. 2 dnů se ozývám s tím, jestli půjdeme ten osobní pohovor, nebo ne. Samozřejmě v některých jako rolích máme třeba i úkoly, který posíláme.' [Speaker 1] 'Tak.' [Speaker 2] 'Je to zase dobrý. Další samozřejmě potom, co ten člověk pošle úkol a tak ale u toho designu nebo u toho designu to neposíláme. Co se týče toho po tom osobním kole, tak tam většinou týden, týden a něco to trvá, než se rozhodneme. Samozřejmě záleží, pokud tam mám ještě nějaký víc kandidátů, tak většinou se snažíme opravdu toho týdne dodržet. Pokud tam žádného kandidáta nikdo nemáme už. Tak třeba do konce týdne prostě záleží na tý situaci a no a pak ta 2 otázka.' [Speaker 1] '1 bylo jak trvá dlouho a potom co tam, co těm lidem jako vlastně dáváte nebo jaký informace jim píšete v tom v tý zprávě?' [Speaker 2] 'Jo. Pokud to je teda úspěšný, tak á je teda volám, nepíšu jim, nejdřív těm volám. Ať to je úspěšný nebo neúspěšný (…) řeknu jim důvody, proč to nevyšlo. Naopak, když to vyšlo, tak samozřejmě jim nějakým způsobem přečtu to hodnocení (…) co se vám vlastně líbilo, nad čím je třeba potřeba ještě zapracovat.'", "summary": "Telefonický feedback policy konzistentní napříč úspěch/neúspěch. “Volám, nepíšu.” Direct counter k universal pain (Krejčí P10, Pohanka P9, Kemr P8).", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hd9KadCNfh0bBJGDRCChr", "video_clip": "[video highlight_clip_1gGb9d.mp4 00:00.8-01:37.6]", "tags": {"Default group": ["Existing solutions", "Pozitivní příklady"], "Hypotézy": ["H1"], "Perspektiva": ["In-house TA"], "Intenzita": ["Velmi silně"]}}, {"id": "Ww5Ly0eceuMrjuz7agiU", "text": "[Speaker 2] 'ono to není jako na všichni police, my jsme to dřív dělali na všichni skoro, kromě toho designu, ale vlastně s nástupem jako AI, tak už to moc neřekne o člověku, protože to všichni už udělají přes to AI. Každopádně ten designer, tím, že vlastně my víme, jsou jako docela vytížen časově, tak si nemyslím, že by se někomu to chtělo prostě tady dělat nějaký obrovský jako návrh čtyři hodiny, abysme z toho něco poznali vůbec. Takže nám stačí to portfolio (…). u třeba toho produktu, tak tam máme nějakou case-ku. (…) e-mailová komunikace a tak. Ale teď už právě od těch okolí docela ustupujeme.'", "summary": "AI killed take-home assessment validity. “Všichni udělají přes AI.” Strategic opening pro pre-vetting jako structured alternative v post-AI éře.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hBrnYJsBVybhi4cpxcRbB", "video_clip": "[video highlight_clip_Ww5Ly0.mp4 00:01.0-00:50.0]", "tags": {"Hypotézy": ["Emergent", "H9"], "Perspektiva": ["In-house TA"], "Default group": ["Industry insights", "Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "ax55I2gEW8Hl2rtg6kWp", "text": "[Speaker 2] 'mě asi trošku osobně vadí to slovo proklepávat, přijde mi to vlastně hodně neosobní, že to jsou takový kusy do stěnů, který potřebuje člověk projít a zbavit se jich, nebo je oslovit. Nechci designovat. Jinak asi vlastně ta jednička, dvojka, trojka, to mi přijde logický, je to vlastně fajn, si myslím, že by to člověk mohl jako využít jako nějaký firmy. Přebudem tady jako nějaká poktávka nebo spíš nabídka pro nějaký agentury na nějaké urychlení teda toho procesu nábojo-naborovýho.'", "summary": "Mockup feedback #1: copy “proklepávat” odpuzuje (kandidáti jako “kusy”). 1-2-3 struktura OK. Aneta vidí produkt jako agenturní nástroj — misalignment.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hplM5IZcdtA7ShuuH0UTB", "video_clip": "[video highlight_clip_ax55I2.mp4 00:00.0-00:56.7]", "tags": {"Hypotézy": ["Emergent", "H8"], "Perspektiva": ["In-house TA"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "advaLdaTnCNFlGRmhRfK", "text": "[Speaker 2] 'přijde mi to vlastně nabídka klasická, jestli chceme zatlatit někoho, kdo nám bude vlastně pomáhat s tím náborem, což nám chodí vlastně pořád, takže já už bych klasicky prostě si řekla, no to nepotřebujeme. (…)' [Speaker 1] 'Pardon, já se ptám, proč vlastně nepotřebujete vy to máte vlastně teďka? Už máte proces, který vám funguje? To znamená, že byste jako nedává to smysl pro vás, protože.' [Speaker 2] 'finančně se nám to vůbec nevyplatí tím, že prostě máme, nehledáme takový velký počet lidí, abysme potřebovali seplatit tu agenturu a vlastně i je fakt asi nevím, jestli čím to může být, ale myslím si, že fakt je pro nás důležitý ten kontakt s tím rekruterem, který už ten uplifting fakt jako zná a fakt Ten nablufting je fakt hodně specifický, takže asi i kvůli tomu, že je jednodušší pro nás, abychom to dělali my.'", "summary": "Mockup feedback #2: WTP ZÁPORNÝ. “Finančně se nevyplatí.” 3 reasons: (1) low volume, (2) Applifting specificity, (3) frame “agentura” = blocker (CoolPeople trauma).", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hvopwbOgQTr3uXJGMe8gs", "video_clip": "[video highlight_clip_advaLd.mp4 00:00.5-01:02.9]", "tags": {"Default group": ["Existing solutions", "Pain points"], "Hypotézy": ["H10", "H12", "H6", "H8"], "Perspektiva": ["In-house TA"], "Verdict": ["Kill"], "Intenzita": ["Velmi silně"]}}, {"id": "4fvKVllv1Rd7JU7daGgR", "text": "[Speaker 2] 'Nedokážu říct vůbec, protože já jsem ani jako, my jsme nikdy nedošli vlastně někam, že bychom už byli u nějakého fakt jednání i o ceně, protože prostě dává za nás jako smysl. Ale řekla bych, že to bude drahý, se myslím (…) v tom koupíbu, tak tam to fungovalo na vlastně nějakých jako provizí, nebo pronájmu toho člověka, kdy vlastně nějaká část jeho, toho jeho MD, rejty vlastně neníšla i v té firmě (…) tady u toho vlastně ten design, tak na mě působí, že to je víc takový férovější možná. (…) možná ta růžová a příjemná.'", "summary": "Aneta nemá price reference. Default: “drahé” bez specifické cifry. Pricing anchored ke CoolPeople (commission/MD rate). “Férovější” pocit driven aestheticky.", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hyH24PupmB9F1JwotofzL", "video_clip": "[video highlight_clip_4fvKVl.mp4 00:01.0-00:30.4]", "tags": {"Hypotézy": ["H10", "H12", "H6"], "Perspektiva": ["In-house TA"], "Default group": ["Industry insights"], "Verdict": ["Unknown"], "Intenzita": ["Velmi silně"]}}, {"id": "PYxbMwW7wLQsIJUGjxvc", "text": "[Speaker 2] 'Asi možná to, že se občas ti lidi jako neumí právě prodat, hlavně ženy. Všeobecně v pozicích mi to tak přijde. (…) tam myslím, že už nestačí prostě jenom ty technický skilly, ale je nutný fakt i ta komunikace vlastně díky i nástupu toho AI, protože vlastně ta lidskost je to jediné, co nás teď bude asi živit. (…) ženy všeobecně, když se jich ptám, jak vlastně na nějakým levelu plus minus tak cítějí, třeba z nějakého jako judora, medora, seniora, tak vlastně si většinou řeknou nižší tu senioritu, než ve skutečnosti mají a naopak muži si řeknou většinou vyšší, než mají.'", "summary": "Co je nejvíc rozbité podle Anety: sebeprezentace, hlavně u žen. Ženy podhodnocují, muži nadhodnocují senioritu. “Lidskost je to jediné, co nás teď bude živit.”", "session": "P11", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hgnkgIw6vZaUybiDhqBmj", "video_clip": "[video highlight_clip_PYxbMw.mp4 00:00.7-00:29.6]", "tags": {"Hypotézy": ["H7"], "Perspektiva": ["In-house TA"], "Default group": ["Industry insights", "Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "9aZxO83YDFNTgniwSZrT", "text": "[Speaker 2] 'No, záleží, jak definujeme design. Já jsem pracovala vlastně jako Scrum Master a tam jako hodně jsme řešily pořád takové ty produktové věci, právě aby ti produkťáci a ti vývojáři nevyvíjeli něco, co nikdo nechce, ale aby právě vždycky na začátku se udělalo to discovery a UX návrh a všechny tyhle věci. Jsem jako spíš teoreticky, protože jsem neměla moc frontendových týmů na starosti, ale vždycky jsem tam někde nějaký jako povědomí nebo už další dobu měla.' [Speaker 2] 'A právě když jsem se rozhodla, že už bych chtěla změnu, tak mě právě ten discovery a UX hodně lákalo, protože jsem viděla, jak to v těch týmech žalostně chybí. Takže v roce 2023 na jaře jsem si udělala UX kurz od Czechitas. A tam bych možná mohla nějak datovat nějaký úplně oficiální začátek. Předtím to byly takové jako předzvuky možná. A opravdu tam jsme se učili Double Diamond a potom jsem vlastně hledala práci jakožto výzkumník. A měla jsem i stáž a v tom se pohybovalo vlastně v té praktické rovině rok. Přesně rok a měsíc asi.'", "summary": "Career switcher z 12 let vývoje (Scrum Master). Trigger ke změně: chybějící discovery v týmech.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hAlJVR25gZQQHycWcV1KI", "video_clip": "[video highlight_clip_9aZxO8.mp4 00:00.8-01:23.4]", "tags": {"Hypotézy": ["H3"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "DcKfzAldeIG2lgnA8TKz", "text": "[Speaker 2] 'Já jsem asi hodně drivovaná smyslem, co se týče nějaké motivace. Takže mě právě nedával smysl dělat něco, co nikdo nechce. Tak mě to asi tak trochu vadilo v těch týmech občas, v těch vývojových. A nějak jsem cítila potenciál, že mám nějaký talent, protože tam jsem taky pořád jako Scrum Master se na něco ptala, na nějaké potřeby. A pořád jsme řešili nějaké problémy. Takže asi nějak tak přirozeně jsem k tomu doiterovala. A musím říct, že mě to baví asi čím dál víc, jak do toho čím dál víc pronikám. Že já studuju i vysokou školu na KISK — design informačních služeb. Takže v práci jsem jako vyloženě hodně do výzkumu, ale pořád se snažím šátrat i do toho designu a nějak jako to všechno možné okolo. Nejenom odevzdat ten výzkum, ale potom třeba pomoct klientovi s tou prioritizací, nebo s nějakou ideací. Moc mě teda nebaví klikání ve Figmě, ale to doufám, že teďkon ovládnu nějak víc AI a budu schopná prototypovat spíš formou AI. A co mě baví? Pořád objevovat to nové, ten kontakt s těma lidma a dělat opravdu něco, co dává ten smysl — v tom slova smyslu, že to někdo fakt chce.'", "summary": "Motivace smyslem. Plánuje AI jako workaround pro slabou Figmu — buduje skilly paralelně.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h2orrxf3HbqBNGPrz9IlK", "video_clip": "[video highlight_clip_DcKfzA.mp4 00:00.9-01:33.9]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Kandidát"], "Default group": ["Motivátory & Bariéry"], "Intenzita": ["Neutrálně"]}}, {"id": "NWA3kvHbUpWKWkTTcbSR", "text": "[Speaker 2] 'Že já studuju i vysokou školu na KISK — design informačních služeb. Takže v práci jsem jako vyloženě hodně do výzkumu, ale pořád se snažím šátrat i do toho designu a nějak jako to všechno možné okolo'", "summary": "Studentka KISK –> i v práci orientovaná na výzkum; vhled do designu", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h5DCMa0nsSR0ge9AsMvIJ", "video_clip": "[video highlight_clip_NWA3kv.mp4 00:01.7-00:15.5]", "tags": {"Default group": ["Background"]}}, {"id": "uE1ljaCBsmqQMpWmtoCg", "text": "[Speaker 2] 'Já jsem asi člověk, spíš co radši jako komunikuje, než že bych seděla u toho počítače. Tak proto ta Figma mě trošičku jako je trnem v oku, ale jinak jako proti ní nic nemám. A nebaví momentálně řeším to, jak jako zrychlit takové to, když máte udělané ty rozhovory a teď potřebujete to z toho nějak dát do nějaké vizuální podoby. Ručně přepisovat to máme samozřejmě taky přepsané na nějakou AI, ty rozhovory, ale taková ta fáze, než se z toho něco začne líhnout z těch dat — tak já mám ráda, když už se z toho něco líhne a když už můžu jako přemýšlet nad tím, co tam vidíme, než jako takové to trochu rutinní snažit se zachytit tam spoustu věcí a ještě úplně nevíme, co z toho bude, ale radši to tam budeme mít. A zabírá to strašně moc času. Ale opravdu se to jako vyplatí mít tam i něco, co třeba na první pohled nevypadá užitečně, ale pak třeba úplně na konci zjistíme — aha, vlastně jo, tohle dává smysl, ještěž to tady máme. A možná ještě, kdybych musela dělat jako nějak hodně nějakého research ops, to by mě asi taky jako ve velké míře nebavilo — pořád odtelefonovávat nějaké lidi a organizovat ty respondenty. To naštěstí nemusím dělat.'", "summary": "Pain v analytické fázi výzkumu — čas mezi sběrem dat a prvními insighty.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h5BGGDFALVScdnU5cAsVt", "video_clip": "[video highlight_clip_uE1lja.mp4 00:00.1-01:30.7]", "tags": {"Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "QXQlBEaJuGh9KzA7FBNA", "text": "[Speaker 2] 'Tak já jsem vlastně začala chodit na UX Monday od asociace, tam prostě párkrát do roka tam zajdu, ne určitě ne každé první pondělí v měsíci, to určitě ne.' [Speaker 2] 'A ta škola je docela dobrý updater, tam máme dost fresh info o tom, co se kde šustne v oboru, řekla bych. A přemýšlím ještě, jestli něco teďka nesleduju. No, tak koukám asi na LinkedIn. A právě takové ty události, co mi chodí z Meetupu, mám teďka i tu asociaci interakčního designu, mám pocit, že taky ještě posílá nějaké eventy. Tak jsem tam prostě zašla na nějaký event, studuju tu školu a něco tam vidím asi na LinkedIn, bych řekla.'", "summary": "Komunitní kanály switchera: KISK > UX Monday > LinkedIn. Škola jako vstup do komunity.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hyDFfrcoJHrsRCdCyQELo", "video_clip": "[video highlight_clip_QXQlBE.mp4 00:01.9-00:54.8]", "tags": {"Hypotézy": ["Emergent"], "Default group": ["Existing solutions"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"]}}, {"id": "n73y9NJbZBYf7XDnhb5c", "text": "[Speaker 2] 'Já jsem určitě chtěla vlastně udělat tu kariérní změnu. Vlastně já jsem předtím pracovala v České televizi, tam je normálně regulérní vývoj, vývojové oddělení, ICT v podstatě, digitální služby a právě plno UXáků, researcherů a tak. Ale tam nebyl prostor. Prostě se furt škrtalo a furt se hledali jenom nějací senioři, takže tam jsem zjistila, že mi teda pšenka nepokvete. Takže jsem věděla, že prostě musím skončit. Tak jsem skončila v České televizi a dala jsem si myslím měsíc volno. A teď jsem jako přemýšlela, jak se teda do toho UX dostat. Takže jsem věděla o tom, že existuje ta vysoká škola, tak jsem se přihlásila někdy v tom únoru minulý rok na to studium. A při té příležitosti jsem si všimla, že oni kromě bakalářského studia mají ještě celoživotní kurzy. A tam jsem objevila kvalitativní výzkum. Tak jsem si říkala, jo to je super, tak jsem se přihlásila a to jsem vlastně potom od března do června loňského roku pracovala na takovém výzkumném projektu pro Stride XL. Se mi podařilo oslovit brněnskou agenturu UXovou Stride XL. A oni mi dali prostě nějaký svůj tak trochu jako hobby projekt, abych jim ho zpracovala, protože jsem ho zpracovala zadarmo, tak to asi znělo docela lákavě. Takže vlastně tam jsem dostala úplně jako reálnou praxi a dokonce takhle i pro reálného zadavatele. No a pak zrovna nějak v květnu asi loňského roku objevila jsem, myslím, že to bylo taky na LinkedIn, nebo možná jsem sama koukla na stránky DIA — digitální informační agentury. A oni tam zrovna hledali researchera a brali i juniory. Tak jsem se tam přihlásila a vyšlo to v podstatě.' [Speaker 2] 'A zkoušela jsem samozřejmě i někam jinam. Já jsem nebyla úplně vyhraněná, že bych chtěla dělat jenom UX research. Zkoušela jsem i UX designéry, ale tam jsem asi neměla dostatečnou praxi, nějakou tu vizuální. Tam úplně nic nevyšlo. A nevycházely mi ani žádné stáže. Všude mě vlastně odmítali. Takže to bylo takový trochu zoufalý chvílema, ale vlastně potom, když se objevila nějaká pozice, která mi fakt přišla, že sedí na ten můj profil, tak to nakonec vyšlo. Celý to nakonec trvalo asi čtyři měsíce, takže to zase nebylo tak hrozně dlouhá doba na to, že to byla ta kariérní změna. A ne možná v úplně lehké době. Takže nakonec docela fajn.'", "summary": "Switching journey 4 měsíce: ČT (jen senioři) → KISK → stáž zdarma → DIA. Pattern: neplacená práce = jediná cesta k referenci.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hWdHXKUdhyLPYGWdUTAt6", "video_clip": "[video highlight_clip_n73y9N.mp4 00:00.2-03:14.1]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H3"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points", "Workarounds", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "2IvGJil92i1kJsGvyoWR", "text": "[Speaker 2] 'Já jsem nebyla úplně vyhraněná, že bych chtěla dělat jenom UX research. Zkoušela jsem i UX designéry, ale tam jsem asi neměla dostatečnou praxi, nějakou tu vizuální. Tam úplně nic nevyšlo. A nevycházely mi ani žádné stáže. Všude mě vlastně odmítali. Takže to bylo takový trochu zoufalý chvílema, ale vlastně potom, když se objevila nějaká pozice, která mi fakt přišla, že sedí na ten můj profil, tak to nakonec vyšlo. Celý to nakonec trvalo asi čtyři měsíce, takže to zase nebylo tak hrozně dlouhá doba na to, že to byla ta kariérní změna'", "summary": "Career switch: 4 měsíční proces -> přes studium a neplacenou stáž po získání první placené role ve státní správě.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hRd1L9kyDNFUW7oadA0lO", "video_clip": "[video highlight_clip_2IvGJi.mp4 00:01.6-00:58.0]", "tags": {"Emoce": ["Frustrace/zklamání"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"]}}, {"id": "xj8CKbcJvKuScrBytRvR", "text": "[Speaker 2] 'Přihlásila jsem se, myslím, že jsem napsala i nějaký motivační dopis. Přihlásila jsem se a oni mě pozvali.' [Speaker 1] 'Takže bylo nějaký portfolio, nebo něco jste tam dělala ty projekty, který jste?' [Speaker 2] 'Já mám normálně v CVčku i na LinkedIn ty — tehdy jsem měla teda hlavně ten výzkum, ale to jsem vlastně ještě ani neměla ten výzkum. To bylo zajímavý vlastně — já jsem tehdy, a to bylo ještě v květnu, já jsem ještě úplně neměla hotové ani ty výstupy z toho výzkumu, ale měla jsem tu stáž na tom LinkedIn. Takže jsem měla v tom CVčku tu stáž pro tu Stride XL. No, tak to si myslím, že mohlo být docela rozhodující. A jinak ten pohovor — vůbec nic speciálního na něm jako by nebylo. Pozvali mě na pohovor a tam mi hodně spíš vysvětlovali, jak oni fungují a zeptali se mě, jakou mám zkušenost s výzkumem. Tak jsem jim řekla, že teda tady z tohohle výzkumu. A oni mi řekli: “No, mysleli jsme si, že máte víc zkušeností.” Tak už jsem se trošku v duchu křižovala, že Pane Bože, zase. Ale pak mě stejně jako vzali.'", "summary": "Stáž na LinkedIn = trust signal i bez výstupů. Trh měří roky, ne dovednosti.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hmS49lsWrTBfOl5y87scP", "video_clip": "[video highlight_clip_xj8CKb.mp4 00:01.2-01:18.0]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H3"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points", "Trust signals"], "Intenzita": ["Silně"]}}, {"id": "LuCCaXrN0dngWK2FQQlq", "text": "[Speaker 2] 'No právě, že mě to přišlo hrozně zvláštní, že skoro nic. Já jsem měla z toho pocit, že vlastně se oni o mě nic nedozvěděli, že já jsem se o nich dozvěděla víc, než oni o mě. Takže oni fakt jako hodně vysvětlovali, abych to vysvětlila — totiž digitální informační agentura je vlastně úřad, tudíž tabulkové platy, takže oni jsou jako rádi, že se jim tam vůbec někdo hlásí, to popravdě. Takže oni moc neřeší, si myslím, nebo nemůžou si moc vybírat v podstatě. Což teda mě hrálo do karet, protože já jsem jako se svojí ne úplně rozsáhlou praxí si taky úplně nemohla vybírat. Takže to tak jako oboustranně zapadlo tady z tohohle pohledu. Oni pořád mi jako vysvětlovali, co teda tam dělají — mají tam vlastně i UXáky, nejenom UX researchery. Jak oni hájí ty zájmy těch úřadů, jak jsou taková odborná podpora pro ty jednotlivé úřady. Protože my třeba kontrolujeme práci dodavatelů, co dodávají — ať už třeba nějaké Figma prototypy, co dodávají ty externí firmy, co vyhrají ty veřejné soutěže. Tak my to třeba uživatelsky testujeme, nebo naši UXáci na to dávají nějaký feedback, jestli to splňuje design systém a tak. Takže my jsme na straně toho úřadu. A oni mi to takhle vysvětlovali, co vlastně všecko dělají. '", "summary": "Bez selekčního tlaku (státní úřad) firma nehodnotí — strávila pohovor vysvětlováním sebe.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hw0n4Y89ZcUAHXzloV08g", "video_clip": "[video highlight_clip_LuCCaX.mp4 00:01.9-02:02.3]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "DUOT5Zude1oZDF4z6GKZ", "text": "[Speaker 2] 'Já jsem měla z toho pocit, že vlastně se oni o mě nic nedozvěděli, že já jsem se o nich dozvěděla víc, než oni o mě. Takže oni fakt jako hodně vysvětlovali, abych to vysvětlila — totiž digitální informační agentura je vlastně úřad, tudíž tabulkové platy, takže oni jsou jako rádi, že se jim tam vůbec někdo hlásí, to popravdě. Takže oni moc neřeší, si myslím, nebo nemůžou si moc vybírat v podstatě. Což teda mě hrálo do karet, protože já jsem jako se svojí ne úplně rozsáhlou praxí si taky úplně nemohla vybírat.'", "summary": "Pohovor na juniorní pozici nesloužil k prověření dovedností kandidátky („skoro nic se o mně nedozvěděli“)", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hDbuDlH03aDu7p8OD3iNv", "video_clip": "[video highlight_clip_DUOT5Z.mp4 00:01.0-00:34.2]", "tags": {"Hypotézy": ["H3"], "Default group": ["Industry insights"], "Perspektiva": ["Kandidát"], "Emoce": ["Překvapení"]}}, {"id": "T9Qz6eJfDofkLuGNOPzE", "text": "[Speaker 2] 'A mě se fakt skoro na nic neptali. Já jsem měla pocit, že odcházím a říkám si tak jako dobrý, ale oni se o mě vůbec nic nedozvěděli. Jediné, co je hrozně zajímalo, jestli jako s tím platem je to OK — protože oni mají normálně ty tabulkové platy'", "summary": "Případovku nechtěli vidět, 12 let přenositelných zkušeností nula. HR trik s “dalším kandidátem”.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/huYT1uObVwhF5puJZsSqB", "video_clip": "[video highlight_clip_T9Qz6e.mp4 00:00.5-00:27.6]", "tags": {"Hypotézy": ["H1", "H3"], "Default group": ["Industry insights", "Motivátory & Bariéry"], "Perspektiva": ["Kandidát"], "Emoce": ["Nejistota"]}}, {"id": "F8JiVK1ygqkk52pMsSew", "text": "[Speaker 2] 'A mě se fakt skoro na nic neptali. Já jsem měla pocit, že odcházím a říkám si tak jako dobrý, ale oni se o mě vůbec nic nedozvěděli. Jediné, co je hrozně zajímalo, jestli jako s tím platem je to OK — protože oni mají normálně ty tabulkové platy, to si může každý najít na internetu, tam měli vyloženě to rozmezí. Takže vlastně to asi bylo tak jako celý. A řekli mi, že si mysleli, že mám víc zkušeností. To jsem pochopila — aha, tak to, že jsem dělala 12 let ve vývoji s vývojáři, tak to tady asi nikoho nezajímá. Prostě, že v této oblasti mám jako jediná z našeho týmu nějakou zkušenost, že prostě vím, jak funguje ten vývoj — a to tady se to asi neprodá. A ještě mi říkali, že mají ještě dalšího kandidáta. A to jsem si říkala: no do prčic, tak doufám, že nebude mít víc zkušeností než já. Ale pak jsem se dozvěděla, že to asi byl jenom takový trik našeho šprýmovního pana HRisty. Já jsem myslím měla prezentaci — normálně odkaz na prezentaci v tom CVčku i na tom LinkedIn — a vůbec nic nechtěli vidět, vysvětlit, jak jsem postupovala, nic prostě. Jednou jsem jim popsala, že jsem dělala výzkum, zkoumala jsem tohle, bylo tam asi 10 respondentů. Vyloženě stručně nějaký popis, že jsem dělala ty činnosti v tom výzkumu, který oni taky dělají, a že mám tuhle jednu zkušenost.' [Speaker 2] 'A ještě jsem se snažila prodat svoji praxi testera, protože jsem dělala — ještě než jsem dělala Scrum Master — softwarového testera, což má jako zase docela blízko k nějakému feedbacku na nějaké digitální služby. Je to trošku jiný pohled samozřejmě, ale je to taky pohled jako by uživatele na nějaký digitální produkt a kontrola toho, jestli je všecko OK. Tak to si pamatuju, že jsem jim říkala o tom testerovi, ale říkám — ten Scrum Master je vůbec nezajímal, vůbec se neptali, co jsem dělala. Takže já jsem z toho byla vlastně trošku rozpačitá, že se nic nedozvěděli.'", "summary": "Ignor náboráře skills i portfolia: Pohovor ukázal tři zásadní chyby v hodnocení: firma nechtěla vidět kandidátky prezentaci, ignor přenositelných zkušeností z 12 let ve vývoji (Scrum Master, softwarový tester) a místo zkoumání dovedností použila levný HR trik o „dalším kandidátovi", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hm8nVXqIDv33HqTnNpm8m", "video_clip": "[video highlight_clip_F8JiVK.mp4 00:00.5-02:42.7]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H3"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "fVbn69qynwylXxNd83ff", "text": "[Speaker 2] 'No hladce to ani nešlo. Když mi řekli “mysleli jsme si, že máte víc zkušeností,” tak to jako moc — to mi v tu chvíli hodně zatrnulo v podstatě. Říkám, kurník, jestli ani tohle nevyjde, tak já už nevím. Takže to mě trošku — ještě tam přesně psali, že dáváme šanci juniorům. Tak jsem si říkala: no tak sakra, tak máte tam, že dáváte šanci juniorům a teď mi tady tvrdíte, že byste chtěla, abych měla víc praxe. No ale zase na tu druhou stranu říkali: no tak nedávno jsme nabrali taky juniora a funguje to docela dobře. Tak vypadali, že jsou takový, že se tomu úplně nebrání těm méně zkušenostem ve skutečnosti. Ale jinak nic těžkého nebylo, jenom prostě tohle, že jsem se bála, že mě odmítnou.' [Speaker 2] 'A taky jsem se bála — bylo důležité, abychom si jako nějak sedli, tak jsem u toho mého vlastně nadřízeného si vůbec nebyla jistá, spíš jsem neměla pocit, že bych mu nějak sedla. Takže z toho jsem měla možná trochu ještě strach, že možná jim jako nějak nezapadnu charakterově nebo nastavením.'", "summary": "Rozpor mezi inzerátem (“šance juniorům”) a realitou (“víc zkušeností”). Zoufalství switcherky.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hwKUsiItznjTa3XEv7exO", "video_clip": "[video highlight_clip_fVbn69.mp4 00:00.9-01:03.2]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H3"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "3u1er85Pcu8737ALAaxw", "text": "[Speaker 2] 'No, tak tam jsem neměla žádný zkušenosti kromě těch Czechitas. Tam jsme teda zpracovávali Czechitas i prototyp právě v té Figmě a od té doby vím, že ta Figma není úplně můj kámoš. Ale tam se mě neptali vůbec na nic, tam mi představili nějaké tři možnosti, co bych mohla zpracovávat a ať si vyberu. Jo, a oni vyloženě to nechali na mě, ať si vyberu mezi třema nějakýma jako tématy. A byli rádi, že prostě jim někdo udělal výzkum zadarmo a pod dohledem odborníků z Masarykovy univerzity, takže tam jako nebylo žádné prokazování dovedností.'", "summary": "Stáž zdarma = workaround. Akademický dohled nahrazuje hodnocení dovedností.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hvqmvMZIhuNwru1nQdFLy", "video_clip": "[video highlight_clip_3u1er8.mp4 00:00.9-00:40.4]", "tags": {"Hypotézy": ["H3"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"], "Default group": ["Trust signals", "Workarounds"]}}, {"id": "3iV2TuZk4CHQrNzqgyAY", "text": "[Speaker 2] 'Tam nic nebylo, podle mě neumí si úplně proklepnout ty lidi, nebo možná ani nemají motivaci — jsou rádi, že jim to někdo veme za ty peníze. To je jako moje interpretace. '", "summary": "Přímá interpretace pocitu z náboru: “Neumí si proklepnout ty lidi, nebo možná ani nemají motivaci.” A klíčové: “Jsou rádi, že jim to někdo vezme za ty peníze.” — firma s tabulkovými platy si nemůže vybírat, proto ani neinvestuje do hodnocení. Validuje H1 z opačné strany: kde není selekční tlak, není ani hodnotící proces.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hlN3bgiBHekZvT36l7oi8", "video_clip": "[video highlight_clip_3iV2Tu.mp4 00:00.5-00:13.4]", "tags": {"Hypotézy": ["H1"], "Default group": ["Industry insights"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "JmyfT1W1J9CstyWJlxI1", "text": "[Speaker 2] 'No, tak vlastně hlásila jsem se do Loona, nevím, jestli znáte — taková ta neziskovka, co řeší prevenci zdravotní. A oni vlastně chtěli rozvíjet tu svoji aplikaci Preventivka, která nějak teda vznikla během covidu a nějak Česko.digital — dobrovolníci z Česko.digital se na tom hodně podíleli na vývoji aplikace. A oni hledají produkťáka na tuhletu aplikaci, to bylo někdy úplně na začátku roku loni, kolem toho února, asi možná v lednu už to začalo. Tak tam mi zadali docela, řekla bych, těžkou případovku. Ale nějak jsem asi po týdnu trochu stresování a radění se se všema možnýma lidma, co znám — produkťáky a konzultacemi s AI — tak jsem nějak se tím úkolem prokousala a myslím, že to dopadlo velmi dobře na to, že jsem to v životě nedělala. A vlastně ta případovka se jim líbila ze všech nejvíc. Pozvali mě na pohovor a pak vybrali nějakou holku, co už tam měli, protože už jí znali. A ještě navíc s tou appkou to nějak nedopadlo — ona jim tam dělala, oni mají ještě nějaké ty školící produkty a oni potřebovali vlastně hlavně někoho na ty školící produkty. A ta holčina už to dělala. A hlavně jim padlo úplně nějaké financování, se kterým počítali právě na tu aplikaci, takže ta aplikace pravděpodobně nějak zamrzla. Takže mě nevzali, ale jako na tu případovku jsem byla jako pyšná. Mám ji kdyžtak taky na LinkedIn — je tam i zadání. Bylo to něco ve smyslu vymyslet monetizační model pro tu aplikaci, která prostě zatím nikdo za ní neplatil, byla zdarma — a jak to udělat, aby za to někdo platil.'", "summary": "Tam, kde není selekční tlak, není ani hodnotící proces (DIA jako příklad).", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hDytPGcv4O7c0vjnLTPoB", "video_clip": "[video highlight_clip_JmyfT1.mp4 00:01.7-01:27.4]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H3"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "Jfu7fej3361E6MsLkf3c", "text": "Pozvali mě na pohovor a pak vybrali nějakou holku, co už tam měli, protože už jí znali. A ještě navíc s tou appkou to nějak nedopadlo — ona jim tam dělala, oni mají ještě nějaké ty školící produkty a oni potřebovali vlastně hlavně někoho na ty školící produkty. A ta holčina už to dělala. A hlavně jim padlo úplně nějaké financování, se kterým počítali právě na tu aplikaci, takže ta aplikace pravděpodobně nějak zamrzla.", "summary": "Případovka nejlepší ze všech — vzali interní známou. Kvalita práce nerozhoduje.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hewRfMi4u6ahiGDOPddlp", "video_clip": "[video highlight_clip_Jfu7fe.mp4 00:00.4-00:17.4]", "tags": {"Perspektiva": ["Kandidát"], "Default group": ["Motivátory & Bariéry", "Pain points"]}}, {"id": "zcQet85DOoqhWuEBX3wB", "text": "[Speaker 2] 'Byl tam potom pohovor, já jsem odevzdala tu případovku a pak byl ještě pohovor. Ten si bohužel jako úplně nepamatuju, vím, že byl hrozně divnej, že mi to vůbec nesedlo. Bylo to online — mně online rozhovory strašně nesedí, protože teďkon mi to je v pohodě, protože já se tady neucházím o žádnou práci, ale když se ucházím o tu práci, tak mě strašně chybí tam ta mezilidská interakce a nějaký reagování. Ještě jak je člověk nervózní — já fakt nemám úplně jako dobrou zkušenost, moc mi to nesedí v podstatě. Takže to bylo online, já vím, že jsem byla děsně nervózní, protože jsem měla strašný strach, že zase budu moc juniorní, protože jsem to v životě nedělala. A oni mi pak nakonec dali asi feedback, že vlastně jsem možná moc seniorní — tak já nevím, nebo že prostě pak vzali nějakou ještě juniornější holčinu, kterou teda už znali.' [Speaker 1] 'Mě by jako zajímalo spíš jak jako já pak dál to hodnocení a na základě jakejch kritérií oni jako posuzovali, že jste a nebo nejste juniorní nebo seniorní, že to bylo jako, nebo jste tam vlastně odprezentovala? Předpokládám tu tu vaší.' [Speaker 2] 'Já jsem ani neprezentovala, to bylo na tom to vtipný — oni ani prostě skoro nic z té případovky zas nechtěli vědět. Něco se mě tam ptali možná z té případovky, ale zase taky mi to přišlo jako marginálie, ze kterých nemohli nic poznat. Asi to nebyl úplně ukázkový pohovor, bych řekla. Mám pocit, že kladli otázky, které moc nedávaly smysl, a že tam bylo fakt cítit, že nejsme sladění nějak jako myšlenkově — já nechápu, proč se mě na to ptají, tak nevím, jak na to mám odpovědět. Prostě nesedlo to — nesedlo to jako chemicky. Celý mi to nedávalo smysl.'", "summary": "Online pohovor + neresearchovaná případovka + nesladěné otázky = mismatch bez šance.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hoCS87gcD67nG9KLCJufJ", "video_clip": "[video highlight_clip_zcQet8.mp4 00:01.9-02:50.9]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "m5CJJXSe87dJ1LlI3DNE", "text": "[Speaker 2] 'Pak tam byla ještě jedna taková výraznější a to byl teda CX specialista do jedné taky agentury, která dělala mimo jiné pro O2, pro Direct pojišťovnu nějaké customer experience projekty. A ty měly taky zajímavou teda případovku — tam jsem zase měla vymyslet novou propozici pro předplacené karty mobilního operátora. Jakože nový tarif vlastně. Takže jsem zase hlavně s pomocí AI zkoumala, jak vůbec dneska fungují ty předplacené karty — když já už mám 20 let paušál, takže jsem prostě musela prozkoumat, co to vůbec je, jak to dneska funguje, kdo to vůbec používá. Říkala jsem si, to snad nikdo nepoužívá. No pak jsem tu cílovku pochopila — i s nějakýma kamarádama jsem se bavila, co mají třeba malé děti, protože vím, že děckám se právě dávají tyhle ty předplacené karty, aby neprovolaly moc peněz. Takže vím, že jsem měla asi tři rozhovory s nějakýma lidma a tak jsem skládala ten celý background toho problému. A dokonce jsem byla na mentoringu s jednou ženou, co se tím zabývá, protože to byl pro mě fakt trochu oříšek, jak to dát dohromady. Ale zase myslím, že ten výsledek byl skvělý. Potom jsem to prezentovala v angličtině — musela jsem udělat prezentaci, tím jsem měla dokázat, že vůbec umím třeba používat PowerPoint, a musela jsem jim to v angličtině odprezentovat. A předtím teda ještě, než mi dali tu případovku, tak byl pohovor — a tam se mě docela proklepli, to teda zase si myslím, že docela jo.'", "summary": "Strukturovanější proces (CV → pohovor → případovka → AJ prezentace). Kandidát aplikuje výzkum i na případovku.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hwBUdF4ZfEVS1tBUNZ2hf", "video_clip": "[video highlight_clip_m5CJJX.mp4 00:01.4-02:01.7]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Pozitivní příklady", "Workflow / Chování"]}}, {"id": "QQ6Oe20vCYRfd9cewBdP", "text": "[Speaker 2] 'A předtím teda ještě, než mi dali tu případovku, tak byl pohovor — a tam se mě docela proklepli, to teda zase si myslím, že docela jo.'", "summary": "Strukturovaný assessment: logicky seřazený proces -> pohovor, případovka,prezentace řešení v angličtině", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h9YxDlF0qlNiIu2fZ1xRE", "video_clip": "[video highlight_clip_QQ6Oe2.mp4 00:00.4-00:09.7]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady"]}}, {"id": "G17iU2P4oQYJJAgP5vb8", "text": "[Speaker 2] 'Ten první pohovor byl osobně, což bylo super, to mě sedí. A pak byla ta případovka a pak jsem za nima došla zase osobně na tu prezentaci. Byli tam — byla tam majitelka té firmy, protože to byla firma asi o osmi lidech a všichni dělali na IČO. A ona prostě byla majitelka asi třeba deset let, ta firma byla na trhu. A byly tam dva konzultanti — majitelka a dva konzultanti. A hodně teda to vedla ta majitelka, ptala se mě, proč třeba odcházím z té předchozí práce. A to vím, že to mě docela fakt proklepla, protože já jsem byla fakt z té práce docela vyhořelá. Já jsem tam tehdy řekla něco ve smyslu, že jakmile mi to přestane dávat smysl, tak prostě mi to přestane dávat smysl. A ona — já mám pocit, že se potom bála, že jí tam z nějakých důvodů nevydržím.'", "summary": "Upřímnost o vyhoření se obrátila proti ní — majitelka se bála, že nevydrží.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hc9S6bvNyU4Z1HAWbkNXD", "video_clip": "[video highlight_clip_G17iU2.mp4 00:01.0-00:32.1]", "tags": {"Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "sQIZ8z6ZIXzQAOIRl1iJ", "text": "[Speaker 2] 'Jo, a ještě to bylo zajímavý — tím se teda asi nevím, jestli úplně inspirujete, asi ne, ale spíš je to taková kuriozita z natáčení. Ona měla ráda numerologii, nebo takovou — jak je taková ta mřížka, jak jsou takový ty devět číslíček. Tak se mě ptala na datum narození, mi tam vysázela do té mřížky ty čísla a začala mi tam jako číst z té numerologické mřížky, nebo co to je, nějaký moje charakteristiky. Tak mi to přišlo vtipný, ale zpětně jsem si říkala, ty bláho, co to bylo. Přišlo mi to hodně zvláštní. Říkala jsem si, no, já nevím teda, jestli je to vlastně dobrý nápad. Ale ona hlavně — mi přišlo, že ona se mě vlastně na základě toho nějak zaškatulkovala, aniž by vůbec mě znala. A mě to vyděsilo v tom slova smyslu — ale já se tam třeba nevidím v některých těch věcech. A jestli ona je o tom přesvědčená, že tomu věří, že takhle ty lidi jsou podle té mřížky, no tak to jsem v háji. Ona tam na mě — něco ve smyslu — něco tam sedělo, ale vím, že hodně jí tam vyšlo nějaká preciznost a neschopnost pracovat v nejistotě nebo něco takovýho. A vlastně na tohle mě vlastně potom jako nevzali — že pro ně to je důležité. A oni opravdu žili trochu v chaosu, to jsem teda pochopila. Měli tam třeba nějaký board s lístečkama a já jsem se ptala, no jaký to má smysl, byly různý barvičky — a co znamená která barva? No prostě chaos to byl. Takže možná ta mřížka nebyla úplně nesprávná. Takže to byla mřížka.'", "summary": "Numerologie jako hodnotící nástroj. V absenci frameworku sáhne firma po čemkoli.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hMwW8wUdYyzzMJC3g2i9w", "video_clip": "[video highlight_clip_sQIZ8z.mp4 00:00.3-01:49.5]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"], "Emoce": ["Vztek/rozčílení"]}}, {"id": "cw3xvRYPggAqa9SlIYac", "text": "[Speaker 2] 'A vím, že se hodně ptali právě na ty zkušenosti — proč jsem odešla, co jsem tam dělala. Tak jsem popisovala tu roli toho Scrum Mastera, co byla vlastně ta moje náplň a proč vlastně chci dělat toho CX konzultanta. Pamatuju si, že jsem tam vyprávěla něco ve smyslu, že vidím záchytné body společné v té roli toho Scrum Mastera a toho CX specialisty — že jsem se furt hodně viděla v té dotazovací roli a zjišťování těch potřeb a potom nějak to vizualizovat a prodat těm lidem. Takže jsem se tam snažila na tu svoji předchozí praxi nějak napasovat, co jsem si myslela, že oni dělají — oni jako šalamounsky mi to neřekli. Pamatuju si, že úplně snad někde na začátku se mě zeptali, jak té pozici vlastně rozumím, nebo co si představuju, že bych dělala. Tak jsem jim to popsala tak, jak jsem to pochopila z jejich inzerátu. A myslím si, že jsem se docela trefila, že oni, když mi to potom popisovali, tak jsem měla pocit, že to vlastně docela sedí.' [Speaker 2] 'A pak mi teda někdy až v druhé půlce třeba prozradili, co oni teda dělají, mi to vysvětlili. A upozorňovala mě ta majitelka i na nějaké specifika — že tam opravdu dokáže být stres, že musí ty věci zpracovávat rychle pro ty zákazníky. Věřím tomu, že oni byli docela malá agentura a hodně si jdou o čas a o cenu, že to může být její výhoda, že jsou levnější než větší agentury — takže to znamená udělat rychle, aby to nebylo drahé.'", "summary": "Self-awareness přenositelných dovedností × netransparentní očekávání firmy.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h3pgPN8Qt7PNhv6cbOP2U", "video_clip": "[video highlight_clip_cw3xvR.mp4 00:01.6-02:09.0]", "tags": {"Hypotézy": ["H3"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "OF0bVTV00rHWqUrOlDwd", "text": "[Speaker 2] 'Vím, že jsem měla pocit, že moc nečetli moje CV — ptali se mě, jestli se jako pořád stěhuju. Já přitom jsem žila v Brně asi sedmnáct let a oni nějak naznali, že se stěhuju. Jak na to přišli — jako mám tam třeba nějaká města, že jsem třeba mezi Prahou a Brnem občas jezdila, když jsem pracovala se Seznamem jako Scrum Master, protože jsem v Praze měla týmy, ale to ještě neznamená, že jsem bydlela v Praze. Vlastně jsem neměla úplně dobrý pocit tady z nějakých assumptions — to stejně s tou mřížkou, taky takové assumptions. OK, tak podle mřížky, aniž se mě zeptali, si udělali nějakou představu. Takže to byl jako — mě ten rozhovor bavil, já jsem byla motivovaná to zkusit, bylo to pro mě zajímavá práce. Ta náplň se mě líbila a já jsem velmi suverénně na konci toho rozhovoru řekla: tak myslím, že musím teď udělat několik věcí — přestěhovat se na Prahu 6, protože oni vyžadovali 100% v kanclu a byli na Praze 6. Jakože fakt se mi to líbilo, bylo to takový dynamický, hodně nový pro mě. Myslím si, že by to byla velká zkušenost. Líbilo se mi to.'", "summary": "Self-awareness přenositelných dovedností × netransparentní očekávání firmy.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hJdtUwiBFDZJ3Bb5jQ7J0", "video_clip": "[video highlight_clip_OF0bVT.mp4 00:00.9-01:09.5]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "E6uCMnWvBCJWdhAU2ARF", "text": "[Speaker 2] 'Už jsem vám řekla, že byli dost random. Vytáhli zase numerologickou mřížku. A pak mi ještě řekli, že si myslí, že neumím pracovat v nejistotě. A já jsem přemýšlela — jak na tohle zase přišli?'", "summary": "Druhý pohovor: znovu numerologie. Zamítnutí z numerologického závěru, ne z práce.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hFvK13BBCqxJj3mZl3QKw", "video_clip": "[video highlight_clip_E6uCMn.mp4 00:01.6-00:04.4]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"], "Emoce": ["Vztek/rozčílení"]}}, {"id": "3CE1JxJPPu2Mou1bNibx", "text": "[Speaker 2] 'Já jsem vlastně nedostala vůbec žádný feedback, opravdu. Ani z toho Loona, ani z tohohle vlastně. Žádný feedback. Takže já jsem byla vlastně docela, jako řeknu, docela naštvaná, protože jsem pak strávila strašně času s těma případovkama. Neříkám, že mě to nebavilo a hodně mě to naučilo — bylo to skvělá zkušenost. Dneska to mám v tom CVčku, nevím jestli to někdy k něčemu bylo dobrý. Ale nikdy mi nedali žádnou — jako já jsem do toho investovala spoustu energie a oni potom mě odpálkovali. Čau. A přece se jim to líbilo. Ale prostě — vlastně jsem nepochopila, v čem teda byl problém. Ani u jedné.'", "summary": "Dvě případovky, desítky hodin, nula feedbacku. Ani u juniorů, kde by byl nejpotřebnější.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hwlkBSqnyU9UxRJyu3a36", "video_clip": "[video highlight_clip_3CE1Jx.mp4 00:01.3-00:51.0]", "tags": {"Hypotézy": ["H2"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"], "Emoce": ["Vztek/rozčílení"]}}, {"id": "tIUQCKRIUVQx2lH0zZP9", "text": "[Speaker 2] 'U toho CX si myslím, že jsem se možná potom — protože jak jsem odprezentovala v angličtině ten svůj návrh — tak mi dali, vlastně jo, dali mi feedback, že si myslí, že ta jedna, jeden slide měl být jako ještě víc vepředu. A já jsem jim to odsouhlasila, že jo, takhle jsem nad tím uvažovala, ale pak jsem to z nějakého důvodu dala dozadu, ale jo, chápu co tím chcete říct. Dali mi feedback na to flow — jinak v tom nic neměli. Já si myslela, že se jim to líbilo. Jediné, co ještě říkali — já jsem tam trošku se snažila vyrobit nějaký model nejlevnější ceny na trhu a to bylo, mělo to být pro O2. A zrovna O2 nemá cenovou strategii být nejlevnější, oni jsou naopak nejdražší. Tak jak bych to odargumentovala klientovi. Tak jsem jim tam nějak vysvětlovala — měla jsem ten model celkem sofistikovaný — že to neznamená, že to bude nejlevnější, ale samozřejmě by to muselo vycházet z jejich kalkulací cenových, aby ten model do toho zapadl. Což jsem samozřejmě neznala.' [Speaker 2] 'Takže vlastně nějaký feedback z tohoto smyslu jsem dostala. A myslím si, že se jim to docela líbilo. Všichni zaujatě — všichni zaměstnanci, asi pět, se na to koukali a já jsem z toho měla docela dobrý pocit. Doufala jsem, že to vyjde — a nevyšlo. Po té prezentaci jsem šla jenom s tou majitelkou vedle do kanceláře. Ona se mě ptala na platové věci. A já jsem si řekla nějakou sumu — protože to mělo být na IČO, mělo to být full 100% v kanclu. A zdálo se mi to, že to bude docela stresující a náročný, takže jsem si řekla třeba 70 tisíc. A ona mi řekla: no tak 50. Oho, tak můžeme se domluvit na 55. Takže vlastně si myslím, že to i neklaplo třeba z tohohle důvodu. Já jsem vůbec nevěděla, jak se ohodnotit, protože v tom IT jsou ty platy úplně jiný. Ale byla jsem ochotná jít dolů, protože jsem věděla, že nejsem v úplně výhodné pozici.'", "summary": "Switcher z IT → mismatch v očekávání platu. Feedback jen na flow prezentace, ne kompetence.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hMpSso2CRxb41uK3Akg3o", "video_clip": "[video highlight_clip_tIUQCK.mp4 00:01.8-02:30.0]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H3"], "Perspektiva": ["Kandidát"], "Default group": ["Motivátory & Bariéry", "Pain points"], "Intenzita": ["Silně"]}}, {"id": "SGV4hf25Y6SKIQQ06AYX", "text": "[Speaker 2] 'Numerologická mřížka mluvila jasně a moje platové očekávání asi taky, takže nakonec to nevyšlo. A možná jsme si nesedli, možná s tou majitelkou, nevím. Já jsem teda neměla nějaký jasný problém, mně fakt přišlo celý zajímavý, ale nevím, jak to bylo ona. Pochopila jsem, že ona je hodně takový ten typ majitele — denně je tam, člověk je na očích, hodně pod drobnohledem, taková dominantní a že to bude podle ní. Tak to jsem si ještě říkala, že nejsem úplně tenhle typ, možná to nějak vycítila. Ale jako že bych dostala nějakou konkrétní zpětnou vazbu — byla fakt velmi vágní. A byla jsem z toho trošku rozhozená, že si nedali trochu záležet, když já jsem strávila tolik času tím výběrkem.'", "summary": "Asymetrie effortu kandidáta a firmy. Vágní feedback navzdory hodinám práce.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h91tQYmhYBpsUZzCIRQt2", "video_clip": "[video highlight_clip_SGV4hf.mp4 00:00.6-00:57.2]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H2"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "8MRjDRXsX0bn2KmIaFbS", "text": "[Speaker 2] 'No tak nefunguje to, že se nenabírají junioři, že jo. Takže je fakt strašně těžký se do toho oboru vůbec jako dostat. A už vůbec pracovní trh — ale obecně, nejenom tady UXovej. Mám pocit, že moc nepočítá s těma career switcherama. Že prostě člověk má hromadu zkušeností, který já prostě třeba minimálně 50 % tý mé práce využívám ty svoje seniorní zkušenosti z těch pozic, co jsem byla. A pak ještě teda doplňuju si samozřejmě nějaké znalosti a zkušenosti přímo z toho oboru.'", "summary": "Klíčová věta: trh nepočítá se switchery. 50 % práce = přenositelné seniorní skills.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hjgQCAkqSnSnBJ6ekQAOE", "video_clip": "[video highlight_clip_8MRjDR.mp4 00:00.5-00:36.7]", "tags": {"Hypotézy": ["H3"], "Default group": ["Industry insights"], "Perspektiva": ["Kandidát"], "Intenzita": ["Velmi silně"]}}, {"id": "kaJvCa4pVjRKWNXZEM5E", "text": "[Speaker 2] 'Ale fakt jako se necítím být jako nějaký junior, ale mám pocit, že jakmile člověk nemá v tom CV, že dělal 5 let UX designéra ve firmě XYZ, tak nemám vůbec šanci. A že nikoho to nezajímá, že nikdo se nekouká — jako že možná je tam takový přetlak těch kandidátů, že oni asi nemusí ty firmy, já nevím. Ale to mě jako fakt hodně mrzí. Já nevím, kdo to vyhodnocuje, jestli to dělají nějaký junioři, kteří to tam nevidí, nebo jestli to vyhodnocují nějaký roboti. Jakože někdy fakt mám pocit, že to vyhodnocují roboti. A dokonce s jedním HRistou, který mě taky zamítl tehdy — taky na nějakou stáž to bylo — tak jsem mu volala. Nebo on mi volal, já jsem ho poprosila o feedback, protože už mě to štvalo, jak mi nedávají ten feedback nikdo prostě. Takže on mi potom volal — já jsem ho požádala, on mi sám volal. Super, aspoň někdo. A začali — asi půl hodiny jsme spolu mluvili a on mi něco říkal: no máte to CVčko tak nějak divně strukturované, že se mu to blbě čte. Že to mám jako na ty dvě půlky — mám tam dvě třetiny šířky papíru zkušenosti a pak jednu třetinu vzdělání, skills, školení. A on mi říkal, že se to nějak blbě čte. Já jsem si říkala — ty bláho, ty na to používáš nějakého robota, nebo co, ten robot to nemůže přečíst, nebo jakože — nebyl to nestandardní formát CVčka.' [Speaker 2] 'Takže vlastně nevím, kdo to čte, kdo ty CVčka — a jestli vlastně záleží, jestli to člověk pošle v prvních dnech a potom ty další se už nečtou. Jestliže tam přijde třeba 100 kandidátů, tak já nevím — vezmou prvních 20 a berou to prostě first in, first out metoda, nebo jak to prostě berou. Mám pocit, že to je hrozná masovka, nikdo se nezamýšlí nad těma kandidátama a jediné, co je zajímá, prostě klíčový slova v CVčku a že už máte na 5 let praxe. A vůbec nikoho nenapadne, že když někdo dělal nějakou pozici, jaké by to třeba mohlo mít benefity. Mám pocit, že to je hodně strojový, ty nábory — takový nelidský a takový fakt jako krutý a soutěživý. Fakt jako někdy jsem z toho neměla úplně dobrý pocit. Nevím, jestli to takhle je na těch pozicích, protože mě na ty pozice nikdy nepozvali. Na nějaké seniornější jsem byla juniorní a na stážisty jsem zase asi byla moc seniorní, nebo nevím.'", "summary": "Keyword hiring + ATS robot + first-in-first-out. Switcher neviditelný v automatizovaném pipeline.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hD7WfEedITtDk5Mp4wd8k", "video_clip": "[video highlight_clip_kaJvCa.mp4 00:01.1-02:54.8]", "tags": {"Hypotézy": ["H2", "H3"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"], "Intenzita": ["Velmi silně"], "Emoce": ["Vztek/rozčílení"]}}, {"id": "dtk7n5NWgbkhjwa8Ltnz", "text": "[Speaker 2] 'Nebo on mi volal, já jsem ho poprosila o feedback, protože už mě to štvalo, jak mi nedávají ten feedback nikdo prostě. Takže on mi potom volal — já jsem ho požádala, on mi sám volal. Super, aspoň někdo. A začali — asi půl hodiny jsme spolu mluvili a on mi něco říkal: no máte to CVčko tak nějak divně strukturované'", "summary": "Workaround: aktivně si vyžádat feedback. Když dorazí, je o formátu CV, ne o kompetencích.", "session": "P5", "cohort": "designer-junior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h3pI4KBEKIDaVvoGsoAiD", "video_clip": "[video highlight_clip_dtk7n5.mp4 00:01.6-00:23.9]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H2"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points", "Workarounds"], "Intenzita": ["Silně"]}}, {"id": "7y3xiPjVr6rdV6QN1bfr", "text": "[Speaker 2] 'Tak, hele, já jsem teda team lead, takže moje role v najímání designerů je ta, že jakýkoliv novej designer vlastně prochází přeze mě. Já jsem ten člověk, který řeší ten nábor, ať už jak kdyby to měl být externí člověk nebo interní člověk. U těch externích si dáváme záležet, ale není to samozřejmě takový gro jako u toho interního, protože tam máš nějakou smlouvu a počítáš s tím, že ten člověk tam bude na dosmrti. Každopádně, takže to jde vždycky přeze mě. Není to tak, že by tady byl někdo, o kom já bych jako nevěděla, protože jedna věc je, že vím, co potřebujeme z pohledu toho řemesla. Na to se i ladím jako se zbytkem toho týmu. To nikdy není tak, že já bych si jenom něco vymyslela, ale vždycky chci, aby ty lidi do toho byli jako začleněný. Akorát já jsem ten, kdo to jakoby driveuje, nebo u koho se ty informace jako scházejí. A kdo pak komunikuje právě i s HR a někam jako dál. Takže si to vždycky ladím s tím týmem, ladím si jako jaké máme požadavky, co od toho člověka jako očekáváme, aby i oni to jako věděli, jestli nám to sedí. Je to nějaký takový jako matchování, prostě párování. Takže to je všechno přeze mě, je to stejný potom i komunikace s HR, když třeba jako rozjíždíme nějakej nábor interní, tak to si zařizuju já. Což znamená, že teda vlastně dělám nějakej ten popisek tý pozice, dívám se pak na ten inzerát, co tam jakoby je. '", "summary": "Centrální bod hiringu — vše přes ni, žádný proaktivní stakeholder.", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h3T4TKYZqy7OPfWOkLets", "video_clip": "[video highlight_clip_7y3xiP.mp4 00:00.1-01:57.2]", "tags": {"Perspektiva": ["Hiring manager"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "cWXTINdhnaloc4jaVivE", "text": "[Speaker 2] 'Hele, u toho interního já třeba to vnímám osobně tak, že u toho člověka to beru tak, že tady s náma může být třeba dalších 10, 15 let, jo, kdyby on chtěl. A tam prostě vím, že ten interní člověk, externistu tu můžeš vyhodit, kdyby ti neseděl, ale interního člověka jen tak nevyhodím. Proto to je pro mě jakoby zásadní rozdíl. To stejné, tady firma se dívá špatně na to, když by tady byla nějaká větší fluktuace těch interních zaměstnanců. Proto je to pro mě, kdežto u externisty ani neví, kdo tady je, nebo není, nějaký HR. Proto to neznamená, že u externího člověka mi na tom nezáleží, ale je to takový, většinou to je i o dost rychlejší, ten nábor. A než já totiž u toho interního vymyslím něco jako z HR, ten popis té pozice, nech se to zpropaguje, pak to nějakou dobu necháváš bejt, prochází si ty CVčka, pak ty lidi chodí jedno, dvě kola pohovoru. Tak většinou, když chceme od vás, nebo třeba od jiný agošky jako designéry externí, tak už si to prostě řeknem. Víme, co chceme, víme i na jaký projekty často. A tím, že se jako vlastně známe, že i vy víte, jak prostě zhruba fungujeme jako ten tým, tak mi přijde, že už to není tak, že byste mi dávali jako vlastně každýho. Kdežto u toho interního to tak je — tam se mi propadne kdokoliv, v rámci těch CVček, prostě kdokoliv. Tehdy, když jsem nabírala lidi jako před rokama, tak tam byla prostě baristka. Proto já se na to musím dívat o dost jako víc nebo přesněji, protože tam jsou i tyhle ty, kdežto ty už mi to vlastně vyfiltruješ.'", "summary": "Interní = doživotí, padá vše bez filtru (i baristka). Externí (agentura) = rychlé, pre-filtrované.", "session": "P3", "cohort": "hiring-manager", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hxTvReDhXwcHGcDrkCYOH", "video_clip": "[video highlight_clip_cWXTIN.mp4 00:01.6-02:05.2]", "tags": {"Hypotézy": ["H2"], "Perspektiva": ["Hiring manager"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "nG6nNjpYaY62lCyMUKVo", "text": "[Speaker 2] 'Já už jako od vás, od té agentury čekám, že už tady nebude jako každej, že mi řekneš, hele, tady jsem nabral z ulice jako 20 lidí, tak si vyberte, koho chcete, je mi to jedno. Ale že vlastně děláme vždycky, že jo, i takovej ten jako rozhovor o tom, co my si představujeme, ty se mě doptáváš, takže já to beru tak, že už tam je vlastně tvoje nějaká jako přidaná hodnota. A není to o tom, že bys mi jako doporučil každýho
