 se asi netroufám odhadovat úplně' [Speaker 1] 'Úplně ale řádově.' [Speaker 2] ', ale řádově jsou to podle mě skoro jako desítky hodin. Ty jo, protože protože. Jako.' [Speaker 2] 'Protože ten trouble, aspoň na tom levelu, na kterým já jsem se většinou pohyboval, a myslím si, že to není až tak unikátní — tak je v tom, že tím, že nenabíráme lidi do call centra, kteří by byli jako perfektně standardizovaný, tak ty vlastně skoro po každým musíš prolézt všema těma touchpointama toho hiring procesu'", "summary": "Nájem 1 člověka = desítky hodin. Není standardizované (≠ call centrum), každý hiring unikátní. Ručně přes všechny touchpointy.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hVK6sqyRbBZiyI7Nte56d", "video_clip": "[video highlight_clip_LddZY3.mp4 00:00.2-01:14.2]", "tags": {"Hypotézy": ["H2"], "Perspektiva": ["Lead"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "1Bm837TWIz5qpMqJ61ds", "text": "[Speaker 2] 'Od prostě přesvědčuješ nadřízené o tom, že ta pozice je potřeba a už tam ji musíš nějak specifikovat a identifikovat, proč je potřeba. Pak když prolezeš tímhle kolečkem, tak pak vlastně znova jdeš do toho — jakoby mezitím plyne čas, situace se vyvíjí, takže pak stejně jdeš a znova redefinuješ, koho to teda jdem nabírat. Děláš v podstatě to job description, pak to job description znovu schválit s HR a podobně. A pak teprve se někde dohrabeš k tomu, že to je konečně vystavené, ten inzerát.' [Speaker 2] 'A teď ještě — já většinu těch mých hajrovacích zkušeností mám právě spíš z té doby, kdy byl nedostatek lidí. Takže vlastně pak makáš na marketingu, aby se ti vůbec někdo ozval, oslovuješ lidi atd. A teď, teďka asi bych vystavil inzerát a ozvalo by se 20 juniorů a já bych řešil, jak si z nich vybrat. Ale tohle bylo to opačné, kdy prostě máš tu pozici open a sháníš vůbec, kdo se ti přihlásí. A pohovorovat jednoho člověka taky není na chvilku — většinou se s ním chtělo popovídat HR, i když my jsme třeba jako nechtěli, ale chápu, že oni to mají v protokolu. Ale pak následoval typicky první pohovor a pak následoval třeba ten role play — ten se už do hodinky nevejde, protože to máš intro, pak role play samotný a pak ještě debrief s tím člověkem a ještě bez něj. A tohle se násobí těma účastníkama, těma rolema že jo, takže ono jako. '", "summary": "End-to-end hiring proces: přesvědčit nadřízené → specifikovat → redefinovat → schválit JD → marketing → screening → pohovory + role play + debrief. Násoben účastníky.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hWjDA9cQFaaN8vTEejesF", "video_clip": "[video highlight_clip_1Bm837.mp4 00:01.2-02:01.7]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H2"], "Perspektiva": ["Lead"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "KUvq4JkN0bstf5drtW3Q", "text": "[Speaker 2] 'Skoro taková ta klasika. Jsou to prostě jakoby ty předávky mezi těma jednotlivýma zainteresovanýma lidma. Že vlastně když to máš ty na svým písečku, tak to relativně odsejpá, protože si to prostě řídíš ty. Ale když prostě se snažíš vymámit něco prostě z nadřízených na začátku, nebo pak z toho HR, tak prostě tam to dost často drhne. A takhle, ne nutně, jako že by to HR bylo špatné, ale prostě ty předávky — ty gapy mezi tím jsou ten trouble.'", "summary": "Největší pain při hiringu: předávky mezi lidmi. Sám si řídím = ok, schvalování od nadřízených + HR = drhne. “Gapy mezi tím jsou ten trouble.”", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hZ7e41N4dlApARLX0nyvC", "video_clip": "[video highlight_clip_KUvq4J.mp4 00:00.3-00:54.5]", "tags": {"Hypotézy": ["H2"], "Perspektiva": ["Lead"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "nJqsVehGKfuzDvwGuBSL", "text": "[Speaker 2] 'mimochodem mám takovou docela zajímavou zkušenost s tím, že čím větší firma, která navenek působí jako rigidněji, tím většinou líp jim ten hiring proces funguje. Právě všichni takový ty frajeři, co vykřikujou, jaký jsou strašně rychlý a agilní — i vy ten Rohlík vlastně — tak vlastně tam to většinou fungovalo jako nejhůř, protože to prostě nemají zajetý, nemají to nastavený. Když to vezmu třeba versus to MMSDčko, no tak to mělo perfektně jako standardizované' [Speaker 2] 'vypadá to jako velký, těžký moloch, ale vlastně to HR to mělo perfektně standardizované a pak už šlo vlastně v uvozovkách jenom se na to napojit s těma našima potřebama designového teamu'", "summary": "Kontraintuitivní: velké “rigidní” firmy mají lepší hiring než “agilní” startupy. “Frajeři co vykřikujou agilitu — tam to fungovalo nejhůř.” MMSD vs. Rohlík.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hdVPWfnZuhlMVMPac8paa", "video_clip": "[video highlight_clip_nJqsVe.mp4 00:00.4-01:00.1]", "tags": {"Hypotézy": ["Emergent", "H1"], "Default group": ["Industry insights"], "Perspektiva": ["Kandidát", "Lead"], "Intenzita": ["Velmi silně"]}}, {"id": "vByEtNp5zcXi04Hkmdg0", "text": "[Speaker 1] 'Mě zaujal ten self-assessment, že kandidát nebo člen týmu se hodnotí sám a pak ho hodnotí někdo jiný.' [Speaker 2] 'To jsme dělali u členů týmu, to jsme nedělali u kandidátů. Ale kandidátům jsme určitě většinou dávali větší či menší feedback prakticky vždycky. I když jsme ty lidi nebrali, tak od nás dostávali jako proč je nebereme.'", "summary": "Self-assessment = pro tým (ne kandidáty). Ale kandidátům dávali vždy feedback, i když nebrali. Výjimečné v kontextu trhu (universal pain ghosting).", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hSZwi8i5kCI0cXPhGBttU", "video_clip": "[video highlight_clip_vByEtN.mp4 00:00.0-00:27.9]", "tags": {"Verdict": ["Go"], "Hypotézy": ["H5"], "Perspektiva": ["Lead"], "Default group": ["Pozitivní příklady"], "Intenzita": ["Silně"]}}, {"id": "DZarMbbUMOXj9gy7bGqu", "text": "[Speaker 1] 'Jakou formou jste jim ten feedback dávali?' [Speaker 2] 'Myslím, že kombinovaně — něco měli černé na bílém a ještě jsme se byli o tom ochotni bavit po telefonu. Myslím, že jsme jim většinou volali, ale minimálně měli černé na bílém. Ono takhle, tam zas připadají právní aspekty — černé na bílém musíš dát nějaké formálnější hodnocení, než co si můžeš vyříkat jako mezi čtyřma očima.' [Speaker 1] 'A když si vezmu teďka ty kandidáty, které byly odmítnutý. A dostali feedback tak jakej jak reagovali na ten feedback? Vlastně jaký byly over all? Reakce vlastně na to, protože jste.' [Speaker 2] 'Jako poděkování principiálně. Někteří lidé byli vyloženě překvapení, že vůbec feedback dostali. Prostě jsme jim neřekli jenom díky čau, ale že jsme jim byli schopni vyprodukovat nějaký aspoň pár bodů, jako proč ne. Ale nebylo to jako elaborát — bylo to mailem, prostě jako dva, tři hlavní důvody proč ne.'", "summary": "Feedback formát: mail (2-3 hlavní důvody) + telefonát. Kandidáti často překvapeni, že vůbec dostali feedback — norma je ghosting.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hty7Ob638SC0ugGp4C9p7", "video_clip": "[video highlight_clip_DZarMb.mp4 00:01.5-01:38.5]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Lead"], "Default group": ["Pozitivní příklady", "Trust signals"], "Intenzita": ["Silně"]}}, {"id": "mEpk1Lh1sGWQezUdGXKH", "text": "[Speaker 1] 'Jak to fungovalo to sebehodnocení a hodnocení v týmu? Zajímají mě momenty, kdy se hodnotící a hodnotitel neshodli tak, jak to jako vypadalo. Mě to tak zajímalo, jak to probíhalo.' [Speaker 2] 'Vypadalo hej, Hele, do detailů vlastně úplně nevím, protože ono to bylo zároveň nastavené tak, aby to bylo přiměřeně diskrétní, aby to bylo přiměřeně safe zóna.' [Speaker 2] 'Tohle jsem dělal víckrát a mám pocit, že mi to funguje — mám feedback, že to ty lidi vítají. Nastavené je to tak, že spáruješ lidi, kteří spolu aspoň nějakým způsobem dělají — protože oni se musí znát. Dostanou guidance: tady máte kompetence, popisy těch levelů, abyste pochopili, jak se sami zhodnotit. A pak dostanou úkol — sejděte se aspoň na hodinu, radši na dvě. Odprezentujte si to navzájem. A vlastně disputujte spolu, jestli kdo z vás má či nemá pravdu, a upravte si podle toho to své hodnocení. Já jsem si tohle zažil párkrát s někým, kdy jsme si to dělali navzájem. Od nich vím, že jim to bylo příjemné, protože ono to není jenom o hodnocení — ono je to i o imposter syndromu. Prostě fakt je to kalibrace na obě strany. A ty lidi byli dost vděční, že jsme je vlastně donutili se tím projít.'", "summary": "Detailní popis párové kalibrace: spárovat lidi co se znají + framework + 1-2h debate. Vděční, že je “donutil” projít. Řeší imposter syndrom.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hXABSj6gcFxiWdRMspIaE", "video_clip": "[video highlight_clip_mEpk1L.mp4 00:00.6-01:52.3]", "tags": {"Emoce": ["Důvěra"], "Default group": ["Existing solutions", "Pozitivní příklady"], "Verdict": ["Go"], "Hypotézy": ["H11", "H5"], "Perspektiva": ["Lead"], "Intenzita": ["Velmi silně"]}}, {"id": "CUGcdIyrTQSgQcV2OHkf", "text": "[Speaker 1] 'A já jsem se nezeptal, a strašně důležitou věc a to, co bylo cílem tady toho hodnocení vlastně.' [Speaker 2] 'Mít o něco objektivnější obraz toho člověka, aby to nebylo jenom na jeho perspektivě, ale aby dostal to zrcadlo a aby se zkorigovaly oba směry — nahoru i dolů — ta jeho perspektiva.'", "summary": "Cíl assessmentu: objektivnější obraz + zrcadlo + korekce v obou směrech. Lidi se i podhodnocují. Není o známkování, ale o kalibraci.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hng6WQy7cak3ZlZsVW3Es", "video_clip": "[video highlight_clip_CUGcdI.mp4 00:01.3-00:26.5]", "tags": {"Default group": ["Existing solutions"], "Verdict": ["Go"], "Hypotézy": ["H5"], "Perspektiva": ["Lead"], "Intenzita": ["Silně"]}}, {"id": "Pyh0hBUoKhnstLMOiuUX", "text": "[Speaker 2] 'Pak jsme šli do jednak rozvoje těch lidí a potažmo rozvoje toho týmu. Já třeba naposled, kdy jsem tuhle metodu použil, tak bylo s tou agenturou Proof and Reason, kterou jsem měl prostě trénovat discovery proces. Tak jsem si přesně podobnou metodu použil a vlastně na základě startovního assessmentu, který probíhal plus mínus přesně tak, jak se o něm tady bavíme, tak jsme korigovali plán pro celý ten kurz. Zjistilo se, že oni si myslí, že jsou relativně dobří v prezentačních dovednostech, ale naopak z toho krásně vyplavalo, že prakticky celý tým si myslel, že jsou mizerní facilitátoři workshopů. A na základě tohohle jsme upravili celý běh toho tréninku — zdvojnásobili jsme objem prostoru pro workshopy. Podobným způsobem to fungovalo i v těch týmech — my jsme fakt třeba na základě hodnocení vybírali a schvalovali ať už konference nebo placené tréninky. Lidi byli posílaní na to, co jim vycházelo buď extrémně slabé, nebo naopak extrémně silné — že byla šance z nich udělat extrémní talenty v té oblasti.'", "summary": "Use case: Proof and Reason — assessment odhalil gap (facilitace), zdvojnásobili prostor v tréninku. Cílený rozvoj přes konference/tréninky.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hjr5EV7XiZrF4i58EusQE", "video_clip": "[video highlight_clip_Pyh0hB.mp4 00:00.9-01:45.8]", "tags": {"Default group": ["Existing solutions", "Pozitivní příklady"], "Verdict": ["Go"], "Hypotézy": ["H11"], "Perspektiva": ["Lead"], "Intenzita": ["Silně"]}}, {"id": "7gLLyv2qzrX33dBhxJ0G", "text": "[Speaker 2] 'Já vám nemám to změřené, protože na tvrdé data to není, ale přenositelné to podle mě je, jenom to vždycky vyžaduje nějakou kontextovou úpravu. Takže vlastně naskakuje ten design thinkingovej princip, že já na začátku musím nejdřív pochopit to prostředí, respektive toho klienta. Teďka to hodlám recyklovat pro Českou spořitelnu, ale jenom prostě zase v trochu jiném kontextu. Ta přenosnost přijde třeba 80 procent.' [Speaker 1] 'No tak jo.' [Speaker 2] 'Možná to přeceňuju. Ale ono takhle — zase tam je část toho, že cesta je cíl. I když to třeba není úplně dokonale na míru, ten framework, už jenom to, že se otevře ta debata a že lidi mají ten zážitek a že mají to zrcadlo — tyhle body jsou relativně nezávislé, instantně doručitelné na tom obsahu samotném.' [Speaker 1] 'A ještě myslím, že dokud pokud bys jak pro tu hraješ na té vlastně na tom hřišti té discovery, tak je to možná. Jako ta pravděpodobnost přenositelnosti je trochu vyšší, než kdybys měl nějakej plošný kompetenční model, o kterým řídíš celou organizaci nebo celý celý designovej.' [Speaker 2] 'Plošný kompetenční model bylo právě to, co jsme postavili v tom MMSDčku, kde to fakt zahrnovalo všechny disciplíny — od researche až po vizuální designéry, copywritery tam taky byli. To by pochopitelně bylo přenositelné hůř. Ale per ta jedna role si myslím, že to je relativně funkční.'", "summary": "Přenositelnost frameworku ~80 %. Per-role funguje, plošný hůř. “Cesta je cíl — že lidi mají to zrcadlo, je nezávislé na obsahu.”", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h3b4JYntGKHntkbwdiEBN", "video_clip": "[video highlight_clip_7gLLyv.mp4 00:00.2-02:11.6]", "tags": {"Default group": ["Existing solutions", "Industry insights"], "Hypotézy": ["H7"], "Perspektiva": ["Lead"], "Intenzita": ["Silně"]}}, {"id": "s2rpPPs0kinS2kpx5Rfx", "text": "[Speaker 1] 'kdybys měl vybrat 1 věc, která na tom najímání designerů jako nejvíce rozbitá, tak co by to vlastně za tebe bylo jako?' [Speaker 2] 'Ty jo. Ono je spíš jako rozbitej ten trh teďka. Sorry, že to vezmu takhle high level.'", "summary": "Na otázku “co je nejvíc rozbité”: odpověď na úrovni trhu, ne procesu. Problém systémový, ne lokální.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hnMyWyr2IlWKw95zCXDkt", "video_clip": "[video highlight_clip_s2rpPP.mp4 00:01.7-00:22.3]", "tags": {"Hypotézy": ["Emergent"], "Default group": ["Industry insights"], "Perspektiva": ["Kandidát", "Lead"], "Intenzita": ["Silně"]}}, {"id": "gESu6KKwFoCfJUm3wnlx", "text": "[Speaker 2] 'Ten techno-optimismus AI zavání takovýma těma ferdama mravencema, že vlastně potřebuješ jenom dvě role — jedna je víc produktová a druhá víc technologická, že zkrátka ten jeden je v podstatě produkťák a ten druhý inženýr, oba dva intenzivně promptujou a dohromady z toho na konci padá to, co dřív dělalo dvacet lidí, tak teďka dělají dva. Já neříkám, že to tímhle směrem částečně nesměřuje. Ale ono se to pak prostě odbíjí v očekáváních z těch pozic — fakt jsem potkal pozice, které byly v duchu: hele, ty musíš být skvělej stratég, umět perfektně promptovat, a ještě mít vizuální cit, že prostě fakt potřebujeme, abys tam spravil i brand. Což je rozkročení od fakt výzkumu až po marketing. A podle mě to není reálné, respektive znám jenom pár lidí v Čechách, kteří jsou toho schopni aspoň trochu obsáhnout, a pak je otázka, v jaké kvalitě. Ale inzeráty, co se objevují teďka, jsou tohohle typu. Vlastně jestli mi přijde teďka něco rozbitého, tak je to to, že se za celou tu dobu, co digitální design existuje, tak se nám bohužel do příchodu AI nepodařilo úplně vysvětlit tu naši hodnotu. My jsme holt dál od té produkce — markeťák spustí kampaň a doručí čísla, inženýr naprogramuje featuru. Ale že se tam dostala nějak — to prostě v téhle fázi těm firmám nedochází. Takže oni optimalizujou, zefektivňujou, vypisujou tím pádem úplně široký role. A ještě je tam jeden aspekt — vibe coding, jak je tady s náma plus mínus rok, tak zase strašně zváhnul to kyvadlo té pozornosti k té produkci. A ne k té přípravě toho, co se dělá. Ono nás to za pár let nejpozději kousne do zadku, že tady bude prostě extrémní produkce shitu. Ale my jsme prostě do příchodu AI nevysvětlili, k čemu ty designéři jsou dobří. Některý firmy to tuší, u některých prostě — hele, my potřebujeme někoho, kdo nám napromptuje to rozhraní. Takže vlastně ty pastelky se jenom přenášejí z Figmy do nějakého Cloudu.' [Speaker 1] 'Jako jiný nále.' [Speaker 2] 'A vůbec se neřeší výzkum, discovery, prioritizaci si udělá přece produkťák podle toho, jak se mu co líbí.'", "summary": "“Do příchodu AI se nám nepodařilo vysvětlit hodnotu designérů.” Vibe coding zváhnul kyvadlo k produkci. Predikce: extrémní produkce shitu.", "session": "P2", "cohort": "designer-senior", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hMxcpJXx0kibg5Kq6zn7X", "video_clip": "[video highlight_clip_gESu6K.mp4 00:01.7-03:48.7]", "tags": {"Hypotézy": ["Emergent", "H1", "H3"], "Emoce": ["Frustrace/zklamání"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát", "Lead"], "Intenzita": ["Velmi silně"]}}, {"id": "k4aEgk0HPX3tjttIW4gp", "text": "[Speaker 1] 'Aktuálně jsem od prvního dubna ve Sporce v roli produktového designéra, jako interakční designér. Hlavně na, nebo jenom na George Business, na webovou a mobilní aplikaci. A v designu se pohybuju zhruba nějakých 5, 6 let. Začínal jsem nejdřív ve fundraisingu, pak digitální fundraising. A vlastně z digitálního marketingu jsem nějak začal se víc zajímat o UX. A jako hnutí Duha, kde jsem pracoval tři a půl roku, tam jsem byl jako marketingový libero, že tam vlastně děláš jako všechno. A začal jsem víc kreslit weby. Tam vlastně nějakou jsem měl první spolupráci s váma, s 2Freshem, když jste nám pomáhali s tím webem. No a potom vlastně jsem se dostal do Generaly, kde jsem se přeorientoval z webu na webové aplikace. A po téměř třech letech jsem si nějak řekl, že je čas se posunout dál. A dostal jsem se vlastně do Sporky. '", "summary": "Mid designer 5–6 let. Oblouk: fundraising → digital marketing → weby (Duha) → web apps (Generali) → Sporka.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hz4wGCd09xBRzOIZGneuv", "video_clip": "[video highlight_clip_k4aEgk.mp4 00:00.1-01:02.4]", "tags": {"Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "jJvfzmtNW0KF8Bt7Qlwg", "text": "[Speaker 1] 'ako že to kombinuje víc věcí. Baví mě psychologie, sociologie, trochu toho businessu. A vlastně já potřebuji v práci dělat něco hmatatelného. Jako potřebuji vidět zatím nějaký výsledek. A to byl i ten důvod, proč vlastně v rámci toho digitálního marketingu mě víc začalo zajímat UX. Protože kolikrát, že jo, v rámci toho digitálního marketingu něco tvoříš, ale hrozně těžko tam hledáš nějaký hmatatelný výsledek. Ale tady máš ten výstup v podobě toho screenu, nebo toho webu'", "summary": "Pull do UX: kombinace disciplín + hmatatelnost výstupu. Marketing chyběl viditelný výsledek.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hdPTZPbbRDD4Y3ikIv8Sk", "video_clip": "[video highlight_clip_jJvfzm.mp4 00:00.7-00:32.8]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Kandidát"], "Default group": ["Motivátory & Bariéry"], "Intenzita": ["Neutrálně"]}}, {"id": "6e9bpQLIVRIznDUgE7aj", "text": "[Speaker 1] 'To jsou spíš nějaké symptomy spjaté s tím, kde pracuješ. Tak samozřejmě korporát je jako rigidnější struktura. Protože jak vlastně jsem přešel do Sporsky, tak vidím, že i korporát dokáže být v něčem rychlej. Takže někdy vnímáš to, že ta diskuze o těch tématech je třeba rychlá. Ten výstup dokáže to vytvořit rychle. Ale pak se vlastně čeká na nějaký kolečka, který jsou daný. Takže to je nějaký symptom, který jako vnímám, že člověka může trošku mrzet v některé fázích.'", "summary": "Frustrace ze schvalovacích koleček. Korporát ≠ automaticky pomalý (Sporka rychlejší než Generali).", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hYJBcc9ctGXIRBeBuVnk4", "video_clip": "[video highlight_clip_6e9bpQ.mp4 00:00.7-00:34.5]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Pain points"]}}, {"id": "0YdtjLaPIYPh6Alf8Vka", "text": "[Speaker 1] 'Na UX asociaci jsem zapomněl. Jsem členem samozřejmě, sleduju Slack, ale hlavně tam to sleduju, hlavně z důvodu té práce, když jsem hledal. Na UX Monday jsem chodil, ale tím, jak vlastně jsme se přestěhovali z Prahy, rodina, tak naposledy na nějaké komunitní akci jsem byl na té vaší, to bylo někdy před Vánoci. Jak jste měli s Péťou v Holešovicích podle mě.' [Speaker 2] 'To bylo no ano, to bylo nějakej konec listopadu myslím no tak to.' [Speaker 1] 'Jsem byl naposledy a teďkon vlastně vím, že kolegové jako ze stovky choděj na UX monday teďkon v pondělí jsem nemohl, ale třeba to další nějak jako zvažuju, že bych zase zase vyrazil, ale a ale ty komunitní akce jako spíš spíš sporadicky no. Byl jsem i na jednom meetupu v Rohlíku, který byl o vibe codingu, to bylo taky někdy na podzim. Tam je to spíš nárazové, no párkrát za rok. '", "summary": "Updaty: knížky, LinkedIn (7–8 lidí), newslettery, UX asociace Slack. Komunitní akce sporadicky kvůli rodině.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hW04PGd1Z2GRLYQuCXl09", "video_clip": "[video highlight_clip_0YdtjL.mp4 00:01.3-00:56.5]", "tags": {"Hypotézy": ["Emergent"], "Default group": ["Existing solutions", "Industry insights"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"]}}, {"id": "mjRfj6fEvrixEfjshGZh", "text": "[Speaker 1] 'Minulý rok manželka dostala grant do Británie, takže jsme byli pět týdnů v Británii a viděl jsem, že až se vrátím, tak když se nebudou rozjíždět nějaký zajímavější projekty v Generali, tak budu zvažovat, že se začnu aktivně rozhlížet. Vrátili jsme se někdy v květnu přes prázdniny. V Generali byl ještě jeden projekt, ale nějak jsem nabyl dojmu, že tady ten typ projektů mě nějak nečhallengeuje nebo nemotivuje, takže vlastně někdy září, říjen jsem začal aktivně rozesílat.'", "summary": "Trigger pull, ne push: 5 týdnů v Británii = mentální reset, projekty v Generali nečhallengeují.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/h5MgGNMgzvryphnxQFxk5", "video_clip": "[video highlight_clip_mjRfj6.mp4 00:01.8-00:35.6]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Kandidát"], "Default group": ["Motivátory & Bariéry", "Workflow / Chování"], "Intenzita": ["Neutrálně"]}}, {"id": "NegAaRYiMJc8I1xM7hVd", "text": "[Speaker 1] 'Měl jsem takové jako dvě vlny. Dostal jsem se na pohovory a během chvíle jsem byl v nějakých druhých, třetích kolech. A právě v jednom scale-upu to vyšlo, dostal jsem nabídku, ale nějak jsem cítil i z toho, jakou mi zadali case study i jak k tomu přistupovali k tomu pohovoru, že to nebude pro mě asi úplně ten správný fit. Necítil jsem, že bych tam chtěl. Bylo to super, že rychle to dopadlo, ale prostě necítil jsem, že to je ten správný fit. A do toho jsem měl i další pohovory a tohle jsem oddaloval, nakonec jsem to odmítl. Velmi dobře se to vyvíjelo v jedné menší bance, kde jsem dostal case study. Case study byla na dvě části, hodně zajímavá, trvalo mi to klidně jeden celý den. A pak na tom představování bylo třeba 8 dalších UXáků, přišla tam ředitelka celé té divize, ředitelka HR. Byl to hodně velký challenge, ale líbilo se jim to. No a tam jsem už tak cítil, že to dopadne, ale prostě někdy svět přihrá jiné okolnosti. Volali další den, že se jim to moc líbilo, že by mě rádi vzali, ale že jsou součástí větší skupiny, v té skupině mají nějakou IT agenturu a tam jí volal včera manažer, že se jim uvolnil jeden UXák, pro kterého nemají práci, takže chtějí udržet lidi ve skupině zaměstnaný. Tím pádem jako naberují jeho a z mé strany to nevyjde '", "summary": "Banka: dopadlo dobře, ale vzali interního UXáka z jiné firmy ve skupině. Externí kandidát strukturálně v nevýhodě.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hmQnHr2L9w4gvBgwbzcE2", "video_clip": "[video highlight_clip_NegAaR.mp4 00:00.0-01:53.1]", "tags": {"Hypotézy": ["Emergent", "H1"], "Emoce": ["Frustrace/zklamání"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"]}}, {"id": "KuDlMf0DaXcb3DmQhuGr", "text": "[Speaker 1] 'mezitím byly ještě další dvě, kde jsem byl ve finálovém kole, ale nevyšlo to. Jedno byla nějaká nadnárodní agentura, všechny ty lidi, kdybych říkal ty manažery, tak budeš znát, takže záměrně neříkám jména. Dostal jsem zpětnou vazbu, že mi tam chyběly nějaké zkušenosti, dovednosti ve výzkumu, takže dali přednost někomu jinému. A potom jsem byl v české IT agentuře, software house, kde to nebylo na UXovou pozici, ale na něco mezi UXákem a produkťákem. A tam jsem byl ve finále, ale nakonec tu pozici neobsazovali, protože to nebylo v nějaké horké fázi a hlavně sháněli někoho seniorního, kdo se hodně orientuje v technických věcech, a mě v rámci toho screeningu vyhodnotili jako medior++, takže to taky skončilo.'", "summary": "Dva finály bez výsledku. Důvody: redefinice požadavků ex post (research, technika), ne kvalita.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/htOy5tddxntgn1ef3gAi0", "video_clip": "[video highlight_clip_KuDlMf.mp4 00:01.3-01:07.2]", "tags": {"Hypotézy": ["H1"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "3zulS01JWwR36hEW3f0t", "text": "[Speaker 1] 'Většinou vždycky mi někdo zavolal z HR a doptával se mě na to, co dělám, co vlastně tvořím, a jaké jsou moje časové možnosti, platové očekávání a proč vlastně hledám práci. Takže takový ten první půlhodinový kol. A pak vlastně, když jim to dávalo smysl, tak mě zvali na nějaké druhé kolo, kde buď s tím druhým kolem někde mi zadávali case study, jakože mi třeba poslali v mailu rovnou, anebo mi řekli, připrav si na to setkání nějaký deep dive do svých case study, kterou nám představíš, máš na to půl hodiny a my se tě pak doptáme.'", "summary": "Standardní funnel mid-level: 30min HR screening → druhé kolo s týmem (case study nebo deep dive).", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hkhSnDk96Vtkes03UeTO6", "video_clip": "[video highlight_clip_3zulS0.mp4 00:01.8-00:43.1]", "tags": {"Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "muC2JQXVyidAjWs3Shcg", "text": "[Speaker 1] 'Bylo to různý, někde dali relativně krátký čas, někde nedali žádný čas, tady to máš a postarej se o to, že to byla taková tyrkisová firma, která hodně tlačila odpovědnost toho člověka a vlastně mohl jsi na to mít kolik chceš času. Zároveň ale v tom zadání bylo napsané, kolik bys tomu maximálně měl věnovat, aby to mohli porovnávat ty výstupy. Někde mi to jako říkali, že přes víkend nejsem doma, takže mi to poslali až v pondělí a měl jsem na to dva dny. A vlastně to byl pro mě důležitý moment, že na té case study poznal, jak ta firma má maturitu nebo jak k tomu přistupuje. Že někde ta case study byla zadaná jako jedna věta na A4 a někde to byly tři stránky, kde jsi měl relativně dost kontextu, nějaký nastíněný závěr z výzkumu a tak podobně. Takže vlastně to pro mě taky byl signál, že by mě v té firmě lákalo pracovat, že nad tím uvažují dobře, anebo že tomu nevěnovali tolik pozornosti nebo neměli čas. Ale vlastně to taky bylo pro mě důležitý.'", "summary": "Case study zadání = proxy pro maturitu firmy. Spektrum: 1 věta na A4 vs. 3 strany kontextu.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hzer9cAsmIghtBbeGfn28", "video_clip": "[video highlight_clip_muC2JQ.mp4 00:01.8-01:10.0]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points", "Pozitivní příklady", "Trust signals"], "Intenzita": ["Velmi silně"]}}, {"id": "6jflJjjliQYrxktgx3eZ", "text": "[Speaker 1] 'Některé ty inzeráty mají rovnou ten rozstyl, že tam máš zadat. Takže když tě přijmou na to první kolo, tak souhlasí s tím intervalem.' [Speaker 1] 'Někdy to bylo součástí toho prvního screeningového kola, že se ptali, jakou jsi představou plat, tak já jsem se ptal, kolik na to máte alokováno. A nějakou diskuzí jsem se dostal k tomu, jaký je ten rozstyl. A když mi to dávalo smysl, tak jsem pokračoval. Většinou u toho prvního screeningu už bylo jasný, za jakou částku bych tam teoreticky nastupoval '", "summary": "Platová transparentnost už standard. Taktika: obrátit otázku (“kolik máte alokováno”) a získat rozstyl.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hO9fhj4TomopVTlBX1zda", "video_clip": "[video highlight_clip_6jflJj.mp4 00:00.9-00:44.3]", "tags": {"Hypotézy": ["Emergent"], "Default group": ["Existing solutions", "Pozitivní příklady"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"]}}, {"id": "E2meD2kIHhIs0b5upbh9", "text": "[Speaker 1] 'Jako jedna věta jenom napsaná. Jedna věta na A4 hlavičkovým, kdy bylo, ať na designu vlastně něco, co se vlastně ani netýkalo té samotné práce. Vlastně tady to byl nějaký finanční nástroj, ale já jsem měl designovat něco jako kompletně jinýho, co mají lidi doma. Jako kávovar. '", "summary": "Scale-up nabídku odmítl: case study “designuj kávovar” pro firmu, co dělá finanční nástroj. Zadání jako disqualifier.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hnGUos5jMUuaXexDDWViS", "video_clip": "[video highlight_clip_E2meD2.mp4 00:01.2-00:26.6]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points", "Trust signals"], "Intenzita": ["Silně"]}}, {"id": "qnZgQwfInCzoSclnVHSN", "text": "[Speaker 1] 'Další byla ta banka, kde první byl screening s HRistkou, kde jsme si vymezili ty platové možnosti, následně jsem měl kolo zase s HR a s team leaderem, kde team leader se mě hlavně ptal, HRista jenom přihlížel, bylo to online, trvalo to hodinu. Na základě toho řekli, dává nám to smysl, takže ti pošleme case study. Case study byla rozdělená na dvě části, kdy jedna byla jako víc o wireframeování a druhá byla víc o přemýšlení, týkala se dvou různých věcí a vlastně si měl připravit výstup pro obě. Měl jsem na to nějaký tři, čtyři dny, pak jsem to šel představit osobně do té firmy, kde teda bylo dalších sedm, osm UXáků, team leader, ředitelka inovací, HRistka. V hodině nebo třičtvrtěhodině jsem to představoval,' [Speaker 1] 'UXáci se mě ptali, a pak jsme se rozloučili a měli mi dát do konce týdne vědět. Během toho týdne se stalo to, co jsem popisoval — volali, že mají tu jinou agenturu, která dodala.'", "summary": "Banka — nejkvalitnější proces (4 kola, strukturovaná case study, panel 8+ UXáků). Selhání ze strany firmy, ne kandidáta.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hIVnway2PsCwC6w85O8sB", "video_clip": "[video highlight_clip_qnZgQw.mp4 00:01.9-01:19.5]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "WkdhqFXLx5M3YhqLqJaT", "text": "[Speaker 1] 'Pak je teda další software house. Tam vlastně první kolo s HRistou, kdy hodinový call, doptávala se mě i na ty odborné věci, a na základě toho už mi rovnou na tom hovoru řekla, že jim připadá, že to je fit, a rovnou mi poslala do mailu case study. Měl jsem neomezený čas na tu case study a ta case study byla docela podrobná. Během víkendu jsem to dal dohromady a poslal jsem to. A oni teprve, až když jsem to poslal, tak na základě toho mě pozvali na další kolo. A na tom dalším kole už byl provozní ředitel, team leader, nějaký další produkťák, a HRista. Představil jsem tu case study, oni se doptávali, já jsem se doptával, a nakonec mi odepsali, že jsem se jim líbil, že by to byl i fit, ale že sháněli někoho seniornějšího a techničtějšího, že tam je to hodně o technické analýze, a že já jsem spíš produktově orientovaný, tak tu pozici neobsazuju.'", "summary": "Software house redefinoval pozici během procesu (“hledáme seniornějšího s technickou analýzou”). Vágní profil ztrácí kandidáty.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hVsiRz5huS2XkycpoDF8E", "video_clip": "[video highlight_clip_WkdhqF.mp4 00:00.8-01:20.8]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "PPVt7Q47AqzaqZAkfrNm", "text": "[Speaker 1] 'Potom byla ta nadnárodní agentura. První call s HRistou, druhý call s manažerem a HRistou, kdy se mě doptávali i na odborné věci, hlavně ten manažer. Třetí kolo bylo, že jsem měl udělat deep dive do nějaké case study, takže to jsem představil, to co jsem dělal v Generali. Na tom callu byl zase ten manažer, už tam nebyla HRistka, a byl tam k tomu jiný UXák, nějaký další kolega. Takže já jsem v první půl hodině představoval, co jsem dělal za tu poslední dobu. Potom mi ten manažer zadal v rámci deseti minut vymyslet, jak přistoupit k nějakému problému nebo k nějakému projektu, který mají na stole. Jenom jsme si vypnuli kameru, mikrofon, a během deseti minut jsem měl dát dohromady nějaký approach k tomu, jak přistupovat. Po deseti minutách jsem to představil, a uzavřeli jsme to tím, že dají mi vědět. Do konce týdne mi volala, že to byl fit, ale že dali přednost někomu, kdo má ještě větší zkušenosti v researchi. Takže to nevyšlo.'", "summary": "Nejhorší formát: 10min on-the-spot challenge s vypnutou kamerou. Asymetrie očekávání vs. času.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hF8JJRsuS0UHjBlCEtbrF", "video_clip": "[video highlight_clip_PPVt7Q.mp4 00:01.0-01:28.4]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "wgCP0FVdUnaoT1NcH7CO", "text": "[Speaker 1] 'Potom teda už byla Sporka, kde screening, asi půlhodinový první call, první call vlastně s týmem, kde se mě doptávali na to, co dělám, co umím, a na základě toho mi poslali case study, na to jsem měl několik dní, připravil jsem case study, poslal jsem ji den předem, to bylo v neděli, a v pondělí jsem ji šel představit, kdy tam byl manažer, další UXáci, doptávali se mě, a po tomhle callu byl ještě znova call s celým týmem, i s výzkumníkama, s copywriterama, kde se mě mohli zeptat spíš jako na osobní věci, a na základě toho mi teprve poslali nabídku, a na nabídku jsem měl pár dnů na odpověď.'", "summary": "Sporka — vítězný proces. 4 kola: HR → tým + case → prezentace → chemistry s rozšířeným týmem.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/h4PLHWLkEA6MkfxBnCI2T", "video_clip": "[video highlight_clip_wgCP0F.mp4 00:00.8-00:49.0]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "YyYKYnjYC3GSRZFPsx11", "text": "[Speaker 1] 'Já jsem ty case study souhlas, bere to dost času. Na LinkedInu dočteš, že připravuješ něco, co oni pak můžou využít a tebe nevezmou, ale já jsem to vždycky bral jako i nějaký trénink pro mě. Jako pro sebe si challengeovat to, co teda umím, neumím, a zhodnotit si jako dostat nějakou zpětnou vazbu od někoho dalšího než jenom od šéfpanema, od kolegů, na tu mojí práci. Takže jako vždycky jsem se na to snažil koukat, že to je i nějaký check toho, co umím, neumím, a kde třeba se mám zdokonalit. Někdy mě to štvalo, že nad tím trávím tolik času a nevychází to, ale zároveň jsem si říkal, že každá tato zkušenost mě určitě v něčem posune. A ten celý moment určitě jeden byl, že když ta case study byla zadaná jako jednou větou, tak to vysílalo signál, že tam to asi nedělají tak, jak bych chtěl, nebo tam, kde bych se chtěl učit další věci.'", "summary": "Case study aktivně vnímá jako self-assessment a externí check dovedností — vzácný feedback mimo kolegy.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hPGcBOjsbGDqZQOJpFNmp", "video_clip": "[video highlight_clip_YyYKYn.mp4 00:01.0-01:10.7]", "tags": {"Default group": ["Existing solutions", "Motivátory & Bariéry"], "Verdict": ["Go"], "Hypotézy": ["H5"], "Perspektiva": ["Kandidát"], "Intenzita": ["Velmi silně"]}}, {"id": "13D9p4yPfudzEs0i5dtk", "text": "[Speaker 1] 'Silný moment byl, když jsem jako do té jedné menší banky — byla rozdělená na dvě části, přemýšlecí a wireframeovací. Tam to byl nějaký problém, který reálně řešili. Já jsem ho nějak uchopil, navrhnul, a pak se mě začal víc doptávat ten UXák, který to jako nakonec designoval. A nakonec testování, on myslel, že to máme udělat přesně tak, jak si navrhnul ty. Tak to byl silný moment, že si řekneš — je to prostě i trochu štěstí a možná nějaká intuice, ale vlastně to mě potěšilo a zároveň, že jsem tam vyzkoušel nějaké nové věci, které jsem třeba v Generali dělat nemohl. Nějaké přístupy, co jsem dělal v tom kurzu MBA, tak bylo vidět, že v téhleté case study ty přemýšlecí je to taky hodně zaujalo. Jedna manažerka musela odejít a ještě jako, že si to pustí na telefonu'", "summary": "Reálný problém + diskuze s interním expertem = nejsilnější trust signal pro kandidáta. Opak “kávovar” zadání.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/h9nnq5FtMaP4SqFy6MV5z", "video_clip": "[video highlight_clip_13D9p4.mp4 00:00.8-00:57.6]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady", "Trust signals"], "Intenzita": ["Velmi silně"]}}, {"id": "XrAfYMOzDVtw05v1CtYA", "text": "[Speaker 1] 'Dělo se to telefonicky nebo asynchronně. Nikde jsem nedostal ihned zpětnou vazbu, ani rozhodnutí hned po tom kolu. Vždycky to bylo s odstupem dnů. Někde jako automaticky posílali zpětnou vazbu, ale většinou to bylo tak, že já jsem, když jsem dostal odpověď, tak jsem volal — dáte mi zpětnou vazbu, napíšete mi, co teda by mohlo být jinak, lépe. Někde ti napíšou jenom jednu větu, ale nenechal jsem se odbít, takže do dvou těch, co mě odmítli, jsem psal ještě o nějaký detailnější' [Speaker 1] 'soupis, a třeba po týdnu mi přišel delší dokument nebo delší mail, kde to vysvětlovali, proč se tak rozhodli. Takže samovolně většinou to odmítnutí bylo formou mailu v rámci jedné, dvou vět, ale u dvou jsem požadoval detailnější zpětnou vazbu a na základě toho mi to po týdnu poslali.'", "summary": "Default feedback 1–2 věty. Detailní existuje, ale jen po opakované žádosti. Stejný pattern jako Bártů.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hskzhESgloLRrJvmfIHoQ", "video_clip": "[video highlight_clip_XrAfYM.mp4 00:01.4-01:03.3]", "tags": {"Hypotézy": ["H2"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "SaDEQ4i0IWvybBqUAnFY", "text": "[Speaker 1] 'Nejvíc líbí to zadání té case study. Protože vlastně vidíš, jak ta firma uvažuje nad tím designovým procesem, zároveň trochu si reflektuješ ty svoje dovednosti a to, co umíš, a dostaneš na to zpětnou vazbu. Co mi naopak nevyhovovalo — já jsem spíš člověk, který v situacích vypjatějších je nervózní. Jak jsem dostal jenom 10 minut na to, jak uchopit ten problém, vypni si kameru a za 10 minut něco představ. To myslím, že byl úkol, který mi nesedí. Kdybych měl třeba čas sednout na půl hodiny a projít tam jednu, dvě iterace, tak by to bylo lepší. Tady vlastně vnímám, že nakonec rozhodlo, že jsem do toho approduce tolik nezahrnul výzkum, ale z 10 minut hodnotit člověka mi přišlo, když ukázali case study, kterou si dělal rok, tak tam si prezentoval taky nějaký výzkum. Přišlo mi to trochu zvláštní. '", "summary": "Preferenční srovnání: case study WIN (self-reflection + feedback), 10min on-call LOSE (asymetrie očekávání).", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hpNRVOsYmbCgYerDy7gKq", "video_clip": "[video highlight_clip_SaDEQ4.mp4 00:00.7-01:11.1]", "tags": {"Hypotézy": ["H1", "H5"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points", "Pozitivní příklady"], "Intenzita": ["Velmi silně"]}}, {"id": "yaDTeN3Rg4r3XZg8sPTX", "text": "[Speaker 1] 'To asi nedokážu říct. Minimálně mě nesdíleli nějakou metodologii toho, jak vlastně hodnotit tady ty projekty. Vlastně většinou v tom zadání měli, co by mělo být patrné z toho výstupu, že to, co pošleš, tak asi by tam měl být nějaký wireframe, asi by tam měl být nějaký povědomí o tvém designovém procesu a tak, ale že by mi potom poslali jako ' [Speaker 1] 'bodování — tohle si splnil, nesplnil, tohle částečně — to se stalo jenom jednou. Částečně v tom software house na tu produktovou roli, když jsem požadoval tu zpětnou vazbu formou mailu, tak vzali jednotlivé části mé prezentace a komentovali, že jo, tady user story dobře sepsaný, tady z té story by nebylo patrné, co mají vývojáři vyvíjet. Takže tam byla nějaká ambice to popsat po jednotlivých částech, ale zase nebylo to obodovaný, že splněno, nesplněno. Jenom vlastně na základě toho, že mě zařadili do jejich matice medior++, ale jak ta matice vypadá? Chtěl jsem jí na tom pohovoru, jestli mi ji pošlou, že bych se i sám ohodnotil. A vlastně to se mi líbí, že děláte vy. A jestli bychom se potkali v tom, jak mě vnímají oni, jak vnímám já sebe. Ale oni jenom řekli, že ji předělávají, že mi ji můžou poslat, ale nakonec neposlali a jenom odeslali ten mail.'", "summary": "Aktivně žádal o kompetenční matici medior++ pro self-assessment. Firma slíbila, neposlala. Explicit reference na 2FRESH.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/h0ir3ucdHB1tzNiJcGztz", "video_clip": "[video highlight_clip_yaDTeN.mp4 00:00.0-01:26.9]", "tags": {"Default group": ["Existing solutions", "Nápady respondenta", "Pain points"], "Verdict": ["Go"], "Hypotézy": ["H5"], "Perspektiva": ["Kandidát"], "Intenzita": ["Velmi silně"]}}, {"id": "oySqiDmPyogfCWlQi4DC", "text": "[Speaker 1] 'Myslím si, že budu třeba někde mezi 40 až 60 hodinama za to období od toho října do toho ledna. Počítám do toho screeningový kolo, první kola, druhý kola a ty case study. Ty case study zabíraj nejvíc. Myslím si, že každou tu case study jsem dělal minimálně 4 až 8 hodin, některé i víc. Když to bylo na tu produktovou roli, tak user story, že jo, třeba tolik často nepíšu, takže jsem si nejdřív něco musel načíst a pak něco tvořit.'", "summary": "Job search 40–60 h za 4 měsíce. Case study 4–8h × 5–6 procesů = gros času. Job search jako týden práce navíc.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/h6QNy9c6kh78k7728z2tZ", "video_clip": "[video highlight_clip_oySqiD.mp4 00:01.5-00:39.0]", "tags": {"Hypotézy": ["Emergent"], "Default group": ["Industry insights"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "qZ1i3eIFtuivV2yullJ6", "text": "[Speaker 1] 'Asi bych byl odvážnější v tom, že bych se víc ptal, jak ta firma na tě uvažuje, než dostanu tu case study. To by mi taky mohlo napovědět. Někdy mi přijde, že když žádáš o tu práci, tak seš trochu — není to jako partnerská, že jo, úroveň, že ty někam jako nabízíš nebo poptáváš a oni si tě jako vybírají. Někdy jsem ty věci bral jako automaticky, že mi pošlete case study a já na tom budu rovnou dělat, ale myslím si, že kdybych se jako ptal na nějakém druhém kole víc toho manažera, tak už jsem třeba mohl identifikovat, že hele, tady asi to nebude fit a možná bych nemusel tolik toho času pálit na těch case study. Ne že by přišly v niveč, byl to spíš jenom nějaký můj trénink do budoucna, ale ten finální výsledek to nepřineslo. Takže víc se ptát někde mezi tím prvním, druhým kolem toho manažera.' [Speaker 2] 'Kdyby ses ptal bejval jo. Tak co by to vlastně přineslo? Co bys jako očekával, že bude ten dopad té změny?' [Speaker 1] 'Abych věděl, v jaké maturitě je ta firma, jak uvažují nad tím designovým procesem a co bych tam mohl dělat, jestli nebudu jenom plnit něco od produkťáka a překreslovat, ale bude tam i nějaká myšlenková práce? Takže no.'", "summary": "Kandidát chce pre-case-study filter — vyhodnotit firmu před investicí desítek hodin. Hiring není partnerská úroveň.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hfyrXxVwQKRvmtRivzokL", "video_clip": "[video highlight_clip_qZ1i3e.mp4 00:01.1-01:39.7]", "tags": {"Hypotézy": ["Emergent"], "Perspektiva": ["Kandidát"], "Default group": ["Nápady respondenta", "Pain points"], "Intenzita": ["Silně"]}}, {"id": "CZaRRUH6ChgpeIUZUDNh", "text": "[Speaker 1] 'To bylo v rámci Generali i v rámci Duhy, ale Generali bylo hlavně designéři a tam to bylo dost jako organicky uchopené, že většinou jsme na tom pohovoru byli jako manažer, dva seniorní designéři a já, a vlastně zadávali jsme nějakou jednoduchou heuristiku tomu zájemci. Měl na to čas nějakou třeba 15–20 minut a pak nám to představoval, my jsme se doptávali. Druhá část bylo, že měl ten respondent nakreslit jako jednoduchý wireframe tužkou na základě nějakého textového zadání. A další hiring, byl jsem na to přizvaný, ale vlastně jsme se moc nedostali k nějakému dotazování, bylo to primárně, byli jsme takoví jako přísedící a jenom jsme dávali manažerovi nějaký názor, ale byla tam primárně diskuze mezi tím manažerem a tím zájemcem.'", "summary": "Panel participant: Generali aktivní (heuristika 15–20min + wireframe), Duha jen přísedící. Žádný standardizovaný formát.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hUvIoJQe8VfSnK6LBM3V2", "video_clip": "[video highlight_clip_CZaRRU.mp4 00:01.0-01:07.7]", "tags": {"Perspektiva": ["Assessor"], "Verdict": ["Go"], "Hypotézy": ["H11", "H7"], "Default group": ["Industry insights", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "8L8d9GAThDthIf0im2ue", "text": "[Speaker 1] 'Bylo to vždycky tak, že začal manažer, následně každý řekl nějaký vstup za sebe, co, jak ten kandidát na něj působí, co si myslí o tom, jako co dělal a jak by tady zapadnul do té organizace. Ale neměli jsme žádnou pevnou strukturu toho, že bychom procházeli nějaké body, spíš to bylo dost organické nebo intuitivní, že každý řekl, co ho jako napadlo.' [Speaker 2] 'OK. A přemýšlím, do jaké míry ty jsi měl jako pocit, že ten tvůj hlas má nějakou váhu víš jako že?' [Speaker 1] 'No. Myslím si, že v nějaké poradní rovině ano. Manažer se ptal hlavně, jakože zajímal ho odborný pohled, ale nejvíc ho zajímalo samozřejmě, jak si myslíš, že by zapadl do týmu, jak cítíš fit jako ty. Když jsme třeba víc z nás jako řeklo, hele, to si myslím, že by úplně možná nefungovalo nebo nezapadla, tak manažer ani tu nabídku nedával. Takže jsem cítil, že to je vnímaný. V té odborné rovině to spíš vždycky bylo, že jsem dával jenom nějaký poradenský hlas. Bylo to primárně na rozhodnutí manažera, ani těch seniorních designérů, že manažer jako chtěl hlavně obsadit to místo nebo potřeboval toho člověka na to, aby splnil potřeby těch ostatních týmů.'", "summary": "Panel = poradní hlas (fit), ne rozhodovací (odbornost). Veto funguje, výběr ne. Manažer pod tlakem obsadit místo.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/h4n3hyGC5DMFbA6uCvXqA", "video_clip": "[video highlight_clip_8L8d9G.mp4 00:01.8-01:35.5]", "tags": {"Perspektiva": ["Assessor"], "Hypotézy": ["H11", "H7"], "Default group": ["Industry insights", "Pain points"], "Verdict": ["Unknown"], "Intenzita": ["Velmi silně"]}}, {"id": "zplo4VEdski8mahLZ8i3", "text": "[Speaker 1] 'Co dělal v té předešlé práci, jak často komunikoval s těma ostatníma profesema, jakože analytici, vývojáři. A já se vždycky jako ptám hodně na takové ty otázky — co tě teda vlastně na té práci baví, co ti challengeuje, nebo v jakých dalších oblastech se rozvíjíš. A když ten člověk odpovídá spíš vlažně, tak to pro mě je signál, že asi tolik nebaví to UX, nebo ty další profese už tolik ne. Jestli to bude mít nějaký přínos pro ten tým. Tím, jak se UX vyvíjí, AI, tak jestli my s tím všichni bysme se neměli spíš jako rozkročovat a být dychtivější po těch tématech. To je pro mě signál. Na základě čeho jsem dával doporučení, jako že spíše ano, nebo spíše ne.'", "summary": "Kleinertova kritéria assessora: cross-funkční komunikace, dychtivost mimo UX, energie odpovědí. Bez rubriky, ale koherentně.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hDNpoJcN5LVwItXPQyqvV", "video_clip": "[video highlight_clip_zplo4V.mp4 00:01.6-01:00.7]", "tags": {"Perspektiva": ["Assessor"], "Hypotézy": ["Emergent", "H7"], "Default group": ["Existing solutions", "Industry insights"], "Intenzita": ["Silně"]}}, {"id": "5UKIuxawkAy7zaeQxTtF", "text": "[Speaker 1] 'Já jsem si dělal takový kompetenční matice právě z nějakého newsletteru. Přišlo mi to ve formě Excelu, kde byly jednotlivé domény a tam jsem vyhodnocoval. To si pamatuju, že jsem si dělal a nakonec mi to vykreslovalo nějaký diagram. Nějaká kompetenční matice, asi ne tak detailní, ale nějaká zjednodušená, kdy ten člověk by na základě toho, jak se tam hodnotí, třeba ukazoval i nějaký důkaz toho, že to vlastně umí, nebo co vlastně udělal. Takže nějaká Excelová tabulka, to si myslím, že by byla ta forma.' [Speaker 2] 'Přemýšlím to, asi je zbytečná otázka. No no, dobře, dobře Michaele heleď já. Pomalinku se asi plížíme k závěru těch našich otázek nevím, lucko, jestli třeba náhodou ty ještě nemáš něco, co bys chtěla doptat Michaela? Než přejdeme k tomu k tý závěrečný části.' [Speaker 1] 'Teď asi ne. Já jsem měla v průběhu nějaké otázky, ale většinou jste je pak zodpověděli, jak jste se ptal. Takže.' [Speaker 2] 'No dobře, hele michale, kdybys měl vybrat jako 1. Věc, která ti přijde, že v tom najímání designérů dneska je nejvíc rozbitá, tak co by to bylo?' [Speaker 1] '1 věc je nejvíce rozbitá.' [Speaker 2] 'Co teď je. By se mohl změnit tak. By se tížilo líp.' [Speaker 1] 'Asi transparentnější nástin toho, co se vlastně teda v celém tom procesu bude dít. Chápu, že to nemůže být v inzerátu, ale když třeba mě přijmou na to první kolo, tak písemně mít sepsané, co se bude dít, těch jednotlivých kolech, kolik času můžou zabrat. Někdy to nebylo úplně patrný, vlastně jsem se to dozvěděl až s odstupem.'", "summary": "Kleinert sám artikuluje produktové features: (1) struktura proti intuici, (2) self-assessment matice s důkazy, (3) transparentnost procesu.", "session": "P7", "cohort": "designer-mid", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/h01qxQQ2EDstsbBwFMtS6", "video_clip": "[video highlight_clip_5UKIux.mp4 00:01.9-02:22.5]", "tags": {"Perspektiva": ["Assessor", "Kandidát"], "Default group": ["Existing solutions", "Nápady respondenta"], "Verdict": ["Go"], "Hypotézy": ["H5", "H7"], "Intenzita": ["Velmi silně"]}}, {"id": "FVUcRG0x08QY9Trvmak2", "text": "[Speaker 1] 'Tak určitě ta zkušenost tam je, jak z interního, tak z externího. (…) A asi po té interní zkušenosti mi došlo, že to není tak různorodý, jak bych chtěla, že ta realizace tam je potom šlapání nějakého kariérního žibříčku, což asi nebylo úplně pro mě. (…) Celý život si myslím, že jsem nějak tak jako k tomu lpěla a sněla, že budu mít teda něco svého, tak jsem se rozhodla, konečně jsem se rozhoupala, že předtím, než budu mít děti, tak to jako zkusím. (…) Je nás teď šest a máme klienty v různých sektorech, ale vždycky nebo většinou, asi z 90 % zaměření (…) IT a věci kolem něj.'", "summary": "Discovery moment = únava z “kariérního žebříčku” v korporátu. Reeva = 6 lidí, 90 % byznysu IT.", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hkOU3jxr3nLfBCB07hhtb", "video_clip": "[video highlight_clip_FVUcRG.mp4 00:01.1-01:09.9]", "tags": {"Default group": ["Industry insights", "Workflow / Chování"], "Intenzita": ["Neutrálně"], "Perspektiva": ["Recruiter"]}}, {"id": "ebyxnCnf4cKSCIcFRmRe", "text": "[Speaker 2] 'Vy mě možná vyvedete s omylu tím, že vlastně jste designová firma a tady tohle hledáte běžně, je to vlastně váš denní chleba, takže ta vaše potřeba bude daleko větší než nějakých jiných firm, ale u většiny společností, se kterými já jsem se setkala, tak ta část toho designu, UX, UI, nějaká research, přesně produkt, tak jsou vlastně takové krásné pozice, které hezkými. (…) ne těch kvalitních, ne těch úplně skvělých, těch vždycky nedostatek, ale celkově těch lidí na tom trhu je poměrně dost. A tady tyhle pozice se velice často obsahovaly právě insercí nebo na doporučení už stávajících zaměstnanců. Takže tam nebyla taková poptávka to řešit externě přes nějakou náborovou agenturu anebo prostě nějakým headhuntingem. (…) ty populární role, že většinou, když tady tuhle roli do agentury i někdo zadal, tak všichni rekruteři na ní chtěli pracovat, protože ta úspěšnost tý obsazeností tam byla jako velice vysoká.Rozumím. Já jsem si všiml, že máte na webu takový claymy jako premium IT recruting, good tweepicky a takže jako co tohle vlastně znamená v praxi? Jak se to projevuje tyhle ty?'", "summary": "Design role = strukturálně slabý agenturní kanál. Firmy si je řeší přes inzerci/referrals. Když dorazí do agentury, recruiteři se rvou.", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hARlzqh0Ey4MGcCw7Kqfq", "video_clip": "[video highlight_clip_ebyxnC.mp4 00:00.5-00:12.9]", "tags": {"Hypotézy": ["H10", "H8"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "p6oBfn4HY4UxGxE4wn1k", "text": "[Speaker 1] 'Jo v dnešní době, kdy je velký tlak i na employer branding a vůbec ten příběh toho interna (…) Znamená to teda, že ty lidi nevybíráte jenom na základě těch hard skillů, ale taky těch soft skillů, toho, aby patřili do týmu, a že i kdybyste měli top kandidáta, který je skvělý technicky, ale nezapadá lidsky, tak ho prostě nevezmete. Což v některých firmách, se kterýma jsem se setkávala já, se nedělo. (…) brát to holisticky z toho pohledu i té lidskosti, toho, jak přistupují ke klientům třeba a co třeba přináší ještě k té práci navíc, co než co je daný na papíře.'", "summary": "Premium = soft skills + cultural fit veto. Trend posledních let. Reeva positioning navázán na employer branding wave.", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hWSBmFC0F89DkkYXXEuIu", "video_clip": "[video highlight_clip_p6oBfn.mp4 00:00.7-00:46.9]", "tags": {"Hypotézy": ["Emergent", "H1"], "Default group": ["Industry insights"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "FA7NlNtDTwEL0bX1ArVd", "text": "[Speaker 1] 'My ty klienty hodně zpovídáme právě o tom, co je podstatou té jejich práce, co je podstatou té firmy samotné, jak vlastně ty lidi nakupují ti samotní hiring manažeři. (…) v mnoha případech nikdy ani ty hiring manažeři neumí odpovědat na tyhle otázky, protože si nikdy předtím nedali nebo neměli čas se na ně zamyslet, protože spousty hiring manažerů samozřejmě nedělají jenom tohle, mají tu svoji běžnou rutinu a ten nábor je jenom nějaká úplně malinká část. (…) V dnešní době hodně zapojujeme i AI, používáme GPT, Metaview a další věci. (…) Takže jsou to takové ty klasické cesty, jako je LinkedIn, Google, Stack Overflow, UXové skupiny na Slacku.'", "summary": "Hiring managers neumí artikulovat, koho hledají. Reeva discovery interview + AI tool stack (GPT, Metaview).", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hPDNrNVrkZncf86KY3yX2", "video_clip": "[video highlight_clip_FA7NlN.mp4 00:01.6-02:00.6]", "tags": {"Default group": ["Existing solutions", "Pain points", "Workflow / Chování"], "Hypotézy": ["H4", "H9"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "tKTbf0nayIahBQsShXOU", "text": "[Speaker 1] 'v momentě, kdy vlastně ty lidi se nám ozývají zpátky, že by o tu pozici měli zájem, my teda v 99 % uvádíme hned toho klienta. Neděláme to takovým způsobem, že bysme mlžili. (…) ty lidi samozřejmě pořád v dnešní době nemají dobré zkušenosti s rekruterama, chtějí obcházet nebo jdou obejít tu rekruterskou agenturu, protože jim to přijde zbytečný. (…) potom si domluváme s tím kandidátem při screen call, takže máme 30-minutový detalní hovor (…).' [Speaker 1] 'A potom si domlouváme s tím kandidátem pryskrncal, takže máme třicetiminutový detailní hovor, pardon.' [Speaker 2] 'V pohodě.' [Speaker 1] 'Kde se teda snažíme i tomu kandidátovi spoustu věcí říct, takže jako máme tam část, která je čistě zpovídací, že toho kandidáta zpovídáme. Ptáme se ho na to, jak tu práci řešil a jak spolupracoval, jaký projekty ho bavily nejvíc a tak dále. U všech pozic ve všech případech požadujeme i nějaké příklady té práce. (…) tady tenhle transcript, ať už si ho bereme jako z Metaviewu, z Notakeru nebo od někud jinů, zase dáváme hiring asistentovi nebo AI asistentovi a pomáhá nám dělat ten sam pro hiring manažera.'", "summary": "Reeva workflow: client name disclosed + 30min screen + portfolio + AI summary. Sebepřiznání: kandidáti recruitery obcházejí jako “zbytečné”.", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hKiE7brCq0aL6B5o5eWF9", "video_clip": "[video highlight_clip_tKTbf0.mp4 00:01.6-01:45.4]", "tags": {"Default group": ["Existing solutions", "Workflow / Chování"], "Hypotézy": ["H8", "H9"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "YVLNfoAQyZ8lh39QU2Zo", "text": "[Speaker 1] 'Já to dost často přirovnávám k muzice. Jsou týmy, které víte, že jsou jasný techno, jsou týmy, které víte, že jsou jasný country a potom jsou týmy, které jsou nějakým způsobem mix a je to prostě fest jak. (…) je to osobní věc, je to něco, co se strašně těžko předává a učí, ale v momentě, kdy si to nějakým způsobem najedete, tak se to dá možná i replikovat a dokáže to dělat víc lidí než jenom ten jeden senior. (…) Vy nechcete poslat člověka, který poslouchá rock na Techno Festival, jo, protože by prostě jako nezapadalo. Byť je to super člověk, je to skvělý člověk, stejně jako ten druhej, ale prostě nebude to sedět, protože to nebude ladit.'", "summary": "Punchline metafora pro cultural matching. “Strašně těžko předatelné.” Otázka: dá se cultural fit zachytit do struktury pre-vetting profilu?", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hxw98OODOUFnyqfprJI9T", "video_clip": "[video highlight_clip_YVLNfo.mp4 00:01.2-00:50.1]", "tags": {"Hypotézy": ["Emergent", "H1"], "Default group": ["Industry insights", "Workflow / Chování"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "JLO5UKvsupUUdAj5Ul8E", "text": "[Speaker 1] 'Máme na to statistiky (…). Na jednoho nabraného člověka napříč těma pozicema (…) je 100 oslovených lidí tou kvalitní outreach message. Z toho je nějakých 30… 20-30 %, kde ty lidi odpovídají. To neznamená, že to jsou pozitivní reakce, ale jsou to vůbec odpovědi (…). A tady z tohohle potom je nějakých (…) 15-10 pre-screen callů, kdy tady z tohohle množství záleží, jaká je to pozice, potom posíláme určitý množství dál na ty hiring manžery. (…) okolo 5-8 lidí,'", "summary": "Reeva funnel: 100 outreach → 20-30 odpovědí → 10-15 calls → 5-8 final. Reeva filtruje hlouběji než Pohanka (200-500 → 20).", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hqAr8xdqsXyQP3eucZJ1n", "video_clip": "[video highlight_clip_JLO5UK.mp4 00:01.9-01:17.7]", "tags": {"Hypotézy": ["H2"], "Default group": ["Industry insights", "Workflow / Chování"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "noP6lxpNdAbTmJU3d2u4", "text": "[Speaker 1] 'No a objem práce a ten to hire. Ten time to hire je mezi měsícem až dvěmi. (…) potom jsou samozřejmě role, které i nám trvají obsadit třeba časem čtyři, pět měsíců, protože je tam komplikovaná situace právě s výběrem, kde vlastně projde celý tenhle proces (…) a my se potom vracíme na začátek, protože v momentě toho výběru jsme zjistili, že třeba ten trh je jiný, ty kandidáty na tom trhu nejsou a vracíme se vlastně zpátky k tomu zadání.'", "summary": "Time-to-hire 1-2 měsíce default, edge cases 4-5 měsíců = restart procesu. Loop calibration vstup ↔︎ trh.", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hcJ7yCNaZBBfRcw5gJERd", "video_clip": "[video highlight_clip_noP6lx.mp4 00:00.9-00:44.9]", "tags": {"Hypotézy": ["H10", "H4"], "Default group": ["Pain points", "Workflow / Chování"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "mUTNqsLpRLWLdGXTrFxl", "text": "[Speaker 1] 'Schopný rekruiter je schopný pracovat (…) na třech, čtyřech rolích najednou. A naši rekruiteři obsazují dvě pozice měsíčně a to je dobrý výsledek, protože ty pozice jsou hodně specifický a zadávají nám je klienti v momentě, kdy si s nimi sami neví radit, takže to jsou opravdu typiky. (…) ten čas na jednu pozici je určitě nějakých 80 hodin (…). V dnešní době ano, Metaview a další AI asistenti hodně pomůžou. (…) Není ani tak těžký vyhledat toho člověka. Nejtěžší je vlastně zmáknout ten proces. (…) ten management na tom je vlastně to mě těší a to zabírá nejvíc času.'", "summary": "Recruiter capacity: 3-4 role najednou, 2 placementy/měsíc. ~80h/pozici (vs. Pohanka 10-20h — Markéta zahrnuje management). Bottleneck = management procesu, ne search.", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hIz3BNK8Eb493VO7A9c9K", "video_clip": "[video highlight_clip_mUTNqs.mp4 00:00.1-01:39.7]", "tags": {"Hypotézy": ["H1"], "Default group": ["Pain points", "Workflow / Chování"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "bXmzdeb6INBXZ9D9i8FK", "text": "[Speaker 1] 'Tak tam určitě jde o to, jestli je to klient, se kterým jsme pracovali nebo ne. (…) Na tom začátku to možná nedokážeme odmanageovat tak dobře, protože byť přijdeme hned na talíři s tou pravdou, tak vlastně ta druhá strana nám nevěří, protože tam není vybudovaný ten vztah. (…) je to takový nešvar (…) pořád rekrutementu, a že vlastně i za tu odvedenou práci v mnoha případech nejsme zaplaceni. Tohle se neděje ani u marketingu, ani u salesu. (…) V rekrutmentu někdy pracujeme na těch pozicích měsíc, dva a máme zaplaceno jenom, pokud je z toho opravdu ten placement. (…) To je taková bolístka agentů, bych řekla, pokud si neplatí něco dopředu nebo nemají nějaký executive search, za který mají zaplaceno přede.'", "summary": "Strukturální pain agenturního byznysu — success-fee only model. “V rekrutmentu pracujeme měsíc, dva a máme zaplaceno jen, pokud je z toho placement.”", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hkv0fUKXbTHYOxNAGPymP", "video_clip": "[video highlight_clip_bXmzde.mp4 00:01.1-01:21.8]", "tags": {"Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "xgdECPonsr754dAaqqmx", "text": "[Speaker 1] 'je to určitě v různých firmách různě. Někdy to jde z týmového budgetu, někdy to jde z budgetu na ty samotné lidi, protože v momentě, kdy, dejme tomu, vás platí nějaká matka z Ameriky, tak máte nabadžetováno, dejme tomu, od ledna, tím pádem oni vám od ledna platí FTE, ale vy toho člověka nahajrujete až v květnu, takže jste ušetřil sobě do týmu pět měsíců tady tohodle platu člověka. Takže máte peníze vlastně už jenom by default tady z tohohle podnětu. (…) nebo je to potom nějaký HR balíček, že HR má teda nabudgetováno na agentury.'", "summary": "3 budget sources: tým / FTE úspory (delayed hire = ušetřený plat) / HR balíček. (2) je insight, který Pohanka neuvedl.", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hj4wDUN8zo8NpWlCU5BZk", "video_clip": "[video highlight_clip_xgdECP.mp4 00:01.1-01:03.1]", "tags": {"Verdict": ["Go"], "Hypotézy": ["H10", "H12", "H6"], "Default group": ["Industry insights"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "hO5iuicbPFVMfpHJLUxh", "text": "[Speaker 1] 'agenturu si korporát poptává v momentu, kdy mu ty interní síly nestačí. My určitě jako nejsme spásný úplně jako všeho a pokud prostě ty lidi na trhu neexistují (…), tak je taky neumíme najít stejně tak jako ten interní tým. Ale ta agentura přichází v momentě, kdy ten interní tým prostě nestíhá. (…) nedává smysl, aby si nabrali vlastního interního rekrutera, protože nechtějí mít do nekonečná FTI dalšího rekrutera, když ví, že ten boost bude jenom na 6 měsíců. (…) Čím to děláme úplně dramaticky jinak je asi ta rychlost. My si můžeme dovolit přesně zapojit teď ty AI asistenty (…) protože nejsme omezení těmi korporátními stanovami (…). většina korporátů má jméno, většina korporátů si může zaplatit EPR (…) takže ten employee branding jako celkově je dobře nastavený, takže tam vzniká i spousta náborů s aplikací, s interátů (…). A tím, že nemá čas na ten headhunting, tak si potom poptá agenturu a my teda děláme jinou část jeho práce, což je právě ten aktivní nábor a outreaching'", "summary": "Agentura = boost capacity + headhunting layer, ne náhrada interního TA. Rychlost agentury = absence corporate compliance (AI bez schvalování).", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hG0lIZp9hqraNdpSCQCAy", "video_clip": "[video highlight_clip_hO5iui.mp4 00:00.6-01:43.8]", "tags": {"Hypotézy": ["H10", "H9"], "Default group": ["Industry insights", "Workflow / Chování"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "UEJaxRDCY8khQciCQXAV", "text": "[Speaker 1] 'Určitě je to povaha těch lidí. To, že designéři ve většině případů jsou daleko komunikativnější a responsivnější než hardcore IT developeri, tak toho si myslím, že je ten největší rozdíl. (…) zase těch dobrých designérů, toho, že člověk opravdu to řemeslo umí hodně hluboko, rozumí tomu, tak tady těchto lidí bude pomálu. Ale toho, že běžně designérské role se dají naučit daleko jednodušší (…). naučit se být designérem nebo bylo daleko jednodušší, než se státí developerem. Takže jako z tohohle hlediska je vás prostě víc, nebo na tom trhu je daleko víc těchhle lidí, než těch coderů.'", "summary": "Designeři komunikativnější, trh nasycenější (vstupní bariéra nižší než dev). “Dobrých málo, většiny dost.”", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hUTJvAhgzP07nvAHsRLUp", "video_clip": "[video highlight_clip_UEJaxR.mp4 00:01.5-01:22.9]", "tags": {"Hypotézy": ["Emergent", "H7"], "Default group": ["Industry insights"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "VdwJG4mqIeRxOr5O0CMq", "text": "[Speaker 1] 'Tak tady v tomhle si myslím, že hraje velkou roli ten hiring manager. Myslím si, že zrovna jako kvalitního designera já poznám daleko hůř, než ten samotný hiring manager, který na to má oko a dělá to denně. (…) je to i na základě těch, na základě toho portfolia, co ten člověk má. A to, že já potom hodnotím už ten aspekt toho, jako jak nemě ten člověk působí, jak si myslím, že je kolaborativní, jakou má nátoru a tady tyhle věci, tak to je zase jako, to už je ta nástavba nad tím, nad tím jako techničním (…). je to jako dobrý designer designer, tak to určitě hodnotí vždycky ten hiring manažer.'", "summary": "Druhá nezávislá konfirmace P9 pasáže 7. “Designera poznám hůř než HM.” Markéta dělí: technika = HM, soft = recruiter.", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hGNRPsfSBHvbT1Qu6W0VD", "video_clip": "[video highlight_clip_VdwJG4.mp4 00:00.6-01:02.3]", "tags": {"Default group": ["Existing solutions", "Pain points"], "Hypotézy": ["H2", "H7"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "O2b3oc34Ekue7tUCvJg0", "text": "[Speaker 1] 'v tomhle je ta ta podstata Reevy jako agentury, že ta spolupráce s těma hiring manažerama je velice úzká a tam, kde nemáme RPO, což znamená, že náš rekruter sedí přímo v té firmě, ale je to externí spolupráce, tak máme vytvořený ve většině případů s těma klientama, s těma hiring manažerama Slack. Takže dokázujeme velice úzký, rychlý komunikaci mezi tím, co je dobrý, co je špatný, proč jo, proč ne. A k tomu ponaučení se a k tomu, že to vylepšíme dál.'", "summary": "Reeva diferenciátor: Slack channel s HM (nebo RPO embedded). Real-time loop pro feedback.", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/h12CXs7kuGCqiQ1lYhsBH", "video_clip": "[video highlight_clip_O2b3oc.mp4 00:01.7-00:26.4]", "tags": {"Default group": ["Existing solutions", "Pozitivní příklady"], "Hypotézy": ["H1"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "kEhItJKEdZHUg6pkPdJd", "text": "[Speaker 1] 'Každé pozice se liší a u těch hardtechnických je vždycky technický kol. Jako pokud designéři mají nějaký domací úkol, že teda připraví nějakou strategii anebo nějaký jako vlastní návrh, ale ve většině případů se to vlastně neděje. Spíš se jde po těch zkušenostech, co už ten člověk měl a potom co ukazuje vlastně to portfolio, který už má.'", "summary": "Designeři ve většině případů NEdostávají homework. Assessment přes portfolio + verbalní zkušenosti. ČEZ (Navrátilová) = exception.", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hoHOOTBDZnqiBPqJoSihk", "video_clip": "[video highlight_clip_kEhItJ.mp4 00:01.4-00:25.5]", "tags": {"Hypotézy": ["H1", "H7"], "Default group": ["Industry insights", "Workflow / Chování"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "1Geq6C0yc2pgGDurQ3KF", "text": "[Speaker 1] 'Věřím tomu, že i tím, že vlastně jsem seděla na několika Greenfield projektech, kde vlastně to byla no-name firma a tady začínala (…) tak bych řekla, že patent tam určitě je, a to, jak to dobře dělat a zkombinovat vlastně všichni tady tyhle fáze. (…) Od toho procesu náborovýho po to, že si vybíráte ty správný lidi, kteří zase mají potom proces na to, jako jak dál postupovat (…) až po to, že máte employee branding od dne a a ruku v ruce s tím máte PR, bez kterého to prostě nejde. Takže to si doufám říct, jako že vidíte na firmách, který jsou v tomhle úspěšný od Pure Storage, STRV a dalších a nebo vy samotný, že jako to, že děláte podcasty a jdete vidět a zajímá vás i jako přesah přes ten váš design samotný, tak jako dělá to, že máte firmu úspěšných kvalitních designerů.'", "summary": "Úspěch v hiringu = systém: nábor + onboarding + employer branding + PR + content. 2FRESH explicit jako příklad.", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hk1ZnF6J7Ux2T7XGsJa3K", "video_clip": "[video highlight_clip_1Geq6C.mp4 00:01.1-01:20.5]", "tags": {"Hypotézy": ["Emergent", "H4"], "Default group": ["Industry insights", "Pozitivní příklady"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "nh4RWPkVxGtRGWyjfV8v", "text": "[Speaker 1] 'každá ta firma to má úplně jinak. každá ta firma to má úplně jinak. V korporátu to jde befelem a tam jsou i dané směrnice, jak vlastně takový job description má vypadat. Je potom taky rozdíl mezi tím, jestli je to job description, který zůstává ve firmě interně, nebo je to job description, který jde ven. To jsou dvě rozdílné věci. V mnoha případech jsou to dvě rozdílné věci, někdy ne a pak to vypadá hrozně. (…) jak ta pozice jmenuje, jak ten trh to přijímá, protože někdy interně máte nějaký názvosloví, který prostě funguje, protože je daný, známý ve firmě interně, ale navenek nefunguje, protože to takhle nikdo nikdy neslyšel, nedává jim to smysl. Takže určitě tam to tvoříme spolu, pokud to nefunguje.'", "summary": "JD interní vs. externí jsou dvě role. Markéta to spoluupravuje (vs. Pohanka NEupravuje). Diferenciace recruiter strategie.", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hUbMuHICiaedX0aiXNYAr", "video_clip": "[video highlight_clip_nh4RWP.mp4 00:01.8-00:48.9]", "tags": {"Hypotézy": ["H4"], "Default group": ["Pain points", "Workflow / Chování"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "3chsymToIQyNaxfj5Eef", "text": "[Speaker 1] 'Určitě to roli hraje, protože ten člověk už ví, do čeho jde, ale ještě bych do toho dala třetí věc, která je hrozně důležitá a to je životní situace toho člověka. A vy daleko líp zapadnete do korporátu (…) pokud (…) máte rodinu, chcete stabilit, chcete klid a jasně daný mantinely. Když, dejme tomu, máte před rodinou nebo už máte děti odrostlí, ale pořád máte spoustu energie a chcete si ještě něco zažít a dokázat, tak je pro vás startup, protože tam žádný mantinely nejsou. Můžete pracovat 24-8 (…). hraje velkou roli i ta zkušenost toho člověka, ale také to, v jaké životní fázi a v jaké životní energii se ten člověk teď nachází.'", "summary": "Třetí matchmaking dimenze: životní fáze (rodina = stabilita; pre-rodina = startup energie). Risk diskriminace, careful.", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/htCbtCjIDY0taftRi7I64", "video_clip": "[video highlight_clip_3chsym.mp4 00:00.7-01:00.7]", "tags": {"Hypotézy": ["Emergent"], "Default group": ["Industry insights", "Trust signals"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "AHzdGZyaEOl9ZVqwdWFb", "text": "[Speaker 1] 'Nejčastěji je to o tom, že si dobře nezvalidovali, jakého člověka vlastně potřebují a hledají rocket science prostě na nějaké úplně minoritní úkony a naopak. (…) Bude ten člověk muset komunikovat s někým a bude to jenom interně nebo prostě bude komunikovat i do Afriky a jaký jsou tam ty lidi, jak to musí zvládnout. Anebo to bude někdo, kdo bude opravdu jako sedět a jenom tvořit a potřebuje klid (…) potřebuje být v kolektivu, potřebuje chodit do kanclu, anebo to může být někdo i remote (…). myslím si, že nejčastější chybu a spálemého času je tady u tohohle vstupu. Ale v dnešní době, kdy už mám za sebou i to, že mám svou vlastní firmu, vidím, jak je to hrozně těžké jako někoho novýho přijmout (…) takže jako tohle bych řekla, že nejčastější prostě chyba.'", "summary": "Root cause #1: firmy nevalidovaly, koho hledají. “Rocket science na minoritní úkony.” Cross-validuje H4 napříč P1-P9.", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hcc0DBRmKKS7rUpTgfSSM", "video_clip": "[video highlight_clip_AHzdGZ.mp4 00:00.7-01:30.9]", "tags": {"Hypotézy": ["H4"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "8d4S20oHOF5eGsPaXbDH", "text": "[Speaker 1] 'je to to, že se snažíme být hodně transparentní (…) anebo třeba to, co jsme udělali u vás, že omezíme ten čas toho, když se té pozici věnujeme, že vlastně tam dáváme ten 14-denní test na to, jestli teda jako najdeme správný lidi nebo ne, protože pokud se to rozplyzne jako do něčeho daleko delšího, tak většinou už narážíme na to, že tam jako je nějaká ta chyba u toho vstupu. A to musíme teda jako velice rychle změnit, protože jinak na tom pálíme strašně moc času, který není zaplacenej.'", "summary": "14-denní time-box jako diagnostic tool. Když Reeva nenajde do 14 dní, vstupní zadání je špatně. Forces fast restart.", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hBrIVxH3mmTXQ5jiuWhe3", "video_clip": "[video highlight_clip_8d4S20.mp4 00:00.8-00:43.3]", "tags": {"Default group": ["Existing solutions", "Workarounds"], "Hypotézy": ["H1", "H4"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "g4TaWb22nrYhwgX8XpnF", "text": "[Speaker 1] 'Je to asi to, že těch klientů máme víc a že už v tom množství, které oni za ten rok udělají, tak potom jsou tam ta jedna, dvě role, které už nejsou schopný sami odvést. Ať už je to z toho důvodu, že ten interní tým na to už nemá ten prostor a oni to potřebují rychle, anebo je to prostě tím, že už vyčerpali ty svoje pole, kde hledat. (…) ten rekrutment je určitě hodně o konexích a o tom, koho znáte. Takže tam v momentě, kdy potom do toho vpouštíte další bubliny, tak je to samozřejmě efektivní, protože vždycky zná někdo někoho, koho vy ještě neznáte. Ano, je tam ten průsečík toho, že znáte mnoho lidí společných, ale pak je tam právě ten jeden, dva, který potřebujete, který neznáte a oni jo.'", "summary": "Reeva exception explained: agreguje rezidua z většího klientského base + bubble crossover network. Value prop = expanding reach beyond client’s bubble.", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/h4JmSzWV0YIxunjRElYAT", "video_clip": "[video highlight_clip_g4TaWb.mp4 00:00.4-00:52.7]", "tags": {"Hypotézy": ["H10", "H8"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Recruiter"], "Intenzita": ["Velmi silně"]}}, {"id": "qsbJPRDAfjgNgri1dzam", "text": "[Speaker 1] 'Jsou to určitě ty rutinní práce, co jako děláme pořád, no, takže od toho searche těch kandidátů, tak po právě psaní těch reportů, přesně očukávání si ty job descriptions, jestli je teda správná, není správná, jak ji napsat lépe, no, myslím, že tady tyhle věci. (…)' [Speaker 2] 'Tahleta práce, kterou popisujete, tak když ji srovnáte s tím obdobím, kdy jste byla v těch korporacích, to předpokládám, že byla stejná práce, akorát jí teďka děláte třeba efektivněji v agentuře, protože už to máte zmáknutý. Ale jako ty jednotlivý úkony asi jsou pořád stejný, že jo v rámci.' [Speaker 1] 'Určitě pořád stejný. Myslím si ale, že tohle má každý seniorní člověk stejný. Vy vlastně, čím seniornější jste, tak tím vám rychleji spínají ty věci a dokážete stejný objem práce udělat za menší čas. Proto máte čas se věnovat týmu (…)'", "summary": "3 oblasti příležitostí: search, reports, JD checking. Markéta sama neotvírá téma “tool, který by validoval kandidáty” (= Pohanka P9 pasáž 23).", "session": "P10", "cohort": "recruiter-agency", "date": "04/05/2026", "setting": "", "link": "https://share.condens.io/hXMgRD3S8txvosSRzh3xC", "video_clip": "[video highlight_clip_qsbJPR.mp4 00:01.1-00:59.3]", "tags": {"Default group": ["Existing solutions", "Pain points"], "Hypotézy": ["H4", "H9"], "Perspektiva": ["Recruiter"], "Intenzita": ["Silně"]}}, {"id": "8DIGQ2rnxL5GhF6r0ezi", "text": "[Speaker 1] 'V každé firmě to je individuální. v nejlepším případě je tam nějaký talent acquisition manager, který tvoří strategii a strategicky teda rozhoduje o tom a vyhodnocuje, co teda dává, nedává smysl. V mnoha firmách je to na týmech. (…) ve velkých korporátech potom si to řeší každý hiring manažer jako sám po svým a vlastně jde o to, aby nabrali ty lidi, jim je vlastně úplně jedno, jak
