velmi obecný, to znamená, my hrozně chceme, vzbudit nějakou proaktivitu a vlastní pojetí toho problému. A dokonce jsme hrozně doufali, že se nám ty lidi začnou ozývat, že jim něco není jasné, že by se chtěli doptat. To se nepotkává s realitou. Minimálně u těch mediorů a juniorů, ty většinou to nějak udělají a pak ti to řeknou na tom druhém kole, že jo, jsem to úplně nepochopil, tak jsem to udělal takhle. Je to nějaký druh toho, co si ověřujeme. Oni teda to vypracujou, je to velmi obecný, každý to vypracuje prostě jinak. A pak vlastně v rámci tý zaslaný case tady, tak mají rovnou informace o tom, že s tím půjdou na to druhý kolo. My je prosíme, aby nám to do nějakého data poslali a my si to ověřujeme. A vlastně se rozhodujeme, jestli teda na to druhý kolo je pozvem. Ale to se skoro nikdy nestalo.' [Speaker 2] 'Nepamatuju si jediný případ, kdybychom je nepozvali. Ono už je to blbý, když ten člověk samozřejmě ten úkol vypracuje. A když ho vypracuje, spíše stane, že ho nevypracuje a že s ním jako ukončíme komunikaci, že měl prostě nabídku jinde, nebo nás vyghostoval a cokoliv.'", "summary": "Case study záměrně vágní — testuje proaktivitu a vlastní pojetí. Ale lidi se nedoptávají", "session": "P8", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hm6XWTvFVveoerqlPjgL4", "video_clip": "[video highlight_clip_Yt1SMS.mp4 00:01.7-02:18.7]", "tags": {"Default group": ["Existing solutions", "Workflow / Chování"], "Hypotézy": ["H1"], "Perspektiva": ["Hiring manager", "Lead"], "Intenzita": ["Silně"]}}, {"id": "CVeM7QsvCMiHgIXyVRJv", "text": "[Speaker 2] 'A tam už pak je jenom ten chapter lead s tím daným, nebo s částí toho týmu, do kterého se ten člověk hlásí, vývojový. To znamená, je tam většinou i nějaký vývojář, je tam většinou nějaký produťák, záleží, jak se to povede v tom daném týmu. Ale je fakt cílem, aby tam byly ty lidi z toho týmu, který vlastně taky koukají, jak ten člověk jako přemejší. A ten člověk pak přijde na to druhé kolo, tam už žádný… Dva… A vlastně celý to řídí ten chapter lead, ten designer. A většinou to probíhá tak, že dají tomu člověku čas, aby to vlastně představil sám, tak on vlastně ukáže, co dělá tak. Na tom se hodně ověřujeme, jestli to reálně dělal, nebo jestli to dělal třeba někdo jiný. A podle toho, jak o tom mluví a jak řekne, co zatím je, tak tomu… vlastně zjišťujeme, jak ten člověk pracuje, protože jak je to zadání obecný, tak někdo skončí tak, že pošle dvě hotový obrazovky klikatelního prototypu totálně bez kontextu. Ale neznamená to, že je špatný, protože třeba nepochopil, že tam ten kontext má dát a on ho tam dá tou prezentací. Jiný člověk zase pošle obrovskou analýzu, že si udělal rozhovory a další věci a žádný výstup z toho reály zatím nemá. To je nějaký discovery, něco podobného. A i to je zajímavé. A my vlastně chceme vědět, jak ten člověk přemýšlí a ptáme se třeba, a co byste dělal dál, kdybyste teď měl další týden na to. Nebo co byste teď udělal jinak, kdybyste to dostal znovu a to zadání. A snažíme se na základě té komunikace zjistit, co je pro toho člověka důležité. A jak vlastně přemýšlí. A na základě toho se pak rozhodujeme. Na to doptávají pak ty lidi z toho týmu, vývojáři, produktáři, a ty vlastně si většinou neprohlídnou tu kejsku, i když jim ji nazdílíme. Ale ty už tu jedou jako pocitově, z pozice té svý dané role. A je to velmi relevantní v tom, že pak na tom druhém kole my máme vlastně odpovědi i technický, i produktový, který třeba ten designer jako všechny není.'", "summary": "2. kolo: panel s vývojářem a PM — “koukají, jak ten člověk přemýšlí.", "session": "P8", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hQlcAVOKXMIdQf28aemNX", "video_clip": "[video highlight_clip_CVeM7Q.mp4 00:01.5-01:53.6]", "tags": {"Default group": ["Existing solutions", "Pozitivní příklady"], "Hypotézy": ["H1"], "Perspektiva": ["Lead"], "Intenzita": ["Silně"]}}, {"id": "mPYavZKUeYMLke8ZjS2B", "text": "[Speaker 2] 'Většinou je to na základě porovnání těch lidí, co absolvovali to druhé kolo. Podle mě to hodnocení toho konkrétního výkonu je jako jedna věc, ale většinou se tam hrozně sčítá takový to porovnávání těch lidí. Takže pak vybíráš z toho, jaký jsou tvý možnosti, a ne z toho, jestli se reálně potkaly tvý požadavky na toho člověka. Víc se vybírá na základě toho, co je zrovna v meníčku. Teďka prostě přišly tyhle ty tři chody a my si řekneme, tenhle chod je lepší než nemít asi nic, tenhle asi vezmu.'", "summary": "Vybíráš z toho, co je v meníčku, ne proti požadavkům.” Relativní porovnání > absolutní kritéria.", "session": "P8", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/h32f6Qua3m3a73shvCMO2", "video_clip": "[video highlight_clip_mPYavZ.mp4 00:01.3-00:52.2]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Perspektiva": ["Hiring manager", "Lead"], "Default group": ["Industry insights", "Pain points"]}}, {"id": "aWHdh9Ge9TgrK7gRFnNV", "text": "[Speaker 2] 'Protože je tam sto nabídek a máš tam prostě lidi, kteří jsou skvělí, tak automaticky dáváš přednosti jim. Takže ty trény jsou úplně odepsané. Ale to jenom jako dodatek. A s těma mediorama to skončí u seniorů. Často. A teď jsme teda měli tento případ, nabrali jsme toho kluka na Mediora, mně přijde seniorní. Já jsem říkal, jak to vlastně máme s těma kompetencama, že jsem vůbec nevěděl, jak to funguje. A odpověď byla za mě fair, protože my jsme se rozhodli, že je nastavíme po zkuševce, že prostě až projde zkuševkou, tak on si projde tím self-assessmentem sám a na základě toho my to hodnotíme a uvidíme, co vyjde. A pokud zjistíme, že prostě je na jiný úrovni, než jakou jsme si jako mysleli, tak na základě toho upravíme ten rozvoj a vstoupí to v platnost prostě v dalším období tý evaluace. Jo, kdy vlastně vždycky jednou za rok minimálně jako ty lidi budeme hodnotit a budeme vlastně ověřovat tu úroveň, na který jsou. A do toho by pak měl vstupovat i to, že se jim může změnit jako plat, že se jim můžou změnit nějaký povinnosti a další věci. Takže to určitě uděláme, ale necháme to po zkuševce. A je to zatím první případ, který mám a přijde mi to vlastně jako docela fér nápad, protože v tuhle chvíli ani toho člověka nechci zahlcovat nějakou byrokracii, self-assessmentu, nějakých kompetenciích a podobných věcí, když má spoustu jiných starostí, jak se adaptovat do týma.'", "summary": "Kompetenční matice (20×5) se v hiringu NEPOUŽÍVÁ — až po zkušební době. Side effect: vypsaný medior končí jako senior.", "session": "P8", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hYVmkODLN9S4994jxPhCI", "video_clip": "[video highlight_clip_aWHdh9.mp4 00:01.5-00:51.7]", "tags": {"Hypotézy": ["H1", "H7"], "Perspektiva": ["Lead"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Velmi silně"]}}, {"id": "0rybNKkZUEPcdXFkk0dd", "text": "[Speaker 2] 'ten si vybavím, který vlastně dneska vede asociaci UX a já když jsem vlastně najímal Michala, tak on k nám prošel tak trochu se štěstím, protože já jsem hodně chtěl jeho a ten tým chtěl jiný dva kandidáty. A vlastně já jsem měl jako velmi slabou argumentaci na to, proč ho chci, protože on byl přesně ten případ, který tu case tady jako nedopracoval, nebo on jako rozděl spoustu výzkumů a tak, ale měl tak skvělej design proces zatím, přemejšel nad tím skvěle. Já říkám, já tohle člověka prostě chci, tohle to je za mě UX designer. To, že tady ta holka vám nakreslila jako krásné ikonky, proti tomu se velmi špatně jako celkově argumentu, ty vizuálně orientovaný lidi prostě na tyhle ty lidi jako jdou a oni nebyli špatný ani v té UX oblasti. Ale já jsem si hodně jako přisadil, že mi ten Michal přijde prostě zajímavý vystupováním, pokorou obrovskou a takovou jako vrozenou diplomací, tak jsme se nakonec rozhodli pro něj a to byl jako velmi, velmi dobrý krok, no, teď u nás teda nevydrží nějak jako extra dlouho, taky dva, půl roku, pokud nebo tři možná, ale to, to byl super, super nábor, kterej, kterej byl jako parádní. '", "summary": "Nejlepší hire prosadil proti týmu na základě “pokory a diplomacie” — intuice vs. vizuální portfolio kolegů.", "session": "P8", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hZPnKu36UgZtEOCGpYANh", "video_clip": "[video highlight_clip_0rybNK.mp4 00:00.3-01:25.2]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Hiring manager", "Lead"], "Default group": ["Pain points", "Pozitivní příklady"], "Intenzita": ["Silně"]}}, {"id": "ZL53Bo8f3fFH685viNkd", "text": "[Speaker 2] 'Zpětně vidím, že ten člověk byl nesrovnatelně, opravdu nesrovnatelně jinde, než ten, kterého jsme chtěli vzít, a ještě byl levnější. Takže já do dneška ho tam mám, je to moje absolutně jako pravá ruka, naprosto boží člověk na design systémy. Neprodal se na tom pohovoru zdaleka tolik jako ten druhý, ale ve výsledku byl prostě mnohem lepší. A já si říkám, to bylo víc štěstí, než nějaká naše observace nebo analýza kolem toho.'", "summary": "“Bylo to víc štěstí než naše observace.” Lepší kandidát se neprodal, preferovaný byl horší — systém neumí rozpoznat kvalitu.", "session": "P8", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hhO4iALwTfJ9vnsp2h9U6", "video_clip": "[video highlight_clip_ZL53Bo.mp4 00:00.5-00:46.0]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H4"], "Perspektiva": ["Hiring manager", "Lead"], "Default group": ["Pain points"]}}, {"id": "B7xOZCDAWQMl4l6MxXix", "text": "[Speaker 2] 'HR. Absolutně jakákoliv příprava. Ale nemám zkušenosti cross firmy a tak, takže z mého pohledu ten koncept, jak je to postavený v té korporaci, je absolutně nefunkční. Řekni mi o tom nic. Žádný nic navíc. Já je nepotřebuju.' [Speaker 1] 'Takže. Jako ta jejich pomoc, kterou ti poskytujou tak. Vlastně říkáš, že by bylo ideální, kdyby vůbec neexistovala, že by jako líp pracovalo, kdyby tam nebyla, že to je jako nutnost nějaká, kterou ty musíš jako.' [Speaker 2] 'To, co jsi mi ukázal, kdyby to existovalo, takový prototyp, to je za mě HR. Ten filtr, nějaká pomoc prochroustat se množstvím věcí, pomoct mi komunikovat s těma lidma, pomoct tomu dát dobrou flow, abych mohl reagovat rychle, abych ty lidi neztratil, aby se měli dobře, když je nevyberem. Todle všechno, a to všechno se neděje.'", "summary": "Nejvíc rozbité je HR. Já je nepotřebuju.” Produkt by měl nahradit HR funkci (filtr, komunikace, flow)", "session": "P8", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hehJsh5FicBH3kObQe8m3", "video_clip": "[video highlight_clip_B7xOZC.mp4 00:00.1-00:41.1]", "tags": {"Hypotézy": ["H1", "H2", "H6"], "Perspektiva": ["Hiring manager", "Lead"], "Default group": ["Nápady respondenta", "Pain points"], "Intenzita": ["Velmi silně"], "Emoce": ["Vztek/rozčílení"]}}, {"id": "MPl1LDUSmOrHZ7o0g2dZ", "text": "[Speaker 2] 'Ty lidi neodpadají, ty lidi fakt v 90 plus procentech zpracujou. Ale čím to je, tak já si myslím, že to je, že oni jsou v pozici, že chtějí žádat o práci, chtějí získat. Nejsou to ty seniorní designéři, kteří si tohle víc můžou dovolit. A oni nechtějí přiznat, že něco nepochopili. Vždycky hledají chybu v sobě. To je moje hypotéza'", "summary": "Kandidáti se nedoptávají — bojí se přiznat, že nerozumí. Mocenský gap blokuje oboustrannou komunikaci.", "session": "P8", "date": "24/04/2026", "setting": "", "link": "https://share.condens.io/hvBh7tNcYptxTn8V2piSc", "video_clip": "[video highlight_clip_MPl1LD.mp4 00:00.3-00:25.6]", "tags": {"Hypotézy": ["Emergent", "H1"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát", "Lead"], "Intenzita": ["Velmi silně"]}}, {"id": "Cw9GSaHTGEtkLusHxTY6", "text": "[Speaker 2] 'Jako byly tam moje, ale to byl pár, kteří se na mě vykašlali. V podstatě byly to dvě skupiny — od jednej jsem vlastně nedostala žádný feedback, jenže přijali automaticky e-mail, že byla přijatelná ta kandidatura, alebo ta poptávka. A ten druhý, když už to přišlo nějakou automatickou kontrolou a přišel mi rovnou feedback v průběhu dne nebo dalšího dne, že nemají zájem, že jim vlastně jako nefituje. Většinou to byly ty inzeráty, kde chtěli už mít nějaké rozmezy třeba co se týká nějaké jako rozmezy toho platu. A kde čekovali nějaké konkrétné zkusenosti. Takže byly některé inzeráty, které vlastně jako hledaly někoho s specifickými zkusenostemi s pracou na specifických produktoch nebo v oblasti. A tam, i když část té moje zkusenosti jako tam fitovala, tak nebyla dostačujícá, nebo nějakým tím skéninkům prostě nepřišla, tak vlastně byla automaticky zamietnutá.'", "summary": "Každá firma přistupuje k hodnocení designerů jinak — portfolio review, whiteboard, case study, volný rozhovor. Kandidátka se dozvídá formát až na místě — nemůže se připravit. Chybí standardizace procesu i transparentnost očekávání.", "session": "P6", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/h765NgM7rFp5UVPloV8OE", "video_clip": "[video highlight_clip_Cw9GSa.mp4 00:01.4-01:18.7]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "Y9Gzp3Jzbb6c8LHjwYs0", "text": "[Speaker 2] 'Například, keď se vlastně interpretoval záujem o tu pozici, tím jako působím a jaká jsem osobnostně. A to byl jeden konkrétní pohovor na manažerskou pozici, kde jsem vlastně byla v klidě na tom osobném pohovore a bylo mi vytknuté, že nedávám do toho tolko energie, či to vlastně chcem, či jsem dravá, či mám na to tu správnou energii a ten drive. Tak to mě trochu zarazilo, že je tato pozice potřebné pro lidi, kteří vědí udržovat klid i v náročných situacích. Tak to bylo trochu jako matuce.'", "summary": "Na manažerskou pozici jí vytkli \"málo energie a drive\" — přitom byla klidná záměrně, protože to vnímá jako klíčovou vlastnost lídra. Hodnotitel interpretoval klid jako nezájem. Subjektivní interpretace osobnosti kandidáta místo hodnocení kompetencí.", "session": "P6", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hDfb4pwIiwbaEuhG01iAc", "video_clip": "[video highlight_clip_Y9Gzp3.mp4 00:01.4-00:44.4]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"], "Emoce": ["Vztek/rozčílení"]}}, {"id": "5SiwTpTIZ0PyoOtsRrVn", "text": "[Speaker 2] 'A potom nějaké jako nepříjemné, kde jsem vnímala, že to je fakt jako to hodnotení jako v škole. Ale skôr se to týkalo jako nějakých hard skillů nebo té historii těch hard skillů. A je to skôr jako moje osobní problém, protože já vnímám jako seniorní pozici jako důležitou hlavně, co se týká soft skillů a nějaké komunikace. Protože čím důležitější je ten projekt, tím je důležitější ta komunikace a ta spolupráca. A ty hard skilly se dají naučit jako vždy, lehčí za pár týždňů nebo za měsíc. Alebo to, že máš za sebou nějaký větší projekt a víš ho jako dodat v určité kvalitě. Takže se mi to asi nějak tak jako osobně dotklo, že ta moja seniorita je dotazovaná.'", "summary": "\"Hodnocení jako ve škole\" — checklist hard skills, zpochybňování seniority. Její přesvědčení: u seniorních pozic jsou soft skills a komunikace důležitější než hard skills, které se dají naučit za týdny. Osobně se jí dotklo, že její seniorita byla zpochybněna na základě chybějících specifických hard skills.", "session": "P6", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hmCkIWSFwbPbKrB8J40e1", "video_clip": "[video highlight_clip_5SiwTp.mp4 00:00.4-01:21.6]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H4"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"], "Intenzita": ["Velmi silně"]}}, {"id": "FF8U5aH8gT3lUARmRpYG", "text": "[Speaker 2] 'Co je jako také specifické oproti tomu, když jsem hledala kdysi tu prácu a když jsem hledala teď, že vlastně se hledali, ve většině případů hledali jako zkusenost s konkrétními oblastmi a s konkrétními produktami. A to vlastně evoluovalo jako senioritu v jejich oblasti.'", "summary": "Domain specificity bias — firmy místo aby hodnotily designérské kompetence , tak posuzují \"kolik let jsi dělala v bankovnictví\". Kdo nemá zkušenost v jejich konkrétním oboru, ten pro ně není dost senior — i když má 10+ let v designu. Marcela to popisuje jako nový trend — dřív to tak nebylo. Silný argument pro standardizovaný kompetenční framework.", "session": "P6", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hn5irWIDqVvfvxNN12SrF", "video_clip": "[video highlight_clip_FF8U5a.mp4 00:01.5-00:14.4]", "tags": {"Hypotézy": ["Emergent", "H1", "H3"], "Emoce": ["Frustrace/zklamání"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "zH1x991t2pWpKVIpOnb5", "text": "[Speaker 2] 'Tak to ty jako kandidát nevíš, jako to hodnotí, a to jsou skôr jako interní procesy. A ti, které poznám, jsou skôr jako kvůli tomu, že poznám, protože jsem byla z druhé strany. Tak například jako v tom Microsoftě, lebo těž jsem se jako hlasila znova jako do Microsoftu, tam je vždycky ten feedback, tam je například portfolio review, kde vlastně prezentuješ tu case tady před celým publikou. Tam může být 5 designérov, k tomu ještě další inžinieri, alebo produktoví manažéry. A mám možnost se pýtat. A oni potom vyplňují takový jako feedback form, v rámci té firmy, kde mají špecifické oblasti. A ti jsou na základě toho, těch hodnot, které má firma interně. Čiže, keďže se jede growth mindset, tak se tam čekuje, jak je jako mindset na ten rast osobnostný a profesný. Jak je to tam vlastně na určité škále. A potom je tam vlastně jako zkusenost s tou úrovňou toho designu jako takého, z tvojho pohledu jako designera. Potom je tam spolupráce a myslím si, že je tam ještě empowerment. Že vlastně jako pomáháš třeba jiným, čiže oni tam hodnotí, či sdíláš to svojí know-how, či robíš mentora, alebo či píšeš třeba články. Tak třeba jako vím, že oni mají takovou tu šablónu, kterou jako vyplňují. A na základě toho to zazbírají vlastně z celé skupiny, která tam je. A potom si z toho urobí jako ten feedback, že tam se fakt urobí ten average. A porovnávají se tam ty kandidáti. '", "summary": "Microsoft jako best practice — strukturovaný portfolio review před panelem (designeři + inženýři + PM). Feedback formulář s konkrétními oblastmi: growth mindset, design úroveň, spolupráce, empowerment. Hodnotí se na škále, průměruje se z celé skupiny, kandidáti se porovnávají. Nejstrukturovanější proces, který zažila.", "session": "P6", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hYoxYMgu4XO7BpIXrY5Xt", "video_clip": "[video highlight_clip_zH1x99.mp4 00:00.7-01:49.1]", "tags": {"Default group": ["Existing solutions", "Pozitivní příklady"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "KqXjVsaPQYwnM0dNr2kQ", "text": "[Speaker 2] 'To už bylo další kolo, kde jsem išla osobně do té kancelárie. A tam měli připravenou nějakou case, byli tam zastupci za produktový management a za užívatele, který to používá, business architekta. A měl jsem vlastně pomoct najít nějaké rěšení, které jsem měla odprezentovat byznysovému vlastníkovi, který tam přišel ku konci. A měla jsem na to 35 minut, aby jsem vyspovědala vlastně jako to užívatele, aby jsem zjistila, jaké jsou, co vlastně jako chceme prezentovat a co chceme jako za byznys vlastně jako dosáhnout. A vlastně nebylo ani jako dané, či to mám urobit wireframe, či mám urobit prezentaci, co s tím mám urobit, takže to jsem si těž musela nějakým způsobem zjistit v rámci toho času.'", "summary": "Whiteboard challenge v praxi: reálný problém, mix rolí (PM, uživatel, business architekt), 35 minut, otevřený formát. Kandidátka musí sama zjistit kontext i formát výstupu. Stresující, ale umožňuje osahat firemní kulturu a komunikaci.", "session": "P6", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hehgrWTf62sKck0XoKi36", "video_clip": "[video highlight_clip_KqXjVs.mp4 00:01.5-00:43.5]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady"], "Intenzita": ["Silně"]}}, {"id": "K4jRy41m6FN69i44yOpG", "text": "[Speaker 2] 'Jo, ale i tak to bylo vlastně jako zvláštně, protože jinak ta forma tej prezentácie tej case tedy byla bolná a ten feedback byl vlastně na tu štrukturu tej prezentácie v podstatě. Takže jako z druhé strany pro mě OK, jako prezentací někam jinam jako dělej na podobné pozici je dobrý a chápem to, ale jako zadání nebylo úplně tak to konkrétné, že by to bylo jako must have. Takže jako nedá se úplně hodnotit něčeho, keď nejsou tak nejjasné požadavky'", "summary": "Microsoft feedback paradox: formát prezentace byl \"volný\", ale feedback hodnotil strukturu prezentace. Kandidátka vnímá disconnect — nemůžeš hodnotit něco, co jsi jasně nespecifikoval jako požadavek.", "session": "P6", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hLqtjMv6IEM5TBSvNahIv", "video_clip": "[video highlight_clip_K4jRy4.mp4 00:00.1-00:37.8]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Pain points"]}}, {"id": "0aRKfGji6Pyx7TtEd94s", "text": "[Speaker 2] ' Já bych to možná rozdělila na dvě části. Ta jedna, kterou má bavila skôr jako osobně, tak byla ta, že vlastně jako designujem něco jiné, že mám nějakou case study, kterou můžu si nějakým způsobem ochutnat, jaký typ práce tam vlastně jako bude. A pro mě to je vždycky takový jako refresh toho můjho vzťahu k práci, takže pro mě osobně je to vždycky takový, že mě to baví, že zase jako vidím tu svoji radost z té práce, že jsem designer a že mám tu flow. Tak má vlastně jako hodně bavila, i když to bylo stresující, ta case study. To je jako poprvé, co to bylo takto koncipované, že tam fakt byl jako mix těch rolí a byl tam jako reální problém, který říjí v té firmě, takže to bylo jako zajímavé si osahat to, jak se komunikuje jako s těmi ostatními rolami, jak moc jsou otvorení tomu designu, jak moc jako chápou ten design. Pro mě to bylo fajn jako zjistit si a osahat si, jako by to reálně v té firmě vyzeralo. Zároveň to ode mě vyžadovalo nějaký jako čas. Některé firmy mají takový jako ten jeden děň v té firmě, takže mi to přišlo takové, že to má jako stejný efekt, ale zároveň tam je ten respekt vůči tomu času a té energie, kterou ten kandidát do toho dá. '", "summary": "Case study / design challenge = refresh vztahu k práci — \"zase vidím tu radost, že jsem designer.\" Stresující, ale přínosné: osahat si firemní kulturu, komunikaci mezi rolemi, postoj k designu. Oceňuje formát, který respektuje čas kandidáta (45 min challenge vs. celý den ve firmě = stejný efekt).", "session": "P6", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hXSQ2uqF8mOTzmLmpRaWN", "video_clip": "[video highlight_clip_0aRKfG.mp4 00:00.1-01:46.2]", "tags": {"Emoce": ["Důvěra"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Motivátory & Bariéry", "Pozitivní příklady"], "Intenzita": ["Silně"]}}, {"id": "fNkO29VGhToGMk47pAzT", "text": "[Speaker 2] 'Keď popíšu na tu konkrétnu situaci, tak jsem byla na starosti menší tým, který se rozšiřoval a v tu dobu už vyslal i inzerát na mediorného designera, ale zároveň v průběhu času, co byla ta poptávka otvorená,tak přišla další poptávka pro dalšího designera, takže na jeden inzerát jsme vlastně jako nabírali více lidí. To prvé, co se jako děje, je nějaká komunikace jako s HR, tak nějakou definovat vlastně, koho hledáme a jaký level má. Takže bylo jako těžké nějakým způsobem definovat, koho vlastně hledáme, protože mám zkusenost, že prostě jako lidé, kteří nemají úplně dlouhodobou zkusenost, tak se aj tak hlásí na seniornější pozici. Potom, co se dohodovalo s HR je vlastně jako nějaký proces — screening, potom interview so mnou a potom case study alebo review. A jsem vybrala to portfolio review, protože pro mě bylo důležité hlavně jako, aby ten člověk věděl odprezentovat tu prácu před klientem, protože to byla agentura, takže prezentačné dovednosti byly důležité. A bylo pro mě jako důležitější vidět ty mekké dovednosti, a nějakým způsobem typ projektu, který mají ze sebou, než nějaký jako hard skill, že vědí nadizajnovat prostě landing page pro nějakou kampání, protože to je něco za mě, co se člověk jako naučí rychle'", "summary": "Hiring proces z pohledu leada: definice pozice s HR je těžká (lidi se hlásí na pozice nad svůj level). Proces: screening → interview → portfolio review. Vybrala portfolio review inspirovaná Microsoftem. Klíčové: soft skills a šíře zkušeností > hard skills. \"Landing page se naučí rychle.\" Prezentační dovednosti důležité v agenturním kontextu.", "session": "P6", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hcvq1yAI7wt3S0yUd352f", "video_clip": "[video highlight_clip_fNkO29.mp4 00:00.3-02:31.1]", "tags": {"Hypotézy": ["H1", "H4"], "Perspektiva": ["Hiring manager"], "Intenzita": ["Silně"], "Default group": ["Trust signals", "Workflow / Chování"]}}, {"id": "3tZn4Kl7A613AOxv1vgj", "text": "[Speaker 2] 'Tam byl hlavně jako důležitý za toho produkťáka soft skills, aby věděl komunikovat, aby měl nějakou zkusenost s tím, být proaktivní a fungovat v chaose, nebo když něco nefunguje. Protože to byl klient, který měnil zadání prostě jako každý týždeň. A potom, co hládali jako s tým, je ta zkusenost jako s tím designem, jak moc seniorný je, jak je na tom jako s tím interaction designem, či robil nějaký výzkum, nerobil výzkum. A bohužel někdo, lidé v tým jako hodnotili i to, či měl zkusenost s nějakým jako marketingem, nebo ne. Tam jsme se jako interně nezhodovali, co je jako důležité pro seniorného designera.'", "summary": "Hodnotící kritéria se lišily podle role: produkťák chtěl soft skills (komunikace, proaktivita, chaos resilience), design tým chtěl hard skills (interaction design, výzkum). Interně se neshodli, co je důležité pro seniora. Někteří hodnotili i marketing zkušenost — chybí společný framework.", "session": "P6", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/h1Hmf8roA9FlTMH0dOUUm", "video_clip": "[video highlight_clip_3tZn4K.mp4 00:00.5-00:46.6]", "tags": {"Hypotézy": ["H1", "H7"], "Perspektiva": ["Hiring manager"], "Default group": ["Pain points", "Trust signals"], "Intenzita": ["Silně"]}}, {"id": "57mQx1fecjIE7DicLnbO", "text": "[Speaker 2] 'Spíš ta komunikace interně s tím týmem. Co to znamená? Co je jako důležité pro každého? Toto konkrétně byla firma, kde vlastně nebyly dané standardy, co znamená vlastně být seniorním člověkem. Co znamená být seniorní designer. Interně v týme to bylo chápané tak, že ten jediný člověk, který byl na seniorní pozici, tak se každý s ním srovnával. Že vlastně i ty jeho názory, či ano, či ne, ten seniorní člověk byl brán za prostě sad intestum. A s čím jsem ani nebyla OK.Takže to bylo skoro na úrovni jako toho interného nějakého dohadování, co mě fakt nebavilo, že abychom měli nějaký common, jako společné chápání, koho konkrétně hledáme a které skilly jsou nejdůležitější. Že to není o tom, či ví někdo jako nakreslit prostě jako landing page, ale je to o něčem jako trošku víc. Jako ten zvyšek, buď jako lída, alebo jako designera, je to vždycky jako radost, když se nabere, protože v tom vidím, že ta firma dává důvěru tomu designu a je to skoro takové jako Vánoce'", "summary": "Největší pain jako hiring lead: chybějící standardy seniority. \"Jediný senior v týmu se stal benchmarkem — s čím jsem ani nebyla OK.\" Interní dohadování o tom, koho hledáme a co je důležité. Ale zbytek hiringu = radost, \"takové Vánoce\" — firma investuje do designu. Kontrast: systémový problém (standardy) vs. osobní motivace (radost z nabírání).", "session": "P6", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hT1urpNg6aUW8dFcLJnUv", "video_clip": "[video highlight_clip_57mQx1.mp4 00:01.0-01:23.9]", "tags": {"Hypotézy": ["H1", "H7"], "Perspektiva": ["Lead"], "Default group": ["Motivátory & Bariéry", "Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "32USunbW8yujx0KQKLVl", "text": "[Speaker 2] 'Je to skoro. Já si myslím, že ty standardy jsou asi na také úrovni, ne úplně konkrétné, ale aspoň nějakým způsobem rámcové dané by měly být. Samozřejmě každý tým, i když máš obrovskou firmu a jsou tam nějaké standardy, které mají nějaké jako tabulky, nějaké levelů, tak každý tým má vlastně jako jiné chápaní toho, co to jako znamená v té praxi. Něco na té úrovni, aby jako nějaký checklist byl jako daný, protože každý má v hlavě něco jiného, každý se prostě jako porovnává s někým jiným. A je pro mě jako strašně nešťastné, jako pro lídra, nebo pro toho hirujícího, kdy vlastně se něco hodnotí na velmi subjektivném, jak to jako zmeráš.' [Speaker 1] 'Není to jasný. Co to znamená teda bejt ten senior, že jo, jako každej se to může představit nějak jinak.' [Speaker 2] 'Přesně tak jako Někdo to má podle rokov, někdo to má podle objemov tých jako projektov. Je něčo jiné, keď jako ten UXák robí 10 rokov na jednom flow v jednej firmě a je něčo jiné, keď má v starosti kompletný redesign nějakého portálu. Takže jako každý to chápe jinak a možno mít tak jako spoločné chápaní toho, co to znamená, je důležité.'", "summary": "Rozvíjí problém standardů seniority. Potřeba alespoň rámcového checklistu — ne detailního, ale společného. \"Je strašně nešťastné pro lídra hodnotit na subjektivní bázi.\" Příklad: 10 let na jednom flow ≠ kompletní redesign portálu, ale obojí se nazývá \"senior\". Každý měří jinak (roky, objem, typ projektů). Silná validace potřeby přenositelného frameworku.", "session": "P6", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/hglj1C4H4Xf0mbUnJr3cC", "video_clip": "[video highlight_clip_32USun.mp4 00:01.2-01:54.9]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H7"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Lead"], "Intenzita": ["Velmi silně"]}}, {"id": "JkzDNl9bWergFiuZ545S", "text": "[Speaker 2] 'Figmu, lebo to potřebuji mít vizuálně a mít tam ty lepíky. A to je asi tak všechno. Snažila jsem se v tým mít ještě nějakou škálu, ale tohle nepřešlo. Nic takového toho.'", "summary": "Nástroje pro hodnocení: Figma s lepíky — primitvní workaround. Pokusila se zavést hodnotící škálu, ale v týmu to neprosadila. Potvrzuje absenci nástrojů pro strukturované hodnocení designerů.", "session": "P6", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/h43tqAsGxntaNTKkVzsjh", "video_clip": "[video highlight_clip_JkzDNl.mp4 00:01.2-00:18.7]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Hiring manager"], "Intenzita": ["Neutrálně"], "Default group": ["Workarounds"]}}, {"id": "Wf0qG5o1pEyYyKPjdOVw", "text": "[Speaker 2] 'Asi jasnější požídavky než jako všeobecně generované inzeráty. To vlastně odfiltruje hned na začátku. A nějak to očekávání nad těmi dalšími kolemi, že co konkrétně se očekává. A když se neočekává nic, že vlastně jako to mají očekávat třeba tu tvou reakci, jakým způsobem reaguješ na neznámé prostředí. OK, já jsem s tím OK, ale tak jako tak by bylo fajn to vědět. '", "summary": "Na otázku \"co je na hiringu designerů nejvíc rozbitý\": generické inzeráty s nejasným požadavky. Odfiltrují špatně na začátku. Druhý problém: nejasná očekávání na průběh procesu — kandidát neví, co ho čeká v dalších kolech. I když je OK s tím, že se testuje reakce na neznámé prostředí, chtěla by to vědět předem. Upstream problém — špatný input = špatný output celého procesu.", "session": "P6", "date": "14/04/2026", "setting": "", "link": "https://share.condens.io/h3gL2VdNm7XwFKjMZn4jd", "video_clip": "[video highlight_clip_Wf0qG5.mp4 00:01.5-00:39.0]", "tags": {"Hypotézy": ["Emergent", "H1"], "Emoce": ["Frustrace/zklamání"], "Perspektiva": ["Hiring manager", "Kandidát"], "Default group": ["Nápady respondenta", "Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "LuCCaXrN0dngWK2FQQlq", "text": "[Speaker 2] 'No právě, že mě to přišlo hrozně zvláštní, že skoro nic. Já jsem měla z toho pocit, že vlastně se oni o mě nic nedozvěděli, že já jsem se o nich dozvěděla víc, než oni o mě. Takže oni fakt jako hodně vysvětlovali, abych to vysvětlila — totiž digitální informační agentura je vlastně úřad, tudíž tabulkové platy, takže oni jsou jako rádi, že se jim tam vůbec někdo hlásí, to popravdě. Takže oni moc neřeší, si myslím, nebo nemůžou si moc vybírat v podstatě. Což teda mě hrálo do karet, protože já jsem jako se svojí ne úplně rozsáhlou praxí si taky úplně nemohla vybírat. Takže to tak jako oboustranně zapadlo tady z tohohle pohledu. Oni pořád mi jako vysvětlovali, co teda tam dělají — mají tam vlastně i UXáky, nejenom UX researchery. Jak oni hájí ty zájmy těch úřadů, jak jsou taková odborná podpora pro ty jednotlivé úřady. Protože my třeba kontrolujeme práci dodavatelů, co dodávají — ať už třeba nějaké Figma prototypy, co dodávají ty externí firmy, co vyhrají ty veřejné soutěže. Tak my to třeba uživatelsky testujeme, nebo naši UXáci na to dávají nějaký feedback, jestli to splňuje design systém a tak. Takže my jsme na straně toho úřadu. A oni mi to takhle vysvětlovali, co vlastně všecko dělají. '", "summary": "Oboustranná nouze jako výhoda: Kvůli nekonkurenceschopným tabulkovým platům ve státní správě neměl úřad prostor si vybírat, což sedlo juniorce bez praxe; pohovor tak neplnil funkci hodnocení, ale pouze představování samotné instituce.", "session": "P5", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hw0n4Y89ZcUAHXzloV08g", "video_clip": "[video highlight_clip_LuCCaX.mp4 00:01.9-02:02.3]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "T9Qz6eJfDofkLuGNOPzE", "text": "[Speaker 2] 'A mě se fakt skoro na nic neptali. Já jsem měla pocit, že odcházím a říkám si tak jako dobrý, ale oni se o mě vůbec nic nedozvěděli. Jediné, co je hrozně zajímalo, jestli jako s tím platem je to OK — protože oni mají normálně ty tabulkové platy'", "summary": "Státní správa představuje specifický kontext, kde kvůli tabulkovým platům klesají nároky na senioritu, což otevírá dveře juniorům – vzniká tak oboustranně výhodný kompromis z nouze.", "session": "P5", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/huYT1uObVwhF5puJZsSqB", "video_clip": "[video highlight_clip_T9Qz6e.mp4 00:00.5-00:27.6]", "tags": {"Hypotézy": ["H1", "H3"], "Default group": ["Industry insights", "Motivátory & Bariéry"], "Perspektiva": ["Kandidát"], "Emoce": ["Nejistota"]}}, {"id": "F8JiVK1ygqkk52pMsSew", "text": "[Speaker 2] 'A mě se fakt skoro na nic neptali. Já jsem měla pocit, že odcházím a říkám si tak jako dobrý, ale oni se o mě vůbec nic nedozvěděli. Jediné, co je hrozně zajímalo, jestli jako s tím platem je to OK — protože oni mají normálně ty tabulkové platy, to si může každý najít na internetu, tam měli vyloženě to rozmezí. Takže vlastně to asi bylo tak jako celý. A řekli mi, že si mysleli, že mám víc zkušeností. To jsem pochopila — aha, tak to, že jsem dělala 12 let ve vývoji s vývojáři, tak to tady asi nikoho nezajímá. Prostě, že v této oblasti mám jako jediná z našeho týmu nějakou zkušenost, že prostě vím, jak funguje ten vývoj — a to tady se to asi neprodá. A ještě mi říkali, že mají ještě dalšího kandidáta. A to jsem si říkala: no do prčic, tak doufám, že nebude mít víc zkušeností než já. Ale pak jsem se dozvěděla, že to asi byl jenom takový trik našeho šprýmovního pana HRisty. Já jsem myslím měla prezentaci — normálně odkaz na prezentaci v tom CVčku i na tom LinkedIn — a vůbec nic nechtěli vidět, vysvětlit, jak jsem postupovala, nic prostě. Jednou jsem jim popsala, že jsem dělala výzkum, zkoumala jsem tohle, bylo tam asi 10 respondentů. Vyloženě stručně nějaký popis, že jsem dělala ty činnosti v tom výzkumu, který oni taky dělají, a že mám tuhle jednu zkušenost.' [Speaker 2] 'A ještě jsem se snažila prodat svoji praxi testera, protože jsem dělala — ještě než jsem dělala Scrum Master — softwarového testera, což má jako zase docela blízko k nějakému feedbacku na nějaké digitální služby. Je to trošku jiný pohled samozřejmě, ale je to taky pohled jako by uživatele na nějaký digitální produkt a kontrola toho, jestli je všecko OK. Tak to si pamatuju, že jsem jim říkala o tom testerovi, ale říkám — ten Scrum Master je vůbec nezajímal, vůbec se neptali, co jsem dělala. Takže já jsem z toho byla vlastně trošku rozpačitá, že se nic nedozvěděli.'", "summary": "Ignor náboráře skills i portfolia: Pohovor ukázal tři zásadní chyby v hodnocení: firma nechtěla vidět kandidátky prezentaci, ignor přenositelných zkušeností z 12 let ve vývoji (Scrum Master, softwarový tester) a místo zkoumání dovedností použila levný HR trik o „dalším kandidátovi", "session": "P5", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hm8nVXqIDv33HqTnNpm8m", "video_clip": "[video highlight_clip_F8JiVK.mp4 00:00.5-02:42.7]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H3"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "3iV2TuZk4CHQrNzqgyAY", "text": "[Speaker 2] 'Tam nic nebylo, podle mě neumí si úplně proklepnout ty lidi, nebo možná ani nemají motivaci — jsou rádi, že jim to někdo veme za ty peníze. To je jako moje interpretace. '", "summary": "Přímá interpretace pocitu z náboru: “Neumí si proklepnout ty lidi, nebo možná ani nemají motivaci.” A klíčové: “Jsou rádi, že jim to někdo vezme za ty peníze.” — firma s tabulkovými platy si nemůže vybírat, proto ani neinvestuje do hodnocení. Validuje H1 z opačné strany: kde není selekční tlak, není ani hodnotící proces.", "session": "P5", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hlN3bgiBHekZvT36l7oi8", "video_clip": "[video highlight_clip_3iV2Tu.mp4 00:00.5-00:13.4]", "tags": {"Hypotézy": ["H1"], "Default group": ["Industry insights"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "JmyfT1W1J9CstyWJlxI1", "text": "[Speaker 2] 'No, tak vlastně hlásila jsem se do Loona, nevím, jestli znáte — taková ta neziskovka, co řeší prevenci zdravotní. A oni vlastně chtěli rozvíjet tu svoji aplikaci Preventivka, která nějak teda vznikla během covidu a nějak Česko.digital — dobrovolníci z Česko.digital se na tom hodně podíleli na vývoji aplikace. A oni hledají produkťáka na tuhletu aplikaci, to bylo někdy úplně na začátku roku loni, kolem toho února, asi možná v lednu už to začalo. Tak tam mi zadali docela, řekla bych, těžkou případovku. Ale nějak jsem asi po týdnu trochu stresování a radění se se všema možnýma lidma, co znám — produkťáky a konzultacemi s AI — tak jsem nějak se tím úkolem prokousala a myslím, že to dopadlo velmi dobře na to, že jsem to v životě nedělala. A vlastně ta případovka se jim líbila ze všech nejvíc. Pozvali mě na pohovor a pak vybrali nějakou holku, co už tam měli, protože už jí znali. A ještě navíc s tou appkou to nějak nedopadlo — ona jim tam dělala, oni mají ještě nějaké ty školící produkty a oni potřebovali vlastně hlavně někoho na ty školící produkty. A ta holčina už to dělala. A hlavně jim padlo úplně nějaké financování, se kterým počítali právě na tu aplikaci, takže ta aplikace pravděpodobně nějak zamrzla. Takže mě nevzali, ale jako na tu případovku jsem byla jako pyšná. Mám ji kdyžtak taky na LinkedIn — je tam i zadání. Bylo to něco ve smyslu vymyslet monetizační model pro tu aplikaci, která prostě zatím nikdo za ní neplatil, byla zdarma — a jak to udělat, aby za to někdo platil.'", "summary": "Externí faktory vs. časová investice: Switcherka investuje úsilí a stres do vypracování případovky, ale navzdory dobrému výsledku narazí na \"skleněný strop\" v podobě ztraceného budgetu a předem známé interní kandidátky", "session": "P5", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hDytPGcv4O7c0vjnLTPoB", "video_clip": "[video highlight_clip_JmyfT1.mp4 00:01.7-01:27.4]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H3"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "zcQet85DOoqhWuEBX3wB", "text": "[Speaker 2] 'Byl tam potom pohovor, já jsem odevzdala tu případovku a pak byl ještě pohovor. Ten si bohužel jako úplně nepamatuju, vím, že byl hrozně divnej, že mi to vůbec nesedlo. Bylo to online — mně online rozhovory strašně nesedí, protože teďkon mi to je v pohodě, protože já se tady neucházím o žádnou práci, ale když se ucházím o tu práci, tak mě strašně chybí tam ta mezilidská interakce a nějaký reagování. Ještě jak je člověk nervózní — já fakt nemám úplně jako dobrou zkušenost, moc mi to nesedí v podstatě. Takže to bylo online, já vím, že jsem byla děsně nervózní, protože jsem měla strašný strach, že zase budu moc juniorní, protože jsem to v životě nedělala. A oni mi pak nakonec dali asi feedback, že vlastně jsem možná moc seniorní — tak já nevím, nebo že prostě pak vzali nějakou ještě juniornější holčinu, kterou teda už znali.' [Speaker 1] 'Mě by jako zajímalo spíš jak jako já pak dál to hodnocení a na základě jakejch kritérií oni jako posuzovali, že jste a nebo nejste juniorní nebo seniorní, že to bylo jako, nebo jste tam vlastně odprezentovala? Předpokládám tu tu vaší.' [Speaker 2] 'Já jsem ani neprezentovala, to bylo na tom to vtipný — oni ani prostě skoro nic z té případovky zas nechtěli vědět. Něco se mě tam ptali možná z té případovky, ale zase taky mi to přišlo jako marginálie, ze kterých nemohli nic poznat. Asi to nebyl úplně ukázkový pohovor, bych řekla. Mám pocit, že kladli otázky, které moc nedávaly smysl, a že tam bylo fakt cítit, že nejsme sladění nějak jako myšlenkově — já nechápu, proč se mě na to ptají, tak nevím, jak na to mám odpovědět. Prostě nesedlo to — nesedlo to jako chemicky. Celý mi to nedávalo smysl.'", "summary": "Zmatečný assessment: Pohovor postrádal jasnou strukturu a kladené otázky nedávaly kandidátce smysl, což vedlo k pocitu myšlenkového nesouladu. Zmatečný i feedback (kandidátka se bála juniority, firma zmínila moc velkou senioritu, ale nakonec nabrala juniora).", "session": "P5", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hoCS87gcD67nG9KLCJufJ", "video_clip": "[video highlight_clip_zcQet8.mp4 00:01.9-02:50.9]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "m5CJJXSe87dJ1LlI3DNE", "text": "[Speaker 2] 'Pak tam byla ještě jedna taková výraznější a to byl teda CX specialista do jedné taky agentury, která dělala mimo jiné pro O2, pro Direct pojišťovnu nějaké customer experience projekty. A ty měly taky zajímavou teda případovku — tam jsem zase měla vymyslet novou propozici pro předplacené karty mobilního operátora. Jakože nový tarif vlastně. Takže jsem zase hlavně s pomocí AI zkoumala, jak vůbec dneska fungují ty předplacené karty — když já už mám 20 let paušál, takže jsem prostě musela prozkoumat, co to vůbec je, jak to dneska funguje, kdo to vůbec používá. Říkala jsem si, to snad nikdo nepoužívá. No pak jsem tu cílovku pochopila — i s nějakýma kamarádama jsem se bavila, co mají třeba malé děti, protože vím, že děckám se právě dávají tyhle ty předplacené karty, aby neprovolaly moc peněz. Takže vím, že jsem měla asi tři rozhovory s nějakýma lidma a tak jsem skládala ten celý background toho problému. A dokonce jsem byla na mentoringu s jednou ženou, co se tím zabývá, protože to byl pro mě fakt trochu oříšek, jak to dát dohromady. Ale zase myslím, že ten výsledek byl skvělý. Potom jsem to prezentovala v angličtině — musela jsem udělat prezentaci, tím jsem měla dokázat, že vůbec umím třeba používat PowerPoint, a musela jsem jim to v angličtině odprezentovat. A předtím teda ještě, než mi dali tu případovku, tak byl pohovor — a tam se mě docela proklepli, to teda zase si myslím, že docela jo.'", "summary": "Strukturovaný hiring proces s jasnými kritérii: firma aplikovala logický a důkladný proces (screening → případovka → prezentace) s jasně definovanými hodnoticími kritérii (angličtina, PowerPoint), do kterého kandidátka proaktivně zapojila své výzkumnické dovednosti (rozhovory, mentoring).", "session": "P5", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hwBUdF4ZfEVS1tBUNZ2hf", "video_clip": "[video highlight_clip_m5CJJX.mp4 00:01.4-02:01.7]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Pozitivní příklady", "Workflow / Chování"]}}, {"id": "QQ6Oe20vCYRfd9cewBdP", "text": "[Speaker 2] 'A předtím teda ještě, než mi dali tu případovku, tak byl pohovor — a tam se mě docela proklepli, to teda zase si myslím, že docela jo.'", "summary": "Strukturovaný assessment: logicky seřazený proces -> pohovor, případovka,prezentace řešení v angličtině", "session": "P5", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h9YxDlF0qlNiIu2fZ1xRE", "video_clip": "[video highlight_clip_QQ6Oe2.mp4 00:00.4-00:09.7]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady"]}}, {"id": "sQIZ8z6ZIXzQAOIRl1iJ", "text": "[Speaker 2] 'Jo, a ještě to bylo zajímavý — tím se teda asi nevím, jestli úplně inspirujete, asi ne, ale spíš je to taková kuriozita z natáčení. Ona měla ráda numerologii, nebo takovou — jak je taková ta mřížka, jak jsou takový ty devět číslíček. Tak se mě ptala na datum narození, mi tam vysázela do té mřížky ty čísla a začala mi tam jako číst z té numerologické mřížky, nebo co to je, nějaký moje charakteristiky. Tak mi to přišlo vtipný, ale zpětně jsem si říkala, ty bláho, co to bylo. Přišlo mi to hodně zvláštní. Říkala jsem si, no, já nevím teda, jestli je to vlastně dobrý nápad. Ale ona hlavně — mi přišlo, že ona se mě vlastně na základě toho nějak zaškatulkovala, aniž by vůbec mě znala. A mě to vyděsilo v tom slova smyslu — ale já se tam třeba nevidím v některých těch věcech. A jestli ona je o tom přesvědčená, že tomu věří, že takhle ty lidi jsou podle té mřížky, no tak to jsem v háji. Ona tam na mě — něco ve smyslu — něco tam sedělo, ale vím, že hodně jí tam vyšlo nějaká preciznost a neschopnost pracovat v nejistotě nebo něco takovýho. A vlastně na tohle mě vlastně potom jako nevzali — že pro ně to je důležité. A oni opravdu žili trochu v chaosu, to jsem teda pochopila. Měli tam třeba nějaký board s lístečkama a já jsem se ptala, no jaký to má smysl, byly různý barvičky — a co znamená která barva? No prostě chaos to byl. Takže možná ta mřížka nebyla úplně nesprávná. Takže to byla mřížka.'", "summary": "Numerologická mřížka jako hodnotící nástroj na pohovoru — kandidátka na základě data narození zaškatulkována jako “neschopná pracovat v nejistotě.” -> “Zaškatulkovala mě, aniž by mě znala.” Extrémní validace H1 — v absenci strukturovaného frameworku sáhnou firmy po čemkoli, včetně numerologie.", "session": "P5", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hMwW8wUdYyzzMJC3g2i9w", "video_clip": "[video highlight_clip_sQIZ8z.mp4 00:00.3-01:49.5]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"], "Emoce": ["Vztek/rozčílení"]}}, {"id": "OF0bVTV00rHWqUrOlDwd", "text": "[Speaker 2] 'Vím, že jsem měla pocit, že moc nečetli moje CV — ptali se mě, jestli se jako pořád stěhuju. Já přitom jsem žila v Brně asi sedmnáct let a oni nějak naznali, že se stěhuju. Jak na to přišli — jako mám tam třeba nějaká města, že jsem třeba mezi Prahou a Brnem občas jezdila, když jsem pracovala se Seznamem jako Scrum Master, protože jsem v Praze měla týmy, ale to ještě neznamená, že jsem bydlela v Praze. Vlastně jsem neměla úplně dobrý pocit tady z nějakých assumptions — to stejně s tou mřížkou, taky takové assumptions. OK, tak podle mřížky, aniž se mě zeptali, si udělali nějakou představu. Takže to byl jako — mě ten rozhovor bavil, já jsem byla motivovaná to zkusit, bylo to pro mě zajímavá práce. Ta náplň se mě líbila a já jsem velmi suverénně na konci toho rozhovoru řekla: tak myslím, že musím teď udělat několik věcí — přestěhovat se na Prahu 6, protože oni vyžadovali 100% v kanclu a byli na Praze 6. Jakože fakt se mi to líbilo, bylo to takový dynamický, hodně nový pro mě. Myslím si, že by to byla velká zkušenost. Líbilo se mi to.'", "summary": "Assumptions bez ověření — firmy si dělají závěry z povrchních signálů místo aby se zeptaly.", "session": "P5", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hJdtUwiBFDZJ3Bb5jQ7J0", "video_clip": "[video highlight_clip_OF0bVT.mp4 00:00.9-01:09.5]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "E6uCMnWvBCJWdhAU2ARF", "text": "[Speaker 2] 'Už jsem vám řekla, že byli dost random. Vytáhli zase numerologickou mřížku. A pak mi ještě řekli, že si myslí, že neumím pracovat v nejistotě. A já jsem přemýšlela — jak na tohle zase přišli?'", "summary": "Zamítnutí na základě numerologického závěru (“neumí pracovat v nejistotě”), ne na základě případovky nebo rozhovoru. Kandidátka se oprávněně ptá: “Jak na tohle zase přišli?” — důkaz chybí, závěr existuje.", "session": "P5", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hFvK13BBCqxJj3mZl3QKw", "video_clip": "[video highlight_clip_E6uCMn.mp4 00:01.6-00:04.4]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"], "Emoce": ["Vztek/rozčílení"]}}, {"id": "eC7iSiQh7YoUbSUAE9GT", "text": "[Speaker 2] 'Hele, tak jdu podle úplně jakože primární věci, ale jak jsem ti říkala, třeba místo výkonu práce Praha, tak to jenom, to beru jako objektivní data. Tak prostě dívám se na to, co ten člověk má za sebou nebo nemá, jestli splňuje to řemeslo. Ale potom, když už jde na to lámání chleba, kdy ty lidi si řeknou, ano, tak takhle, prostě všichni mají za sebou nějakou praxi, tak podle čeho to rozhoduju? Tak jedna z těch věcí je, jestli třeba má za sebou nějaký podobný projekty nebo podobnej background, jako to, co my tady máme, aby ten člověk — víš, aby to nebyl někdo ze startupů, kdo si chce jen tak vyzkoušet korporát, ale vlastně z toho bude nešťastnej. Pokud umí to řemeslo, tak se dívám prostě na to, jestli už třeba byl v nějaký takovýhle velký firmě, nebo sice dělal jako pro agenturu, ale vlastně pracoval tři roky pro toho klienta a byl tam u něho. To je pro mě jako důležitý, protože to prostředí, a protože jak jsem ti teď přesně popisovala — ala volám na ten servis desk, čekám na lince — někdo už by se na to vyprdnul. Prostě mi někdo řekl, tohle to nemám za potřebí. Ale to je prostě bohužel jako náš denní chleba. A to je něco, s čím se tady ten člověk bude potkávat, že to není jenom o tom řemesle, ale je to i o tom, jakoby, vydržet, nebo trošku boj s větrnými mlýny. Takže dívám se na to, kde do teď jako dělal a jestli vlastně z toho nebude jako frustrovaný. To je jedna z těch věcí a druhá z těch věcí, jestli pracoval v týmu, protože když ti přijdou samý takový ty ičaři, který dělali tu one man show, ty lidi jsou dobrý, ale prostě oni pak často neumějí být ty týmový hráči. Já tady nemůžu mít jenom ty Ronalda. ' [Speaker 2] 'Já potřebuju mít i obránce, někoho v tý bráně. Prostě každý má tu svou roli. Potřebuju, aby to sedělo jako celek. '", "summary": "Kritéria: lokace, korporátní fit (ne startupáři), týmovost. Hledá odolnost vůči \"boji s větrnými mlýny\".", "session": "P3", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h4Qis70Ih0475RrbnDXss", "video_clip": "[video highlight_clip_eC7iSi.mp4 00:00.0-02:10.3]", "tags": {"Hypotézy": ["Emergent", "H1"], "Perspektiva": ["Hiring manager"], "Intenzita": ["Silně"], "Default group": ["Trust signals", "Workflow / Chování"]}}, {"id": "zRYhmgUZoXGkYOe7vvAw", "text": "[Speaker 2] 'Míra chodí se mnou, ale často chodí až na druhý kolo. Teďka třeba u toho brigádníka mu to bylo tak trochu jako to šumák, ale na to druhý kolo já jsem mu řekla, hele, já chci, abys tam šel, pak tady ten člověk s náma bude, prostě chci, abys u toho byl, abys to jako věděl. Ale jinak na ty pohovory já vždycky chci, aby se mnou chodil ještě někdo z našeho týmu, což když nabírám spíš UX-áka, tak chodí Filip, když nabírám spíš UI člověka, tak chodí David. Že já říkám takový ty obecné věci o tom týmu a tak dále. Pak třeba už i o tom řemesle říkají jakoby kluci. A bavím se i s nima, já chci, aby to bylo víc objektivní, aby to bylo jako o tom, hele, na mě ten člověk působil takhle, co ty si o tom myslíš? Plus ta HRistka, takže jsme tam jakoby tři. A na to druhý kolo třeba už pak nejde ten Filip, i kdyby tam byl, tak ještě přijde ten Míra, toho tam jako chci.'", "summary": "1. kolo: lead + senior + HRistka. 2. kolo: + Míra. Konsensus, žádný framework.", "session": "P3", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hFjeQx9ssjOrPSzeuwIEu", "video_clip": "[video highlight_clip_zRYhmg.mp4 00:00.3-00:56.7]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Hiring manager"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "9ZvCTBIw2ZZ1ZqNuRXhh", "text": "[Speaker 2] 'Hele, to první kolo je fakt taková ta chemie — vůbec jako, aby my jsme se představili, aby oni viděli nás a my je. I oni můžou říct, že to prostě s náma nefílujou a to je jako v pohodě. Proto já tam říkám naplacato, jak my dneska fungujeme. Co máme a co nemáme nastavený, koho hledáme, jak to dneska máme prostě rozdaný ty karty, jak to funguje na těch projektech. A já to říkám tak, jak to je, aby pak někdo nebyl jako frustrovanej. Říkám i ty výhody, i ty nevýhody. Co tam jsou, že ty věci díl trvaj, nebo prostě se to jako — teď, Milane, teď tady mám na tabuli 15 minut, protože to bude trochu jinak po dvou letech, chápeš to? Ještě to není vyvinutý a teď přišla IT analýza ' [Speaker 2] 'že ty data úplně nemůžou být takhle, takže to máme trochu předělat. No dobrý, hele, já už jsem v pohodě, mě to nemůže rozhodit. Já už jsem zen mistr. Takže tohle já těm lidem taky na tom pohovoru říkám, protože to prostě, to se může stát a někdo to musí jakoby ustát ten člověk. Nesmí si z toho tolik brát. Je to takový jako jak když jdeš na to první rande, vůbec jestli se chceš vidět ještě podruhý a něco tam budovat, nebo ne? A když tohle všechno jakoby v pořádku, že se teda znova jako chceme vidět, že chceme pokračovat, tak to druhý kolo už je potom jako praktický. Protože já říkám, víš, tady jsme si ten med kolem tý pusy, tak nám to funguje, jsme zaláskovaný, máme ty růžový brejle, ale já teďka chci vidět trochu i nejenom ty sladký řečičky, ale i ty činy. Takže chci vidět — dáváme nějakej úkol, záleží podle tý pozice, na kterou se hlásej. A zase to není tak, že na to vypracování potřebuješ dva dny. ' [Speaker 2] 'JTo já jim říkám, že se zase vážím jakoby jejich času. Takže tady nedělám žádný assessment centra. Ale já chci něco vidět a chci hlavně vidět, jak ten člověk nad tím přemýšlí.'", "summary": "1. kolo = chemie/první rande, transparentně i nevýhody. 2. kolo = úkol, \"chci vidět, jak nad tím přemýšlí.\"", "session": "P3", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hfhXRj8VcULFM8O6wRwvG", "video_clip": "[video highlight_clip_9ZvCTB.mp4 00:00.7-02:42.8]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Hiring manager"], "Default group": ["Pozitivní příklady", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "uuLo5hupujUHXh6PhczN", "text": "[Speaker 1] 'Takže zadáváš to e-mailem, nastavíš očekávání na tom screeningovém kolu ještě, řekneš, bude nějaký úkol, dáš jim čas na to, aby ho vypracovali? předtím 2 setkáním vlastně jo, takže když přichází, připravený na to 2 setkání s tím úkolem.' [Speaker 2] 'Přesně tak.' [Speaker 1] 'Dáváš jim na to nějakej fakt čas? To znamená, že třeba jim to pošleš den předtím. Nebo že je omezuje časově, nebo.' [Speaker 2] 'Většinou to druhý kolo je třeba týden potom a já jim to třeba pošlu, já nevím, pět, čtyři dny před tím. Není to jako, že by to bylo den před tím, to zase taky nevím, víš, jakože jestli ty lidi mají čas přesně ten večer, nebo ne. Ale já jim tam píšu, že si třeba myslím, že by to mělo zabrat, já nevím, dvě, tři hoďky, maximálně čtyři, že tomu zase nemají jakoby věnovat dva dny. A snažím se jim říkat i na tom prvním kole, že prostě s čím přijdou, tím přijdou a že mě zajímá i to, jak nad tím přemýšlej. ' [Speaker 2] 'Ale přesně, Milane, mě totiž často nezajímá jenom jako, že je ten výstup, že by někdo přišel s Figmou pixel perfect jako grafika, ale mě zajímá ten proces zatím. A protože já jim posílám e-mail, ale součástí toho e-mailu jsou i třeba do Figmy nebo do FigJamu, já nahážu screeny z mýho Čezu, protože ty lidi často nemají přístup do mýho Čezu. Tak tam jenom hodím třeba tady dashboard, tady odběrný místo, tady nějaký platby, prostě jenom pět takových jakoby screenů, aby si udělali trošku obrázek, o čem to je a s tím zadáním, že biznis přišel, že nevím, je nějaký problém, klienti si stěžují — co s tím.'", "summary": "Úkol: reálný ČEZ problém + screeny ve FigJamu, 2–4 h. Hodnotí proces, ne pixel perfect.", "session": "P3", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hdAbUvh7zo4lsd8Hh0iXd", "video_clip": "[video highlight_clip_uuLo5h.mp4 00:00.1-01:36.3]", "tags": {"Hypotézy": ["H1", "H4"], "Perspektiva": ["Hiring manager"], "Default group": ["Pozitivní příklady", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "GWPlrQhSBSM4BWJQs3k1", "text": "[Speaker 2] 'No a to je právě hezký vidět, kdo se jak připravuje. Třeba z minulosti vím, že přišla jedna holka na juniorku, která třeba chtěla, jakože měla podle mě ten Czechitas test nebo něco takového za sebou, nějakej kurz. Tak já i těmhle těm lidem jsem dávala šanci, jsem si říkala, hele, tak jo, pojďme to vyzkoušet. Motivační dopis měla jakoby hezký. I to tehdy bylo tak, že třeba ta holka, já jsem prosímtě byla na letní škole za Krále Klacká a ona tam byla se mnou. Tak jsem si říkala, pane bože, já ji asi znám, tak jsem podle mě na to první kolo poslala jenom Filipa, abych nebyla jako zaujatá, protože já jsem o ní měla takovou trošku představu, že to není úplně moje krevní skupina. Ale to neznamená, že to musí jenom moje krevní skupina. Tak jsem schválně tehdy vyslala pouze Filipa, abych si říkala, hele, ať já nejsem zaujatá, prosím tě běž tam ty, pobav se s ní, jestli ti to sedí a jestli ji pozveme do druhého kola. Tak Filip mi říkal, hele, vypadalo to dobře — pozvali jsme ji na to druhé kolo, tak jsem tam jako taky přišla. Hele, a ta holka prostě přišla s takovým zmačkaným papírem, kde něco začala vybalovat, a to prostě vidíš, Milane. Já říkám, tak toto tady utrhla papír a dělala to v autobuse po cestě sem. Hele, to si ji takhle rozstříleli, mě ji až bylo líto. Já jsem si pak přišla jak na státnicích, my už pak odpovídáme sami — já třeba říkám, jak byste řešila tohle a co třeba se na to kouknout z tohohle pohledu? Že těm lidem to není, že my je jenom střílíme. Nesnažíme se toho člověka tam dusit ve vlastní šťávě, to prostě už vidíš po nějakých otázkách, jestli se chytá nebo nechytá, co jakoby zhruba my chceme. A on když ví, tak naskočí a řekne, jo, jasně, já jsem jenom nevěděl, tak jsem to rovnou udělal jako takhle, ale třeba normálně bych to řešil. Ale jde mi o to, s čím ty lidi vůbec přijdou — ala zmačkaný papír versus něco tady mám. Že vůbec to má nějakou jako strukturu. A to neznamená, že já chci pixel perfect obrázek ve figmě, to nemusí být, ale prostě třeba, že ti i v tom FigJamu nebo kdekoliv ukáže ten člověk — hele, tak když by přišla taková věc, tak co bych jako dělal. A vlastně, víš, já si vždycky říkám, když máš ten design proces, tak kdyby jel přesně podle něho, tak mi odpovíš na všechny ty otázky.'", "summary": "Zmačkaný papír vs. struktura ve Figmě. Design proces = hodnotící rámec. \"Nestřílíme — pomáháme.\"", "session": "P3", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h6DX4MpnFTbyUxx9UdIlA", "video_clip": "[video highlight_clip_GWPlrQ.mp4 00:01.5-02:51.2]", "tags": {"Hypotézy": ["H1", "H4"], "Perspektiva": ["Hiring manager"], "Intenzita": ["Silně"], "Default group": ["Trust signals", "Workflow / Chování"]}}, {"id": "I3iK8NRMLbiwSdoK5dQa", "text": "[Speaker 2] 'Hele, je to tak, že většinou s tím člověkem prostě teda se vidíme tu hodinu a pak třeba ještě zůstaneme v tý zasedačce dalších deset minut, něco takovýho. A i s tou HRistkou společně vlastně si tak jako říkáme, co nám tam sedělo, nesedělo a jestli to vidíme na nějaký jako pokračování nebo ne. A většinou ' [Speaker 2] 'to prostě jako to víš, to prostě to není tak, že bys to nevěděl. A já navíc chci, aby ten člověk jako seděl nám všem, aby to byl jak Filip, tak já, tak Míra, že to — a to stejný ta HRistka řekne, jo, hele, v pohodě, nebo že to jsou jenom drobnosti, kterých si všimneš, ale jakmile tam někdo z nás vidí ten red flag, tak jakoby víš, že to nebude fungovat.'", "summary": "Debrief 10 min, 3 lidi. Jeden red flag od kohokoliv = vyřazení.", "session": "P3", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hEvQBxN0bIqJ89eE0rdgJ", "video_clip": "[video highlight_clip_I3iK8N.mp4 00:01.4-00:41.2]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Hiring manager"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "sDhTH19V0tFACe5Nin18", "text": "[Speaker 2] 'pak jsem měl myslím. Call s luma jak on se to jmenuje budík? Já vám tam počkejte vteřinku, tohle tohle se vyplatí najít, aby. Abych byl přesnej v tý roli, ale to bylo myslím jako telefonickej rozhovor, kterým jsem tak jako prošel v pohodě. A pak myslím, následovalo zadání. Ježíš teďka teďka mi fakt to.' [Speaker 2] 'Tak počkejte, já si ho někdo přestanu, no a pak následovalo zadání. Domácí úlohy si myslím. Na kterou jsem měl asi tejden a myslím, že jsem se docela snažil a principelně si myslím, že jsem s ní jako taky taky prolez.' [Speaker 1] 'Hele a když říkáš tejden jako na vypracování, tak kolik času ti to reálně zabralo? Ta úloha, jako kolik se tomu věnoval?'", "summary": "Hiring manager (Luka Budík, tribe lead) byl nový v roli, plaval. Druhé kolo = telefonický rozhovor s hiring managerem. Kandidát si všímá, že hiring manager není úplně připraven na svou roli — může ovlivnit kvalitu hodnocení.", "session": "P2", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hQ0507dsDnS01YKBu3vWg", "video_clip": "[video highlight_clip_sDhTH1.mp4 00:00.7-01:09.6]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "GaQEiDezbOhV15cb4Zzr", "text": "[Speaker 2] 'á myslím, že asi 8 hodin nebo 10, jako něco takového. Já jsem se snažil dodržet to, co oni říkali v zadání, že prostě tomu nevěnujte víc než něco, tak jsem to trochu přešvihl, ale jenom jako o trochu. Bylo to řešení problémů s akvizicí v Německu, že mají špatný konverzní poměr — ty lidi se jim přihlašujou, nabírají, přihlašujou se a nenakupují. Z mého pohledu to nebyla nejhorší úloha, co jsem kdy někdy dostal, na jednu stranu, na druhou stranu už to nebylo úplně juniorní a chtělo se to trochu hrabat i v tom německém Rohlíku a podobně'", "summary": "Domácí úkol: 8-10 hodin práce, týden na vypracování. Reálná case study (akvizice v Německu). Kandidát přešvihl doporučený čas — investice do úkolu je značná. Na senior pozici očekávej, že kandidát překročí doporučený limit.", "session": "P2", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hGRV16k03TuUM1gqWfoGM", "video_clip": "[video highlight_clip_GaQEiD.mp4 00:01.9-01:13.8]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Workflow / Chování"]}}, {"id": "hojb0GBWCTVFd1vFUlg4", "text": "[Speaker 2] 'Lidé šli na začátku dva a pak šli po jednom, takže to byly vlastně čtyři lidi ve třech sešnách. A grilovačka slušná, takže to bylo intenzivní — celkem asi skoro tři hodiny. ' [Speaker 1] 'Zeptat jenom jako já bych to zkoušel, nevím, jestli to správně čtu. Takže byl ten screen screenovej call, kterej jsem měl s tím lukou, pak mu.' [Speaker 2] 'Řekli dobrý tady bylaPersonalistka, Luka, domácí úkol, a pak ty tři pohovory se čtyřma lidma — to bylo celkem pět pohovorů.'", "summary": "Rohlík formát: 5 kol celkem — HR screening, hiring manager call, domácí úkol, pak 3 sessions se 4 lidmi v jednom odpoledni (Luka + Michal Damborský, personální ředitelka, člověk z obchodu). Každý měl ~45 min. Celkem ~3 hodiny v jeden den. “Grilovačka slušná.”", "session": "P2", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hDNcvSzkSiC1K1H18jmkY", "video_clip": "[video highlight_clip_hojb0G.mp4 00:00.3-00:38.7]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"], "Default group": ["Workflow / Chování"]}}, {"id": "OhreqSj4HuaCh1sRNQn5", "text": "[Speaker 2] 'kde to právě začalo z mého pohledu trochu skřípat, že oni vlastně nebyli moc připravený na ten pohovor — Luka a Michal na mě. Vlastně jsme si dohromady ani neodřídili, jak rychle to jako probereme, a pak tam nezbyl moc čas na nějaké další povídání o jiných věcech, protože jsme se prostě zasekli na té case tady. Sice zajímavým povídáním, ale vlastně neměli to podle mě úplně jako připravený, no tohle to. A ty si promiň?' [Speaker 1] 'Že tam do toho vstupuju, jenom říkáš, nebyli připravený a tak co to jako znamená? Jo, ty jsi čekal, že to nějak bude, že proberete jako nějaký témata, ale ve skutečnosti jste probrali jenom to domácí cvičení.' [Speaker 2] 'Já jsem čekal, že jim to prostě fakt relativně svižně odprezentuju, oni budou mít připraveny nějaký tři základní otázky, u kterých se půjde třeba trochu do hloubky, a tím to zabalíme a půjdeme se dál bavit o mé historii, mém přístupu k věcem, nebo já že se budu mít šanci doptat jich, co vlastně potřebujou. ' [Speaker 2] 'A vlastně tomuhle vůbec nedošlo. Celý jsme to zabili na tom jejich aktuálním problému, který přiznali, že je reálně pálí. Bylo vidět, že oni se nějak asi úplně nedohodli, jak moc do detailu chtějí na tom jít, a zároveň prostě fakt nedali mě prostor opačně. Furt přece jenom já jsem ten nabíraný, a ne ten, kdo by si měl řídit hiring managera, že jo?'", "summary": "Hiring manažeři (Luka, Michal) nepřipraveni na pohovor — nedohodli se na struktuře, neměli jasné otázky, zasekli se na case study. Kandidátovi nedali prostor se ptát. Bob reflexivně dodává, že si to mohl odřídit sám, ale je v roli kandidáta — nechce řídit hiring managera. Potvrzuje H1: i ve firmách, které mají ambici (Rohlík), hodnocení skřípe.", "session": "P2", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hcbzhrYiTxDPEl6O3JJdp", "video_clip": "[video highlight_clip_OhreqS.mp4 00:00.9-02:03.9]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "pvsrPpqysYh6skFSe4Q3", "text": "[Speaker 2] 'pak jako ty další pohovory — personální ředitelka dělala spíš jako nějaký culture check. Ta to byla jenom naštvaná, že se nám protáhl ten první pohovor, že na mě má míň času, ale nějak to zvládla relativně se ctí. Zároveň té odbornosti jako naší moc nerozumí, takže jako asi mě podle mě taky hodnotila jenom jako lidsky. A zajímavý byl ten člověk z toho, myslím, že vyloženě obchodu, který byl naopak jako perfektně připravený. Věděl v podstatě, co ze mě chce vytáhnout, s cílem taky částečně culture check a částečně, aby viděl, jak o věcech přemýšlím, jestli jsem schopen nějakého třeba expertního odhadu a podobné věci. A ten byl ostrej ale milej. Já jsem třeba kdysi zažil podobný pohovor do Auta a vlastně tenhle člověk ho téměř dokázal vyrovnat. To Auto bylo tenkrát nejlepší pohovor, co jsem ever zažil — bylo to totálně ostrých 50 minut, perfektně strukturovaný, perfektně rozmyšlený, na co se ten člověk a proč ptá. A tenhleten člověk z Rohlíku, typově prostě fakt drsnej obchoďák, tak to měl nachystaný podobně kvalitně. Prostě jsem pak dolezl a jenom jsem si otřel pot a říkal jsem si, tak tohle bylo dobrý. '", "summary": "KLÍČOVÝ CITÁT: “Nejlepší pohovor vedl drsnej obchoďák, ne design lead.” Personální ředitelka = culture check, nerozumí odbornosti. Obchodník = perfektně připravený, strukturovaný, věděl co chce zjistit. Potvrzuje emergentní pattern: obchodníci interviewují líp než design leadeři. Bob srovnává s nejlepším pohovorem ever (Avto) — 50 minut, perfektně strukturované.", "session": "P2", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hGZEQDZQTyRT8TJcuaDMw", "video_clip": "[video highlight_clip_pvsrPp.mp4 00:01.3-01:36.5]", "tags": {"Emoce": ["Důvěra"], "Hypotézy": ["Emergent", "H1"], "Default group": ["Industry insights", "Pozitivní příklady"], "Perspektiva": ["Kandidát"], "Intenzita": ["Velmi silně"]}}, {"id": "SUlxZktrSNeYLWr2pDJx", "text": "[Speaker 2] 'dohromady to nemají podle mě úplně blbě vymyšlený v tom, že tě prostě neotravujou jako postupně, ale že tě tam prostě zatáhnou na to odpoledne, zatíží, prostě pak si udělaj nějaký debrief. To vím, že dělali, že přímo po mně dělali debrief. '", "summary": "Pozitivní aspekt Rohlík procesu: intenzivní formát (všechno v jednom odpoledni) místo postupného otravování. Ihned po kandidátovi debrief. Respektuje čas kandidáta i firmy.", "session": "P2", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hluawlNP3EjuMzLDZ1dzO", "video_clip": "[video highlight_clip_SUlxZk.mp4 00:00.3-00:12.5]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Pozitivní příklady"]}}, {"id": "vadLcqszcN0LTEu453R0", "text": "[Speaker 2] 'Sranda je, že tohle to jsme zvládli podle mě tak nějak na přelomu listopadu, prosince. Vím, že oni si udělali debrief. A pak se mnou postupně komunikovala ta personalistka, která vlastně říkala, no a ještě si to musíme jako nějak tady rozmyslet. Tak ještě prosím chvilku strpení. A pak už říkala, hele, ještě poprosím, prostě já nevím, přes víkend. A pak, jak to trvalo už dlouho, už to asi bylo trapné, tak z ní začaly lézt i detaily, co se děje. Že prostě — hele, prakticky jseš až jako jedinej kandidát a už jenom schválíme, teda čekáme na to, až tě schválí jako Tom Čupr. A tohle to už bylo vlastně někdy před Vánocema těsně. A pak ona zavolala fakt prostě pátek před tím vánočním týdnem a říká, no, tak se omlouvám, tak jsme to do Vánoc nestihli. Což jako — původně se tvářili, že prostě na přelomu listopadu, prosince bude vybaveno. K tomu já jsem naštěstí už na začátku byl skeptický. To, že to není rozseklý do Vánoc, no, to už mě trochu naštalo, protože prostě chceš vědět, jestli jo nebo ne. Na druhou stranu to z jejich strany vypadalo celkově pozitivně, tím, že ona mi jako asi trochu neplánovaně říkala, že jsem prostě jedinej kandidát a čeká se už jenom na schválení. Pak proběhly 14 dnů Vánoc, nic se nestalo. Pak proběhnul první lednový týden, taky se nic nestalo. Volal jsem zpátky té personalistce někdy druhý týden v lednu a říkám, tak co, už prostě tři démy a ticho popěšně. A ona: no, já už tam nedělám, oni se s tebou nespojili? A já — no, nespojili. Tak já šťouchnu do toho mého nastupujícího kolegy, ať ti teda dá vědět. A kolega se pak ozval v duchu: no, tak tady proběhlo nějaký business review, a vlastně jsme se rozhodli tu pozici neobsadit. Ptám se: hele, tak mi aspoň řekněte, jak jsem dopadl. Z tohohle člověka vypadlo: no, měli jsme tři kandidáty a vybírali jsme si mezi váma. Ale přitom těsně před Vánocema říkala, že jsem jedinej a čeká to na schválení'", "summary": "KLÍČOVÝ PŘÍPAD — Rohlík hiring fail. 5 kol, ~3 měsíce, kandidát se dozví náhodou (personalistka odchází, nikdo nekomunikuje). Slibí rychlost — nedodrží. Říká “jedinej kandidát” — pak “měli jsme 3”. Pozice nakonec zrušena (business review). Žádný feedback na výkony. Exemplární příklad rozbitosti hiring procesu na seniorní úrovni.", "session": "P2", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hCR8mpu3wkocUU5Xw2qXX", "video_clip": "[video highlight_clip_vadLcq.mp4 00:00.5-03:17.9]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H2"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "g684NnYYwwv7bf9vfahu", "text": "[Speaker 2] 'Ono se ten můj postup se zas tak moc nelišil, protože už v tom Seznamu jsme dávali skoro bych řekl větší důraz než na to, jakej prostě má ten člověk vizuální výstup, tak spíš právě na to jednoduše, jak o tom přemýšlí, respektive jak zná nějakej designovej proces z high level a případně praktické metody v detailu. Já často k sobě potřebuju spíš lidi, kteří umějí opravdu nějak přiměřeně metodicky procházet procesem a nekličkujou jak zajíci. A když je potřeba, tak ve finále se někdo na ten hezký design jako najde. A pak jasně, když jsme nabírali specificky jako UI designéry, tak tam už to přesně bylo o portfoliu — předveď, že jseš schopný měnit třeba styl podle potřeby, aby to nebylo všechno na jedno prdo. Ale jinak valná většina těch lidí, které já jsem historicky nabíral, tak byli fakt spíš takový ty design thinkeři a metodičtí lidi, anebo výzkumníci nebo produkťáci '", "summary": "Při hiringu dávali větší důraz na myšlení a znalost procesu než na vizuální výstup. “Kličkujou jak zajíci” = red flag. Visual design = najde se někdo jiný. U UI designérů portfolio ano, u ostatních ne. Design thinkeři, výzkumníci, produkťáci = většina jeho nájmů. Potvrzuje H4: assessment > portfolio pro non-UI role.", "session": "P2", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hrIO3icZVaddfjeic3cYX", "video_clip": "[video highlight_clip_g684Nn.mp4 00:01.0-01:34.7]", "tags": {"Hypotézy": ["H1", "H4"], "Default group": ["Industry insights", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "fB8pcxTYQD3CzL0i0C0g", "text": "[Speaker 2] 'S těma ten základ už jsem v podstatě řekl — jak přemýšlejí o problémech, jak se navigujou. Pak jsme pochopitelně zkoušeli i nějaký domácí úlohy, ale my jsme se lidi většinou snažili neopatrovat až tak naháliko — byly spíš menší, abychom byli o čem se bavit. Ale s čím jsme měli relativně dobré zkušenosti, tak byl nějaký role play. Že jsme si je prostě vzali na pohovor a nebyl to jenom pohovor, ale byla to prostě simulovaná jejich situace s nějakou netriviální pozicí — ale opravdu otravnej stakeholder třeba, nebo prostě protichůdné požadavky a tak. Na to jsme si pak vzali kolegy z týmu, aby to nebylo jeden na jednoho — byli jsme tři, čtyři. Uvedli jsme tu situaci, sehráli jsme ji, trvala třeba tři čtvrtě hodiny. A z toho jsme si pak hodnotili, jak ty lidi fungují.'", "summary": "Hiring metody: domácí úkoly (menší, ne naháliko) + role play (45 min, 3-4 lidé, simulované situace — otravný stakeholder, protichůdné požadavky). Role play = nejlepší zkušenost — ukazuje, jak člověk reálně funguje. Nenabírá na portfolio, ale na chování v simulované situaci.", "session": "P2", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hIxX8Oj1q7mqrpMhIDndx", "video_clip": "[video highlight_clip_fB8pcx.mp4 00:01.5-01:08.0]", "tags": {"Default group": ["Existing solutions", "Pozitivní příklady"], "Hypotézy": ["H1", "H4"], "Perspektiva": ["Lead"], "Intenzita": ["Silně"]}}, {"id": "nJqsVehGKfuzDvwGuBSL", "text": "[Speaker 2] 'mimochodem mám takovou docela zajímavou zkušenost s tím, že čím větší firma, která navenek působí jako rigidněji, tím většinou líp jim ten hiring proces funguje. Právě všichni takový ty frajeři, co vykřikujou, jaký jsou strašně rychlý a agilní — i vy ten Rohlík vlastně — tak vlastně tam to většinou fungovalo jako nejhůř, protože to prostě nemají zajetý, nemají to nastavený. Když to vezmu třeba versus to MMSDčko, no tak to mělo perfektně jako standardizované' [Speaker 2] 'vypadá to jako velký, těžký moloch, ale vlastně to HR to mělo perfektně standardizované a pak už šlo vlastně v uvozovkách jenom se na to napojit s těma našima potřebama designového teamu'", "summary": "Kontraintuitivní pattern: velké “rigidní” firmy mají lepší hiring než “agilní” startupy. “Frajeři co vykřikujou, jaký jsou agilní — tam to fungovalo nejhůř.” MMSD (velký moloch) = perfektně standardizovaný HR proces. Rohlík (startup) = chaos. Shoduje se s Lucií Navrátilovou (stejný pattern). Standardizace > “agilita” v hiringu.", "session": "P2", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hdVPWfnZuhlMVMPac8paa", "video_clip": "[video highlight_clip_nJqsVe.mp4 00:00.4-01:00.1]", "tags": {"Hypotézy": ["Emergent", "H1"], "Default group": ["Industry insights"], "Perspektiva": ["Kandidát", "Lead"], "Intenzita": ["Velmi silně"]}}, {"id": "DZarMbbUMOXj9gy7bGqu", "text": "[Speaker 1] 'Jakou formou jste jim ten feedback dávali?' [Speaker 2] 'Myslím, že kombinovaně — něco měli černé na bílém a ještě jsme se byli o tom ochotni bavit po telefonu. Myslím, že jsme jim většinou volali, ale minimálně měli černé na bílém. Ono takhle, tam zas připadají právní aspekty — černé na bílém musíš dát nějaké formálnější hodnocení, než co si můžeš vyříkat jako mezi čtyřma očima.' [Speaker 1] 'A když si vezmu teďka ty kandidáty, které byly odmítnutý. A dostali feedback tak jakej jak reagovali na ten feedback? Vlastně jaký byly over all? Reakce vlastně na to, protože jste.' [Speaker 2] 'Jako poděkování principiálně. Někteří lidé byli vyloženě překvapení, že vůbec feedback dostali. Prostě jsme jim neřekli jenom díky čau, ale že jsme jim byli schopni vyprodukovat nějaký aspoň pár bodů, jako proč ne. Ale nebylo to jako elaborát — bylo to mailem, prostě jako dva, tři hlavní důvody proč ne.'", "summary": "Feedback formát: černé na bílém (mail, 2-3 hlavní důvody) + telefonát. Kandidáti často překvapeni, že vůbec feedback dostali — norma je ghosting. Právní aspekty limitují detailnost písemného feedbacku vs. ústního. I tak = výrazně nad standardem trhu.", "session": "P2", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hty7Ob638SC0ugGp4C9p7", "video_clip": "[video highlight_clip_DZarMb.mp4 00:01.5-01:38.5]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Lead"], "Default group": ["Pozitivní příklady", "Trust signals"], "Intenzita": ["Silně"]}}, {"id": "gESu6KKwFoCfJUm3wnlx", "text": "[Speaker 2] 'Ten techno-optimismus AI zavání takovýma těma ferdama mravencema, že vlastně potřebuješ jenom dvě role — jedna je víc produktová a druhá víc technologická, že zkrátka ten jeden je v podstatě produkťák a ten druhý inženýr, oba dva intenzivně promptujou a dohromady z toho na konci padá to, co dřív dělalo dvacet lidí, tak teďka dělají dva. Já neříkám, že to tímhle směrem částečně nesměřuje. Ale ono se to pak prostě odbíjí v očekáváních z těch pozic — fakt jsem potkal pozice, které byly v duchu: hele, ty musíš být skvělej stratég, umět perfektně promptovat, a ještě mít vizuální cit, že prostě fakt potřebujeme, abys tam spravil i brand. Což je rozkročení od fakt výzkumu až po marketing. A podle mě to není reálné, respektive znám jenom pár lidí v Čechách, kteří jsou toho schopni aspoň trochu obsáhnout, a pak je otázka, v jaké kvalitě. Ale inzeráty, co se objevují teďka, jsou tohohle typu. Vlastně jestli mi přijde teďka něco rozbitého, tak je to to, že se za celou tu dobu, co digitální design existuje, tak se nám bohužel do příchodu AI nepodařilo úplně vysvětlit tu naši hodnotu. My jsme holt dál od té produkce — markeťák spustí kampaň a doručí čísla, inženýr naprogramuje featuru. Ale že se tam dostala nějak — to prostě v téhle fázi těm firmám nedochází. Takže oni optimalizujou, zefektivňujou, vypisujou tím pádem úplně široký role. A ještě je tam jeden aspekt — vibe coding, jak je tady s náma plus mínus rok, tak zase strašně zváhnul to kyvadlo té pozornosti k té produkci. A ne k té přípravě toho, co se dělá. Ono nás to za pár let nejpozději kousne do zadku, že tady bude prostě extrémní produkce shitu. Ale my jsme prostě do příchodu AI nevysvětlili, k čemu ty designéři jsou dobří. Některý firmy to tuší, u některých prostě — hele, my potřebujeme někoho, kd
