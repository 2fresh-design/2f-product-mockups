o nám napromptuje to rozhraní. Takže vlastně ty pastelky se jenom přenášejí z Figmy do nějakého Cloudu.' [Speaker 1] 'Jako jiný nále.' [Speaker 2] 'A vůbec se neřeší výzkum, discovery, prioritizaci si udělá přece produkťák podle toho, jak se mu co líbí.'", "summary": "KLÍČOVÉ INSIGHTY PRO BOARD: 1. “Do příchodu AI se nám nepodařilo vysvětlit hodnotu designérů” — strukturální problém oboru. 2. “Vibe coding zváhnul kyvadlo pozornosti k produkci” — firmy chtějí generalisty, kteří promptují všechno. 3. “Za pár let nás to kousne do zadku — extrémní produkce shitu” — predikce. 4. Inzeráty chtějí nerealistické rozkročení (stratég + prompter + visual designer + brand). 5. “Pastelky se jenom přenášejí z Figmy do Cloudu” — role designéra degradována na tool operátora.", "session": "P2", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hMxcpJXx0kibg5Kq6zn7X", "video_clip": "[video highlight_clip_gESu6K.mp4 00:01.7-03:48.7]", "tags": {"Hypotézy": ["Emergent", "H1", "H3"], "Emoce": ["Frustrace/zklamání"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát", "Lead"], "Intenzita": ["Velmi silně"]}}, {"id": "NegAaRYiMJc8I1xM7hVd", "text": "[Speaker 1] 'Měl jsem takové jako dvě vlny. Dostal jsem se na pohovory a během chvíle jsem byl v nějakých druhých, třetích kolech. A právě v jednom scale-upu to vyšlo, dostal jsem nabídku, ale nějak jsem cítil i z toho, jakou mi zadali case study i jak k tomu přistupovali k tomu pohovoru, že to nebude pro mě asi úplně ten správný fit. Necítil jsem, že bych tam chtěl. Bylo to super, že rychle to dopadlo, ale prostě necítil jsem, že to je ten správný fit. A do toho jsem měl i další pohovory a tohle jsem oddaloval, nakonec jsem to odmítl. Velmi dobře se to vyvíjelo v jedné menší bance, kde jsem dostal case study. Case study byla na dvě části, hodně zajímavá, trvalo mi to klidně jeden celý den. A pak na tom představování bylo třeba 8 dalších UXáků, přišla tam ředitelka celé té divize, ředitelka HR. Byl to hodně velký challenge, ale líbilo se jim to. No a tam jsem už tak cítil, že to dopadne, ale prostě někdy svět přihrá jiné okolnosti. Volali další den, že se jim to moc líbilo, že by mě rádi vzali, ale že jsou součástí větší skupiny, v té skupině mají nějakou IT agenturu a tam jí volal včera manažer, že se jim uvolnil jeden UXák, pro kterého nemají práci, takže chtějí udržet lidi ve skupině zaměstnaný. Tím pádem jako naberují jeho a z mé strany to nevyjde '", "summary": "Dvě vlny hledání, tři cesty k nabídce. (1) Scale-up — nabídku dostal, ale odmítl (case study + přístup k pohovoru = špatný fit). (2) Menší banka — dopadlo výborně, 8 UXáků + 2 ředitelky na prezentaci, ale odmítnut kvůli internímu UXákovi z jiné firmy ve skupině — kvalitní kandidát poražen interním přesunem kvůli finančním důvodům. Silný Industry insight: firemní skupiny řeší hiring napříč entitami, externí kandidát je v nevýhodě nezávisle na kvalitě.", "session": "P7", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hmQnHr2L9w4gvBgwbzcE2", "video_clip": "[video highlight_clip_NegAaR.mp4 00:00.0-01:53.1]", "tags": {"Hypotézy": ["Emergent", "H1"], "Emoce": ["Frustrace/zklamání"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"]}}, {"id": "KuDlMf0DaXcb3DmQhuGr", "text": "[Speaker 1] 'mezitím byly ještě další dvě, kde jsem byl ve finálovém kole, ale nevyšlo to. Jedno byla nějaká nadnárodní agentura, všechny ty lidi, kdybych říkal ty manažery, tak budeš znát, takže záměrně neříkám jména. Dostal jsem zpětnou vazbu, že mi tam chyběly nějaké zkušenosti, dovednosti ve výzkumu, takže dali přednost někomu jinému. A potom jsem byl v české IT agentuře, software house, kde to nebylo na UXovou pozici, ale na něco mezi UXákem a produkťákem. A tam jsem byl ve finále, ale nakonec tu pozici neobsazovali, protože to nebylo v nějaké horké fázi a hlavně sháněli někoho seniorního, kdo se hodně orientuje v technických věcech, a mě v rámci toho screeningu vyhodnotili jako medior++, takže to taky skončilo.'", "summary": "Dvě další nevydařené finály. Nadnárodní agentura: “chybí research zkušenosti” → vzali seniornějšího researchera. Software house: “medior++” ale chtěli senior technicky orientovaného. Důvody odmítnutí byly pokaždé o jiném kandidátovi nebo o posunu požadavků, ne o kvalitě Kleinerta. Validace H1 — firmy nemají jasno, koho hledají; požadavky se ladí ex post.", "session": "P7", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/htOy5tddxntgn1ef3gAi0", "video_clip": "[video highlight_clip_KuDlMf.mp4 00:01.3-01:07.2]", "tags": {"Hypotézy": ["H1"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "muC2JQXVyidAjWs3Shcg", "text": "[Speaker 1] 'Bylo to různý, někde dali relativně krátký čas, někde nedali žádný čas, tady to máš a postarej se o to, že to byla taková tyrkisová firma, která hodně tlačila odpovědnost toho člověka a vlastně mohl jsi na to mít kolik chceš času. Zároveň ale v tom zadání bylo napsané, kolik bys tomu maximálně měl věnovat, aby to mohli porovnávat ty výstupy. Někde mi to jako říkali, že přes víkend nejsem doma, takže mi to poslali až v pondělí a měl jsem na to dva dny. A vlastně to byl pro mě důležitý moment, že na té case study poznal, jak ta firma má maturitu nebo jak k tomu přistupuje. Že někde ta case study byla zadaná jako jedna věta na A4 a někde to byly tři stránky, kde jsi měl relativně dost kontextu, nějaký nastíněný závěr z výzkumu a tak podobně. Takže vlastně to pro mě taky byl signál, že by mě v té firmě lákalo pracovat, že nad tím uvažují dobře, anebo že tomu nevěnovali tolik pozornosti nebo neměli čas. Ale vlastně to taky bylo pro mě důležitý.'", "summary": "KLÍČOVÁ PASÁŽ — case study zadání jako proxy pro kvalitu firmy. Spektrum od “jedna věta na A4” po “tři stránky kontextu + nastíněné závěry z výzkumu”. Kandidát čte maturitu firmy z kvality zadání. “Na té case study poznáš, jak firma uvažuje.” Reverse signal — kandidát hodnotí firmu skrze to, jak firma hodnotí jeho. Silný trust signal pro produkt: transparentní, kvalitně zadaná case study je diferenciátor firmy.", "session": "P7", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hzer9cAsmIghtBbeGfn28", "video_clip": "[video highlight_clip_muC2JQ.mp4 00:01.8-01:10.0]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points", "Pozitivní příklady", "Trust signals"], "Intenzita": ["Velmi silně"]}}, {"id": "E2meD2kIHhIs0b5upbh9", "text": "[Speaker 1] 'Jako jedna věta jenom napsaná. Jedna věta na A4 hlavičkovým, kdy bylo, ať na designu vlastně něco, co se vlastně ani netýkalo té samotné práce. Vlastně tady to byl nějaký finanční nástroj, ale já jsem měl designovat něco jako kompletně jinýho, co mají lidi doma. Jako kávovar. '", "summary": "Klíčový moment — první nabídku odmítl scale-up, protože case study byla jedna věta na hlavičkovém A4 a úkol se netýkal práce firmy (firma dělá finanční nástroj, úkol byl “designuj kávovar”). Kleinert to přímo cituje jako signál fit-misfit. Validace H1: nekvalitní, generické zadání = nízká maturita = pass. Zajímavá paralela s Bártů (numerologická mřížka) — firma se odhaluje tím, jak hodnotí.", "session": "P7", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hnGUos5jMUuaXexDDWViS", "video_clip": "[video highlight_clip_E2meD2.mp4 00:01.2-00:26.6]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points", "Trust signals"], "Intenzita": ["Silně"]}}, {"id": "qnZgQwfInCzoSclnVHSN", "text": "[Speaker 1] 'Další byla ta banka, kde první byl screening s HRistkou, kde jsme si vymezili ty platové možnosti, následně jsem měl kolo zase s HR a s team leaderem, kde team leader se mě hlavně ptal, HRista jenom přihlížel, bylo to online, trvalo to hodinu. Na základě toho řekli, dává nám to smysl, takže ti pošleme case study. Case study byla rozdělená na dvě části, kdy jedna byla jako víc o wireframeování a druhá byla víc o přemýšlení, týkala se dvou různých věcí a vlastně si měl připravit výstup pro obě. Měl jsem na to nějaký tři, čtyři dny, pak jsem to šel představit osobně do té firmy, kde teda bylo dalších sedm, osm UXáků, team leader, ředitelka inovací, HRistka. V hodině nebo třičtvrtěhodině jsem to představoval,' [Speaker 1] 'UXáci se mě ptali, a pak jsme se rozloučili a měli mi dát do konce týdne vědět. Během toho týdne se stalo to, co jsem popisoval — volali, že mají tu jinou agenturu, která dodala.'", "summary": "Nejkvalitnější proces z celého job searche: jasné platové vymezení → HR + team lead screening → strukturovaná case study (wireframing + thinking) → osobní prezentace před 8+ UXáky + HR + C-level → rychlá reakce. Vše dopadlo výborně — ale kandidát neuspěl z externího důvodu (IT agentura ve skupině). Pozitivní příklad procesu, který je ale nepoužitelný jako benchmark, protože firma sama kvalitu procesu nedotáhla do rozhodování.", "session": "P7", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hIVnway2PsCwC6w85O8sB", "video_clip": "[video highlight_clip_qnZgQw.mp4 00:01.9-01:19.5]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "WkdhqFXLx5M3YhqLqJaT", "text": "[Speaker 1] 'Pak je teda další software house. Tam vlastně první kolo s HRistou, kdy hodinový call, doptávala se mě i na ty odborné věci, a na základě toho už mi rovnou na tom hovoru řekla, že jim připadá, že to je fit, a rovnou mi poslala do mailu case study. Měl jsem neomezený čas na tu case study a ta case study byla docela podrobná. Během víkendu jsem to dal dohromady a poslal jsem to. A oni teprve, až když jsem to poslal, tak na základě toho mě pozvali na další kolo. A na tom dalším kole už byl provozní ředitel, team leader, nějaký další produkťák, a HRista. Představil jsem tu case study, oni se doptávali, já jsem se doptával, a nakonec mi odepsali, že jsem se jim líbil, že by to byl i fit, ale že sháněli někoho seniornějšího a techničtějšího, že tam je to hodně o technické analýze, a že já jsem spíš produktově orientovaný, tak tu pozici neobsazuju.'", "summary": "", "session": "P7", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hVsiRz5huS2XkycpoDF8E", "video_clip": "[video highlight_clip_WkdhqF.mp4 00:00.8-01:20.8]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "PPVt7Q47AqzaqZAkfrNm", "text": "[Speaker 1] 'Potom byla ta nadnárodní agentura. První call s HRistou, druhý call s manažerem a HRistou, kdy se mě doptávali i na odborné věci, hlavně ten manažer. Třetí kolo bylo, že jsem měl udělat deep dive do nějaké case study, takže to jsem představil, to co jsem dělal v Generali. Na tom callu byl zase ten manažer, už tam nebyla HRistka, a byl tam k tomu jiný UXák, nějaký další kolega. Takže já jsem v první půl hodině představoval, co jsem dělal za tu poslední dobu. Potom mi ten manažer zadal v rámci deseti minut vymyslet, jak přistoupit k nějakému problému nebo k nějakému projektu, který mají na stole. Jenom jsme si vypnuli kameru, mikrofon, a během deseti minut jsem měl dát dohromady nějaký approach k tomu, jak přistupovat. Po deseti minutách jsem to představil, a uzavřeli jsme to tím, že dají mi vědět. Do konce týdne mi volala, že to byl fit, ale že dali přednost někomu, kdo má ještě větší zkušenosti v researchi. Takže to nevyšlo.'", "summary": "Nejhorší formát v celém samplu: 10-minutový on-the-spot design challenge s vypnutou kamerou/mikrofonem. Kleinert: “Z 10 minut hodnotit člověka mi přišlo, když ukazoval case study, kterého si dělal rok, tak jako tam taky prezentoval nějaký výzkum — to mi přišlo trochu zvláštní.” Asymetrie: firma očekává research depth z 10 min práce. Odmítnutí “chybí research” přitom research v 10 min prostě nevytvoříš. H1 kill signal — extrémní špatná praxe hodnocení.", "session": "P7", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hF8JJRsuS0UHjBlCEtbrF", "video_clip": "[video highlight_clip_PPVt7Q.mp4 00:01.0-01:28.4]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "wgCP0FVdUnaoT1NcH7CO", "text": "[Speaker 1] 'Potom teda už byla Sporka, kde screening, asi půlhodinový první call, první call vlastně s týmem, kde se mě doptávali na to, co dělám, co umím, a na základě toho mi poslali case study, na to jsem měl několik dní, připravil jsem case study, poslal jsem ji den předem, to bylo v neděli, a v pondělí jsem ji šel představit, kdy tam byl manažer, další UXáci, doptávali se mě, a po tomhle callu byl ještě znova call s celým týmem, i s výzkumníkama, s copywriterama, kde se mě mohli zeptat spíš jako na osobní věci, a na základě toho mi teprve poslali nabídku, a na nabídku jsem měl pár dnů na odpověď.'", "summary": "Sporitelna — vítězný proces. 4 kola: (1) HR screening, (2) tým + zadání case study, (3) osobní prezentace + doptávání tým, (4) chemistry check s celým rozšířeným týmem (výzkumníci, copywriteři — osobní otázky). Teprve pak nabídka. Delší proces, ale nejstrukturovanější + jediný s explicitním culture fitem. Pozitivní příklad: chemistry check jako poslední filtr, ne první dojem.", "session": "P7", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/h4PLHWLkEA6MkfxBnCI2T", "video_clip": "[video highlight_clip_wgCP0F.mp4 00:00.8-00:49.0]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "13D9p4yPfudzEs0i5dtk", "text": "[Speaker 1] 'Silný moment byl, když jsem jako do té jedné menší banky — byla rozdělená na dvě části, přemýšlecí a wireframeovací. Tam to byl nějaký problém, který reálně řešili. Já jsem ho nějak uchopil, navrhnul, a pak se mě začal víc doptávat ten UXák, který to jako nakonec designoval. A nakonec testování, on myslel, že to máme udělat přesně tak, jak si navrhnul ty. Tak to byl silný moment, že si řekneš — je to prostě i trochu štěstí a možná nějaká intuice, ale vlastně to mě potěšilo a zároveň, že jsem tam vyzkoušel nějaké nové věci, které jsem třeba v Generali dělat nemohl. Nějaké přístupy, co jsem dělal v tom kurzu MBA, tak bylo vidět, že v téhleté case study ty přemýšlecí je to taky hodně zaujalo. Jedna manažerka musela odejít a ještě jako, že si to pustí na telefonu'", "summary": "Nejsilnější pozitivní moment v celém rozhovoru: banka mu zadala reálný problém (ne fikci jako kávovar). Jeho návrh rezonoval s tím, co interní UXák skutečně designoval → validace jeho přístupu. Manažerka odcházela s tím, že si prezentaci pustí dál na mobilu = signál skutečného zájmu. Klíč: reálný problém + reálná diskuse s interním expertem = nejsilnější trust signal pro kandidáta. Srovnej s “kávovar” (pasáž 11) — opak.", "session": "P7", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/h9nnq5FtMaP4SqFy6MV5z", "video_clip": "[video highlight_clip_13D9p4.mp4 00:00.8-00:57.6]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady", "Trust signals"], "Intenzita": ["Velmi silně"]}}, {"id": "SaDEQ4i0IWvybBqUAnFY", "text": "[Speaker 1] 'Nejvíc líbí to zadání té case study. Protože vlastně vidíš, jak ta firma uvažuje nad tím designovým procesem, zároveň trochu si reflektuješ ty svoje dovednosti a to, co umíš, a dostaneš na to zpětnou vazbu. Co mi naopak nevyhovovalo — já jsem spíš člověk, který v situacích vypjatějších je nervózní. Jak jsem dostal jenom 10 minut na to, jak uchopit ten problém, vypni si kameru a za 10 minut něco představ. To myslím, že byl úkol, který mi nesedí. Kdybych měl třeba čas sednout na půl hodiny a projít tam jednu, dvě iterace, tak by to bylo lepší. Tady vlastně vnímám, že nakonec rozhodlo, že jsem do toho approduce tolik nezahrnul výzkum, ale z 10 minut hodnotit člověka mi přišlo, když ukázali case study, kterou si dělal rok, tak tam si prezentoval taky nějaký výzkum. Přišlo mi to trochu zvláštní. '", "summary": "Preferenční srovnání: case study WIN, 10-min on-call LOSE. Důvody pro case study: (1) vidíš jak firma uvažuje, (2) self-reflection dovedností, (3) feedback. Důvody proti on-call challenge: (1) netestuje reálný proces, (2) asymetrie očekávání vs. čas, (3) neférové vs. long-form case study. Kleinert artikuluje jasný design preference = vodítko pro produkt.", "session": "P7", "date": "17/04/2026", "setting": "", "link": "https://share.condens.io/hpNRVOsYmbCgYerDy7gKq", "video_clip": "[video highlight_clip_SaDEQ4.mp4 00:00.7-01:11.1]", "tags": {"Hypotézy": ["H1", "H5"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points", "Pozitivní příklady"], "Intenzita": ["Velmi silně"]}}, {"id": "VmNjmqVLLBLtkOXLUrSr", "text": "[Speaker 2] 'To CVčko bylo velice často stejné, s tím, že se vyvíjelo, jak jsem si povzpomínala, že se vlastně ještě dává smysl tam něco připsat. Protože jsem jako trochu zapomněla, co všechno mám za sebou. Takže spíš nějak jako školení nebo tak jsem si tam dopisovala postupně. A k těm CVčkům jsem vždycky posílala takový průvodní dopis, proč nemám portfolio. Protože já nemám portfolio. A to nemám z toho důvodu, že v Honeywellu byly NDA, v Czechitas jasný, všechno tam malovali na papír, anebo jsme se to ústně domlouvali. A ve Stridu mám taky NDA, nebyl tam design hlavní, takže tam nebylo co ukazovat.'", "summary": "Portfolio neexistuje (1) NDA, (2) papírové prototypy, (3) design nebyl hlavní. Ke každému CV posílat průvodní dopis vysvětlující, PROČ nemá portfolio. Portfolio jako gatekeeping artefakt, který systematicky diskriminuje designery z korporátů a agentur s NDA", "session": "P4", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hDt8HBMW8xZ3FsNXAIql1", "video_clip": "[video highlight_clip_VmNjmq.mp4 00:00.5-00:41.1]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H4"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "p9lnfL4olcqKMhTlNSmb", "text": "[Speaker 2] 'Tak v tom WhiteSoftu, to je takový malý korporát tady v Brně, který se zabývá tiskem, pomáhá spravovat tisk malým i velkým firmám, aby to bylo bezpečnější, když to tak jako jenom shrnu. A posílala jsem tam ten životopis přes kamarádku, s tím, že jsem viděla vypsanou pozici už nějakou delší dobu teda, nebo minimálně po druhé, na to se ještě pak musím zeptat, až tam opravdu budu, že buď někdo odešel, anebo nevím. Každopádně posílala to tam kamarádka, já jsem si zase říkala, že když už se někam hlásím, tak ať z toho má někdo referral bonus. Takže jsme to udělali takto. A tam vlastně velice rychle, fakt třeba následující pracovní den, nebo tak nějak, mi psala e-mail rekrutérka, když se domluvíme, abychom se popovídali, že takový základ. Prescreening vlastně, to byl půlhodinový hovor, kdy ona asi až tak nevěděla, o čem se bavíme, ale takový ten základ tam byl. Na základě toho jsme se pak domluvili pohovor jenom já a dvě potenciální kolegyně, s kterými bych byla v týmu. To byl hodinu a čtvrt rozhovor, tam jsme se bavili konkrétně o mých zkušenostech, o tom, co dělají oni, popisovali mi to vlastně produkt, jak pracují, protože to je taková specifická forma práce, oni nemají manažery a UX asi tam fungují jako konzultanti převážně. Takže to mi popisovali vlastně a bavili jsme se o nějakých dalších takových věcech. A potom jsme měli další, na který jsem se měla připravit pět až deset minut povídání na jedno ze čtyř nebo z pěti témat, které mi nabídly. To jsem si dělala jako prezentaci, snažila jsem se shánět screenshoty a tak. A pak se mě zkoušely, jak přemýšlím, dávaly mi prostě konkrétní věci, co se jim jako dějou v práci a já jsem měla nějakým způsobem zareagovat, mluvit nahlas, co mi v hlavě běží. Pak jsme chvilku přešli do angličtiny, pak se mě ještě na nějaké takové věci ptaly, prostě týmové, byla tam coachka součástí toho pohovoru, nějaká jejich, asi ne scrum masterka, ale prostě něco v tom smyslu. Byl tam product owner, s kterým spolupracují a zase ty dvě designérky.'", "summary": "Ukázka hiring procesu — 3 kola: (1) prescreening s rekrutérkou (půl hodiny, základy), (2) hodinu a čtvrt s designérkami z týmu — produkt, zkušenosti, kulturní fit, (3) prezentace case study + live úkoly z praxe + angličtina + coachka + product owner. Klíčové: kandidátka pohovoruje s budoucími kolegyněmi, ne s manažerem. Proces orientovaný na tým, ne na hierarchii.", "session": "P4", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hVBhtrFyNDrGsgDw34Zhd", "video_clip": "[video highlight_clip_p9lnfL.mp4 00:00.2-02:00.7]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "aT74C0vcUfVcROx1LceJ", "text": "[Speaker 2] 'Já myslím, že největší vliv na to mělo to, že jsme se jakoby sedly nějakým způsobem, jsme si byly příjemné, jakože určitě během těch rozhovorů. Ale moje příprava na to druhé kolo, i vlastně na to první, už bylo jakoby zjistit něco o té firmě, prostě podívat se na nějaký Atmoskopu, tady tyhle věci, jak to tam funguje, podívat se, kde to je, a jak se tam dostanu. A pak vlastně během toho rozhovoru, tak jak jsem říkala, první mi vykládali o tom jejich produktu, jestli mě to vůbec jako zaujme, protože, co si budem — ono když jsou to nějaké tiskárny, tak já jsem se na to dívala, tak jsem si říkala, proč tam potřebují designéry, to je přeci takový pytlák jenom, že jo, pak maximálně nějaké administrátorské nastavení, a pak se můžou tak moc designovat, aby tam měli tři designéry, tak mi to pak dovysvětlili trochu víc, že tam toho je samozřejmě víc, a probíhá tam nějaký redesign, takže proto. A vlastně bavili jsme se o tady tomto, pak říkám o těch mých zkušenostech, já jsem jim vykládala, co jsem kdy jakoby dělala, na čem, a co mě jako bavilo, nebavilo, a o sobě, jakože oni mi říkali něco o sobě. No a pak mě vlastně pozvali na to další kolo, jakože jim se mnou dobře mluvilo a tak, ale jakoby to první kolo s těma designérkama nebylo zkoušení, nebylo o mých znalostech.'", "summary": "Druhé kolo s designérským týmem nesloužilo k testování hard skills, ale k oboustrannému ověření culture fitu a představení produktu; firma překonala počáteční pochybnosti kandidátky o náplni práce", "session": "P4", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hJr2QCFYJoH0nEXlYfpdj", "video_clip": "[video highlight_clip_aT74C0.mp4 00:00.6-01:27.1]", "tags": {"Emoce": ["Důvěra"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady"], "Intenzita": ["Silně"]}}, {"id": "wdPMSioJqamO20xnTkDo", "text": "[Speaker 2] 'Vlastně říkám, byly tam ještě další dva lidi navíc. Ta coachka, ta se připojila později trošku, a ten product owner, ten zase se dřív odpojil, takže já jsem vlastně začínala to třetí kolo vlastně tou svou prezentací, kdy jak říkám, oni mi předem poslali seznam, ze kterého si mám vybrat.' [Speaker 1] 'Můžu se zeptat, jaký témata byly v nabídce, pokud to není nějaký tajný?' [Speaker 2] 'Jedno z nich bylo třeba fuck up, jedno z nich, které jsem si nakonec vybrala, tak bylo před a po. ' [Speaker 2] 'Pak tam bylo nějaké — nějaký zlepšovák, který bych já sama třeba vymyslela, nebo výzkum, který jsem iniciovala, a jestli byly tyhle ty čtyři, nebo ještě nějaký pátý, tak to se teďka nejsem jistá, ale minimálně tyhle čtyři. To asi vymýšleli, ale předpokládám jako že ty holky, protože vy s tím se jakoby každý den potkávají a dávalo to jakoby smysl k tomu, co mi říkali, že dělají za práci tady tyhle ty.' [Speaker 1] 'Sis vybrala.' [Speaker 2] 'Vybrala jsem si tady to před a po, protože to byla vlastně poslední pořádná UXácká práce v Czechitas, a my jsme tam dělali úpravu portálu pro lektory a účastnice, a věděla jsem, že minimálně seženu od vývojáře, protože to je kamarád, tak od něho seženu nějaké podklady, nebo to dokážu tak popsat, a hlavně jsem získala přístupy do aktuálního portálu, takže jsem si mohla udělat ty screenshoty, abych aspoň nemluvila jenom tak jako naslepo prostě o něčem. A přišlo mi to taková fajn.' [Speaker 1] 'A ta struktura toho, jak se to prezentovala, byla na tobě to bylo to bylo takhle jako řekněme velmi volně zadaný úkol, prostě mluv 10 minut na téma před a po jo.' [Speaker 2] '5 až 10 minut, jak to pojmu, tak myslím si, že teda pocitově — já osobně bych to tak udělala, že i vlastně to, jak jsem to pojala, tak to je taky nějakým způsobem to hodnocení. Ale to mi nikdo neříkal.'", "summary": "Vnímala volnou prezentaci (volba z 5 možností) jako skrytý test schopnosti strukturovat informace, téma si ale vybrala podle toho, k čemu měla zrovna podklady. Formát volný — 5–10 minut, struktura na ní. Implicitní test designérského myšlení.", "session": "P4", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hn11vksXfOqBQeI0nTrHQ", "video_clip": "[video highlight_clip_wdPMSi.mp4 00:00.3-02:00.0]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Intenzita": ["Neutrálně"], "Default group": ["Pozitivní příklady", "Workflow / Chování"]}}, {"id": "C45UshjKIuq4zoxJyzsZ", "text": "[Speaker 2] 'Potom byl prostor na jejich otázky a na moje otázky, protože já jsem mezitím měla nějakou otázku k té firmě, takže to mi pak odpovídal ten product owner, který vlastně věděl na to líp odpověď, než ty designérky. A potom mi dávali nějaké ty úkoly, jakože konkrétní úkoly z praxe, které se jim prostě dějí, s tím, že byly teda trošičku do extrému a měla jsem odpovídat hned. Takže když řeknu jeden konkrétní třeba, tak navrhla jsem nějakou hlášku do toho systému a pořád mi ji někdo vrací. Zase to bylo hodně konkrétní, to nevím, jestli můžu a chci říkat, ale prostě pořád mi to někdo vrací a jak se v různých těch fázích toho vracení budu — jak se zachovám, co jim na to řeknu těm lidem. Protože tam se to často děje, že vývojář přijde sám s nápadem, který na jednu stranu smysl dává, na druhou ne, tak jak se zachovám. Takže vlastně zase čekali nějakou moji odpověď a pak byl třetí úkol, ten už se nepamatuji. A potom jsme zkoušeli teda přepnout bez upozornění do té angličtiny, protože oni věděli, že bude trochu pro mě problém, ale tím jsem prošla teda úplně v pohodě. Ale zase je rozdíl bavit se o něčem, o čem člověk ví, což je o mně, nebo bavit se úplně o něčem jiném, ale to jako se doučím v pohodě. A pak nějaká taková otázka, co si myslím, že bych přinesla do týmu, když už vím, jak ten tým funguje. Co mě na tom láká, vlastně na té práci u nich.'", "summary": "Pohovor testuje komunikační dovednosti, zvládání zpětné vazby a reakce pod tlakem.", "session": "P4", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hpbIbCoXYtPiUgJWvS47O", "video_clip": "[video highlight_clip_C45Ush.mp4 00:01.8-01:33.3]", "tags": {"Hypotézy": ["H1", "H4"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady"], "Intenzita": ["Silně"]}}, {"id": "duwA6PjHBO3S3LTfVun6", "text": "[Speaker 2] 'Vlastně v tu chvíli, kdy já jsem odpovídala, tak jedna z těch designérek vždycky řekla, že třeba, když už jsem se trápila, nevěděla, co dál říkat, když se to taky řekne, tak její ta odpověď stačí a popsala vlastně, co slyšela z těch mých odpovědí. Můj myšlenkový pochod, jak se jí líbil, jestli se jí líbil a ta zpětná vazba tam na tahle úrovni byla. Že jsem úplně mimo, to tam asi nepadlo, to jsem doufám nebyla, ale to by mě asi nevzali. Ale ta zpětná vazba byla okamžitá, z hlediska toho vyjádření.'", "summary": "Zpětná vazba v reálném čase během pohovoru. Okamžitý feedback na myšlenkový pochod, ne čekání na výsledek; pocit jistoty. Kontrast s typickým procesem, kde feedback přijde až po týdnech (nebo vůbec).", "session": "P4", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hZJIkyFjuqwUmvQuWAc9X", "video_clip": "[video highlight_clip_duwA6P.mp4 00:01.9-00:35.7]", "tags": {"Hypotézy": ["H1", "H2"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady", "Trust signals"], "Intenzita": ["Silně"]}}, {"id": "hfw3VOtuiPg4SwoDtwfh", "text": "[Speaker 2] 'Lišilo se to, no v tom, že se teda taky dlouho neozývali, jak jsem říkala. To byl jako velký rozdíl. Už hned jako by na to první kolo s tím týmem si mě pozvali k nim. Takže jsem tam byla fyzicky. A to je taková asi jako specifikum, strašně špatně se hledalo něco o tom projektu, na kterém bych pracovala. To je grantový projekt a vlastně kdybych asi neměla takový vstup do ISU, jako bývalý student, nebo bývalý student vlastně, tak mám přístup pořád, tak bych to ani nedohledala a vlastně nevěděla, na co se hlásím, protože ten projekt je obrovský, čítá milion grantů a oni jsou jenom jedna malinkatá součást. A to tam nebylo až tak dobře specifikované v tom inzerátu. Ale to se mi pak povedlo dohledat, takže jsem na to se dala připravit. Inzerát teda během toho, když jsem se chtěla připravovat den předtím, tak zmizel, protože už byl měsíc nahraný a jim to tam zmizelo, takže se na to připravovala trochu hůř. Já jsem to neměla stažené. '", "summary": "Problém hiring procesu – Špatná informační náplň inzerátu (zmizel před pohovorem, neodráží správně job description)", "session": "P4", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hCVfB3W5KdDKB3au9FEdB", "video_clip": "[video highlight_clip_hfw3VO.mp4 00:00.6-01:01.8]", "tags": {"Hypotézy": ["Emergent", "H1"], "Emoce": ["Frustrace/zklamání"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "cvhMs96IHlqkGDeWQQ0i", "text": "[Speaker 2] 'Oni mi dali skvělou příležitost pro ně pracovat na 0.2. Protože to jenom tak jako nikde nebylo. Když už, tak to byly jenom právě nějaké konzultace pro jiné nějaké IT firmy, kde prostě bych si nic nenaučila. Tady jsem se dokázala něco naučit. Mám různé zkušenosti, ne úplně ty, co jsem chtěla, ale získala jsem tam hodně zkušeností. Poslední dobou, když už byly projekty, tak byly výzkumnické. A já se jako výzkumník — chtěla jsem být výzkumník, nepodařilo se mi ve Stridu stát se výzkumnicí. A když už bych výzkumnicí byla, tak byla juniorní. A to tam teďka není žádné. A jsou potřeba výzkumníci seniorní.' [Speaker 1] 'Dobře a ještě přemýšlím, jako dali ti příležitost pracovat na 0. Dvojku? Chápu super v rámci mateřské, že jo, tak to je jako příjemný. A když bysme se bavili o tom procesu náboru, tak jaký byly ty jejich kritéria, jejich způsob hodnocení tebe vlastně aby, aby si jako ověřili, že?' [Speaker 2] 'Jo, o tom jsme vůbec neřešili tehdy. Já jsem se prostě jim ozvala na doporučení někoho, že by mi možná mohli dát práci. A oni řekli, jo zrovna někoho potřebujeme, kdo má nějaké zkušenosti alespoň s čímkoliv. A nevadí nám vlastně, že máš tu 0.2, a že budeš doma týden, protože jsou děcka nemocné. Tohle jsme vůbec neřešili. Ale myslím si zpětně, že to je chyba, že vlastně jsem zjistila za ty dva roky, že o mě vůbec nic neví.'", "summary": "Absence assessmentu: Nábor probíhající čistě na základě doporučení bez jakéhokoliv počátečního zhodnocení dovedností vede k dlouhodobé neznalosti skutečných kompetencí zaměstnance, což sama kandidátka zpětně hodnotí jako chybu.", "session": "P4", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hwhGb0cUysTrqm64BxJzy", "video_clip": "[video highlight_clip_cvhMs9.mp4 00:01.3-01:33.9]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "bTubcSo5JtYScCzt4D4X", "text": "[Speaker 2] 'V konkrétně v Honeywellu byl problém s malým počtem designérů. Tady v Brně potom ke konci, než jsem odešla na rodičák, což je 2020, tak dokonce v letectví žádný UXák oficiálně nebyl, ani já. Já jsem byla jako system engineer vedená, protože všichni museli být v Americe. Takže tam, jakoby co se týče toho, jak jsem dobrá skillově jako UX designer, mi asi někdo právě zpětnou vazbu pořádně nedal, protože neměl kdo. Ale co se týče potom nějaké lidské stránky a toho, jak se se mnou spolupracuje, jaké jsou výsledky těch mých nápadů, tak to dokázali vlastně i vývojáři. A já jsem vlastně tam vystřídala hodně projektů za těch kolik, 6–7 aktivních let, kdy ty projekty třeba jako skončily, nebo mi tam třeba nevyhovoval ten projekt nebo něco takový. Takže já jsem nebyla čistě na jedné pozici na jednom projektu, ale měla jsem toho docela dost. I v rámci pozic, že mám Scrum Master kurz, tak jsem jednou dělala i částečně Scrum Lady na projektu a tak. Takže tam se to střídalo a měnili si mě, půjčovali si mě na základě asi jako zase doporučení, tentokrát to bylo asi lidské doporučení, že prostě jim pomůžu.'", "summary": "Absence odborné zpětné vazby: Působení v roli jediného designéra v korporátu vedlo k dlouhodobému nedostatku hodnocení UX dovedností, přičemž její posun napříč projekty fungoval výhradně na základě osobních doporučení a hodnocení soft skills od vývojářů.", "session": "P4", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hbTCFLAQKb4s0in0rX2N8", "video_clip": "[video highlight_clip_bTubcS.mp4 00:00.4-01:25.5]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H7"], "Default group": ["Industry insights", "Pain points"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "vCMW8jSj40MdYTX3CNaa", "text": "[Speaker 2] 'On tam byl, ale pro vývojáře. A tím, že jakoby já jsem byla designér, tak se tam prostě doplnily nějaké moje políčka, ale pak to bylo jenom o tom, jak se ohodnotím já.' [Speaker 1] 'Tedy ty sama ses zhodnotila a neměla jsi nějakého oponenta, který přicházel, challengoval tě? A bylo to vůbec… Teď jsi říkala, že je pro tebe důležitý ten tým v tom honeyvalu byl nějaký tým vlastně lidí, který.' [Speaker 2] 'My jsme tam, nás tam bylo víc designérů, pak se to trochu rozpadlo, a ani jsme se jako lidsky moc nesedli, takže tam se potom to hrozně měnilo. Pak to byl Human Factors, ale oni jsou přece jenom trošičku jinak zaměření. Ale byl tam jeden právě kolega, který dokázal dávat dobrou zpětnou vazbu a jakoby byl takovým mentorem, než odešel. A já jsem měla, co se týče třeba zpětné vazby na ty designy, tak já jsem měla skvělý vývojový tým, kde byli frontendisti s velkým přesahem, anebo systém inženýr s velkým přesahem. Ne, že by tomu nějak víc rozuměli, ale ten druhý pohled na věc prostě z jiného úhlu byl v té době dostačující.'", "summary": "Chybějící hodnocení pro designéry: Firma měla systém jen pro vývojáře, designérka uvízla u pouhého sebehodnocení („jenom o tom, jak se ohodnotím já“) a postrádala odbornou zpětnou vazbu od jiného designéra, kterou jí museli částečně nahrazovat vývojáři.", "session": "P4", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hyCopW05GbNdI7VMSX7ma", "video_clip": "[video highlight_clip_vCMW8j.mp4 00:01.2-01:03.9]", "tags": {"Default group": ["Existing solutions", "Pain points"], "Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H11", "H7"], "Perspektiva": ["Kandidát"], "Intenzita": ["Velmi silně"]}}, {"id": "2BV8zSzSaQfbzPd0Yhjz", "text": "[Speaker 2] 'Portfolio. Pro mě je to portfolio. I jako to, že zabere hromadu času a nic neřekne. Pokud to člověk, pokud dělá člověk celou dobu sám na sebe a ty jeho designy se někam implementovaly a je to veřejné, tak jako v pohodě. To mi přijde super. Ale pokud dělám v korporátu nebo prostě nějakou specifickou práci, jako třeba právě pro Czechitas, nebylo Figma, zdrojáky prostě, nebo něco takového, tak jakože já bych si s tím portfoliem fakt trcala strašně dlouho a asi by nemělo podle mě vůbec ani takový efekt a nikdo by z něho nepoznal, jak přemýšlím, jaká jsem.' [Speaker 1] 'Takže myslíš jako, že by vůbec to portfolio jako artefakt vyřadila jako z celého procesu, protože v něm nevidíš přidanou hodnotu. V podstatě se dá říct. A nebo to znamená něco jinýho?' [Speaker 2] 'Jako strašně záleží, ale jako vidím to i ve Stridu, jako my tam prostě máme ty NDA, i kolegy, kteří prostě pracovali normálně, nejenom na těch projektech, co já, tak prostě — jako pokud case tady nevyšla na webu, tak ji prostě nemůžou použít, nemůžou říct, že s tímhle zákazníkem pracovali, protože to taky není ofiko. A jako když se pak chtějí někam hlásit, tak pokud je někdo vyloženě takhle nedoporučí, která vlastně zkušeností je skvělá, tak prostě, jak to má udělat? ' [Speaker 1] 'Rozumím.' [Speaker 2] 'Jako může to anonymizovat samozřejmě, ale otázka je, jestli pak něco řekne. Nedokážu posoudit. Ale jako za mě byl fakt problém s tím portfoliem, že vlastně všude vždycky chtějí to portfolio. A jakože, a hlavně třeba já mám další věc, já jsem byla na rodičáku jako 5 let a říkám, pracovala jsem u něj, ale hypoteticky jsem nemusela. A co já jim budu ukazovat věci, co jsem dělala před 6 lety? Jako fakt? Jako něco, kdy AI vůbec nebylo v té době, vůbec. Ta Figma se jenom za tu dobu, než začal Covid a než jsem šla na rodičák, tak změnila, že prostě to je úplně jiný nástroj. A jakože na těch obrázcích nikdo nikdo nepochopí, jak přemýšlím.' [Speaker 1] 'Je něco, co bys ty vzkázala firmám, který najímají designéry? A není to, aby vynechali portfolio ještě něco dalšího?' [Speaker 2] 'Přemýšlím. Já jsem se jakoby nesetkala s tím, že bych měla špatný pohovor. Já jsem jich teda neměla tak moc. Ale nebylo to nikdy a nikdy mě neshazoval během toho pohovoru. Nebo prostě neshazoval moji práci nebo něco takového. Vím, že se to ale děje, protože nejsem jediná na světě, kdo dělal pohovor. Bavíme se o tom. Takže nedokážu se ve své vlastní pozici takhle posoudit. Ale nevím, nevím. Asi mě nejvíc trápí to portfolio.'", "summary": "Portfolio jako nefunkční standard: vnímá portfolio jako nejrozbitější část náboru (objektivní bariéry - NDA, pauza na rodičovské) a především ukazuje pouze statický vizuál, ze kterého nelze poznat reálné designérské myšlení.", "session": "P4", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hF5Xt9NhfM48WZYbhT777", "video_clip": "[video highlight_clip_2BV8zS.mp4 00:01.7-03:07.5]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1", "H4"], "Default group": ["Industry insights", "Pain points"], "Intenzita": ["Velmi silně"]}}, {"id": "0X4QytmVdpOfMz6TM1JI", "text": "[Speaker 2] 'Ale nejhorší pohovor, co bylo, to bylo, že mi dvakrát přesouvali meeting, kvůli nějaké nedostupnosti nějakých lidí. A potom tam na tom pohovoru seděli nějací jiní lidi. Takže nějaká asistentka tam nějak složitě přesouvala termíny a pak jakože tam seděl někdo, kde já jsem vlastně netušil, já jsem netušil, co to jsou za lidi. To bylo prostě hrozně divný. To je asi jako to nejhorší, co se mi… A potom jeden pohovor probíhal, jakože jsem někde šel, venku. Někdo zazvonil. No jo no tak jestli by se Vám to hodilo teď. To je taky výborný. Ale tam to, ale tam to nebylo jako nějak, že co by mě asi zajímalo.'", "summary": "Nejhorší zážitek: dvakrát přesunutý meeting, na pohovoru jiní lidé než byli avizováni — netušil, s kým mluví. Chaotická organizace = signál o firemní kultuře.", "session": "P1", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hrjX2yKLxccCBWzT2qLNP", "video_clip": "[video highlight_clip_0X4Qyt.mp4 00:00.3-00:53.9]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points"], "Intenzita": ["Silně"]}}, {"id": "otmhuON1xmdcA3rfgd4T", "text": "[Speaker 2] 'Ale nejlepší, kromě 2FRESH samozřejmě, nejlepší bylo, to byla firma, to byla ta personalista, s tím člověkem, který mě nabíral, se se mnou bavili o tom, jako na rovinu, co očekávají, jako v čem si oni myslí, že bych mohl na tom pohovoru jakože excelovat, co tam mám jako říkat, skoro až takhle, nebo na co se mám zaměřit. Takže já jsem byl vlastně potom jako dobře přichystaný na ten pohovor, když tam byl širší okruh těch lidí, kteří se mě ptali nějaké věci, tak vlastně to bylo zajímavé. A já jsem se cítil, že oni mě vlastně připravují na ten pohovor sami. Ještě hezký, jakože ten personalista mi řekl, co se ode mě očekává, potom ten člověk, co mě nabíral, a to nebylo jeho rozhodnutí, to bylo rozhodnutí týmu, tak on mi řekl, hele, jo, tohle je fajn, tohle je fajn, a čeká nás ještě tohle kolo, a rád bych tam, abys tam více řekl tohle, a neříkej třeba tohle, protože to nás jako nezajímá třeba, jo. To bylo hrozně fajn, že mě vlastně udělali guiding toho pohovoru přímo ta firma, která mě nabírala, což jsem úplně říkal, wow, to je něco, co jsem nezažil nikdy.'", "summary": "Pozitivní příklad — firma proaktivně koučovala kandidáta na pohovor ( na co se zaměřit, co říct, co neříkat.) Coaching = trust signal, firma investuje do úspěchu kandidáta.", "session": "P1", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hznrM75tuvZj8W5HhJvED", "video_clip": "[video highlight_clip_otmhuO.mp4 00:01.4-01:09.3]", "tags": {"Emoce": ["Důvěra"], "Hypotézy": ["Emergent", "H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pozitivní příklady", "Trust signals"], "Intenzita": ["Velmi silně"]}}, {"id": "OdZkM28nTzCuEAVwvYLY", "text": "[Speaker 2] 'A potom ještě jeden krátký story, jedna technologická firma, já jsem viděl, že mají dvoukolový pohovor, a během prvního kola jsme přešli do fázy toho druhého kola. Jak to vlastně stalo? Jo, prostě jsme se, měl to jako struktura, a potom, no, a řekl, a teď mi, prosím, ukáž mi tady tohle a tohle a tohle, jo, takže vlastně po mně chtěli, ať tam odprezentuju něco, co jsem neměl vůbec připravené, takže jako já jsem ukázal jako svoji přípravu té přípravy, jo, ale prostě bylo to, jako, že oni skipli úplně, že se to prostě jako zkondenzovali, a neřekli mi o tom.' [Speaker 1] 'A to bylo teda jako zážitek, kterej hodnotíš spíš na tý straně toho jako spíš.' [Speaker 2] 'Spíš negativně, protože jako já jsem si uvědomil, že kdybych se třeba nepřipravoval nějak do nějaké podoby, tak vlastně nemám co ukázat. Protože jedna z těch věcí u těch firem je, že ty odpovídáš na jejich inzerát, na jejich poptávku, tak jako ty to přizpůsobuješ to, co nabízíš, i její poptávce. Takže když ta firma třeba dělá v oblasti nějaké technologické, tak jako více se zaměříš na tu technologičtější stránku, a když dělá třeba více s lidmi, tak zase více se zaměříš na tuhle stránku. Dneska to není o tom, jako že se nabízíš, ale ta nabídka a poptávka vlastně musí sedět navzájem. Jakože opravdu, jako že ty můžeš mít nějaké koníčky, které třeba zapádají do toho portfolia té firmy, tak můžeš o tom mluvit.'", "summary": "Hiring proces pain points: Firma skipla z 1. do 2. kola bez varování -> Negativní zážitek. Přizpůsobuje portfolio/prezentaci konkrétní firmě", "session": "P1", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h5rfW9Zntf9tWwyt3fljd", "video_clip": "[video highlight_clip_OdZkM2.mp4 00:00.9-01:53.2]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "cSNp7KyhFbwGih1P6vTF", "text": "[Speaker 2] 'No, hele tak tam je to zajímavý, tam myslím si, že u některých, někteří potřebovali vidět ten rekord track, takže na ně dělal dojem prostě, jaké všechny projekty si odbavil a to jim stačilo, jo, to bylo zajímavý pro mě třeba. Ale u těch, kdy to bylo více do hloubky, tak tam vlastně jsem prezentoval svoji práci, dopady a výstupy a vlastně já jsem si nachystal tři nějaké prezentace, do nějaké úrovně prostě detailu, jako od overviewu až po nějaký hodně detailní. A vlastně ty nejlepší pohovory byly, když jsme se bavili o tom, co ta práce přináší, co jsem tam řešil a tak dále, jako ty case studies byly — to chtěli tři nebo čtyři firmy chtěli case study, kde jsem měl možnost jako prezentovat ty věci a do hloubky se ptali na otázky, co je k tomu napadaly. Jedna firma, tam jsem dělal úkol, to jsem zažil po dlouhé době, já jsem naposledy hledal práci před sedmi lety třeba, jo. Ale tam jsem dělal úkol a nejvtipnější na tom je, že ten úkol vyžadoval, dostal jsem k tomu nějaký podklad dopředu, oni mi řekli, nevěnuj tomu moc času, protože je to jenom pohovor. A potom ten úkol vyžadoval třeba hodinu, dvě a na základě toho briefu mi bylo třeba jasný, že se to nedá vyřešit za hodinu toho úkolu. A oni mi potom nepřijali na základě toho, že jsem nedokázal přinést rozhodnutí, se kterým ten tým půl roku bojoval, na základě toho hodinového pohovoru, což bylo hrozně vtipný.'", "summary": "Hodnocení v hiring procesu: (1) výčet projektů (2) case study prezentace (3) úkol na zkoušku — vyřešení problému, se kterým bojovali půl roku, v hodinovém úkolu –> nerealistická očekávání na design úkoly.", "session": "P1", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hY3XFj94Eunzbmbn59KAY", "video_clip": "[video highlight_clip_cSNp7K.mp4 00:01.8-01:57.5]", "tags": {"Emoce": ["Frustrace/zklamání"], "Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Silně"]}}, {"id": "LdxZ9QG0priadtBEylKg", "text": "[Speaker 2] 'Oni očekávali, že já jim tam jako vyřeším některé věci a rozhodnu. A jako ten průběh byl fajn, to bylo prostě jako vyloženě jako pracovní schůzka, kdy jsme řešili nějaké to téma ve fázi discovery. A já jsem potom tam řekl, hele, ale tady nemáme ty informace, tady chybí tohleto, tady bych potřeboval ještě tohleto, a oni se ptali, a jak by ses rozhodl? A já říkám, jako já teď na základě toho nevím, jak bych se rozhodl, protože jsou tyhle možnosti. A oni mi potom napsali, hele, ale ty jsi byl takovej nerozhodnej hrozně. A já jsem potom tu firmu trochu sledoval zpovzdálí a měli tam nějaké layoffs i v tom departmentu, kam jsem se hlásil. Takže jako, neříkám, že to s tím souvisí, ale bylo to zajímavý prostě, jakože že někdy ty očekávání jako jsou takový zajímavý, no.' [Speaker 1] 'Jo jo jasně, takže svým způsobem to jako nebylo úplně fér vlastně, nebo respektive chápu průběh toho úkolu fér. Byl ale vlastně ten závěr, ke kterému došli, je úplně fér. Nebyl, protože jako nevzali v úvahu úplně asi všechny. A no tak to není. Já se teďka vlastně podstatný jo?'", "summary": "Problematika design úkolu: Firma čekala rozhodnutí od jednoho člověka v hodinovém úkolu — problém, který tým řešil půl roku. Ukazuje kadidátovi firemní kulturu.", "session": "P1", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hI1Kj1VdOxDf1xkW8LHDL", "video_clip": "[video highlight_clip_LdxZ9Q.mp4 00:01.9-01:17.7]", "tags": {"Hypotézy": ["H1"], "Default group": ["Industry insights", "Trust signals"], "Perspektiva": ["Kandidát"], "Intenzita": ["Silně"]}}, {"id": "pLbe44feOvE9cvANCJWu", "text": "[Speaker 2] 'Myslím, že není, já jsem potřeboval, to bylo. Ne, já jsem byl třeba nakonec rád. Já jsem si to potom jako projížděl zpětně vlastně a říkal jsem si, hele, tak jestli ta zodpovědnost je jako na jednom člověku a není na tom týmu těch lidí, tak to asi není prostředí, ve kterém já bych asi rád pracoval delší dobu. A to jsem si potom uvědomil, že bylo asi třeba pro mě dobře, jo, jakože ta firma byla nastavena jinak, jak fungovala, a vlastně mi to pomohlo trochu odkrýt tohleto.'", "summary": "Pohovor jako diagnostika firemní kultury — i “neúspěšný” pohovor přinese cenné informace.", "session": "P1", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/h5eArcMkVvkNvkuarSvOX", "video_clip": "[video highlight_clip_pLbe44.mp4 00:00.3-00:36.4]", "tags": {"Hypotézy": ["H1"], "Perspektiva": ["Kandidát"], "Default group": ["Motivátory & Bariéry", "Pain points", "Trust signals"]}}, {"id": "wfPv8uSnQdCCtGcwyany", "text": "[Speaker 2] 'Jo potom hrozně zajímavý bylo, že byl pohovor, kde oni mi ukázali jako obrovský Miro, kde mi ukázali, jako jak ten tým pracuje. A pak chtěli po mně, ať jim navrhuji věci, které — ať jim říkám věci, které se mi líbí a nelíbí na jejich procesech. To bylo tak, jakože jako já jsem evaluoval vlastně tu firmu hodně. Ale to bylo, hele, to bylo ry"], "Hypotézy": ["H1"], "Perspektiva": ["Hiring manager"]}}, {"id": "fYD9HarcJVz6WLRsCWRZ", "text": "[Speaker 2] 'takže má to takové tři části bych řekl. První je taková jako normálně jako skill check, co ten člověk jako vlastně jak zvládá to, co, nebo prostě jestli kompetentní na tu pozici, co potřebujeme. Takže to je vlastně část, kterou někdy jsme to připravovali třeba i ve více lidech. Jo, takový prostě otázky, které jsou cílené na to. Na ten obleček vyloženě prostě, jestli tam je technicky nebo sami, jak je. Nějakej jako.' [Speaker 1] 'Promiň, takže otázky ho máte připravený otázky, pomocí kterých zjišťujete. Úroveň toho skillu.' [Speaker 2] 'Otázky přímo ne. Já jsem měl vždycky prezentaci.' [Speaker 1] 'OK.' [Speaker 2] 'Takže jsem řekl, hele teď, ahoj, jak se máš, jak jsi měl dneska den, jakože temperature check, a pak jsme se bavili, četli jsme životopis, víme o tobě tohle. Otázky se týkaly většinou toho životopisu, něco jako zaujalo nás, nebo všimli jsme si. Tady ten člověk měl možnost krátce něco o sobě říct, a pak je ten skill check vlastně, taková prezentace malá, kde jsme se bavili o těch konkrétních věcech, že to byla nějaká otázka s obrázkem třeba, nebo nějaké screeny nějaké aplikace, a o tom jsme se třeba bavili. Pro nás bylo klíčové, aby ten člověk dokázal se bavit vlastně o věcech, které vidí. Nás zajímalo, jak ten člověk bude jako se chovat v nějakém přirozenějším prostředí, ne ať to není jakože test, ale ať je prostě nějaký rozhovor nad ničím. Tak jsme mu ukázali třeba kus nějakého designu a řekli jsme, hele, teď jsme tady tohle řešili, a máme tyhle nápady, co si o tom myslíš, jo, třeba tímhle způsobem. A na pozadí jsme měli pro sebe udělali takový background check, jako co nás zajímá třeba na jejich odpovědích, jo, třeba jestli nám to bude jenom chválit, nebo jestli se zeptá na něco, nebo jestli, když tam máme chybu schválně, jestli na to upozorní, jestli si to všimne'", "summary": "Hiring process jako lead: tři části — (1) skill check, (2) konverzační interview, (3) team fit", "session": "P1", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hkLGWBkqW7E5Ghz2uDmdJ", "video_clip": "[video highlight_clip_fYD9Ha.mp4 00:01.8-02:20.5]", "tags": {"Default group": ["Existing solutions", "Workflow / Chování"], "Hypotézy": ["H1"], "Perspektiva": ["Lead"], "Intenzita": ["Silně"]}}, {"id": "6TX3ys4x3F0sRjSrWDpM", "text": "[Speaker 2] 'Nás zajímalo, jak ten člověk bude jako se chovat v nějakém přirozenějším prostředí, ne ať to není jakože test, ale ať je prostě nějaký rozhovor nad ničím. Tak jsme mu ukázali třeba kus nějakého designu a řekli jsme, hele, teď jsme tady tohle řešili, a máme tyhle nápady, co si o tom myslíš, jo, třeba tímhle způsobem'", "summary": "Hiring process jako lead: “Nás zajímalo, jak se chová v přirozenějším prostředí” Konverzační formát > testový formát.", "session": "P1", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hUgwsGSdaFcRjvHXWswir", "video_clip": "[video highlight_clip_6TX3ys.mp4 00:01.3-00:19.0]", "tags": {"Default group": ["Existing solutions", "Workflow / Chování"], "Hypotézy": ["H1"], "Perspektiva": ["Hiring manager"]}}, {"id": "AM8d1DfyOUJbXfTsSG6P", "text": "[Speaker 2] 'No, jako já nemyslím, že je dobře, že na pohovoru jako jeden na jednoho. Já mám radši, když tam jsou třeba ti dva lidé, prostě nějaký jako člověk, který třeba je ten decision maker a nějaký prostě k tomu, že je to více taková konverzace i mezi těmi lidmi. My jsme zjistili třeba, když jsme nabírali, že my se třeba mezi sebou pobavíme krátce, že ten člověk potom má pocit, že je součástí spíš rozhovoru, ne výslechu. Pro nás to bylo jako klíčové, že jsme si třeba navzájem řekli něco před ním. Taková jako věc, která mi přišla užitečná i třeba pro nás, že on neměl pocit, že musí pořád mít na všechno správnou odpověď. Ten člověk je méně pod tlakem potom. Když jsem zažil pohovor jeden na jednoho, tak je to hodně takové jako, že jak když máš meč a štít, že prostě jeden za tebe šije a ty to buď ubráníš, nebo ne. Takže ano, byli jsme — ty poslední, co jsme dělali, tak jsme vždycky dva na tom a snažili jsme se, ať je to spíš konverzační. Ať cítí ten člověk dobře, že prostě přijde na to, že je to sice pohovor, ale chceme si hlavně popovídat, abychom zjistili vlastně, jak na tom jsme.'", "summary": "Pair interview jako best practice (méně tlaku → přirozenější chování → lepší data pro hodnocení)", "session": "P1", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hXdd2viV8jtVVi5gK2O0R", "video_clip": "[video highlight_clip_AM8d1D.mp4 00:01.7-01:27.6]", "tags": {"Hypotézy": ["Emergent", "H1"], "Perspektiva": ["Lead"], "Default group": ["Pozitivní příklady", "Trust signals"], "Intenzita": ["Velmi silně"]}}, {"id": "tVKHXqwSGUVxtjULCxm8", "text": "[Speaker 2] 'To je velmi jednoduché. Máme ten checklist. Když to projdeme, kdo co vnímal, jestli to sedí, nebo nesedí. To je nějaká otázka, myslíš si, že ten člověk se dokáže v tomto posunout, nebo ne? Když je to nějaká věc, kterou my potřebujeme, a nezachytili jsme to tam. Takže to je potom otázka, že většinou potom ještě následovalo jedno kolo, kde se to doladilo. To už byl jenom ten hiring manager s nějakým feedbackem nebo s nějakou nabídkou. Nás zajímalo, jestli třeba to je silná stránka, to je super, tady jsou nějaké věci, které jsme tam zachytili, a pak se pobavíme, jak ten člověk zapadl mezi ty lidi.' [Speaker 1] 'A todle byl. Jako interview, který bylo jediný, to znamená na týhletý schůzce jste posbírali data a udělali rozhodnutí, nebo pak byli ještě nějaký další kola třeba?' [Speaker 2] 'Většinou jako jednokolové. A to to, že to to, že třeba když jako už jako je ten zájem třeba a nebo si potřebujeme jako ujasnit jako že co a jak, ale tam už jsme nebyli 2 tam byli vždycky jenom 1.'", "summary": "Hiring process: Hlavním výstupem z pohovoru je posouzení, zda je soulad checklistu firmy a vlastností kandidáta.", "session": "P1", "date": "10/04/2026", "setting": "", "link": "https://share.condens.io/hNZBgdqQJ7FkjYeIFOdTF", "video_clip": "[video highlight_clip_tVKHXq.mp4 00:01.7-01:26.1]", "tags": {"Hypotézy": ["H1", "H2", "H6"], "Perspektiva": ["Lead"], "Default group": ["Pain points", "Workflow / Chování"], "Intenzita": ["Silně"]}}];
const FILTERS = {
  "Hypotézy": new Set(),
  "Default group": new Set(),
  "session": new Set(),
  "Intenzita": new Set(),
  "Perspektiva": new Set(),
  "Emoce": new Set(),
};
const SORT = {
  "Hypotézy": "abc",
  "Default group": "count",
  "session": "abc",
  "Intenzita": "abc",
  "Perspektiva": "abc",
  "Emoce": "count",
};
const FILTER_LABELS = {
  "Hypotézy": "Hypotéza",
  "Default group": "Kategorie",
  "session": "Respondent",
  "Intenzita": "Intenzita",
  "Perspektiva": "Perspektiva",
  "Emoce": "Emoce",
};
const INTENSITY_ORDER = ["Velmi silně", "Silně", "Neutrálně"];

function natCmp(a, b) {
  // Natural sort: H1, H2, ..., H10, H11 (not H1, H10, H11, H2)
  return a.localeCompare(b, "cs", { numeric: true, sensitivity: "base" });
}

function getFacetValues(group) {
  const counts = new Map();
  for (const h of DATA) {
    const vals = group === "session" ? [h.session] : (h.tags[group] || []);
    for (const v of vals) counts.set(v, (counts.get(v) || 0) + 1);
  }
  let entries = [...counts.entries()];
  if (group === "Intenzita") {
    entries.sort((a,b) => INTENSITY_ORDER.indexOf(a[0]) - INTENSITY_ORDER.indexOf(b[0]));
  } else if (SORT[group] === "abc") {
    entries.sort((a,b) => natCmp(a[0], b[0]));
  } else {
    entries.sort((a,b) => b[1]-a[1] || natCmp(a[0], b[0]));
  }
  return entries;
}

function applyFilters() {
  return DATA.filter(h => {
    for (const [group, selected] of Object.entries(FILTERS)) {
      if (selected.size === 0) continue;
      const vals = group === "session" ? [h.session] : (h.tags[group] || []);
      if (!vals.some(v => selected.has(v))) return false;
    }
    return true;
  });
}

function renderSidebar() {
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";
  for (const group of Object.keys(FILTERS)) {
    const heading = document.createElement("h3");
    const label = document.createElement("span");
    label.textContent = FILTER_LABELS[group];
    heading.appendChild(label);
    if (group !== "Intenzita") {
      const toggle = document.createElement("span");
      toggle.className = "sort-toggle";
      toggle.innerHTML = `
        <button data-sort="abc" class="${SORT[group]==='abc'?'on':''}">A→Z</button>
        <button data-sort="count" class="${SORT[group]==='count'?'on':''}">#</button>
      `;
      toggle.querySelectorAll("button").forEach(btn => {
        btn.onclick = () => { SORT[group] = btn.dataset.sort; render(); };
      });
      heading.appendChild(toggle);
    }
    sidebar.appendChild(heading);
    const chips = document.createElement("div");
    chips.className = "filter-group";
    for (const [val, count] of getFacetValues(group)) {
      const chip = document.createElement("span");
      chip.className = "chip" + (FILTERS[group].has(val) ? " active" : "");
      chip.innerHTML = `${val}<span class="count">${count}</span>`;
      chip.onclick = () => {
        if (FILTERS[group].has(val)) FILTERS[group].delete(val);
        else FILTERS[group].add(val);
        render();
      };
      chips.appendChild(chip);
    }
    sidebar.appendChild(chips);
  }
  const reset = document.createElement("button");
  reset.className = "reset";
  reset.textContent = "Reset filtrů";
  reset.onclick = () => {
    for (const k of Object.keys(FILTERS)) FILTERS[k].clear();
    render();
  };
  sidebar.appendChild(reset);
}

function renderAggregation(filtered) {
  const respondents = new Set(filtered.map(h => h.session));
  const tally = (group) => {
    const m = new Map();
    for (const h of filtered) for (const t of h.tags[group] || []) m.set(t, (m.get(t)||0)+1);
    return [...m.entries()];
  };
  const hypCounts = tally("Hypotézy").sort((a,b) => natCmp(a[0],b[0]));
  const catCounts = tally("Default group").sort((a,b) => b[1]-a[1]);
  const intCounts = tally("Intenzita").sort((a,b) => INTENSITY_ORDER.indexOf(a[0]) - INTENSITY_ORDER.indexOf(b[0]));
  const emCounts = tally("Emoce").sort((a,b) => b[1]-a[1]);
  const cohCounts = tally("session"); // placeholder; real cohort comes later
  const sessCounts = [...new Set(filtered.map(h=>h.session))].sort(natCmp).map(s => [s, filtered.filter(h=>h.session===s).length]);

  const maxOf = (arr) => Math.max(1, ...arr.map(([_,n])=>n));

  const block = (title, entries, order = "value") => {
    if (entries.length === 0) return "";
    const max = maxOf(entries);
    const rows = entries.map(([k,v]) => `
      <div class="agg-row"><span>${escapeHtml(k)}</span><span class="v">${v}</span></div>
      <div class="agg-bar" style="width:${(v/max*100).toFixed(0)}%"></div>
    `).join("");
    return `<div class="agg-block"><h4>${title}</h4>${rows}</div>`;
  };

  document.getElementById("agg").innerHTML = `
    <h2>Agregace ${filtered.length === DATA.length ? "(všechna data)" : "(filtrovaná data)"}</h2>
    <div class="agg-headline">
      <div class="item"><div class="num">${filtered.length}</div><div class="label">Highlights</div></div>
      <div class="item"><div class="num">${respondents.size}</div><div class="label">Respondentů</div></div>
      <div class="item"><div class="num">${hypCounts.length}</div><div class="label">Hypotéz</div></div>
      <div class="item"><div class="num">${catCounts.length}</div><div class="label">Kategorií</div></div>
    </div>
    <div class="agg-grid">
      ${block("Hypotézy", hypCounts)}
      ${block("Kategorie", catCounts)}
      ${block("Intenzita", intCounts)}
      ${block("Respondenti", sessCounts)}
      ${block("Emoce", emCounts)}
    </div>
  `;
}

function renderCards(filtered) {
  const container = document.getElementById("cards");
  document.getElementById("count").textContent = `${filtered.length} z ${DATA.length}`;
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty">Žádné highlighty neodpovídají filtrům.</div>`;
    return;
  }
  filtered.sort((a,b) => {
    const ord = {"Velmi silně": 0, "Silně": 1, "Neutrálně": 2};
    const ia = Math.min(...((a.tags["Intenzita"]||["Neutrálně"]).map(t=>ord[t] ?? 99)));
    const ib = Math.min(...((b.tags["Intenzita"]||["Neutrálně"]).map(t=>ord[t] ?? 99)));
    return ia - ib;
  });
  container.innerHTML = filtered.map(h => {
    const hyps = (h.tags["Hypotézy"]||[]).map(t=>`<span class="tag hypothesis">${t}</span>`).join("");
    const cats = (h.tags["Default group"]||[]).map(t=>`<span class="tag">${t}</span>`).join("");
    const ints = (h.tags["Intenzita"]||[]).map(t=>{
      const cls = t==="Velmi silně" ? "intensity-velmi" : t==="Silně" ? "intensity-silne" : "";
      return `<span class="tag ${cls}">${t}</span>`;
    }).join("");
    const ems = (h.tags["Emoce"]||[]).map(t=>`<span class="tag emotion">${t}</span>`).join("");
    const persp = (h.tags["Perspektiva"]||[]).map(t=>`<span class="tag">${t}</span>`).join("");
    return `<div class="card">
      <div class="summary">${escapeHtml(h.summary)}</div>
      <div class="quote">${escapeHtml(h.text)}</div>
      <button class="quote-toggle" onclick="this.previousElementSibling.classList.toggle('expanded'); this.textContent = this.previousElementSibling.classList.contains('expanded') ? '— sbalit' : '+ rozbalit'">+ rozbalit</button>
      <div class="meta">
        <span class="session">${escapeHtml(h.session)}</span>
        ${hyps}${cats}${ints}${persp}${ems}
        ${h.link ? `<a class="link" href="${h.link}" target="_blank">▶ Condens</a>` : ""}
      </div>
    </div>`;
  }).join("");
}

function escapeHtml(s) {
  return (s||"").replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

function render() {
  const filtered = applyFilters();
  renderSidebar();
  renderAggregation(filtered);
  renderCards(filtered);
}

render();
</script>
